body:
  text: 婦人大全良方卷七宋陳自明撰婦人嘔吐方論第一凡六方夫婦人嘔吐者由脾胃有邪冷榖氣不理所為也胃為水榖之海其氣不調而有風冷乘之冷摶於胃胃氣逆則令嘔吐也愚詳曰夫嘔吐之疾非特脾胃虛冷而嘔吐也亦有胃熱而嘔者亦有胃中冷胃口熱而吐者亦有痰盛而嘔者亦有血弱而嘔者經云無隂則嘔是也不可以一槩用藥如胃冷而嘔吐宜用局方人參丁香散理中元及許仁則半夏元人參七味元如胃熱而嘔吐者宜用小柴胡湯蘆根湯竹茹湯槐花散如胃中冷胃口熱而嘔吐者宜用局方藿香正氣散生薑棗子煎沈冷服即止如痰盛嘔吐者宜局方半夏茯苓湯二陳湯如惡阻兼服茯苓元自有專門見十二卷第二論如血不歸原而嘔吐者宜用十全大補湯加陳皮半夏藿香薑棗煎服或有腳氣而嘔者自有專門不敢濫及益智子散治婦人脾胃久虛氣弱多欲嘔吐全不下食四肢無力益智一兩附子炮縮砂仁丁香厚朴黃耆白术白茯苓陳皮川芎良薑藿香葉當歸各三分人參桂心各半兩右㕮咀每服三錢薑三片棗一枚水一盞煎至七分去滓無時溫服丁香散治婦人臟腑虛冷脾胃氣弱食則嘔吐水榖不消丁香白术縮砂仁草果仁各三分人參一兩當歸白豆䓻藿香葉甘草各半兩橘皮三分神麯訶子各半兩右為細末每服二平錢煎薑棗湯調下竹茹湯治胃熱嘔吐乾葛三兩半夏湯洗十次薑汁半盞漿水一升煮令耗半可取三分用甘草三分右㕮咀每服五錢水二盞薑三片竹茹一彈大棗一枚煎至一盞去滓溫服許學士云胃熱者手足心熱政和中一宗人病傷寒得汗身涼數日忽嘔吐藥與飲食俱不下醫者皆進丁香藿香滑石等藥下咽即吐豫曰此正汗後餘熱留胃脘孫兆竹茹湯正相當爾亟治藥與之即時愈良方槐花散亦相類方皂莢白礬槐花炒令黃黑色甘草等分右為細末白湯調二錢許仁則半夏元療積冷在胃嘔逆不下食方半夏一升真熊州者洗去滑小麥麵一升右搗半夏為散以水搜麵圓如彈子大以水煮令麵熟則是藥成初吞四五元日二服稍加至十四五元旋煮旋服服此覺病減欲更重合服亦佳忌羊肉餳救急同又依前半夏元雖覺漸損然病根不除欲多合前元又慮藥毒不可久服欲不服又恐病滋蔓宜合人參七味元服人參白术各五兩厚朴炙細辛各四兩生薑八兩末橘皮三兩桂心二兩右為細末煉蜜元如梧桐子大飲下十元漸加至二十元與半夏元間服亦可忌桃李雀肉生蔥生菜吳升同婦人霍亂方論第二凡六方論曰嘔吐而利者名霍亂也原疾之由皆因腸胃虛冷飲食過度觸冒風冷使隂陽不和清濁相干致令揮霍變亂也或先心痛而吐者或先腹痛而利者或吐利俱作者或頭痛身體壯熱而脈浮洪者或陽氣暴絶而手足逆冷而脈息微絶者治之當分隂陽察其虛實辨其冷熱觀其脈息熱者涼之冷者溫之以平為期百問云凡霍亂吐利熱多而渴者五苓散寒多不飲水者理中元吐利已汗出而厥四肢拘急不解脈微欲絶者通脈四逆加豬膽汁湯夏月中暑霍亂大煩渴四肢逆冷冷汗出腳轉筋者香薷散濃煎沈冷服即效凡霍亂之脈得浮洪者易治微遲者并氣短者難治加減理中元主霍亂臨時方亦可治男子出千金翼人參白术乾薑甘草各一兩右為細末煉蜜為元每兩作五元取湯和一元服之日十服吐多利少者取枳實三枚炙去穰四破水三升煮取一升和一元服之吐少利多者加乾薑一纍吐利乾嘔者取半夏半兩泡洗去滑水二升煮取一升和一元服若體疼痛不可堪者水三升煮棗三枚取一升和一元服若吐利大極轉筋者以韭汁洗腹腎從胸至足踝勿逆即止若體冷微汗腹中寒取附子一枚炮去皮四破以水二升煎取一升和一元服吐利悉止脈不出體猶冷者可服諸湯補之千金翼四順湯治霍亂吐利腹痛手足逆冷脈微欲絶附子一箇破八片乾薑三兩人參甘草各一兩右㕮咀水煎服四逆加豬膽汁湯治吐已下斷汗出而厥四肢拘急不解脈微欲絶者甘草二兩乾薑三兩附子一枚生豬膽汁半合右三味㕮咀每服五錢水三盞煮至二盞去滓內豬膽汁分作兩次溫服其脈即來香薷散治臟腑冷熱不調飲食不節或食腥鱠生冷過度或起居不節或露臥濕地或當風取涼而風冷之氣歸於三焦傳於脾胃脾胃得冷不能消化水榖致令真邪相干腸胃虛弱因飲食變亂於腸胃之間便至吐利心腹疼痛霍亂氣逆有先心痛而吐者或先腹痛而利者有吐利俱發者有發熱頭痛體疼而復吐利虛煩者或但吐利心腹刺痛者或轉筋拘急疼痛者或但嘔而無物出者或四肢逆冷脈微欲絶者或煩悶昏塞欲死者妊婦霍亂吐利此藥悉能主之香薷葉四兩白扁豆厚朴各二兩右㕮咀每服半兩水一大盞酒一分慢火濃煎至六分去滓井中浸令氷冷頓服無時候連併二三服立見神效蘇沈良方中名香茸散百問同有黃連無扁豆訶子散治老幼霍亂吐利一服取效又治九種心痛及心脾冷痛不可忍其功如神訶子甘草厚朴乾薑草果仁陳皮良薑茯苓神麴麥牙各等分右為細末每服二錢候發刺痛不可忍用水一盞煎七分入鹽服急則鹽點胡椒湯治霍亂吐利甚妙胡椒四十九粒菉豆一百四十七粒右為細末木瓜煎湯調下二錢婦人翻胃吐食方論第三凡二方白堊散治婦人翻胃吐食千金翼云不特治婦人男子亦可服一斤以上為妙白磰土以米醋一升煆白磰土令赤入醋內浸令冷再煆再浸以醋乾為度取一兩研乾薑一分炮右為細末研停每服一錢飯飲調下甚者二錢白芷散治婦人翻胃吐食右用白芷一兩切作片於瓦上炒令黃為細末用豬血二十文切片以沸湯泡七次將血蘸藥喫七片如剩藥末留後次用婦人血膈方論第四凡一方牡丹煎治婦人血膈牡丹皮苦參貝母去心玄胡索白芍藥右等分為細末煉蜜圓如梧桐子大每服十五二十圓米飲吞下無時候婦人鼻衄方論第五凡七方夫婦人鼻衄者由傷動血氣所致也凡血氣調和則循環表裏經絡澀則不散若勞傷損動因而生熱氣逆流溢入於鼻者則成鼻衄也只有産後見衄者不可治評曰凡鼻衄雖多因熱而得此疾亦有因怒氣而得之者曽趙恭人鼻衄不止諸治不差召豫治之先用蘇合香丸四粒次用五苓散濃煎白茅花湯調服即止次用芎歸湯調理又有一富室男子鼻血不止六脈洪數究竟云服丹藥太過遂用黃連黃芩大黃為末水煎服愈調服亦可刺薊散治婦人鼻衄血流不止刺薊二兩桑耳亂髮灰艾葉各一兩炒生地黃二兩蒲黃兩半右為細末每服二錢無時粥飲調下伏龍肝散治男子婦人五臟結熱吐血衄血並皆治之伏龍肝生地黃各一兩竹茹一升芍藥當歸黃芩川芎桂心甘草各二兩右㕮咀水一斗三升煮竹茹減三升內藥煮取三升分為三服千金無桂百問有茅花湯以白茅花濃煎飲之立止一方搗生白茅根取汁一合飲之止又方取生蔥心塞鼻中即定若因刺著并刀斧所傷血不止並用之立定又方取釡底墨細研入鼻中又方取亂髮灰細研以竹管吹入鼻中立止又方取龍骨末吹入鼻中立止婦人吐血方論第六凡十三方夫婦人吐血者皆由臟腑傷損所致夫血者外行於經絡內榮於臟腑若傷損氣血經絡則虛血行失於常理氣逆者吐血又怒則氣逆甚則嘔血然憂思驚恐內傷氣逆上者皆吐血也雞蘇散治婦人吐血心煩昏悶雞蘇葉一兩阿膠刺薊生地黃各一兩黃耆羚羊角屑茜根甘草各半兩麥門冬黃芩當歸伏龍肝各三分右為粗末每服四錢水一盞薑三片竹茹半雞子大煎至六分去滓溫服雞蘇散治婦人虛損氣逆吐血不止雞蘇葉黃芩各一兩當歸赤芍藥各半兩伏龍肝阿膠各二兩右為粗末每服四錢水一盞煎至六分去滓溫服治婦人熱毒上攻吐血不止生藕汁刺薊汁生地黃汁各三兩生薑汁半合白蜜一合右和煎三兩沸無時以一小盞調炒麵塵一錢服千金翼治吐血百方不差療十十差神驗不傳方詳此藥性治熱毒吐血有效地黃汁半升生大黃末一方寸匕右煎地黃汁三兩沸調大黃末分為三服又方伏龍肝右研令極細每服二錢新汲水調下頻服取效又方白茅根一握長六寸右以水一大盞煎取七分去滓溫服又方治吐血桂心末右水調方寸匕日夜可二十服又方生地黃三斤切阿膠二兩炒蒲黃六合右水五升煮取三升分三服僕嘗治一人吐血診其脈肝部弦氣口濡此因怒極而得之遂用蘇合香元和雞蘇元服即效養生必用方云凡吐血須煎乾薑甘草湯與服或四物理中湯亦可如此無不愈者服生地黃竹茹藕汁去生便逺柔脾湯治虛勞吐血衄血下白汗出方出養生必用甘草白芍藥黃耆各一兩熟地黃三兩右為末每服四錢水酒各一盞已上煎至七分去滓取六分清汁溫服食前于嘗治一女人年十九嵗月經不行遂妄行而嘔血諸藥無效察其形容人肥脈不大不小僕投以四生元即安又嘗治一男子因飽低頭負重吐血諸藥無效亦投四生元及青餅子即安更不發僕觀初虞世治吐血不喜用竹茹生地黃藕汁然亦不可狎泥此説如陽乘於陰血得熱則流散經水沸溢宜服涼藥以解之大黃犀角生地黃生艾藕汁豈能無效如陰乘於陽所謂天寒地凍水凝成氷宜服溫藥以暖之乾薑肉桂豈能無功學者更宜思之四生元療吐血凡吐血衄血陽乘於陰血熱妄行宜服此藥生荷葉生艾葉生柏葉生地黃右等分爛研圓如雞子大每服一圓水三盞煎至一盞去滓溫服無時候陳日華云先公紹興初遊福清靈石寺主僧留飲食將竟侍者赴堂齋罷來侍立見桌子上不穩急罄折扱之舉首即嘔血蓋食飽拗破肺也明年再到寺因問去年嘔血者無恙否其主僧答云得四生圓服之遂愈自得此方屢救人有效療熱甚嘔血者以犀角地黃湯局方小三黃元以白茅根煎濃湯吞之妙犀角地黃湯治內有瘀血鼻衄吐血面黃大便黑芍藥三分生地黃半斤牡丹皮去心一兩犀角屑一兩如無升麻川芎代右㕮咀每服五錢水煎服有熱如狂者加黃芩二兩青餅子治咯血青黛杏仁各一兩華他方以牡蠣粉炒杏仁去皮尖牡蠣不用右一處同研成膏熔黃蠟和作三拾餅子每服一餅子用乾柿半箇夾定以濕紙褁煨令香同嚼粥飲下無時候若陰乘於陽心肺經寒而嘔血者宜服乾薑一甘草湯甘草乾薑各半兩右㕮咀水煮頓服局方理中湯亦妙方見和劑婦人痃癖諸氣方論第七凡四方夫婦人痃癖者本因邪氣積聚而生也痃者在腹內近臍左右各有一條筋脈急痛大者如臂次者如指因氣而成如弦之狀名曰痃氣也癖者為僻側在兩肋之間有時而痛故曰癖也夫痃之與癖皆陰陽不和經絡否隔飲食停滯不得宣流邪冷之氣摶結不散得冷則發作疼痛故曰痃癖者也麝香元治婦人痃癖冷氣兼疰氣心腹痛不可忍麝香半兩别研阿魏一分麵褁煨令麵熱五靈脂桃仁三稜各三分芫花醋炒檳榔各一兩莪茂桂心沒藥木香當歸各半兩右為細末入麝香令停用粳米軟飯為圓如梧桐子大每服十元無時淡醋湯下治婦人痃癖及血氣等神效方右以獖豬肝一具可及十兩者用巴豆五十枚去大皮劄在肝內用釅醋三碗慢火熬令肝爛熟入砂鉢內研令極爛入京三稜末和就得所為圓如梧桐子大每服五元食前熱酒下肝熟後去巴不用發夫痃癖癥瘕血氣塊硬歇刺痛甚則欲死究而言之皆血之所為僕嘗治一婦人血氣刺痛極不可忍甚而死一二日方省醫巫併治數年不愈僕以蔥白散烏雞元遂安又嘗治一婦人血氣作楚如一小盤樣走注刺痛要一人伏定方少止亦用此二藥而愈尋常小小血氣用此二藥亦有竒效故録于後烏雞煎元方見二十四卷拾遺門蔥白散專治一切冷氣不和及本臟膀胱氣攻衝疼痛大治婦人産前後腹痛胎不安或血刺痛者兼能治血臟宿冷百節倦疼肌體怯弱勞傷帶癖久服盡除但婦人一切疾病最宜服此川芎當歸枳殼厚朴桂心乾薑芍藥舶上茴香青皮苦楝子木香熟地黃麥牙三稜莪茂茯苓神麯人參各等分右為細末每服三平錢水一盞連根蔥白二寸拍破鹽半錢煎至七分溫服內大黃訶子宜相度病狀如大便不利入大黃同煎却不入鹽如大便自利入訶子煎朱先生云此藥大治心氣脾疼用之見效僕嘗以此藥治浮腫立效陳宜人病血氣作楚痛不可忍服諸藥無效召僕診之兩關脈沉弱為肝脈沉差緊此血氣漸成痃癖也只以此二藥安愈四明馬朝奉後院亦病此用此二藥愈羅安人每遇經脈行時則臍與小腹下痛不可忍服藥無效僕以桂枝桃仁湯愈自後再發一投而差桂枝桃仁湯方見第一卷十二論治經候來時先腹痛男六德續添局方七氣湯吞下來復丹婦人疝瘕方論第八凡四方夫婦人疝瘕之病者由飲食不節寒溫不調氣血勞傷臟腑虛弱受於風冷冷入腹內與血相結所生疝者痛也瘕者假也其結聚浮假而痛推移乃動也婦人之病有異於丈夫者或因産後血虛受寒或因經水往來取冷過度非獨因飲食失節多挾於血氣所成也診婦人疝瘕其脈弦急者生虛弱小者死又尺脈澀如浮牢為血實氣虛也其發腹痛逆氣上行此為婦人胞中絶傷有惡血久則結成瘕也乾漆散治婦人疝瘕久不消令人黃瘦尫羸兩脅妨悶心腹疼痛乾漆炒令煙盡木香芫花醋炒赤芍藥桂心當歸川芎琥珀各半兩大黃二兩炒牛膝三分桃仁一兩麝香一分右為細末無時溫酒調下一錢碙砂元治婦人疝瘕及積瘀血在臟時攻腹脅疼痛川芒硝碙砂各一兩當歸雄黃桂心各半兩大黃炮三稜各二兩右為細末用米醋一碗熬大黃末為膏次入餘藥末和元如梧桐子大空心溫酒吞十元漸漸加至二十元以利下惡物為度巴豆元治婦人疝瘕及血氣疼痛巴豆去皮心醋煮半日一分碙砂大黃炒各一兩五靈脂桃仁各三分木香半兩右為末煉蜜元如緑豆大淡醋湯空心下五元熱酒亦可良方黑神元神麴茴香各四兩木香椒炒香出汗丁香各半兩檳榔四枚漆六兩半生半用重湯煮半日令香右除椒漆五物皆半生半炒為細末用前生熟漆和元如彈子大茴香末十二兩鋪陰地蔭乾候外乾并茴香收器中極乾去茴香腎餘育腸膀胱痃癖及疝墜五膈血崩産後諸血漏下赤白並一元分四服死胎一元皆綿灰酒下難産炒葵子四十九枚搗碎酒煎下一元諸疾不過三服痃氣十服膈氣癥癖五服血瘕三元當差子族子婦病腹中有大塊如杯每發痛不可忍時子婦已貴京下善醫者悉常服有藥莫愈陳應之曰此血瘕也投黑神元三元杯氣盡消終身不復作婦人八瘕方論第九凡一方夫婦人八瘕者皆由胞胎生産月水往來血脈精氣不調之所生也腎為陰主開閉左為胞門右為子户主定月水生子之道胞門主於子精精神氣所出入合於中黃門玉門四邊主持關禁閉子精臍下三寸名曰關元主藏魂魄婦人之胞三焦之府常所從止然婦人經脈俞絡合調則月水以時來至故能生子而無病婦人榮衛經絡斷絶不通邪氣便得往入合於其藏若生血未盡而合陰陽即令婦人血脈攣急小腹重疼支滿胸脅腰背相引四肢疼痛飲食不調結牢惡血月事不時或前或後因生聚如懷胎狀邪氣盛甚令人恍惚多夢寒熱四肢不舉陰中生氣腫肉生風甚者害於小便小腹築痛淋瀝面色黃黑則不復生子其八瘕者黃瘕青瘕燥瘕血瘕脂瘕狐瘕蛇瘕鱉瘕是也千金外臺言之詳矣桃仁煎治婦人血瘕血積經候不通出本事方桃仁大黃各一兩虻蟲半兩炒黑川朴硝一兩右四味為末以醇醋二升半銀石器中慢火煎取一升五合下大黃桃仁虻蟲等不住手攪欲下手圓下朴硝更不住手攪良久出之圓如梧桐子大前一日不用喫晚食五更初用溫酒吞下五元日午取下如赤豆汁或如雞肝蝦蟇衣狀未下再作如鮮血來即止續以調血氣藥補之此方出千金頃年在毗陵有一貴官妻患小便不通臍腹脹不可忍衆醫皆作淋治如八正散之類數種皆治不通痛愈甚豫診之曰此血瘕也非瞑眩藥不可去豫用此藥更初服至日午痛痛不可忍遂卧少頃下血塊如拳者數枚小便如黑豆汁一二升痛止得愈此藥治病的切然猛烈太峻氣虛血弱者更宜斟酌與之婦人腹中瘀血方論第十凡二方夫婦人腹中瘀血者由月經否澀不通或産後餘穢未盡因而乘風取涼為風冷所乘血得冷則成瘀血也血瘀在內則時時體熱面黃瘀久不消則變成積聚癥瘕也桃仁散虻蟲水蛭烏賊骨鯉魚鱗燒灰芫花醋炒枳殼當歸炒牛膝赤芍藥碙砂桂心各半兩桃仁三分右為細末食前溫酒調下一錢桃仁元治婦人腹內有瘀血月水不利或斷或來心腹滿急桃仁大黃炒各二兩虻蟲炒去翅足水蛭各四十枚炒焦右為末煉蜜圓如梧桐子大每服五元熱酒吞下未知加至八圓婦人癥痞方論第十一凡三方夫婦人癥痞者由冷熱不調飲食不節積在腹中或腸胃之間與臟氣結摶其牢強推之不移者名曰癥言其病形徵可驗也氣壅塞為痞言其氣痞澀不宣暢也皆得冷則發動刺痛癥痞之病其形冷結若冷氣入於子藏則使無子若冷氣入於胞絡摶於血血得冷則澀亦令月水不通也川山甲散治婦人癥痞及惡血氣攻心腹疼痛面無顔色四肢瘦弱川山甲灰炒燥鱉甲醋炙赤芍藥大黃炒乾漆炒令煙盡桂心各一兩川芎芫花醋炒當歸各半兩麝香一分右為細末入麝香令停每服一錢無時熱酒調下蓬莪茂元治婦人癥痞腹脅妨痛令人體瘦不思飲食莪茂三分當歸炒桂心赤芍藥檳榔枳殼木香昆布琥珀各半兩桃仁鱉甲大黃各一兩右為末煉蜜圓如梧桐子大食前粥飲下二十元丁香元治婦人癥痞結塊不散心腹疼痛雄雀糞炒黃鱉甲各一兩碙砂當歸炒芫花醋炒乾各半兩巴豆一分去皮心油右為末同研令停醋煮麯糊圓如小豆大當歸酒下三元婦人食癥方論第十二凡二方夫婦人食癥者由臟腑虛弱月候來時食生冷之物脾胃既虛不能消化與藏氣相摶結聚成塊日漸生長盤牢不移故謂之食癥也碙砂元治婦人食癥久不消令人瘦弱食少碙砂青礞石穿山甲炙三稜炒乾漆炒令煙盡硫黃各半兩巴豆三拾枚去皮心炒不出油右為末用軟飯圓如小豆大每服五元生薑橘皮湯下礞石元治婦人食癥塊久不消攻刺心腹疼痛青礞石末巴豆去皮心油朱砂粉霜並研木香末各一兩碙砂半兩右研令停以糯米軟飲和圓如緑豆大每服二元空心溫酒下取下惡物為度婦人積年血癥塊方論第十三凡七方夫婦人積年血癥塊者由寒溫失節臟腑氣虛風冷在內飲食不消與血氣相結漸生顆塊盤牢不移動者是也皆因血氣勞傷月水往來經絡否澀惡血不除結聚所生也久而不差則心腹兩脅苦痛害於飲食肌膚羸瘦乾漆圓治婦人積年血癥塊或攻心腹疼痛四肢不和面少血色飲食全少乾漆炒令煙盡大黃炒各一兩琥珀碙砂研硝石研莪茂各三分紅花延胡索桂心各半兩膩粉一分巴豆三七粒去皮心研去油用漿水二盞煎如餳右為細末用棗肉和圓如梧桐子大每服五元於日未出時煎蘇木湯吞下量患人輕重加減服之治婦人積年血癥塊不消狀若鬼胎之候宜服琥珀元琥珀研桂心牛膝芫花製檳榔桃仁炒各三分生地黃延胡索當歸各半兩鱉甲三稜乾漆炒碙砂各一兩大黃二兩虻蟲四十九枚去翅足炒水蛭四十九枚炒右為末醋煮碙砂為膏入藥末和搗三二百杵圓如梧桐子大每服十元空心溫酒下碙砂元治婦人積年癥塊不消碙砂乾漆雄黃水銀以少肥棗研無星雄雀糞各一分巴豆十粒去油右研停用棗肉圎如緑豆大空心當歸酒下三元臨卧再服取下惡物為度沒藥元理五積氣癖及驚悟血積癥癖血瘕發歇攻刺疼痛嘔逆噎塞心中迷悶不醒人事及血鼓癥瘕脹滿經脈不行者靈苑方芫花去枝梗取二兩用好米醋三升煮至一升半去滓不用只將醋入石器內入碙砂霜一兩巴豆肉七粒爛研入醋內煎成膏留元藥用木香沒藥别研當歸桂心蓽撥各一兩檳榔一分肉豆蔲一枚炮斑貓三枚去頭足翅糯米炒令焦黃去米研細附子一兩生用去皮右一十二味除斑貓沒藥餘為細末與斑貓沒藥一處合研令停入前膏子內和搗千百杵元如赤豆大初服一元用醋炒蘿白子令焦黑以酒浸同煎一二沸放溫吞下漸加至五圓七圓即止如急卒血氣攻心脾以酒醋共一銀盞煎沸吞下婦人血瘕癥癖結塊攻心疼痛悶絶久醫不效者入禹餘糧一兩火煆醋焠七次研細和藥為圓每服五圓用蘇木節二兩細銼酒三升煎至七合去滓分為三服吞藥併進三服當汗出則瘕隨大小腸逐下其病立差人弱者每服只二圓如是丈夫元臟小腸氣脾積氣癥塊等疾即入丹砂一兩細研和停以生薑鹽湯下三圓五靈脂元治婦人積年癥塊及惡血氣久不除五靈脂乾漆炒煙盡川烏各一兩炮麝香硫黃碙砂並研各半兩巴豆三十枚去皮醋煮赤右為末研停醋煮麵糊圓如緑豆大每服五圓空心溫酒下三稜煎治婦人血癥血瘕食積痰滯出選竒後集三稜莪茂各二兩青橘皮去白半夏麥芽炒各一兩右用好醋六升煮乾焙為末醋糊圓如梧桐子大每服三四十圓淡醋湯下痰積多薑湯下水府丹治婦人久虛積冷經候不行癥瘕癖塊腹中卒暴疼痛而有皯􅍍黧黑羸瘠百病方經煆花蘂石研兩半碙砂紙隔沸湯淋熬取霜半兩桂心别為末木香乾薑各一兩縮砂仁二兩紅豆半兩斑貓百箇臘月狗膽七枚生地黃汁童子小便各一升蚖青三百箇斑貓蚖青二物並去頭足翅以糯米一升同炒米黃去米不用右九味為末同三汁熬為膏和上末圓如雞頭大朱砂為衣每服闕圎溫酒嚼破食前服米飲亦可孕婦莫服婦人血氣心痛方論第十四凡五方夫婦人血氣心痛者由臟腑虛血氣不調風冷邪氣乘於心也其痛發有死者有不死者成疹者心為諸臟之主而主於神其正經不可傷傷之而痛者名為真心痛朝發夕死夕發旦死心之支别絡為風冷所乘而痛者故痛發乍輕乍甚而成疹者也烏藥散治婦人血氣攻心痛發歇不定烏藥莪茂桂心當歸炒桃仁青皮木香右等分為末每服二錢熱酒調下阿魏元治婦人血氣攻心疼痛及一切積冷氣當歸炒桂心青皮附子炮阿魏麵褁煨其麵熱為度白术川芎各一兩吳茱茰泡木香乾薑各三分檳榔肉豆蔲煨延胡索莪茂各一兩朱砂細研半兩右為末先以醋一升煎阿魏成膏和藥末搗三百杵圓如梧桐子大每服二十元食前熱酒下雞舌香散治男子婦人九種心痛一切冷氣良薑銼細麻油炒桂心赤芍藥等分右為細末每服二錢水一盞入鹽木瓜三片同煎七分溫服鹽湯點亦可血氣疝瘕痛用熟醋湯調下忌生冷又一方名應痛散治心脾痛不可忍者婦人脾血氣作心脾痛必效方同只無桂心用醋煎醋湯點亦可乙丑年春初次女年十五經脈未行忽一日心痛如刺吐飲不止脈沉緩弦細以蘇合香元沉香元神保元理中元訶子散七氣湯皆無效僕思之此證非蟲即飲作梗非局方九痛元不可遂合就服一二元即愈陳氏二神元治婦人血氣不和作痛不止及下血無時月水不調真蒲黃炒蓽撥鹽炒右等分為細末煉蜜圓如梧桐子大每服三十元空心溫酒吞下如不能飲米飲下兩服即止陳日華抽刀散治婦人血風血氣等疾武興戎司機宜侯愷云見一道人用此方療病不一而足遂以為獻真是竒妙五靈脂炒一兩莪茂桂心雲臺子炒各半兩右為末每服二大錢酒半盞水半盞煎至八分疾作熱服失笑散見産後心痛門訶子散見霍亂門亦妙靈苑方治婦人卒血氣心痛只用生五靈脂為細末每服一錢酒一盞煎沸熱服婦人血氣心腹疼痛方論十五凡二十方夫婦人血氣心腹疼痛由臟腑虛弱風邪乘於其間與真氣相擊而痛其痛隨氣上下或上衝於心或下攻於腹故云血氣攻心腹疼痛也延胡索散治婦人血氣攻心腹疼痛延胡索當歸川芎桂心各三分木香枳殼赤芍藥桃仁各半兩熟地黃一兩右㕮咀每服三錢水一盞薑三片煎至七分去滓熱服琥珀散治婦人血氣攻心腹煩躁悶亂疼痛不止琥珀沒藥當歸炒赤芍藥牡丹皮延胡索蒲黃莪茂桂心等分右為末每服一錢溫酒調下沒藥散治一切血氣臍腹撮痛及産後惡露不行兒枕塊痛出經驗方血竭沒藥並細研桂心當歸蒲黃紅花木香延胡索乾漆炒赤芍藥等分右為細末每服二錢熱酒調下食前服治血塊衝心呌噉其痛至危者如喫不得可灌下右用真大順散三錢熱酒調服立止瑞金散治婦人血氣撮痛月經不行預先嘔吐疼痛及月信不通片子薑黃四兩牡丹皮莪茂紅花當歸赤芍藥川芎桂心延胡索各兩半右為末每服二錢水一盞酒三分煎七分溫服日三次八仙散治血氣心腹㽱痛立驗當歸厚朴芍藥枳殼製人參各四分甘草茯苓各五分肉豆蔲二分右為末水二升煎取八合空心分三服八仙散治婦人血氣心腹㽱痛立驗靈苑方棕櫚二兩當歸一兩並銼碎一處燒成灰細研麝香一錢細研右同研令停每服一錢溫酒調下不換金散治婦人血刺痛不可忍者靈苑方三稜莪茂並細銼巴豆去殼各一兩右三味以釅醋一碗熬醋成膏為度先將粳固濟一罐子隂乾後將藥醋膏一處置罐子中外用泥裹以平瓦子一片蓋之用炭火五七斤煅常看守才候煙急出即取出看通黑則止不得燒過了便入乳鉢內細研為末有患者炒生薑酒調一錢服定命散治婦人急血氣靈苑方大生烏頭去皮尖牡丹皮桂心各一兩右為細末每服一錢酒半盞童子小便半盞煎至七分溫服如婦人血瘕血氣胎血積聚上衝心膈須臾欲絶者用酒一盞生薑一片煎至七分去滓通口服大效琥珀散治婦人心膈迷悶腹臟搯撮疼痛氣急氣悶月信不調等疾靈苑方烏藥莪茂各二兩當歸一兩右並生為細末溫酒調二錢服服後以食壓之忌生冷油膩等物如是産後諸疾炒生薑酒調下治血氣不調臍下痛桑耳菴䕡子桂心土瓜根川芎各四分甘草二分牛膝赤茯苓各五分大黃白芍藥各六分乾地黃八分右為末煉蜜元如梧桐子大醋湯吞下二十元蠲痛散治婦人血氣刺痛荔枝核燒存性半兩香附子去毛炒一兩右為細末鹽湯米飲調下二錢不拘時候服沒藥散治婦人血氣疼痛不可忍者出博濟方紅花沒藥當歸延胡索炒右等分為末每服二錢童子小便酒各半盞同煎至六分熱服只用稱錘淬過調亦可常服只用溫酒牲丹散治婦人久虛羸瘦血塊走疰心腹疼痛不思飲食出衛生方牡丹皮桂心當歸延胡索各一兩莪茂牛膝赤芍藥各二兩荆三稜一兩半右為粗末每服三錢水一盞酒半盞煎七分溫服至聖湯治婦人血氣産前産後百疾出同前當歸芍藥乾薑莪茂桂心地黃蒲黃炒各半兩黑豆炒去皮一兩右為細末空心熱酒調下二錢天仙散方見二十卷第七論蔥白散方見本卷第七論中琥珀散方見第一卷十二論治婦人腹脅刺痛以局方七氣湯加延胡索少許同煎服若胸膈不快惡心更間服局方烏沈湯兼治月水不調或前或後菖蒲元治婦人脾血積氣及心脾男六德續添菖蒲九節者六兩吳茱萸炮香附子炒去毛各四兩右三味並銼細以釅醋五升煮乾為度焙乾為細末以好神麯打糊為元如梧桐子大空心食前以淡薑湯吞下四五十元日三服橘皮湯亦好延胡索散治婦人血氣走作疼痛不可忍者及月水不調面色痿黃喫食減少及産後諸疾並皆治之延胡索生三稜生當歸去蘆酒浸莪术醋浸少時各等分右為末每服二錢空心溫酒調下血氣發甚者及月水不調並皆童子小便酒紅花同煎調下當歸煎元治婦人久積血氣時發刺痛肌瘦乏力月候不調當歸二兩别末檳榔赤芍藥牡丹皮延胡索各一兩右除當歸末用米醋熬成膏入衆藥末和圓如梧桐子大空心溫酒下二十元午食前再服治婦人積年血氣攻刺心腹疼痛不可忍者及多方醫療未差宜服神聖北亭元靈苑方北亭去砂石研沒藥木香當歸各一分芫花莪茂各半兩巴豆去皮膜四十粒右先研北亭沒藥巴豆如粉用好米醋三升同煮為稀膏然後將餘四味為細末入於膏內搜合成塊用新瓦合盛之臨時加減元數用酒醋各半盞煎數沸通口服不得嚼破仍須喫盡酒醋立差或男子元氣亦依前方服食如急喉閉者男左女右以一元鼻中嗅之立愈其中云臨時加減圓數皆不云大小數目詳之古人亦鹵莽也既有北亭芫花巴豆合當圓如緑豆大每服只五元琥珀散治産前産後血氣不和及一切疾當歸微炒川芎各一兩赤芍藥二兩莪茂一兩煆右為末每服二錢空心溫酒調下如腰腹痛加陳皮去白半兩乾薑炮半兩為末同和停如不喫酒以水一盞煎至七分溫服婦人血氣小腹疼痛方論第十六凡四方夫婦人小腹疼痛者此由胞絡之間夙有風冷摶於血氣停結小腹因風虛發動與血相擊故痛也葳靈散治婦人久冷氣滯血刺小腹疼痛葳靈仙一兩當歸沒藥木香桂心各半兩右為細末無時熱酒調下一錢服忌茶治婦人久積血氣㽱刺小腹疼痛四肢無力不能飲食宜當歸散當歸炒赤芍藥劉寄奴沒藥枳殼延胡索等分右為細末熱酒調下一錢無時候追氣元治婦人血刺小腹疼痛不可忍靈苑方藝臺子微炒桂心各一兩良薑半兩右為細末醋糊元如梧桐子大每服五圓無時淡醋湯下常服補血虛破氣塊甚有效石灰散治婦人血氣痛不可忍者陳五婆方出婦人經驗方右取豬貼瘠血半盞於湯上暖用杖子攪停後用石灰於火上燒令黃為末羅過入灰一錢同血攪停放溫服立愈婦人兩脅脹痛方論第十七凡六方夫婦人兩脅脹痛者由臟腑虛弱氣血不調風冷之氣客於腸胃傷於胞絡之間與血氣相摶壅塞不宣邪正交爭衝擊故令兩脅脹痛也草豆蔲散治婦人脾胃虛氣攻兩脅脹痛草豆蔲訶子肉各一兩桂心苦梗厚朴各三分甘草一分川芎當歸乾薑檳榔各半兩右為粗末每服四錢水一盞煎七分去滓熱服食前菴䕡子散治婦人臟腑虛冷宿冷氣攻兩脅脹痛坐卧不安菴䕡子延胡索桃仁桂心琥珀當歸各一兩赤芍藥木香沒藥各半兩右為末每服二錢溫酒調下無時候人參紫金元治婦人榮衛不和心腹刺痛胸鬲脹滿不進飲食饒武傳方紫金皮蒼术石菖蒲各一兩香附子二兩人參半兩木香三錢右為末米糊和圓如梧桐子大每服三十圓食後薑湯下氣針元治久積風壅疏利滯氣空胸鬲止刺痛木香青皮去白大黃炮檳榔各一兩黑牽牛二兩半生半炒右為末煉蜜元如梧桐子大溫水下三十元鄧安人年五十忽然氣痛投神保元愈不一二日再痛再服神保元六七十粒大腑不通其疾轉甚亦有要用沉香木香薑桂等藥而未敢投痛甚則築心築背築定兩脅似有兩柴十字插定心脅叫聲徹天召僕診之六脈沉伏乍來乍去衆問僕診脈吉凶何如答曰夫九痛之脈不可凖也但以證辨用藥觀其人質肥偉問其大腑數日不通僕曰實痛也其腹必脹但以人按之痛甚手不可向邇此大實也經云大滿大實者可下之用氣針元五六百粒是夜即愈脹又己未在金陵有家提幹上之下巽內人病心腹痛衆醫投木香沉香檳榔大腹芍藥薑桂之類病益甚召僕診之六脈弦緊而和不似病脈但診之時兩手如火以此知其實痛也衆問如何治療僕曰大凡心腹刺痛不可便作虛冷治療有兩醫答曰非冷而何熱即生風冷生氣是也僕曰不然難經云虗則癢實則痛又仲景云腹痛者桂枝加芍藥湯痛甚者桂枝加大黃湯家提幹云荆布素來質弱僕曰有可辨處遇痛時使一婢按之若痛止是虛寒證也若按之轉甚手不可近此實痛也即令一婢按之手不可近叫喚異常僕曰此實熱無可疑者當用大柴胡湯治之衆皆不許僕責狀而投之八服愈論脅肋疼痛服木通散亦可治男子出明理方心下脅肋少腹疼痛皆素有積寒而溫暖湯散亦可主治甚者以溫藥下之心下與小腹痛諸書並有效方而脅肋下痛鮮獲治法此木通散治脅肋苦痛偏效併心下脅肋并小腹牽引痛者皆主之木通去皮節青皮去白川楝子去皮核各一兩已上三味用巴豆半兩炒黃去巴豆不用蘿蔔子炒舶上茴香一兩炒莪茂木香滑石各半兩右為細末煎蔥白酒調三錢一服愈甚者不過再服三脘散治中焦虛痞兩脅氣痛面目手足浮腫大便祕澀兼治腳氣大腹皮紫蘇沉香乾木瓜獨活各半兩白术川芎木香甘草陳皮檳榔各三分右㕮咀每服三錢水一盞煎至七分去滓空心熱服日中服戊午秋在京城有一婦人中醫虛痞腹脅脹痛大便袐澀六脈虛弱更數服藥無效僕投此藥不終劑而愈婦人心腹脹滿方論第十八凡三方夫婦人心腹脹滿者由臟腑久冷氣血虛損而邪氣客之乘於心脾故也足太陰脾之經也脾虛則脹足少陰腎之經也其脈起於小指之下斜趣足心入跟中上股內後亷貫腎絡膀胱從腎上貫肝膈入肺中其支者從肺出絡於心臟虛邪氣客於三經與正氣相搏積聚在內氣并於脾脾虛有脹故令心腹煩滿而脹也診其脈遲而滑者脹滿也白术散治婦人脾胃氣虛心腹脹滿不欲飲食四肢少力白术草果仁訶子肉各三分赤茯苓檳榔桂心各半兩陳皮厚朴人參各一兩甘草一分右為粗末每服四錢薑三片棗一枚煎至七分去滓食前熱服檳榔散治婦人脾胃虛冷心腹脹滿不欲飲食檳榔前胡川芎青皮三分赤芍藥桂心大黃苦梗木香枳殼各半兩甘草一分右為㕮咀每服四錢薑三片煎至七分去滓溫服無時局方分心氣飲亦妙方見十二卷三脘散亦妙方見本卷十七論木香散治婦人脾胃虛冷心腹脹滿不欲飲食木香桂心白术乾薑炮陳皮去白草果仁訶梨勒人參各一兩神麯炒黃三分甘草炙半兩右為細末每服一錢如茶點熱服婦人大全良方卷七
