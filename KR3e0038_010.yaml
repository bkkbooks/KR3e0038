body:
  text: 婦人大全良方卷六宋陳自明撰婦人熱勞方論第一夫婦人熱勞者由心肺壅熱傷於氣血氣血不調臟腑壅滯熱毒積蓄在內不得宣通之所致也其候心神煩躁頰赤頭疼眼澀唇乾四肢壯熱煩渴不止口舌生瘡神思昏沈多臥少起飲食無味舉體痠疼或時心怔或時盜汗肌膚日漸消瘦故名熱勞也黃耆散治婦人熱勞羸瘦四肢煩疼心躁口乾不欲飲食人參黃芩當歸各三分北柴胡去苗兩半黃耆地骨皮赤茯苓麥門冬生地黃赤芍藥各一兩甘草一分右㕮咀每服四錢水一盞薑五片煎六分去滓溫服無時半夏散治婦人熱勞煩渴口乾體瘦無力四肢疼痛或時寒熱痰逆嘔吐不思飲食半夏知母苦梗人參赤茯苓秦芁赤芍藥麥門冬烏梅肉各半兩鱉甲醋炙北柴胡黃耆各一兩大腹皮三分甘草一分右為粗末每服四大錢水一盞半生薑三片煎至七分去滓溫服無時候豬肚元治婦人熱勞羸瘦北柴胡赤茯苓人參黃耆各一兩黃連三兩地骨皮木香各半兩桃仁鱉甲各一兩半右為細末用好嫩豬肚一枚淨洗將藥末入豬肚內以線縫合蒸令爛熟於砂盆內研如膏員如梧桐子大食前粥飲下三十元午食前再服秦芁散治血經有熱月脈凝滯五心煩倦出婦人經驗方麥門冬秦芁各一兩生地黃當歸各半兩地骨皮鬱金蘇木各一分右為細末每服一錢半水一盞紅花少許同煎至七分溫服若經脈調不用紅花忌酒與熱物此方可服一年婦人客熱方論第二凡三方夫婦人有氣血隂陽臟腑虛實實則生熱虛則受邪邪熱加人隂陽冷熱自相乘也今云客熱者是體虛而將溫過度外熱加之非臟腑自生故云客熱其狀上焦胸鬲之間虛熱口躁心煩手足壯熱者是也麥門冬散治婦人客熱四肢煩悶疼痛不下飲食麥門冬北柴胡赤茯苓各一兩羚羊角屑赤芍藥桑白皮黃耆各三分生乾地黃甘草各半兩右㕮咀每服四錢水一盞薑三片煎六分去滓溫服無時候犀角散治婦人客熱四肢煩悶疼痛不下飲食犀角屑赤芍藥地骨皮紅花甘草各半兩北柴胡一兩黃耆一兩半麥門冬人參枳殼赤茯苓各三分右㕮咀每服四錢水一盞半薑三片煎七分去滓無時溫服黃耆散治婦人客熱心胸壅悶肢節煩疼不思飲食生乾地黃黃耆各一兩犀角屑甘草瓜樓子仁黃芩各半兩人參茯神各三分右為細末每服二錢水一中盞淡竹葉五片煎至七分溫服無時候婦人寒熱方證第三凡四方經云陽不足則先寒後熱隂不足則先熱後寒夫婦人勞傷氣血虛弱令隂陽交爭虛實不調故令寒熱如瘧也地骨皮散治婦人血風氣體虛發歇寒熱北柴胡地骨皮一兩桑白皮枳殼前胡黃耆各三分白茯苓五加皮人參甘草桂心白芍藥各半兩右㕮咀每服三錢水一盞生薑三片煎至七分去滓溫服無時候生地黃散治婦人血氣不調或時寒熱體痛不思飲食生乾地黃北柴胡各一兩羌活木香桂心防風各半兩酸棗仁羚羊角屑白芍藥白术黃耆川牛膝白茯苓當歸枳殼各三分右㕮咀每服三錢水一盞薑三片煎至七分去滓溫服空心柴胡散治婦人寒熱體瘦肢節疼痛口乾心煩不欲飲食北柴胡黃耆赤茯苓白术各一兩人參地骨皮枳殼製生乾地黃苦梗桑白皮赤芍藥各三分鱉甲炙二兩麥門冬三兩甘草半兩右㕮咀每服四錢水盞半薑三片煎七分去滓溫服無時候荆芥散療時氣風溫寒熱瘴瘧往來潮熱並宜服之陳皮麻黃香附子甘草各一兩荆芥穗厚朴各二兩草果仁三箇川白芷桂心各半兩右㕮咀每服二錢水一大盞薑三片棗兩枚煎至七分去滓溫服無時候寡婦寒熱如瘧方論第四凡一方論曰寡婦之病自古未有言者惟倉公傳與褚澄略而論及言寡者孟子正謂無夫曰寡是也如師尼喪夫之婦獨隂無陽欲男子而不可得是以懨懨成病也易曰天地絪緼萬物化醇男女媾精萬物化生孤陽獨隂可乎夫既處閨門欲心萌而不遂致隂陽交爭乍寒乍熱有類瘧疾久則為勞又有經閉白淫痰逆頭風膈氣痞悶面皯瘦瘠等證皆寡婦之病診其脈獨肝脈弦出寸口而上魚際究其脈原其疾皆血盛而得經云男子精盛則思室女人血盛則懷胎觀其精血思過半矣生地黃元許學士云有一師尼患惡風體倦乍寒乍熱面赤心煩或時自汗是時疫氣大行醫見寒熱作傷寒治之大小柴胡湯雜進數日病劇豫診視之曰三部無寒邪脈但厥隂肝脈弦長而上魚際宜服抑隂等藥豫製此方治之愈北柴胡秦芁黃芩各半兩生地黃二兩赤芍藥一兩右為細末煉蜜為元如梧桐子大烏梅煎湯下三十元無時候日三服許學士云嘗讀史記倉公傳載齊北王侍人韓女病腰背痛乍寒乍熱衆醫皆以為寒熱病也倉公日病得之欲男子而不可得也何以知欲男子而不可得診其脈肝脈弦出寸口是以知之又有婦人熱入血室寒熱如瘧一證在本卷第十論婦人惡寒方論第五凡一方論曰夫婦人惡寒者亦有隂陽二證發熱而惡寒者發於陽也無熱而惡寒者發於隂也發於陽者宜解表脈必浮數發於隂者宜溫裏脈必沈細又有汗後利後惡寒及背惡寒已上疾證方治并載百問不復繁引僕嘗治一婦人但惡寒别無他證六脈平靜遂用敗毒散而安此藥能去表中風邪故也經云惡寒家慎不可過當覆衣被及近火氣寒熱相薄脈道沈伏愈令病人寒不可遏但去被徹火兼以和表之藥自然不惡寒矣婦人惡寒尤不可近火寒氣入腹血室結聚針藥所以不能治矣敗毒散見局方婦人血風煩悶方論第六凡四方夫婦人血風煩悶者由臟腑勞傷血氣虛而風邪乘之搏於血使氣不宣而否澀則生於熱或肢節煩疼口乾少臥皆因虛弱而氣血壅滯故煩悶也川烏頭元治婦人血風虛冷月候不調或即腳手心煩熱或即頭面浮腫頑麻川烏頭一斤用好清油候各四兩一處於銚內炭火炒不住手攪裂者仍須如桑根色為度逐旋取出了於新瓦上或不裂者不用裂者則去皮尖臍五靈脂去土石揀淨四兩生右為細末更入臼中或乳鉢內研令停後將蒸餅水浸後却瀝去水漸漸入臼中和杵直待元得即元如梧桐子大空心溫酒或鹽湯下二十元忌動風物丈夫風疾亦治赤芍藥散治婦人氣血不和心胸煩悶不思飲食四肢少力頭目昏眩身體疼痛牡丹皮白茯苓赤芍藥白芷甘草各一兩柴胡一兩半右為細末每服二錢水一盞生薑三片棗一枚同煎至七分溫服食後臨臥酸棗仁散治婦人血風煩悶四肢疼痛心神多躁喫食減少酸棗仁赤芍藥當歸羚羊角屑赤茯苓紅花生地黃各三分防風羌活川牛膝麥門冬桂心川芎地骨皮甘草各半兩右㕮咀每服四錢水盞半薑三片薄荷少許煎七分溫服當歸散治婦人血風潮熱當歸二兩芍藥延胡索不灰木熟地黃各一兩大黃三分蒸桂心半兩甘草一分右為細末每服二錢水一盞胭脂一小角子煎至六分去滓如躁時放冷服細呷清者婦人血風攻脾不能食方論第七凡四方夫脾象於土脾為中州意智之藏也其肝心肺腎皆受脾之精氣以榮養焉脾與胃為表裏脾主化榖納食胃為水榖之海故經言四時皆以胃氣為本也婦人血氣不調臟腑勞損風邪冷氣藴蓄在內攻於脾胃脾胃既虛為邪所乘則不能摧伏五榖故令不能食也草豆䓻散治婦人血風冷氣攻脾胃嘔逆不納飲食人參一兩草豆䓻仁麵裹煨白茯苓半夏各三分良薑白术縮砂仁枇杷葉去毛炙桂心木香青皮甘草各半兩右為粗末每服三錢水一大盞薑三片煎至七分去滓溫服無時候神麯元治婦人血風攻脾胃腹脅氣滿不思飲食白术附子炮枳殼製訶子桂心人參木香食茱茰泡陳皮各一兩苦梗乾薑各半兩右為細末以酒煮神麯末二兩作糊為元如梧桐子大每服二十元空心薑湯吞下椒紅元治婦人血風攻脾胃臟腑虛冷全不思食臍腹多痛體瘦無力椒紅沉香附子炮莪荗訶子當歸白术各一兩良薑白豆䓻仁丁香各半兩麝香一分右為細末酒煮麵糊員如梧桐子大空心溫酒下三十元進食散李潛云治脾胃虛寒不思飲食及久病人脾胃虛全不入食者只兩服能食出蘇沈良方據愚見此方既有川烏治血風攻脾不食豈無良驗青皮陳皮粉草良薑桂心各一分川烏炮去皮尖草豆䓻仁各三箇訶子五箇右為細末每服一錢水一盞薑二片煎至七分溫服婦人夢與鬼交方論第八凡三方夫人稟五行秀氣而生承五藏神氣而養若隂陽調和則臟腑強盛風邪鬼魅不能傷之若攝理失節而血氣虛衰則風邪乘其虛鬼邪干其正然婦人與鬼交通者由臟腑虛神不守故鬼氣得為病也其狀不欲見人如有對晤時獨言笑或時悲泣是也脈息遲伏或如鳥啄皆鬼邪為病也又脈來綿綿不知度數而顔色不變此亦是此候也茯神散治婦人風虛與鬼交通妄有所見聞言語雜亂茯神一兩半茯苓人參石菖蒲各一兩赤小豆半兩右㕮咀每服三大錢水一盞煎至六分去滓食前溫服桃仁元治婦人與鬼魅交通辰砂檳榔當歸桃仁各三分水銀一分棗肉研令星盡麝香阿魏麵裹煨沉香各半兩右為細末煉蜜元如梧桐子大空心桃仁湯吞下十元又方似辟瘟丹虎頭骨二兩朱砂雄黃雌黃鬼臼皂莢蕪荑仁鬼箭梨蘆各一兩右件生為末煉蜜為元如彈子大囊盛一元男左女右繫臂上及用一元當病人户前燒之一切邪鬼不敢近太乙神精丹蘇合香元皆可用也婦人傷寒傷風方論第九凡八方論曰古人治病先論其所主男子調其氣婦人調其血血室不蓄則二氣諧和血室凝結則水火相刑傷寒氣口緊盛即宜下人迎緊盛即宜汗婦人左關浮緊不可下當發其汗以救血室榮衛得和津液自通浹然汗出而解仲景云婦人傷寒經水適斷晝日明了暮則譫語如見鬼狀此為熱入血室無犯胃氣及上二焦無犯胃氣者言不可下也小柴胡湯主之若行湯遲則熱入胃令津燥中焦上焦不榮成血結胸狀須當針期門也五行相尅以生相扶以出平居之日水常養於木水木相生則榮養血室血室不蓄則脾無藴積脾無藴積則剛燥不生剛燥既生若犯胃氣則晝夜譫語喜忘小腹滿小便利屬抵當湯證也傷寒胃實譫語宜下之婦人熱入血室譫語者不可下也雖然婦人傷寒與男子治法不同男子先調氣婦人先調血此大略之詞耳要知脈緊無汗名傷寒脈緩有汗為傷風熱病脈洪大中暑脈細弱其證一也假如中暍用白虎胃實用承氣豈必調血而後行湯邪仲景傷寒論所以不分婦人者良亦在學者皆可隨病於男子藥證中以意選用也若妊婦傷寒藥性須涼慎不可行桂枝半夏桃仁等藥小柴胡去半夏名黃龍湯蓋為妊婦而去也大抵産前先安胎産後先補益次服傷寒藥若病稍退則止藥不可盡劑此為大法黃帝問婦人重身毒之奈何岐伯曰有故無殞亦無損也大積大聚其可犯衰其太半過其厄男子婦人傷寒仲景治法别無異議比見民間有婦人傷寒方書稱仲景所撰而王叔和為之序以法考之間有可取疑非古方特假聖人之名以信其説於天下今取金匱玉函治婦人傷寒與俗方中可採者列為一卷雖不足以盡婦人傷寒之詳並可以百問中參用也婦人傷寒發熱惡寒四肢拘急口燥舌乾經脈凝滯不得往來宜桂枝紅花湯桂枝芍藥甘草三兩紅花二兩右㕮咀每服五錢水一盞半薑四片棗二個煎至七分去滓溫服良久再服汗出而解婦人傷寒口燥咽乾腹滿不思飲食黃芩芍藥湯療之黃芩白芍藥白术生乾地黃右各一兩㕮咀每服五錢水一盞煎至七分去滓溫服寒則加生薑婦人傷寒喘急煩躁或戰而作寒隂陽俱虛不可下宜服當歸湯柴胡三兩白术二兩人參甘草赤芍藥當歸各一兩五味子木通各半兩右㕮咀每服半兩水一盞半生薑四片棗二枚煎至八分去滓稍熱服婦人傷寒六七日胃中有燥屎大便難煩躁譫語目赤毒氣閉塞不得通宜㵼心三黃湯川大黃鼠尾黃芩鷹爪黃連等分右為粗末每服四錢水一盞煎至八分去滓溫服取微利如目赤睛疼宜加茯苓嫩竹葉㵼肝之餘氣婦人傷寒差後猶有餘氣不去謂之遺熱宜乾地黃湯乾地黃一兩大黃黃連黃芩柴胡白芍藥甘草各一兩半右㕮咀每服四錢水一盞半煎至七分去滓溫服取溏利汗出解男子病新差婦人與之交合得病名曰陽易其證裏急腰胯及腹內痛身重宜燒裩散用男子裩襠燒灰為末以水調方寸匕服即愈婦人病未平復因有所動致熱氣上衝胸手足拘急搐搦如中風狀宜青竹茹湯栝樓根二兩淡青竹茹半升右以水二升半煮取一升二合去滓分作三服婦人病未平復因有所動小腹急痛腰胯疼四肢不任舉動無力發熱者宜當歸白术湯桂枝白术當歸甘草芍藥人參黃耆各一分生附子一箇破作八片各一分生薑半兩右㕮咀水三升煮取一升半去滓通口服一湯盞食頃再服溫覆微汗差婦人熱入血室方論第十凡五方婦人傷寒發熱經水適來晝日明了暮則譫語如見鬼狀此為熱入血室無犯胃氣及上二焦宜小柴胡湯婦人傷風七八日續得寒熱發作有時經水適斷此為熱入血室其血必結故使如瘧狀宜服小柴胡湯柴胡八錢重黃芩人參生乾地黃甘草各三錢重半夏二錢重右㕮咀每服五錢水盞半薑三片棗二枚煎至八分去滓溫服局方四物湯不用熟地黃只用生乾地黃加北柴胡等分煎服亦療此證婦人傷寒經脈方來初斷寒熱如瘧狂言見鬼宜服乾薑柴胡湯柴胡四兩桂枝一兩半栝樓根二兩牡蠣乾薑甘草各一兩右㕮咀每服五錢水盞半煎七分去滓溫服初服微煩再服汗出而愈婦人傷寒血結胸膈揉而痛不可撫近宜海蛤散婦人血結胸法當針期門仲景無藥方此方疑非仲景然其言有理姑存焉海蛤滑石甘草各二兩芒硝一兩右為細末每服二錢雞子清調下小腸通利則胸膈血散膻中血聚則小腸壅小腸既壅則膻中血不流行宜此方小便利血數行更宜桂枝紅花湯發其汗則愈婦人傷風發熱惡寒經水適來得七八日熱除脈遲身涼和胸脅下滿如結胸狀譫語者此為熱入血室也當刺期門穴隨其實而取之期門穴在乳直下筋骨近腹處是也凡婦人病法當刺期門不用行子午法恐纏藏膜引氣上但下針令病人吸五吸停針良久徐徐出針此是平㵼法也凡針期門必㵼勿補可肥人二寸瘦人寸半深也婦人咳嗽方論第十一凡九方夫婦人咳嗽者由肌體虛外受於寒熱風濕所得也肺為四臟之華蓋內統諸臟之氣外合於皮毛若為寒熱風濕所傷邪氣自皮毛而入於肺中外皆傷故令咳也大抵治咳不可一槩治當以脈息辨之其脈浮而弦者起於風濡而弱者起於濕洪而數者起於熱遲而澀者起於寒風者散之濕者燥之熱者涼之寒者溫之虛者補之未有不安者也咳嗽用溫藥方論第十二經曰微寒為嗽寒甚為腸澼古人立方治嗽未有不本於溫藥如乾薑桂心細辛之屬以寒氣入裏非辛甘不能發散以此準之未有不因寒而嗽也又曰熱在上焦因咳為肺痿又實則為肺癰虛則為肺痿此人其始或血不足或酒色滋味太過或因服利藥重亡津液燥氣內焚肺金受邪脈數發熱咳嗽膿血病至於此亦已危矣古人立方亦用溫藥如建中之屬今人但見發熱咳嗽率用柴胡鱉甲門冬葶藶等藥旋踵受弊而不知非可為深戒就使不可進以溫藥亦須妙以湯元委曲調治無為鹵莽致傷人命黃耆散治虛中有熱咳嗽膿血口苦咽乾黃耆四兩甘草二兩右為細末湯點一二錢服日三一方甘草一兩黃耆六兩名黃耆六一湯只㕮咀水煎服蛤蚧元治婦人咳嗽不止漸成勞氣宜服蛤蚧一對酥炙紫苑欵冬花鱉甲炙貝母去心皂莢子仁各一兩炒杏仁炒去皮尖一兩半右為細末煉蜜員如梧桐子大每服二十元淡薑湯吞下含化元昔有婦人患肺熱久嗽身如炙肌瘦將成肺勞服此安冦宗奭方枇杷葉去毛桑白皮欵冬花木通紫苑杏仁各等分大黃減半右為細末煉蜜元如櫻桃大食後夜卧含化一元貝母湯治諸嗽久不差出本事方貝母生薑汁浸半日北五味子黃芩乾薑熱者減半陳皮各一兩半夏桑白皮桂心北柴胡熱者加一半各半兩木香甘草各一分右為粗末每服五錢水一盞半杏仁七箇去皮尖碎之生薑二片煎至七分去滓熱服黃師文云戊申冬有姓蔣者其妻積年嗽製此方授之一投而瘥以此治諸嗽悉皆愈定喘湯治丈夫婦人逺年日近肺氣咳嗽上氣喘急喉中涎聲胸滿氣逆坐臥不安飲食不下及治肺感寒邪咳嗽聲重語音不出鼻塞頭昏並皆治之半夏麯炒明阿膠炒甘草各錢半鶯粟殼半兩製北五味子桑白皮麻黃去節人參各一分右㕮咀每服三大錢薑三片烏梅半箇煎至七分去滓漸漸溫服食後臨臥服方同和劑分兩加減不同有效滄州李官人宅補肺湯治狀同前又名清金湯鶯粟殼二兩製人參粉草各半兩陳皮茯苓杏仁製白术明阿膠炒北五味子桑白皮薏苡仁紫蘇莖各一兩右㕮咀為末每服三大錢水盞半薑三片棗兩枚烏梅半箇煎至一盞臨卧溫服僕每用則無效遂加百合貝母去心半夏麯欵冬花各一兩服之良驗金不換散治男子女人肺胃虛寒久嗽不已喘促滿悶咳嗽涎盛腹脅脹滿腰背倦痛或虛勞冷嗽咳唾紅痰及逺年日近一切喘咳疾諸藥不效者並治之鶯粟殼半兩製杏仁製甘草各三錢枳殼四錢右㕮咀每服三錢水一盞半薑三片烏梅半箇煎至八分食後臨卧漸漸熱服許元林先生方乙卯年七月僕嘗治一婦人咳嗽不已服諸藥無效漸成勞瘵求余診之六脈濡弱以愚考之此是血弱又因憂戚太過而成斯疾合用當歸等藥治之必愈遂先用古今録驗橘皮湯空心服蘇子降氣湯後用金叉煎熟地黃元當歸元調理得安又治一婦人時行感熱咳嗽遂用小柴胡湯去人參薑棗只加北五味子煎服愈古今録驗橘皮湯療春冬傷寒秋夏冷濕咳嗽喉中作聲上氣不得下頭痛方陳皮紫苑麻黃去根杏仁製當歸桂心甘草黃芩各等分右㕮咀每服五錢水盞半煎至一盞去滓熱服勞嗽方論第十三凡二方經曰人感於寒則受病微則為咳甚則為泄為痛凡咳嗽五臟六腑皆有之惟肺先受邪蓋肺主氣合於皮毛邪之初傷先客皮毛故咳為肺病五臟則各以治時受邪六腑則又為五臟所移古人言肺病難愈而善卒死者肺為驕藏怕寒而惡熱故邪氣易傷而難治以其湯散徑過針灸不及故也十種咳嗽者肺咳心咳脾咳腎咳肝咳風咳寒咳支飲咳膽咳厥隂咳華他所謂五嗽者冷嗽氣嗽鱢嗽飲嗽邪嗽孫真人亦有方治寒毒注嗽者歷代方論著之甚詳惟今之所謂勞嗽者無所經見意其華他所謂邪嗽真人所謂注嗽者是也此病蓋酒色過度勞極傷肺損動經絡其重者咯唾膿血輕者時發時差又有因虛感邪惡之氣且傳注得之或先嘔血而後嗽或先咳嗽漸就沈羸此則非特內損肺經又挾邪惡傳疰之氣所以特甚病之毒害無過此也真人治注嗽通氣元方用蜈蚣四節又云夢與鬼交通及飲食者全用蜈蚣外臺方四滿元治五嗽亦用蜈蚣遇世名公能推原其旨意率用蛤蚧天靈蓋桃栁枝麝香丹砂雄黃安息香之類以通神明之藥療之髙出古人之意矣又肺中有蟲如蠶令人喉癢而咳嗽湯散徑過針灸不及以藥含化蟲死即嗽止見張鋭方深師四滿元療五嗽一上氣嗽二飲嗽三鱢嗽四冷嗽五邪嗽乾薑桂心躑躅花芎藭紫苑芫花根皮各二分蜈蚣一枚去頭足炙細辛甘草炙鬼督郵人參半夏洗各一分右十二味為細末煉蜜元如大豆許每服五元米飲下日三未知加至七八元服此藥無不差忌羊肉餳生蔥生菜海藻菘菜古今録驗四滿元療五嗽一氣嗽二痺嗽三鱢嗽四邪嗽五冷嗽悉療之方蜈蚣二枚炙芫花根五分熬躑躅花炒乾薑芎藭桂心各四分人參細辛各二分右為末煉蜜元如梧桐子大米飲下一十元日三服加至十五元忌生蔥生菜喘滿方論第十四凡六方夫喘之為病黃帝問岐伯岐伯對曰夜行則喘出於腎淫氣病肺有所墮恐喘出於肝淫氣害脾有所驚恐喘出於肺淫氣傷心度水跌仆喘出於腎與骨當是之時勇者氣行則已怯者則著而為病也原疾之由雖曰皆本於肺與氣然感外邪則有太陽證脈浮無汗而喘者宜麻黃湯陽明病汗出不惡寒腹滿而喘有潮熱者宜承氣湯若表邪未解誤服下利藥不止脈促喘而汗出者宜葛根黃連黃芩湯若微喘者桂枝厚朴杏子湯汗出而喘若無大熱者宜麻黃杏子甘草石膏湯若表邪未解心下停水發熱而喘或嘔者小青龍湯去麻黃加杏仁主之若隂證喘促者四肢逆冷脈息沈細或寸大尺小或六脈促疾或心下脹滿結硬或冷汗自出或大便頻數上氣喘促或咽喉不利者此是本氣極虛內外挾寒冷所致使隂寒內消陽氣得復則愈宜返隂丹主之已上方並見百問不復録僕且以大槩而言之諸藏相乘而喘者以杏子散如感寒伏熱而喘者以華蓋散九寶湯若暴寒向火覆衣被過當傷熱肺實而喘促者其狀多有熱證宜洗心散冷水調服若因氣宇不調痰盛喘促者宜四七湯兼官局桔梗湯薑煎服若涎多而喘者宜千緡湯橘皮半夏湯若不得臥卧即喘者此由水氣逆行上乘於肺肺得水則浮而開使氣不得通流其脈沈大宜神祕湯肺之積名曰息賁在右脅下大如杯令人灑淅寒熱喘咳發癰疽宜棗膏元若上氣喘者神授湯若上盛下弱而喘促者宜蘇子降氣湯吞黑錫丹若尊年之人素來稟賦太厚不任熱藥者不可輕投丹劑及諸熱藥但以祕傳降氣湯分心氣飲論之梗槩不出於此矣若素有腳氣而喘者當作腳氣治之又有骨蒸勞喘自有專門不敢濫及神祕湯治水氣乘肺而喘兼療支飲而喘陳橘皮洗去白紫蘇葉人參桑白皮生薑等分右㕮咀每服半兩水煎去滓溫服杏子散治諸藏相乘喘急杏仁去皮尖雙仁麩炒黃細研如膏麻黃根為細末等分右和煎橘皮湯調下二錢無時候千緡湯齊州半夏七枚炮裂四片破之皂角去皮炙二寸甘草炙一寸生薑如指大右同以水一碗煮去半頓服沈興宗待制嘗病痰喘不能臥人扶而坐數日客有見之曰我曽如此得良藥一服差我以千緡酬之謂之千緡湯可試為之興宗得湯一服而差棗膏元療息賁葶藶研細陳皮苦梗各等分右後二味為末入葶藶令停煮肥棗肉研為膏和圓如梧子大每服五七元飲下許學士云豫嘗患停飲水積肺經食已必喋漸喘覺肺系急服此良驗神授湯治上氣喘急不得卧橘紅苦梗紫蘇人參北五味子等分右㕮咀每服四錢水一盞煎至六分去滓食後服九寶湯治感風伏熱一切咳嗽喘急不問髙年小兒室女産前産後皆可服惟虛勞自汗不可服薄荷葉紫蘇大腹皮洗麻黃去根節各四錢桑白皮桂心杏仁去皮尖陳橘皮甘草各二兩右㕮咀每服半兩水一盞半薑十片烏梅一箇煎至六分去滓溫服食後有兩浙張大夫病喘二十年每至秋冬輒劇不可坐卧百方不差後得臨平僧法本方服之遂差法本凡病三十年服此藥半年乃絶根本永不復發凡服此藥須久乃差官局桔梗湯橘皮半夏湯洗心散華蓋散並見局方不復贅録四七湯見本卷二十卷僕嘗療羅安人年近六十遇秋冬之交上氣喘促不能坐卧六脈洪實服諸藥無效問疾之原少年自川中任所服餌丹砂又恐是丹毒為害遂服洗心散無效僕以華蓋散數服而愈謾記之婦人風痰方論第十五凡八方夫婦人風痰者由臟腑風冷水飲停積在於胸膈所成也人皆有痰少者不能為妨多者成患但胸膈有痰飲漬於五臟則令眼暈亦令頭眩頭痛也評曰夫痰之為害多因外感五邪五邪者寒暑燥濕風內傷七氣七氣者喜怒憂思驚恐恚因五邪而得者得風為風痰得寒為寒痰得冷為冷痰得熱為熱痰得暑為暑痰因七氣所傷者多因婦人性情執著不能容忍而有此證豈特只因風冷而成哉所以外感五邪內傷七氣則一身之中血液淚汗涕唾身中濕者敗濁變而成痰乘間而為害也經云清則運為精華濁則凝為痰飲此之謂也然有痰涎飲沫四種相類宜仔細詳辨調治因風而生痰者宜服三生飲星香飲青州白元子化痰元方見局方因寒冷而得者宜服降氣湯黑錫丹養正丹並見局方因熱而得者宜服金沸草散柴胡半夏湯因暑而得者消暑元並見局方因氣宇不調鬱結而成者宜服參蘇飲四七湯二陳湯痰在上者以瓜蒂散吐之在下者以控涎丹利之雖曰可吐可下亦要觀人之勇怯察脈之虛實方可投之切記不宜痛擊暴下所以初虞世有金虎碧霞之戒者此也三生飲星香飲參蘇飲方並見第三卷第一論控涎丹方見第三卷第六論養正丹方見第四卷第四方論旋覆花湯治婦人風痰嘔逆不下飲食頭目昏悶旋覆花去蒂枇杷葉去毛炙川芎北細辛藿香桂心枳殼去穰麩炒前胡人參去蘆羌活半夏各半兩甘草羚羊角屑赤茯苓各三分右為粗末每服三錢水一盞薑三片煎至七分去滓溫服天南星元治婦人風痰心膈壅滯天南星白附子並炮皂莢仁炒黃半夏麯各一兩晉礬半兩枯右為細末以酒煮麵糊圓如梧桐子大每服十元生薑薄荷湯吞下又方半夏天南星各二兩肥皂莢五挺銼生薑三兩右以水五升一同煮令水盡去皂莢生薑只用半夏南星焙乾為末以酒煮麵糊圓如梧桐子大生薑薄荷湯下七元柴胡半夏湯治痰熱頭痛利膈除煩悶手足煩熱榮衛不調肢節拘倦身體疼痛嗜卧少力飲食無味兼治五嗽痰癖柴胡八兩半夏三兩半人參去蘆甘草黃芩麥門冬各三兩白术二兩右㕮咀每服五錢水盞半薑五片棗一枚煎至八分去滓服金沸草散治傷寒中脘有痰令人壯熱頭痛筋緊急時發寒熱皆類傷風荆芥穗四兩半夏甘草北細辛各一兩赤茯苓二兩前胡旋覆花各三兩右為細末每服二錢水一盞生薑五片棗一枚煎至六分熱服未知再服局方有麻黃赤芍藥無細辛茯苓瓜蒂散療病如桂枝證頭不痛項不強寸脈微浮胸中痞鞭氣上衝喉咽不得息者此為胸中有痰也當吐之宜服此瓜蒂炒黃赤小豆各半兩右為細末取一錢匕豉一合湯七合先漬之須臾煮作稀糜去滓取汁和散溫頓服不吐少少加得快吐乃止諸亡血虛家不可與之脈微大忌令人吐大半夏湯治痰飲及脾胃不和半夏白茯苓生薑各一分右㕮咀作一服每遇膈間有寒痰以水二盞煎至一盞去滓臨卧溫呷如有熱痰加炙甘草一分如脾胃不和去甘草加陳橘皮一分同煎此即二陳湯加減得理四七湯治喜怒悲思憂恐驚之氣結成痰涎狀如破絮或如梅核在咽喉之間咯不出咽不下此七氣所為也或中脘痞滿氣不舒快或痰涎壅盛上氣喘急或因痰飲中節嘔逆惡心並宜服之婦人性情執著不能寬解多被七氣所傷遂致氣填胸臆或如梅核上塞咽喉甚者滿悶欲絶産婦尤多此證宜服此劑間以香附子藥久服取效切不可謂紫蘇耗氣且謂新産氣血俱虛不肯多服用之效驗不可具述紫蘇葉二兩厚朴三兩茯苓四兩半夏五兩右㕮咀每服四錢水一盞半薑七片棗一箇煎至六分去滓熱服無時候若因思憂過當小便白濁用此藥吞青州白元子極妙婦人心胸嘈雜方論第十六凡二方夫心胸嘈雜婦人多有此證原疾之由多是痰也皆血液淚汗變成或云是血嘈今人多用豬餘血炒而食之則愈詳其此理是以血導血歸原爾恰如以鹽梅下涎之義不若用許學士旋覆花湯治心腹中脘痰水冷氣心下汪洋嘈雜腸鳴多睡口中清水自出脅肋急脹滿痛不欲食此胃氣虛冷所致其脈沉遲弦細是其證也旋覆花湯方旋覆花北細辛橘紅桂心人參甘草苦梗白芍藥半夏各半兩赤茯苓三分右㕮咀每服四錢水盞半薑七片煎至八分去滓溫服局方治惡阻半夏茯苓湯亦妙方見惡阻論中婦人大全良方卷六
