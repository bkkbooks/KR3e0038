body:
  text: 婦人大全良方卷十一宋陳自明撰脈例第一王子亨云若妊娠其脈三部俱滑大而疾在左則男在右則女經云隂摶陽别謂之有子摶者近也隂脈逼近於下陽脈别出於上隂中見陽乃知陽施隂化法當有子又少隂脈動甚者妊子也手少隂屬心足少隂屬腎心主血腎主精精血交會投識于其間則有娠又三部脈浮沉正等無病者有妊也餘病如脈經説左手尺部浮洪者為男胎也右手尺部浮洪者為女胎也兩手尺部俱洪者為兩男俱沉實者為兩女又云中指一跳一止者一月胎二跳二止者二月胎也診婦人有妊歌第二肝為血兮肺為氣血為榮兮氣為衛隂陽配偶不參差兩臟通和皆類例血衰氣旺定無孕血王氣衰應有體肝藏血為榮屬隂肺主氣為衛屬陽隂陽配偶者是夫婦匹配偶合構精乃有子也若血少氣盛則無娠孕若血盛氣少則有孕也尺微關滑尺帶數流利往來并雀啄小兒之脈已見形數月懷耽猶未覺尺脈微關脈滑尺脈帶數及流利雀啄皆是經脈閉塞不行成胎已上之脈皆是血多氣少之脈是懷小兒之脈已見形狀也左疾為男右為女流利相通速來去兩手關脈大相應已形亦在前通語左手脈疾為懷男右手脈疾為懷女及其脈流行滑利相通疾速來去是或兩手關部脈洪大相應是其胎已有形狀也左手帶縱兩箇兒縱者夫行乘妻水行乘火金行乘木即鬼賊脈也名曰縱見在左手則懷兩箇男兒也右手帶橫一雙女橫者妻乘夫也是火行乘水木行乘金即所勝脈也名曰橫見於右手則懷一雙女兒也左手脈逆生三男逆者子乘母也是水行乘金火行乘木即己生脈也名曰逆見於左手則懷三箇男兒也右手脈順還三女順者母乘子也是金行乘水木行乘火即生己之脈也名曰順見於右手則懷三箇女兒也寸關尺部皆相應一男一女分形證寸關尺部脈大小遲疾相應者是懷一男一女形證之脈也謂關前為陽關後為隂隂陽脈相應故懷一男一女也有時子死母身存或即母亡存子命此二句之文無辨子母存亡之法往來三部通流利滑數相參皆替替陽實隂虛脈得明遍滿胸膛皆逆氣若寸關尺三部通行流利皆替替有力而滑數皆是陽實隂虛之脈主妊婦逆氣遍滿胸膛而不順也左手太陽浮大男左手寸口為太陽其脈浮大則是懷男子脈右手太隂沉細女右手寸口為太隂其脈沉細是懷女脈也諸陽為男諸隂女指下分明長記取諸陽脈皆為男即浮大疾數滑實之類是也當懷男子諸隂脈即沉細之類是也當懷女子三部沉正等無絶尺內不止真胎婦寸關尺三部脈沉浮正直齊等舉按無絶斷及尺內舉按不止住者真的懷胎婦也夫乘妻兮縱氣霧經云縱者夫乘妻也水行乘火金行乘木即鬼賊脈也縱氣霧霧者露也又上下也謂夫之陽氣乘妻之隂氣二氣上下相逐如霧如露潤澤結子也妻乘夫兮橫氣助橫者妻乘夫也見前注謂兩傍橫氣相佐助也子乘母兮逆氣參逆者子乘母也謂子氣犯母氣相乘兮逆行之氣相參合也母乘子兮順氣護是母氣乘於子氣為順氣相護衛也凡胎聚縱橫逆順四氣以榮養方能成形也小兒日足胎成聚身熱脈亂無所苦婦人懷小兒五箇月是以數足胎成就而結聚也必母身體壯熱當見脈息躁亂非病苦之證謂五月胎已成受火精以成氣故身熱脈亂是無病也汗出不食吐逆時精神結備其中住謂妊胎受五行精氣以成形稟二經以榮其母懷脤至五月其胎雖成其氣未備故胎氣未安上衝心胸則汗出不食吐逆名曰惡阻俗呼選飯唯思酸辛之味以謂胎氣也滑疾不散胎三月妊娠三月名始胎此是未有定儀心包脈養之故脈見滑疾流利為少氣多血不散為血氣盛則始結為胎也但疾不散五月母其脈但疾數而不散者是五個月懷胎之母也弦緊牢強滑者安沉細而微歸泉路孕婦之脈宜弦緊牢強滑利為安吉之脈若沉細而微謂脈與形不相應故云死也前文雖云太隂沉細又云諸隂為女其説似有相違謂三部脈皆不沉細及微故不同也驗胎法第三凡一方婦人經脈不行已經三月者欲驗有胎川芎生不見火為細末空心濃煎艾湯調下方寸匕覺腹內微動則有胎也胎殺避忌産前將護法第四一受孕之後切宜避忌胎殺所遊如經云刀犯者形必傷泥犯者竅必塞打擊者色青黯繫縳者相拘攣甚至母殞驗若返掌斷不可忽月遊胎殺第五立春在房床驚蟄在户單扇清明在門雙扇立夏在竈芒種在母身小暑在竈立秋在碓按京本云在正北方子位白露在厨厠寒露在門立冬在户及厨大雪在爐及竈小寒在房及母身十干日遊胎殺第六甲己日占門乙庚日占碓磨丙辛日占井竈丁壬日占厨廨戊癸日占米倉十二支日遊胎殺第七子丑日占中堂寅卯辰酉日占竈巳午日占門未申日占籬下戌亥日占房六甲旬遊胎殺第八甲子旬遊窗碓甲戌旬遊正廳甲申旬遊中庭甲午旬遊房內甲辰旬遊房中甲寅旬遊闕太史局日遊胎殺第九每遇癸巳甲午乙未丙申丁酉五日在房內北庚子辛丑壬寅三日在房內南癸卯一日在房內西甲辰乙巳丙午丁未四日在房內東六戊六巳日在房內中餘日在外無占凡遊在房內不宜於方位上安牀帳及掃舍皆凶又有小兒殺及本年三殺及産婦身黃定命皆不可犯凡妊娠之後將此貼於當眼常照應之切不可穿鑿修掘移釘繫籬壁重物展壓之類犯之重則胎死腹中母亦不利輕則子受其殃成人之後必定破形拳攣跛縮瘖啞犯之極驗食忌論第十一受孕之後不可食之物切宜忌食非惟有感動胎氣之戒然於物理亦有壓忌者設或不能戒忌非特延月難産亦能令兒破形母殞可不戒哉食雞肉糯米合食令子生寸白蟲食羊肝令子生多厄食鯉魚鱠及雞子令兒成疳多瘡食犬肉令子無聲音食兔肉令子缺唇蓋兔乃不雄而孕生子則口中吐出是以忌馬鴨子與桑椹同食令子倒生心寒食鱉令子項短及損胎雀肉合豆醬食之令子靣生皯黑子食豆醬合藿食之墮胎食氷漿絶産食雀肉令子不耻多淫食山羊肉令子多病食子薑令子多指生瘡食螃蟹令子橫生食蝦蟆鱓魚令兒瘖啞食驢騾馬肉延月難産如此之類無不驗者則知聖人胎教之法豈非慮有自其然乎孕婦藥忌歌第十一蚖水蛭地膽蟲烏頭附子配天雄躑躅野葛螻蛄類烏喙側子及虻蟲牛黃水銀并巴豆大戟蛇蛻及蜈蚣牛膝梨蘆并薏苡金石錫粉及雌雄牙硝芒硝牡丹桂蜥蜴飛生及蟲代赭蚱蟬胡粉麝芫花薇䕔草三稜槐子牽牛并皂角桃仁蠐螬和茅根蘋根碙砂與乾漆亭長波流菵草中瞿麥䕡茹蟹爪甲蝟皮赤箭赤頭紅馬刀石蠶衣魚等半夏南星通草同乾薑蒜雞及雞子驢馬兔肉不須供切忌婦人産前忌此歌宜記在心胸婦人大全良方卷十一
