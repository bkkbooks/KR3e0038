body:
  text: 辯識修製藥物法度凡藥有宜火宜酒者有用子用皮者有去子去皮者有去苖蘆者有别研入藥者有煎成湯去滓後入者若此之類各各不同今備於前無復更註於逐方之下辰砂如鏡面箭鏃者為上雄黃如雞冠通明者為上雌黃無夾石者為上石硫黃如鵝兒黄色為上赤者名石亭脂伏龍肝正對釡月下土是也太隂𤣥精石已上並研令極細如麫無聲為妙禹餘糧代赭石磁石極雄者佳自然銅紫石英有紫色如箭鏃者為上雲母石太一餘糧已上並用火煆令通赤釅醋淬如此七次或十次方可研令極細如麫或用水飛尤妙赤石脂白石脂陽起石有雲頭雨脚輕崧如狼牙者産於北地方可用若是缺伏時研者不可用已上並用火煅一如麫或有生用者青礞石每一兩用硝石二兩大銀鍋子内炒一日一夜自然解散研如麫仍用水飛為妙梁上塵炒令烟盡研如粉絳礬青礬並生研細白礬飛過亦有生用者石膏如無真者以方解石代之凡諸石入湯並碎以綿褁滑石出桂府者明白而堅者方可用若赤色而暗者是吉州所産色黑者名黳石皆不可用蘇合香油先用生布絞去滓秤却用煉熟蜜解開用竹茹輕輕刮淡竹皮是也桑寄生僕隨倉使吳常丞寓廣州方識此物枝梗類木其葉如柘對節而生根侵入樹柯上而生凌冬不凋夏生小花用之果有竒効剉細用木通有川木通有錢子木通即拏藤者為正今之所用者力淺但得隨衆宜去皮節細切罌粟殻去頂蒂筋膜浄洗蜜水淹一宿炒令焦黃阿魏以麫搜和成餅炙黃用葛根當用家葛切片晒乾用今人多取於舖家者乃野葛也有大毒能動胎氣多見醫者贖舖家見成升麻葛根湯孕婦服之動子胎孕小兒藥中亦不宜用麻黃揀小者為上去根節若以止汗用根節以水煑去黃沫焙乾不爾令人發煩躁人參揀色黃明瑩裏面有暈而不油者為上本草云不去蘆則吐人仍煎煑喜河水北細辛揀直而極細味辛辣如川椒者為上地榆葳靈僊柴胡前胡羌活獨活宜用紫色蘆有蠶頭節稀者為上王子亨云獨活乃是極大羌活自是有臼如鬼眼狀尋常白色者乃是老宿前胡謹不可用本草經云二物同一類今人以紫色節宻者為羌活黃色作塊者為獨活又云獨活即羌活毋類也療風宜用獨活兼水宜用羌活白薇紫苑取茸蘆如北細辛者良以牢山出者為上沂兖次之鄆以東市上皆有之形色氣味悉與神農本經唐注日華子相應此藥肺病最為急須今京師所有皆車前草旋覆花根以赤土染之又味鹹大抵鹹走血又能熱中復利小便且肺病本因亡津液而得之今又服走津液藥為害滋甚醫者宜思之秦芁茜根藁本升麻漏蘆防風揀軟而裏面有暈蘆似蠶頭者為上去义股蘆桔梗今人多以薺苨為之要揀味苦肥白者為上或生或炒皆有用已上並洗去苖蘆細切曬乾秤用木香揀如朽骨氣味辛辣甚者為上近時炮炙揀南雲根以亂真其性太寒利大小便本草謂之青木香證類謂之獨行根又云土青木香不堪入藥凡方書云用靑木香者皆當用南木香沉香種類不一惟色黃而沉者為上丁香檀香白芷官桂愈嫩則愈厚愈老則愈薄仍用紫色𦂳卷者去皮至有油處别為末用藿香荆芥薄荷紫蘇諸香藥並不可見火或急用宜多紙裹懷􅀈用北艾先去梗焙燥碾爛以馬尾羅隔去灰末只留黄先秤分兩却用糯米粉打糊揑成餅子炙黃用或以酒炒亦可敗醬即今之苦薺是也喝起草即蒼耳也澤蘭葉紫蘇藿香荆芥薄荷香薷音柔栢葉茵芋大青莽草樗枝菴䕡石楠葉石韋去毛枇杷葉先用温水浸刷去毛却用薑汁炙已上並去梗取葉以紗隔去塵土惟紫蘇藿香飲藥中宜兼嫩梗大能下氣黃連宜揀大而似鷹爪者尤佳石菖蒲一寸九節者佳此種類甚多取生於石上葉有劔脊者真無劒脊者名溪蓀生於泥中者名昌陽可解巴豆毒二味並去須細切舶上茴香北茴香葫蘆巴酒炒破故紙蛇床子薏苡仁紫蘇子除是自種自収方是真者可以伐病雖云細而香者是眞近來人多採野蘇子以亂其真其子亦小却以真蘇葉按令香更不可辨菴䕡子葶藶子甜者揀細而肥者真要分甜苦黒牽牛亦有半生半炒牛蒡子芫花醋浸過炒令黃色去梗已上並隔紙炒香五味子色黒内有羊腎者佳入補藥中宜炒用入𠻳藥中宜生用木鼈子去殻切以麩炒巴豆川中來者似菘子而差小者為上去殻及皮必用皮紙褁打去油如此者三五次油方盡或有不去油者車前子兎絲子二味先用温水淘洗去泥沙捏乾以好酒浸四五日蒸四五次研令極爛揑成餅子焙乾方可為末香附子金毛狗骨碎補並細切炒令黃色舂擦去毛令浄方秤石斛揀色黃如金大者去根皮細切用好酒浸一宿烝一炊久慢火炒燥秤用卷栢甘松並洗去根土用肉蓯蓉揀香而肥有鱗甲分明者仍其端有心者方真有鹽霜者勿用當歸揀如馬尾重半兩已上氣香味甜者為上㣲炒川牛膝揀如鼠尾軟而甜者為上並去蘆酒浸半日不可太過久則失味洗浄慢火焙乾切方秤分兩五加皮桂心補藥用厚者發散用薄者海桐皮黃蘖皮楊梅皮白鮮皮杜仲厚朴桑白皮或炙炒今人多以梏樹根皮為偽最要仔細辨並削去粗皮細切方用惟杜仲厚朴每一斤用生薑一斤研取自然汁罨一宿次日炒令黃色甜𤓰子𤓰樓子冬𤓰仁去皮杏仁桃仁郁李仁並先去尖雙仁却用水煑一二沸去皮以麥麩炒黃秤用酸棗仁去皮炒香用栢子仁揀去殻别炒研用皂角去皮弦子酥炙川椒揀色紅而口白辛香者為上去梗目及閉口者然後慢火炒令色變以紙乗於地上椀覆出汗為度山梔小者佳一名越桃縮砂白豆蔲益智草果並去皮取仁秤㯽榔如雞心者佳大腹子二味生用肉豆蔲三味麫褁炮令麫黃為度山茱茰訶子炮去核取肉秤雙核者名訶梨勒獨核名訶子川楝子烝去皮核炒大黃濕紙裹煨令香熟亦有酒洗生用三稜亦有以紅蓼根為偽者蓬莪茂二味並用濕紙褁炮令香軟細切或更用鹽醋浸半日用鬱金狼毒紫河車三味並洗切焙神麯半夏麯麥牙榖牙並𢷬碎炒黃用白薑出大通池州尤佳天雄重兩半已上有象眼者佳附子揀圓而堅實者為上草烏川烏重七八錢如鴉腦者為上五味並用灰火炮裂去皮尖臍用天南星重一兩者佳忌用虎掌炮去皮或以白礬水浸一二宿吳茱茰去枝葉半夏二味並用湯泡七次半夏麯以洗過半夏為末以生薑自然汁揑為餅子炙黃用生地黃洗焙乾秤亦有研取自然汁熟地黃温水浄洗焙乾却以好酒潑濕却用巾子乘於甑上蒸再用酒洒九蒸九曝焙燥秤地黃生者平宣熟者温補虛人須補藥當用熟本草云男子宜用熟者女人宜用生者滳乳香用蚌粉畧炒掛䆫孔中風乾研延胡索去皮根貝母去心薑浸一宿山藥川芎芍藥知母續斷川中來者色赤而瘦者佳小薊根已上略洗細切慢火焙乾用巴㦸揀紫色者為上水浸軟牡丹皮枸杞根即地骨皮也初虞世云此藥至賤都下並無真者大抵都人雖一錢亦作偽石蓮烏藥洪州者為上麥門冬天門冬略用水浸軟此二門冬去心子火上焙熱即當風涼之如此不過三四次即易乾仍不損藥力他藥並宜如此逺志泔浸一宿黃芩一名枯腸草刮去朽者已上有心者並搥去心只取肉焙乾秤用青橘皮橘皮取多年揀小而紅者佳若大而黃者柑皮也不堪入藥大治産後䏎浮雷公云産後肌浮柑皮酒服者此也二味用温水洗浄却於砂盆内磨去白焙乾秤枳殻揀小而實者為上去穰麩炒黃用本草有枳實一條王子亨云此物本名曰枳凡草木有花必有實夫枳殻即枳實之類也茯苓補藥宜用白色利水藥宜用赤色堅者佳茯神去木用色白者為上猪苓水浸軟已上三味並去黒皮細切焙燥秤蒼术取茅山者為上米泔浸二三宿打洗去皮切焙白术揀白而肥者方是浙术瘦而皮黃者出幕阜山力弱不堪用油者去之二术並去蘆切細焙乾却以麥麩炒令黃燥用甘草炙黃黄耆揀如箭幹直而甜者佳去义蘆剉令長四五寸搥扁以蜜水或鹽水浸透炙令酥脆為上甘菊花取自栽可以烹茶者俟花未開者採之佳旋覆花鶴虱諸花並去蕚蒂血餘皂角水洗浄燒存性童子小便夏月要入薄荷浸之方免臭壤龍齒龍骨並揀有布紋者佳白色者上五色者次之黒者為下火煆通赤以乳鉢研令極細不可犯鐵器或有生用者虎頭骨虎脊骨天靈葢虎前脛骨龜甲鼈頭鹿茸揀嫩而有血色者佳大者為麋茸小者為鹿茸冬至日麋角解夏至日鹿角解麋得陽而角解所以利補陽鹿得隂而角解是以利補隂麋茸性熱鹿茸性温並先燎去毛塗酥炙令黃脆如無酥以好酒浸炙並用酥炙黃紫梢花即湖澤中魚生卵於竹木之上如糖撒狀者是去木用鹿角膠阿膠揀明亮者為上阿膠不必須東平自為之甚佳補虛用牛皮膠治風用驢皮膠東平皆京師偽膠雜以馬皮并故鞍韉鞋底之類其惡為甚二味並細切以蚌粉炒燥如珠方用桑螵蛸去末塗酥炙黃或以酒炒亦可眞珠母取未鑽者研令極細玳瑁宜生用犀角有竹紋者色黒為上羚羊角有馬鞭節仍有挂樹痕者佳諸角宜用馬齗先鎊取屑懷􅀈為末方可入藥牡蠣取左顧者佳用鹽泥固濟煆用地龍以生布袋盛搥出沙土只取皮秤烏賊骨一名海螵蛸去殻用殭蠶去觜切炒令絲盡穿山甲又名鯪鯉甲去大皮細切蛤粉炒燥用水蛭偽者以血調麫而為之宜子細辨認以鹽炒黃䖟虫蚖青紅娘子斑猫並去頭翅足用糯米同炒令米赤為度蜈蚣去頭足炙黃用全蝎去毒畧炒蛇蛻揀全而頭向下者為妙燒存性用亦有纒於青竹上炙黃焦用蟬蜕温水洗去土石仍去前足石蜥蜴蛤蚧並酒炙用烏蛇揀尾小穿得一百二十錢者仍眼如活者為上白花蛇揀眼如活者尾端有佛指甲腹兩邊有念珠斑者為上二蛇並用酒浸一二宿去皮骨取肉炙香用仍經久不蛀晚蠶沙炒鼈甲揀大而有九肋生者尤佳先用淡醋煑去裙却用釅醋炙令黃脆為妙五靈脂揀似鼠屎者為上似沙糖者次之先以水浸淘去砂土日乾碎之亦有炒用乾漆碎之炒令煙盡猪羊腎及肝並去脂膜仍不可經水鯉魚鱗蝟皮獖猪左懸蹄甲露蜂房蠶蛻牛角䚡並用火燒存性研為細末用鹿角霜研細用麝香揀味辣者真名生麝亦有用當門子研令極細用獺肝炙乾用並用研細為末用荷葉蓮蓬㯶櫚為墨刷者妙用荷葉中心蒂者生用益母草去根隂乾今名大秃其子名茺蔚子鬼臼去毛用鬼箭羽去骨取翎用五倍子去心中灰虫麒麟竭汲藥安息香去沙石乳香琥珀五味並細研婦人大全良方辨識修製藥物法度
