body:
  text: 婦人大全良方卷十二宋陳自明撰妊娠疾病門胎教已明須知妊娠疾病故以涎之凡妊娠諸病但忌毒藥餘當對證依法治之妊娠隨月數服藥及將息法第一凡二十方千金妊娠一月名始胚飲食精熟酸美受御冝食大麥毋食腥辛是謂才正又妊娠一月足厥隂脉養不可針灸其經足厥隂內屬於肝肝主筋及血一月之內血行否澀不為力事寢心安靜毋令恐畏又妊娠一月隂陽新合為胎寒多為痛熱多卒驚舉重腰痛腹滿胞急卒有所下當預安之冝服烏雄雞湯方烏雄雞一隻治如食法吳茱茰一升茯苓阿膠各二兩生薑甘草各一兩人參芍藥白术各三兩麥門冬伍合去心右十味細切以水一㪷二升煮雞取汁六升去雞下藥煮取三升內酒三升并膠煬盡取三升去滓溫服一升日三服又若曽傷一月胎者當預服補胎方北細辛一兩防風二兩烏梅一升吳茱茰五合乾地黃白术各一兩大麥五合生薑四兩右㕮咀以水七升煮取二升半去滓分溫三服若寒多者倍細辛茱茰熱多渴者去細辛茱茰加栝樓根二兩若有所思去大麥加柏子仁三合一方有人參一兩忌生菜蕪荑桃李雀肉等物妊娠二月名始膏毋食辛臊居必靜處男子勿勞百節以痛是謂胎始結又妊娠二月足少陽脉養不可針灸其經足少陽內屬於膽膽主精二月之時兒精成於胞裏當謹護驚動又妊娠二月始隂陽踞經有寒多壞不成有熱即萎卒中風寒有所動搖心滿臍下懸急腰背强痛卒有所下乍寒乍熱艾湯主之方丹參三兩當歸人參麻黃去節艾葉阿膠炙各二兩甘草一兩炙大棗十二枚擘生薑六兩右九味切以酒三升水一㪷內藥煮减半去滓內膠煎取三升分溫三服忌海藻菘菜又若曽傷二月胎者當預服黃連湯方黃連人參各一兩吳茱茰五合生地黃五兩生薑三兩右五味切以醋漿七升煮取三升分四服日三夜一每十日一作若頗覺不安加烏梅一升加烏梅者不用漿直用水耳忌猪肉冷水蕪荑一方當歸半兩妊娠三月名始胎當此之時未有定儀見物而化欲生男者操弓矢欲生女者弄珠璣欲子美好數視璧玉欲子賢良端坐清虛是謂外象而外感者也又妊娠三月手心主脉養不可針灸其經手心主內屬於心無悲哀無思慮驚動又妊娠三月為定形有寒大便青有熱小便難不赤即黃卒驚恐憂愁瞋恚喜頓仆動於經脉腹滿繞臍苦痛腰背痛卒有所下雄雞湯方雄雞一隻治如食法甘草炙茯苓人參阿膠各二兩黃芩白术各一兩芍藥四兩麥門冬去心五合大棗十四枚擘生薑一兩切右㕮咀以水一㪷五升煮雞減半內藥煮取一半入清酒三升并膠再煎取三升分三服一日盡之當溫卧忌海藻菘菜酢物桃李雀肉等一方有當歸川芎二兩無黃芩生薑又若曽傷三月胎者當預服茯神湯方茯神丹參龍骨各一兩阿膠當歸甘草炙人參各二兩赤小豆二十一粒大棗十二枚擘右㕮咀酢漿一㪷煮取三升分四服七日後服一劑腰痛者加桑寄生二兩深師方有薤白二兩麻子一升忌同前妊娠四月始受水精以成血脉其食稻粳其羮魚鴈是謂成血氣以通耳目而行經絡又妊娠四月手少陽脉養不可針灸其經手少陽內輸三膲四月之時兒六腑順成當靜形體和心志節飲食又妊娠四月為離經有寒心下溫溫欲嘔胸膈滿不欲食有熱小便難數數如淋狀臍下苦急卒中風寒頸項强痛寒熱或驚動身軀腰背腹痛往來有時胎上迫胸煩不得安卒有所下菊花湯方菊花如雞子大一枝麥門冬去心一升麻黃去節阿膠炙各三兩生薑五兩甘草炙當歸半夏洗各二兩人參一兩半大棗十四枚擘右細銼以水八升煮減一半內清酒三升并阿膠煎取三升分三服溫卧當汗以粉粉之護風寒四五日忌羊肉海藻菘菜餳等又若曽傷四月胎者當預服調中湯方芍藥四兩甘草炙芎藭續斷各一兩柴胡白术各三兩烏梅一升生李根白皮三兩當歸一兩半生薑四兩厚朴炙枳實炙各二兩右細切以水一㪷煮取三升分四服日三夜一八日再服一劑一方有半夏二兩忌海藻菘菜桃李雀肉妊娠五月始受火精以成其氣晏起沐浴浣衣居處必厚其衣裳朝吸天光以避寒殃其食稻麥其羮牛羊和茱茰調以五味是謂養氣以定五藏又妊娠五月足太隂脉養不可針灸其經足太隂內輸於脾五月之時兒四肢成無大饑無甚飽無食乾燥無自炙熱無大勞倦又妊娠五月毛髮初生有熱苦頭眩心亂嘔吐有寒苦腹滿痛小便數卒有恐怖四肢疼痛寒熱胎動無常處腹痛悶頓欲仆卒有所下阿膠湯方又名旋覆花湯阿膠四兩炙人參一兩麥門冬去心一升生薑六兩吳茱茰七合旋覆花當歸芍藥甘草炙黃芩各二兩右細切以水九升煮取一半內清酒三升并膠微火煎取三升半分為四服日三夜一先食再服便愈不差更服忌海藻菘菜又若曽傷五月胎者當預服安中湯方甘草炙芍藥各三兩當歸人參乾地黃芎藭各二兩五味子五合生薑六兩麥門冬去心一升大麻仁五合大棗三十五枚擘黃芩一兩右細切水七升清酒五升煮取三升半分四服日三夜一七日再服一劑忌如前小品療妊娠五月舉動驚愕胎動不安下在小腹痛引腰胳小便疼下血安胎當歸湯當歸阿膠芎藭人參各一兩棗十二箇艾一虎口右細切以酒水各三升合煮至三升去滓內膠令煬分三服腹中當安小便緩也古今録驗救急同一方有甘草無參棗妊娠六月始受金精以成筋身欲微勞無得靜處出遊於野數觀走犬馬食冝鷙鳥猛獸之肉是謂變腠理紐筋以養其力以堅背膂又妊娠六月足陽明脉養不可針灸其經足陽明內屬於胃主其口目六月之時兒口目皆成調五味食甘美無大飽又妊娠六月卒有所動不安寒熱往來腹內脹滿身體腫驚怖忽有所下腹痛如欲産手足煩疼麥門冬湯方麥門冬去心一升甘草炙人參各一兩乾地黃三兩黃芩二兩阿膠四兩生薑六兩大棗十五枚擘右八味切以水七升煮減半內清酒二升并膠煎取三升分三服每如人行三四里中間進糜粥忌海藻菘菜蕪荑又若曽傷六月胎者當預服柴胡湯方柴胡四兩芍藥一方作紫葳白术甘草炙各二兩麥門冬三兩去心蓯蓉一兩芎藭二兩乾地黃五兩生薑六兩大棗三十枚擘右十味切以水一㪷煮取三升分四服日三夜一中間進糜粥勿食生冷及堅强之物七日更服一劑忌海藻菘菜蕪荑桃李雀肉等一方有黃芩二兩集驗療妊娠六七月胎不安常處旋覆花湯亦名阻病旋覆花一兩厚朴白术枳殼黃芩茯苓各三兩半夏炒一方無芍藥生薑各二兩右細切以水一㪷煮取二升半先食分五服日三夜二忌羊肉餳醋桃李雀肉千金同妊娠七月始受木精以成骨勞身搖肢無使定止動作屈伸以運血氣自此後居處必燥飲食避寒常食粳稻以密腠理是謂養骨而堅齒又妊娠七月手太隂脉養不可針灸其經手太隂內屬於肺肺主皮毛七月之時兒皮毛已成無大言無號哭無薄衣無洗浴無寒飲又妊娠七月忽驚恐搖動腹痛卒有所下手足厥冷脉若傷寒煩熱腹滿短氣常苦頸項腰背强䓤白湯方葱白長三四寸十四枚半夏洗切炒麥門冬去心各一升生薑八兩甘草炙當歸黃耆各三兩阿膠四兩人參一兩半黃芩一兩旋覆花一把右十一味切以水八升煮减半內清酒三升并膠煎取四升溫服一升日三夜一溫卧當汗出若不出者加麻黃二兩煮服如前法若秋後勿强責汗忌羊肉餳海藻菘菜等杏仁湯若曽傷七月胎者當預服杏仁去雙仁皮尖碎甘草炙鐘乳研乾薑各二兩麥門冬去心吳茱茰各一升五味子粳米各五合紫苑一兩右九味切以水八升煮取三升半分四服日三夜一中間進食七日服一劑忌海藻菘菜妊娠八月始受土精以成膚革和心靜息無使氣極是謂密腠理光澤顔色又妊娠八月手陽明脉養不可針灸其經手陽明內屬於大腸大腸主九竅八月之時兒九竅皆成無食燥物無輒失食無忍大起芍藥湯又妊娠八月中風寒有所犯觸身體盡痛乍寒乍熱胎動不安常恐頭眩痛繞臍下寒時時小便白如米汁或青或黃或使寒栗腰背苦冷痛而目視茫茫芍藥四分人參當歸甘草炙各三兩白术一兩厚朴二兩炙薤白切一升生薑切四兩右八味切以水五升酒四升煮取三升分三服日再夜一忌海藻菘菜桃李雀肉等葵子湯若曽傷八月胎者當預服甘草炙柴胡白术各三兩厚朴芍藥各二兩葵子二升生薑六兩大棗二十枚擘右八味切以水九升煮取三升分三服日三一日服一劑忌海藻菘菜桃李雀肉等妊娠九月始受石精以成皮毛六腑百節莫不畢備飲醴食甘緩帶自時而待之是謂養毛髮多才力又妊娠九月足少隂脉養不可針灸其經足少隂內屬於腎腎主續縷九月之時兒脉續縷皆成無處溫冷無著炙衣半夏湯又妊娠九月若卒下痢腹滿懸急胎上衝腰背痛不可轉側短氣半夏洗麥門冬去心各五合乾薑一兩當歸吳茱茰阿膠炙各三兩大棗十二枚擘右七味切以水九升煮取三升去滓內白蜜八合微火上溫分四服痢即止忌生物餳猪腎湯若曽傷九月胎者當預服猪腎一具茯苓桑寄生乾薑乾地黃芎藭各三兩白术四兩麥門冬一升去心附子中者一枚炮大豆三合右十味切以水一㪷煮腎令熟去腎內諸藥煎取三升半分四服日三夜一十日更一劑忌猪肉冷水蕪荑桃李雀肉酢物等妊娠十月五臟俱備六腑齊通納天地氣於丹田故使關節人神皆備但俟時而生集驗延年同妊娠惡阻方論第二凡十二方夫妊娠阻病者按咱殷産寶方謂之子病巢氏病源謂之惡阻若婦人禀受怯弱或有風氣或有痰飲既妊娠便有是病其狀顔色如故脉息和順但覺肢體沉重頭目昏眩擇食惡聞食氣好食酸鹹甚者或作寒熱心中憒悶嘔吐痰水胸腑煩滿恍惚不能支持不拘初娠但疾苦有輕重耳輕者不服藥亦不妨重者須以藥療之千金方有半夏茯苓湯茯苓圓二方専治阻病然此二藥比來少有服者以半夏有動胎之性蓋胎初結慮其易散此不可不謹也張仲景傷寒論云婦人傷風續得寒熱發作有時此為熱入血室有用黃龍湯者小柴胡去半夏也此蓋為妊婦而設焉王子亨則有白术散局方則有人參丁香散用之良驗然三方皆大同而小異楊振則有人參橘皮湯齊士明則有醒脾飲子試之亦效皆不用半夏動胎等藥服者知之白术散治惡阻吐清水甚害十餘日粥漿不入者白术一兩人參半兩丁香二錢半甘草一錢右為細末每服二錢水一盞薑五片煎至七分溫服人參橘皮湯治阻病嘔吐痰水人參去蘆陳橘紅白术麥門冬去心各一兩甘草三錢厚朴製白茯苓去皮各半兩右為粗末每服四錢水一盞半淡竹茹一塊如彈子大生薑三片煎至七分去滓澄清溫服空心食前集驗無茯苓麥門冬甘草人參丁香散治妊娠惡阻胃寒嘔逆翻胃吐食及心腹刺痛人參半兩丁香藿香葉各一分右為散每服三錢水一盞煎至七分去滓溫服無時又方人參丁香柿蒂各一兩甘草良薑各半兩右為細末每服二錢熱湯㸃下無時醒脾飲子此出王氏博濟方治妊婦阻病嘔逆不食甚者中滿口中無味或作寒熱草豆蔲以濕紙褁灰火中煨令紙乾取出去皮用厚朴製各半兩乾薑三分甘草一兩一分右為細末每服二大錢水一大盞棗二箇生薑三片煎至八分去滓呷服病輕者只一二服便能食舊有橘紅二兩治寒熱瘧痢不食後人去橘皮以乾生薑代乾薑治老人氣虗大便祕少津液引飲有奇效産科醫官齊士明依舊用乾薑去橘皮亦名醒脾飲子治阻病極為神驗宣和初在京師校勘保生湯治婦人經候不行身無病而似病脉滑大而六部俱勻乃是孕婦之脉也精神如故惡聞食臭或但嗜一物或大吐或時吐清水此名惡阻切勿作寒病治之冝服此藥如覺惡心嘔吐加丁香生薑煎服溫隱居方人參一分甘草一分白术香附子烏藥橘紅各半兩右㕮咀每服三大錢水一盞半薑五片煎至七分去滓溫服無時或作末子調古今録驗療惡食人參四兩厚朴生薑枳殼甘草各二兩右切以水六升煮取三升分三服治妊娠阻病心中憒悶見食嘔吐惡聞食氣肢節煩疼身體沉重多思嗜卧靣黃肌瘦人參陳皮各八分白茯苓麥門冬甘草生薑各十二分大棗二十箇右㕮咀以水五升煎取二升溫分三服忌菘菜醋等凡妊娠惡食者以所思食任意食之必愈一方無棗子有半夏竹茹如陳皮分兩二香散療妊娠胎氣不安氣不升降飲食不美嘔吐酸水起坐覺重宜服之香附子一兩藿香葉甘草各二錢右為細末每服二錢入鹽少許百沸湯㸃下近效方療妊娠惡食心中煩憤熱悶嘔吐青竹茹麥門冬各三兩前胡二兩橘皮一兩蘆根一握右細切以水一大升煮取半升去滓分兩服食前一服一方無麥門冬用小麥三合體熱四肢煩熱者加地骨皮醫人夏侯伍録方李茂翁先生云若左脉弱而嘔服諸藥不止者當服理血歸原藥則愈經云無隂則嘔是也治妊娠惡阻嘔吐不止頭痛全不入食服諸藥無效者服此藥理血歸原則愈人參甘草川芎當歸京芍藥丁香各半兩白茯苓白术陳皮各一兩半苦梗炒枳殼去穰炒各一分半夏泡洗七次切炒黃一兩右㕮咀每服三錢重生薑五片棗一枚煎安胎飲治懷胎三月四月至九箇月日惡阻病者心中憒悶頭重目眩四肢沉重懈怠不欲執作惡聞食氣欲啖鹹酸多睡少起嘔逆不食或胎動不安非時轉動腰腹疼痛或時下血及妊娠一切疾病並皆治之甘草茯苓當歸熟地黃川芎白术黃耆白芍藥半夏泡洗七次切炒阿膠切粉炒地榆各等分右㕮咀每服三錢水盞半生薑四片煎至八分去滓溫服無時候一方無半夏地榆有人參寄生一方無白术黃耆半夏地榆有艾葉只是膠艾湯加白茯苓妊娠痰逆不思食方論第三凡八方夫水飲停積結聚為痰人皆有之少者不能為害多則成病妨害飲食乃至嘔逆妊娠之病若嘔逆甚者傷胎也原疾之由皆胃氣不調或風冷乘之冷搏於胃故成斯病也亦惡阻之一端半夏茯苓湯治妊娠惡阻心中憒悶虛煩吐逆頭目昏眩四肢怠惰百節煩疼痰逆嘔吐嫌聞食氣好啖鹹酸惡寒汗出羸極黃瘦多卧多起不進飲食妊婦有痰必生阻病千金以半夏茯苓湯以對之此思邈處方之妙也若孕婦羸弱胎孕不牢則動必成咎全在醫者相人强弱以投之又何慮焉半夏一兩泡十次别切炒令黃生薑五兩茯苓熟地黃各三兩橘紅北細辛人參芍藥紫蘇川芎各一兩苦梗甘草各半兩右㕮咀每服四大錢水二盞薑七片煎至七分去滓空心溫服兼服茯苓圓局方與崔氏無紫蘇細辛有旋覆花一兩有客熱煩渴口瘡去橘皮細辛加前胡知母各三兩腹冷下痢者去地黃加炒桂心二兩胃中虛熱大便祕小便赤澀加大黃三兩去地黃加黃芩一兩然半夏雖能動胎若炒過則無妨張氏方半夏茯苓湯半夏炮洗七次炒黃陳皮各二兩半白茯苓二兩縮砂仁一兩甘草四兩右㕮咀每服四錢水二盞薑十片棗一箇烏梅半箇煎至七分食前溫服茯苓圓治妊娠阻病心中煩悶頭目暈重憎聞食氣吐逆吐痰煩悶顛倒四肢重弱不自勝持服之即效要先服半夏茯苓湯兩劑後服此藥赤茯苓人參桂心乾薑半夏泡洗七次炒黃橘紅各一兩白术葛根甘草枳殼各二兩右為細末煉蜜為圓如梧桐子大米飲吞下五十圓日三服一方有麥門冬忌海藻菘菜羊肉餳糖桃李雀肉酢等肘後只五味云妊娠忌桂千金方療妊娠心腹支滿痰逆不思飲食赤茯苓前胡白术紫蘇葉各一兩半夏麥門冬人參大腹皮各半兩右為粗末每服四錢水一盞薑五片煎至七分去滓溫服一方無大腹皮人參有大腹子檳榔療妊娠嘔吐不食兼吐痰水生蘆根十分橘紅四分生薑六分檳榔二分右切以水二盞煮取七分空心熱服療妊娠心膈氣滯嘔吐不下飲食心神虛煩四肢少力枇杷葉半夏麥門冬人參甘草半兩訶子肉藿香各一兩赤茯苓枳殼陳皮各三分右㕮咀每服三錢水一盞薑三片棗一箇煎至七分去滓溫服一方無大棗訶子集驗療婦人妊娠惡阻嘔吐不下食青竹茹橘皮各三兩生薑茯苓各四兩半夏五兩右細切以水六升煮取二升半去滓分三服不差頻服忌羊肉餳酢等物古今録驗療妊娠不欲食或吐春月所宜服柴胡湯甘草柴胡各二兩麻黃一兩食茱茰半兩大棗十二枚右細切以水六升煮取三升適寒溫服一升日三療食噫醋除熱下氣所宜多與上同但秋夏去茱茰加枸杞一升六月加小麥一升石膏三兩秋去石膏加甘草一兩九月去麻黃加乾薑一兩十月加川芎三分忌海藻菘菜胎動不安方論第四凡二十方凡婦人妊娠胎動不以日月多少而常墮胎者有雖有胎而月信雖不多常來而胎不損者産寶方云婦人妊娠常胎動不安者由衝任經虛胞門子户受胎不實故也并有飲酒房室過度有所損動不安者巢氏云婦人衝任二經挾風寒而有胎故不以日月多寡因悮有擊觸而胎動者有喜怒不常氣宇不舒傷於心肝觸動血脉衝任經虛乃致胞門不固或因登高上厠風攻隂户入於子宫如此皆令胎動不安也曽有以妊娠月信不絶而胎不損問産科能宗古者答曰婦人血盛氣衰其人必肥既娠之後月信常來而胎不動若據晚進觀之便以為漏胎若作漏胎治之則胎必墮若不作漏胎治則其胎未必墮今推宗古之言誠有㫖也巢氏云婦人經閉不利别無所苦者是謂有子以其經血畜之以養胎擁之為乳汁也有子之後畜以養胎矣豈可復能散動耶所以然者有娠而月信每至是亦未必因血盛也若謂婦人榮經有風則經血喜動以其風勝則可也既榮經為風所勝則所來者非養胎之血以此辨之若作漏胎治之必服保養補胎之藥且胎不損强以藥滋之乃所謂實實虗虛其胎終墮冝矣若醫者知榮經有風之理専以一藥治風經信可止或不服藥胎亦無恙然而有胎本不固而因房室不節先漏而後墮者須作漏胎治之此又不可不審也亦有婦人年方壯嵗聽醫官言某藥可服致補暖而子使胞門子户為藥所操搏巢氏病源并産寶方並謂之胞門子户張仲景謂之血室使新血不滋舊血不下設或有子不以遲晚則必墮中年之後氣宇漸衰必有崩中帶下之疾或月信愆期漸覺黃瘦腰背不伸五心煩熱五勞七傷之疾從此而生不獨胞門子户風寒而生也故千金翼方有朴硝蕩胞湯正為此疾今之醫者未見有用亦未見有知之者義論妊娠胎動其由有二一因母病而胎動但療母疾其胎自安若胎不堅固自動其母疾唯當安胎其母自愈一因勞役氣力或觸冒冷熱或飲食不適或居處失宜輕者轉動不安重者便致傷墮當以母形色察之母面赤舌青者兒死母活唇口青兩邊沫出者子母俱死面青舌赤兩邊沫出者母死子活也集驗方療妊娠二三月上至八九月胎動不安腹痛已有所見方艾葉阿膠當歸川芎各三兩甘草一兩右細切以水八升煮取三升去滓內膠令煬分三服日三千金文仲備急同刪繁療婦人懷妊胎動不安葱豉安胎方香䜴一升熬葱白一升阿膠二兩炙先以水三升煮葱豉取一升去滓入膠再煎令煬服一日一夜可服三四劑經心録同鈎藤湯治妊娠八九月胎動不安心腹㽲痛靣目青冷汗出氣欲絶此由勞動用力傷胎宫冝急治之鈎藤當歸茯神人參各一兩苦梗一兩半桑寄生半兩右為粗末每服五大錢水二盞煎至一盞去滓溫服無時候忌猪肉菘菜若煩熱加石膏二兩半臨産月加桂心一兩治妊娠胎動不安護胎法鯉魚二斤粳米一升葱一握豉薑右作臛食之每月一度治妊娠無故胎動不安腹內絞痛煩悶産寶同當歸桑寄生各四分川芎三分䜴八合阿膠三分葱十四莖右以水二升煮取八合下膠空腹溫分二服一方無豉用銀器煎集驗無寄生豉有續斷三分銀多少先煎後入藥黃耆湯治胎動不安腹痛下黃汁糯米一合黃耆川芎各一兩右細銼水一大盞煎至一盞三分溫服産寶方治胎動熟艾阿膠各二兩葱白一升右以水四升煮取一升半分為三服安胎鐵罩散白藥子一兩白芷半兩右為細末每服二錢煎紫蘇湯調下或胎熱心煩悶入沙糖少許煎銀苧酒治妊娠胎動欲墮腹痛不可忍方苧根二兩銼銀五兩清酒一盞右以水二大盞煎至一大盞去滓分溫二服治胎動方養生必用方救急療胎動去血腰腹痛阿膠川芎當歸青竹茹各二錢右以水十盞內銀一斤煮至五盞去銀入上件藥三味煎至二盞半去滓入膠再煎膠煬分溫三服空心自早至暮盡未效再作治妊娠冷熱腹內不調致胎不安産寶方艾葉二兩當歸乾薑各三兩川芎四兩右以水四升煮取二升分溫四服不過兩劑寄生湯治胎氣常不安治五箇月以後胎不安桑寄生洗銼秦芁阿膠各半兩糯米半兩作粉右以新汲水三升先下寄生秦芁二味煮至二升去滓次入阿膠糯米再煎約有一升止分作三服空心食前日午服之忌酒醋三五日娠婦胎氣至五月已後常不安者服之必效頃見娠婦好飲酒食鹹酸五辛胎必動可不知之治胎動不安好銀煮取水右著葱白作羮食之佳又方川芎二兩葱白一升右以水七升煮取二升半分溫三服順氣飲子産前服之安胎紫蘇葉木香炮人參草豆蔲茯苓各一兩甘草半兩大腹子一兩如氣弱者不用右㕮咀每服三錢水一盞苧根三寸糯米少許煎至七分去滓溫服療妊娠後不轉動方阿膠炙一兩桑寄生半兩右為末以酒一升煮五沸下生雞卵一枚投酒中分溫二服空心食前一服小品方無寄生有艾葉只用水煎文仲安胎寄生湯療血流下方桑寄生白术各五分茯苓四分甘草十分右切以水五升煮取二升半分三服若人壯者可加芍藥八分足水二升若胎不安腹痛端然有所見加乾薑四分即安忌海藻菘菜酢物桃李雀肉等崔氏小品經心同秦芁湯出王氏指迷方治胎動不安秦芁阿膠炒艾葉右等分為粗末每服五錢水二盞糯米百粒煎至一盞去滓溫服小品療妊娠重下痛引腰背安胎止痛湯方當歸阿膠炙乾地黃黃連芍藥各一兩雞子一枚秫米一升右七味以水七升攪雞子令相得煮米令如蟹目沸去滓內諸藥煮取三升分四服忌蕪荑經心録同又膠艾湯療損動母去血腹痛方膠一斤炙艾葉一莒右二味以水五升煮取二升半分三服經心録同妊娠漏胎下血方論第五夫妊娠漏胎者謂妊娠數月而經水時下也此由衝任脉虛不能約制手太陽少隂之經血故也衝任之脉為經絡之海起於胞內手太陽小腸脉也手少隂心脉也是二經為表裏上為乳汁下為月水有娠之人經水所以斷者壅之養胎畜之以為乳汁也衝任氣虗則胞內泄不能制其經血故月水時下亦名胞漏血盡則人斃矣又有因勞役喜怒哀樂不節飲食生冷觸冒風寒遂致胎動若母有宿疾子藏為風冷所乘氣血失度使胎不安故令下血也妊娠卒然下血方論第六凡十二方夫妊娠卒然有損動或冷熱不調和致傷於胎故卒痛而下血若不止之則墮胎也療妊娠三四箇月腹痛時時下血續斷八分艾葉當歸乾地黃六兩竹茹阿膠雞蘇各四錢右以水一升煎取六合去滓空心冉服隔日更服療妊娠六七箇月忽胎動下血腹痛不可忍川芎八分桑寄生四分當歸十二分右以水一升煎取八合下清酒半升再煎取八合分三服如人行五六里再服廣濟主安胎胎病漏血腹痛當歸川芎阿膠炙人參各一兩大棗二十箇右切以水三升酒四升煮取二升半分三服五日一劑頻服三四劑無所忌又療妊娠胎動腹痛及下血安胎當歸川芎苧根各三兩鹿角膠艾葉各二兩葱白一升右細切以水一㪷煮取五升空心熱服正方用銀煮水煎藥又見腰痛門療妊娠忽下血胎上衝心手足逆冷用生艾汁二盞入阿膠生蜜各二錢煎至一盞半稍熱服如無生艾濃煎熟艾汁治妊娠忽然下血腰痛不可忍男六德續添鹿角銼細當歸銼各半兩只作一服以水三盞煎至一半空心食前頓服不過二服即安又方阿膠一兩炒艾葉灰半兩右為細末空心糯米飲調下二錢漏胎下血不止胞乾即死冝急治之生地黃汁一升酒五合右同煎三五沸分溫三服以止為度崔氏療妊娠下血不止血盡子死生乾地黃為末酒服方寸匕日三夜一即愈不過三服良又療妊娠漏胞方一方云及腹內冷者又見指迷方生乾地黃五兩乾薑二兩半右為末酒服方寸匕日再集驗文仲經心同療妊娠無故卒然下血不絶方阿膠三兩用清酒一升半煎取一升頓服又方治妊娠卒然下血兼治胎衣不下方右以鐵錘燒令通赤內酒中如此者三次候溫飲一盞妊娠驚胎及僵仆方論第七凡七方夫妊娠驚胎者是懷妊月將滿其胎神識已具或將産之時從高墜下傷損胞絡致血下胎動遂上搶心胸氣絶不醒其母靣赤舌青口無沫出者兒死母活唇口俱青沫出者子母俱死靣青舌青沫出母死子活若下血不止胞燥胎枯令子死矣催生神妙佛手散一名芎藭湯治婦人妊娠五七月因事築磕著胎或子死腹中惡露下疼痛不已口噤欲絶用此藥探之若不損則痛止子母俱安若胎損立便逐下本出文仲徐王效神驗胎動方云治血上衝心腹滿悶者如湯沃雪救急經心同出外臺又治産前産後體熱敗血腹痛當歸六兩川芎四兩張氏方等分右為粗末每服三錢水一大盞煎令泣泣欲乾投酒一大盞止煎一沸去滓溫服口噤灌之如人行五里再服不過三二服便生一方云此藥治傷胎去血多崩中去血多金瘡去血多拔牙去血多昏暈欲倒者以水煎服或先以漏血腹內疼痛加芍藥官桂减半隨手效詳見通用方治妊娠因墜倒損胎不轉動腹內疼痛腰重及子死腹中不出須㬰三服立下川芎一兩為細末以熱酒調服方寸匕日三四服治妊娠因失所動困絶千金方亦治子煩右取竹瀝飲一升立愈治妊娠從高墜下腹痛下血煩悶生地黃益母草各一兩當歸黃耆各半兩右㕮咀每服四錢水一盞薑四片煎至六分去滓無時候集驗療妊娠二三月上至七八月頓仆失踞胎動不安傷損腰腹痛欲死若有所見及胎奔上搶心短氣下血不止方乾地黃當歸艾葉各二兩阿膠川芎各三兩右以水七升煮取二升半分作三服腹痛甚加杜仲五加皮各三兩一方無地黃有甘草一方無地黃却用生薑自然汁一匙地黃汁半合馬通半合煎成藥去滓入此再煎三沸溫服一方有人參白茯苓水煎竹茹酒治妊娠誤有失墜損築胎損疼痛青竹茹二合好酒一升煮三五沸分作三服即安秦芁湯療妊娠或因僵仆胎動不安臍腹㽲痛出産科方見前療妊娠偶有所傷胎動不安疼痛不可忍兼治血崩甚效兼治子冒又名子癎縮砂不以多少和皮炒令黑色一方用仁尉斗內略炒為細末熱酒調下二錢不飲酒者以米飲調下皆可覺腹中熱則胎已安矣此方極效溫隱居云神效不可盡述僕用有效妊娠胎上逼心方論第八凡七方夫妊娠將養得所則血氣調和故兒在胎則安當産亦易若節適失宜則血氣乖理兒在胎則亟動至産育亦難而子上逼於心者由産難用氣力胎動氣逆胎上衝逼於心者凡胎上逼於心則悶絶胎下乃蘇甚者至死也紫蘇飲治妊娠胎氣不和懷胎近上脹滿疼痛謂之子懸兼治臨産驚恐氣結連日不下名七寶散當歸三分甘草一分大腹皮人參川芎陳橘皮白芍藥各半兩紫蘇一兩右㕮咀每服半兩水一盞半薑四片葱白七寸煎至七分去滓空心溫服曽有一婦人纍日産不下服催生藥不驗許學士曰此必坐草太早心懷一㸃懼氣結而不行然非氣不順也素問云恐則氣下蓋恐則精却却則上焦閉閉則氣還還則下焦脹氣乃不行矣得此藥一服便産及婦人六七月子懸者豫用此數數有驗不十服胎便近下方出本事丁未六月間羅新恩孺人黃氏有孕七箇月逺出而歸忽然胎上衝心而痛坐卧不安兩醫治之無效遂說胎已死矣己用􅒝麻子去皮研爛加麝香調貼臍中以下之命在垂垂召僕診視兩尺脉沉絶他脉平和僕問二醫者曰契兄作何證治之答曰死胎也何以知之答曰兩尺脉絶以此知之僕問之曰此說出在何經二醫無答遂問僕曰門下作何證治之僕答曰此子懸也若是胎死却有辨處夫面赤舌青者子死母活靣青舌青吐沫者母死子活唇口俱青者母子俱死是其驗也今靣色不赤舌色不靑其子未死其證不安衝心而痛是胎上逼心謂矣之子懸冝紫蘇飲子治藥十服而胎近下當歸湯治妊娠胎動蕩心悶絶煩燥口乾橫生倒産上衝下築迷悶唇口青黑手足厥冷産科名保安散一方無甘草有川芎厚朴産寶方有川芎當歸人參各一兩半阿膠一兩炒甘草二兩連根䓤白一握右細銼水二升煎四味至升半去滓下葱再煎三合溫服一劑分為三服治胎上逼心熱痛下血麴半斤搗碎和熟水絞取汁三中盞無時分溫五服一方治胎動腹痛連腰用麥麴新汲水調下一方用神麯大同小異治胎上逼心煩悶方又治妊娠六七月已後胎動困篤葱白二七莖濃煮汁飲之即安若胎已死服之即出未死即安未效再服治胎不順胎上逼心方以烏犬血少少飲之當下治妊娠遍身痛或衝心欲死不能飲食白术五兩黃芩二兩芍藥四兩右水六升煮取二升半分為三服緣胎有水致痛兼易産文仲葛氏療妊娠卒胎上迫心痛方取弩弦急𢃄之立愈妊娠忽然下黃汁如膠或如豆汁胎動腹痛方第九凡一方療妊娠忽然下黃汁如膠或如豆汁胎動腹痛粳米五升黃耆六兩右以水七升煎取二升分為四服妊娠誤服毒藥傷動胎氣方第十凡三方奪命圓専治婦人小産下血至多子死腹中其人增寒手指唇口爪甲青白靣色黃黑或胎上搶心則悶絶欲死冷汗自出喘滿不食或食毒物或誤服草藥傷動胎氣下血不止胎尚未損服之可安已死服之可下此方的係異人傳授至妙牡丹皮白茯苓桂心桃仁製赤芍藥右等分為細末以蜜圓如彈子大每服一圓細嚼淡醋湯送下速進兩圓至胎腐爛腹中危甚者立可取出治婦人服草藥墮孕腹痛方男六德補遺白扁豆生去皮為細末米飲調服方寸匕若修製不及濃煎亦可亦解男子女人誤中砒毒亦治婦人赤白𢃄下要炒黃為末米飲調下阿膠散治妊娠不問月數深淺或因頓仆或因毒藥胎動不安腰痛腹滿或有所下或胎上搶心短氣力方熟地黃二兩白芍藥艾葉當歸甘草阿膠黃耆各一兩一方有川芎右㕮咀每服半兩水一大盞薑三片棗一箇煎至七分去滓溫服無時妊娠心痛方論第十一凡七方夫妊娠心痛者多是風邪痰飲乘於心之經絡邪氣摶於正氣交結而痛也若傷心正經而痛者為真心痛心為帝主之官統領諸藏不可受邪邪若傷之朝發夕死夕發朝死若傷心支别絡而痛者則乍安乍甚休作有時也妊娠之人或有病而痛不已者氣乘胞絡傷損子藏也則令胎動凡胎轉移則多不安不安而動於血者則血下也治妊娠卒心痛氣欲絶方出産寶川芎當歸茯苓厚朴製各等分右水六升煎取二升分為二服忌如前雷公炮炙論云心痛欲死急覔延胡白术湯治妊娠卒心痛欲死不可忍者出古今録驗白术三兩赤芍藥二兩黃芩一兩半右切以水六升煮取二升半分三服半曰令盡微下水令易生忌桃李雀肉千金療妊娠心痛青竹茹一升羊脂八兩白蜜三兩右三味合煎每服棗核大三枚食前頓服日三服又方青竹茹一升酒二升煮取一升半去滓分溫頓服又方破雞子一枚調酒服之又方大麻子三升研水八升煮取五升分為五服又方橘皮三兩豆䜴二兩右為細末煉蜜圓如梧桐子大溫水下二七圓無時候四方出外臺祕要妊娠心腹痛方論第十二凡十一方夫妊娠心腹痛者或由宿有冷疹或新觸風寒皆由藏虛而致發動也邪正相擊而并於氣隨氣上下衝於心則心痛下攻於腹則腹痛故令心腹痛也妊娠而痛者邪正二氣交攻於內若不時差者其痛衝擊胞絡必致動胎甚則傷墮也又云妊娠心腹疼痛多是風寒濕冷痰飲與藏氣相擊故令腹痛攻傷不已則致胎動也當歸芍藥散治妊娠腹中絞痛心下急痛及療産後血暈內虛氣乏崩中久痢常服通暢血脉不生癰癤消痰養胃明目益津白芍藥半斤當歸茯苓白术各二兩澤㵼川芎各四兩一方川芎只兩半右為細末每服二錢食前溫酒調服元和紀用經云本六氣經緯元能祛風補勞養真陽退邪熱緩中安和神志潤澤容色散邪寒瘟瘴時氣安期先生賜李少君久餌之藥後仲景增减為婦人懷妊腹痛方本方用芍藥四兩澤㵼茯苓川芎各一兩當歸白术各二兩亦可以蜜元服出三因方治妊娠心腹痛不可忍方鹽一斤燒令赤右以兩指取一撮酒調服療妊娠先患冷氣忽中心腹痛如刀刺川芎人參茯苓吳茱茰苦梗當歸各三兩厚朴製芍藥各二兩右㕮咀以水九升煎取三升分三服氣下即安療妊娠患腹痛并胎動不安葱白切一升人參厚朴阿膠川芎各二兩當歸三兩右㕮咀以水七升煎取三升分作三服一方有甘草無厚朴川芎香术散治妊娠五箇月已後常胸腹間氣刺滿痛或腸鳴以至嘔逆减食此由喜怒憂慮過度飲食失節之所致蔡元度寵人有子夫人怒欲逐之遂病醫官王師復處此方三服而愈後用果驗廣中莪茂一兩煨丁香半兩粉草一分右為細末空心鹽湯㸃服一大錢覺胸中如物按下之狀草豆蔲散治妊娠心腹常痛喫食减少四肢不和全不入食草果仁想是草豆蔲陳橘皮乾地黃白术各一兩川芎三分當歸炒桂心乾薑木香各半兩右為細末每服四錢水一盞棗二枚煎至六分熱服阿膠散治妊娠胎動腹中㽲痛不思飲食白茯苓白术川芎阿膠各三分炒當歸炒陳皮各一兩甘草一分右㕮咀每服三錢水一盞薑三片棗一箇煎至七分去滓溫服治妊娠四五月忽心腹絞痛大紅棗十四枚燒存性為末以童子小便調下治妊娠胎動欲落腹痛不可忍上等銀一斤茅根二升去黑皮右以水九升煮銀取二升入清酒一升同煎茅根取二升分為三服立安古今録驗療妊娠腹內冷痛忽胎動薤白一升當歸切四兩右以水五升煮取二升作三服亦將小便服將去一炊頃出千金療妊娠腹中痛方生地黃三斤搗取汁酒一升合煎减半頓服愈妊娠中惡方論第十三凡三方夫妊娠人忽然心腹刺痛悶絶欲死者謂之中惡言邪惡之氣中胎傷於人也所以然者血氣自養而為精神之主若氣血不和則精神衰弱故邪毒之氣得以中之妊娠之病亦致損胎也當歸散治妊娠中惡心腹㽲痛當歸丁香川芎各三兩青橘皮二兩吳茱茰半兩去梗湯泡三次炒黑右為細末無時溫酒調一錢又方生乾地黃一兩枳殼木香各三分右為細末每服一錢酒調下又方苦梗一兩細銼略炒薑半兩煎服妊娠腰腹及背痛方論第十四凡十方論曰腎主腰足因勞傷損動其經虛則風冷乘之則腰痛冷氣乘虛入腹則腹痛故令腰腹相引而痛其痛不止多動胎氣婦人腎以繫胞妊娠而腰痛甚者則胎墮也療妊娠氣壅攻腰痛不可忍兼治腹痛當歸三兩阿膠甘草各二兩葱白一升右細銼以水七升煮取三升去滓分溫五服紫酒治妊娠腰痛如折大黑豆二合炒令香熟以酒一大盞煮取七分去豆空心頓服通氣散治妊娠腰痛狀不可忍此藥神妙破故紙不以多少瓦上炒令香熟為末嚼核桃肉半箇空心溫酒調下二錢療妊娠腰背痛反覆不得鹿角長六寸燒令赤酒中淬再燒再淬以角碎為度取酒斂之鹿角為末服亦可療妊娠腰疼痛不可忍或連胯痛先服此散杜仲四兩五加皮阿膠炙防風金毛狗脊川芎北細辛白芍藥􅒝薢各三兩杏仁八十枚去皮尖炒右㕮咀以水九升煮取二升去滓下膠作三服療妊娠三二月腰痛不可忍者次服此圓續斷杜仲各十分芎藭獨活各三兩狗脊五加皮􅒝薢芍藥薯蕷訶子肉各八兩右為末煉蜜圓如梧桐子大空心酒下四十圓日三服療觸動胎以致腰痛背痛杜仲五加皮當歸芍藥人參川芎􅒝薢各三兩右細銼以水七升煮取二升半分溫三服療妊娠三二月及七八月胎動不安或腰肚痛及血下川芎當歸各四兩艾葉阿膠各二兩甘草一兩右細銼以水五升煮取二升去滓分溫三服大地黃圓治産前後腰腹疼一切血疼信效方治血氣虛四肢不舉骨髓熱疼熟地黃二兩烏梅肉當歸各一兩右為細末煉蜜圓如彈子大每服一圓白湯嚼下空心廣濟療妊娠胎動腰痛及下血安胎方見前妊娠卒然下血方論中小品苧根湯療損動胎腹痛去血胎動向下方生乾地黃苧根各二兩當歸芍藥阿膠甘草各一兩右細切以水六升煮取二升去滓內膠煎煬分溫三服忌海藻蕪荑救急療胎動去血腰腹痛方見前第四論中妊娠小腹痛方論第十五凡一方論曰妊娠小腹痛者由胞絡宿有風冷而妊娠血不通冷血相摶故痛甚亦令胎動也療妊娠被驚惱胎向下不安小腹痛連腰下當歸川芎各八分阿膠炙人參各六分艾葉四分大棗二十箇茯苓十分婦人大全良方卷十二
