body:
  text: 婦人大全良方卷十七宋陳自明撰産難門坐月既明須知産難故以次之産難論第一夫産難之由有六所受各異故治療之方不同今具言之以開世惑凡婦人以血為主惟氣順則血順胎氣安而後生理和今富貴之家往往保惜産母惟恐運動故羞出入專坐卧曾不思氣閉而不舒快則血凝而不流暢胎不轉動以致生理失宜臨産必難甚至悶絶一也且如貧者生育日夕勞苦血氣舒暢生理甚易何俟乎藥則孕婦常貴于運動者明矣次則婦人妊娠已經六七箇月胎形已具而世人不知禁忌恣情交合嗜欲不節使敗精瘀血聚于胞中致令子大母小臨産必難二也何以知之生下孩子頭上有白膜一片滯膩如膠俗強名曰戴白生兒身有青有黑俗強名曰宿痣此皆是入月交合所致也如此則不特母病其子亦生浸淫赤爛瘡瘍俗謂之胎蛆動逾嵗月不差可不戒乎三則臨覺太早大小揮霍或信卜筮或説鬼祟多方誤恐致令産母心驚神恐憂惱怖懼又被間雜婦人喪孝穢濁之人衝觸若不預為杜絶臨産必難三也何以知之如偷生之女不正之屬既無産厄子母均安其理可知凡臨産初然腹痛或作或止名曰弄痛坐婆踈率不候時至便令試水試水頻併胞漿先破風颯産門産道乾澀及其兒轉便令坐草坐草太早兒轉亦難致令産難四也直候痛極眼中如火此是兒逼産門方可坐草即令易産如坐草稍久用力太過産母困睡抱腰之人又不穩當致令坐立傾側胎死腹中其為産難五也時當盛暑宜居深幽房室日色逺處開啓忩户多貯清水以防血運血悶血溢妄行血虛發熱之證如冬末春初天色凝寒宜密閉産室窒塞罅隙內外生火常令暖氣如春仍下部衣服不可去綿方免胎寒血結毋致産難六也凡孕婦入月斷不可洗頭方免産難及橫生逆産自明謹論楊子建十産論第二凡人生産先知此十産證候則生産之婦永無傷損性命生産之間性命最重幸而孩子易生人不知福萬一有少艱難則須臾之間子母之命懸于絲髮但世人所患者惟看生産收生之人少有精良妙手緣此而多有傾性命豫因傷痛其事不為無補外有盤腸産僕添方法在後一曰正産正産者蓋婦人懷胎十月滿足隂陽氣足忽然腰腹作陳疼痛相次胎氣頓陷至于臍腹疼痛極甚乃至腰間重痛榖道挺迸繼之漿破血下兒子遂生此名正産二曰傷産傷産者蓋婦人懷胎忽有七月八月而産忽至九月十月而産忽有經一年二年乃至四年五年而後産者今獨以十月滿足為正産蓋一人之生隂注陽定各有時日不可改移今有未産一月已前忽然臍腹疼痛有如欲産仍却無事是名試月非正産也但一切産母未有前面正産證候即不可令人抱腰産母亦不可妄亂用力蓋欲産之婦臍腹疼痛兒身未順收生之人却教産母虛亂用力兒身才方轉動却被産母用力一逼遂使兒子錯路忽橫忽倒不能正生皆緣産母未當用力之所致也凡産母用力須待兒子順身臨逼門户方始用力一送令兒下生此方是産母之用力當也若未有正産之候而用力傷早并妄服藥餌令兒下生譬如揠苗而助之長非獨無益而又害之此名傷産三曰催産催産者言婦人欲産漿破血下臍腹作陳痛疼其痛極甚腰重榖道挺迸已見是正産之候但兒却未生即可服藥以催之忽有經及數日産母困苦已分明見得是正産之候但兒子難生亦可服藥以助産母之正氣令兒速得下生此名催産四曰凍産凍産者蓋言三冬之月天氣寒冷産母經血得冷則凝結而不散因其血之不散以至兒子不能生下此之一弊為害最深然世人不知覺若冬月産婦下部不可脫去綿衣并不坐卧寒冷之處當滿房著火令遍房常有暖氣常令産母背身向火令臍下腿膝間常有暖氣若背上心前少聞寒冷須是暖炙綿衣以􅊶之貴其血得熱則流散使兒子易生此名凍産若春秋之間天地少有隂濕寒冷之氣亦可就房中以微炭火暖之為妙五曰熱産熱産者蓋言盛暑之月欲産之婦當要其溫涼得所不可因熱恣意取涼反有傷損胎氣又生産之處不可多著人數切恐人多熱氣逼襲産母蓋人之血氣得熱則散熱過則損今當夏暑炎熱之盛而産母氣虛人氣一逼則其血沸溢而血得熱則上蒸能令産母發熱頭痛面赤昏昏如醉乃至不知人事世有名血暈者緣此而成也此名熱産若值夏月少有清涼之氣隂雨之變産母亦不可任意取涼恐生大病六曰橫産橫産者蓋兒子下生先露其手忽先露其臀此因未當用力而産母用力之過也臍腹疼痛兒身未順則是産母用力一逼遂致身橫而不能生下不幸而有此證候當令産母安然仰卧令看生之人推而入去凡推兒之去先推其兒身令直上漸漸通手以中指摩其肩推其上而正之漸引指攀其耳而正之須是産母仰卧然後推兒直上徐徐正之候其身正門路皆順煎催生藥一盞今産母喫了方可令産母用力令兒下生此名橫産若看生之人非精良妙手不可依用此法恐恣其愚以傷人命七曰倒産倒産者蓋因其母胎氣不足關鍵不牢用力太早致令兒子不能回轉順生便只直下先露其足也治之之法當令産母于床上仰卧令看生之人推其足入去分毫不得令産母用力亦不得驚恐候兒自順若經久不生却令看生之人輕輕用手內入門中推其足令就一畔直上令兒頭一畔漸漸順下直待兒子身轉門路正當然後煎催生藥令産母服一盞後方始用力一送令兒生下此名倒産若看生之人非精良妙手不可依用此法恐恣其愚以傷人命八曰偏産偏産者蓋因兒子回轉其身未順生路未正却被産母用力一逼致令兒頭偏拄左腿忽偏拄右腿致令兒雖近人門而不能生下但云兒已露頂然不知兒之所露即非頂也忽左額角忽右額角而已謂兒頭偏拄一畔以此不能生收之之法當令産母于床上仰卧令看生之人輕輕推兒近上以手正其頭令兒頭先端正向人門然後令産母用力一送即使兒子生下若是小兒頭之後骨偏拄榖道即令兒却只露額當令看生之人以一件綿衣炙令溫暖用褁手急于榖道外旁輕輕推兒頭令正即便令産母用力送兒生也此名偏産凡于榖道外旁推兒頭正須推其上而正之仍是小用輕力推些上兒而正之也若看生之人非精良妙手不可依用此法恐恣其愚以傷人命九曰礙産礙産者蓋言兒身已順門路俱正兒子已露正頂而不能生下蓋因兒身回轉肚帶攀其肩以此露正頂而不能生此名礙産收之之法當令産母于床上仰卧令看生之人輕輕推兒近上徐徐引手以中指按兒肩下其肚帶也仍須候兒身正順方令産母用力一送使兒子下生此名礙産若看生之人非精良妙手不可依用此法恐恣其愚以傷人命十曰坐産坐産者蓋言兒子之欲生當從髙處牢繫一條手巾令産母以手攀之輕輕屈足坐身令兒生下非令産母臨生兒時坐著一物此名坐産若是産母兒將欲生却令坐著一物即抵著兒路不能生也十一曰盤腸産續添凡四方趙都運恭人每臨産則子腸先出然後産子産子之後其腸不收甚以為苦名曰盤腸産醫不能療偶在建昌得一坐婆施之一法而收之其法遇産後子腸不收之時以醋半盞新汲冷水七分碗調停噀産婦靣每噀一縮三噀收盡此良法也後學不可不知治推腸生方又名盤腸産右以半夏為末搐鼻中則腸上矣又方以大紙撚以麻油潤了點燈吹滅以煙熏産婦鼻中腸即上矣又方以萆麻子十四粒去殼研如膏貼産婦頭頂中心腸即上即拭去催生方論第三凡三十六方五行論命以年月日時支干所遇五行所屬相生相值以推人之貴賤其間最切要者時也若林開命書以年為父母為己身月為兄弟僚友曰為妻妾上官時為子孫帝座蓋人之生也得其時則終身富貴失其時則終身貧賤信乎人生之時不可忽也然則人生之時其可催乎殊不知娠有諸生産之難若臨産起坐既久勞力困乏須妙藥催趂以救其危當此之時又何暇論其時耶又聖惠方有推娠婦行年法若行年有與本命相值所産嵗月者即鋪驢馬皮于灰草上令娠婦臨産時踐之手攀鞍轡頭則易産今之醫者便以此等物為産卧所需之物誠謬論也其所以然者謂妊婦行年偶與本命相值于所産嵗月慮有諸般艱難之厄故以此厭禳之取其快速之意耳如或不值則無用矣今録催生數方皆名醫士夫厯用良驗者以幸有緣産寶方論曰夫産難者內宜用藥外宜用法蓋多門救療以取其安也療産難坐草數日困乏不能生此為母先有病經絡俱閉而然催生柞木飲子治産難或橫或倒死胎爛脹于腹中此方屢用神妙生大柞木枝一大握長一尺淨洗寸銼甘草大者五寸銼作五假右用新汲水三升半同入新沙瓶內以紙三重緊封之文武火煎至一升半令香覺腹痛便凖偹候産婦腰重痛欲坐草時溫溫飲一小盞便覺心下開豁如覺再渴又飲一盞至三四盞覺下重便生更無諸苦切不可坐草早及坐婆亂下手如催生藥只消一服此方至驗乃上蔡張不愚方也催生如神散療逆生橫産瘦胎兼治産前産後虛損月脈不調崩漏一名催生黑散一名烏金散一名二神散百草霜香白芷不見火為細末右二味等分研停每服二大錢于臨産蓐時以童子小便并少米醋打為膏沸湯調下集驗用酒童子小便各半盞同煎才沸即調停熱服甚者不過再服血得黑則止此藥大能固血免得乾生其妙在此催生如聖散黃蜀葵花不以多少焙乾為細末熟湯調下二錢神妙或有漏血胎臟乾澀難産痛劇者并進三服良久腹中氣寬胎滑即時産下如無花時只用葵子爛研小半合以酒調濾去滓溫過䪺服尤妙亦治打撲傷損如胎死不下煎紅花溫酒調下用子歌曰經驗用子四十九粒黃金內子三十粒細研酒調能備急命若懸絲在須臾即令眷屬不悲泣曹秀才方用葵子一味研墨或研朱砂為衣每服四十粒溫酒吞下催生丹療産婦生理不順産育艱難並宜服之出聖惠方局方同宜天醫日合十二月兔腦髓去皮膜研如泥通明乳香一分細研母丁香末一錢麝香一字研細右四味拌停以兔腦髓和圎如雞頭穰大隂乾用油紙密封貼每服一圎溫水下即時産隨男左女右手中握出是驗又方通明乳香一瑰如皂子大右為末覺腰痛時用新汲水一小盞入醋少許同調扶立令産婦兩手捉兩石燕坐婆飼藥飲之先令妊婦念醫靈藥聖三遍然後服之仍略扶行數步須臾坐草便生更無痛楚神良經驗方如神開骨膏乳香不以多少五月五日午時令一人在壁背捧乳鉢在凳上令一童兒以筆管透壁縫內逐粒從筆管中過入乳鉢內研令極細以童兒面北滴水圎如雞頭大每服一粒無灰酒吞下海上方用乳香朱砂等分為細末麝香酒調下治難産或倒橫不順方蛇蛻一條全者蠶蛻紙一張一方無右入新瓦瓶中鹽泥固濟燒存􅒏為末煎榆白皮湯調下一錢三服覺痛便生一方云臨産腰痛用藥三字麝香一字溫酒調下名二妙散催生萬金不傳遇仙丹萆麻子十四箇去殼朱砂雄黃各一錢半蛇蛻一尺燒右為細末漿水飯和圎如彈子大臨産時先用椒湯淋泄臍下次安藥一圎于臍中用蠟紙數重覆藥上以闊帛繫之須臾生下急取去藥一圓可用三次如聖膏治産難兼治胞衣不下兼治死胎用萆麻子七粒去殼細研成膏塗腳心胞衣即下速洗去不洗腸出却用此膏塗頂上腸自縮入如聖之妙一方男用七粒女用十四粒一方用萆麻子百粒雄黃末一錢同研並用如前法寸金散治産難用敗兔毫筆燒為灰細研為末生藕汁一錢調服立産若産婦虛弱及素有冷病恐藕汁動氣當于銀器內重湯調溫服陸氏方云此難産第一方金箔三片兔毫筆頭三箇燒為灰右二味和停用蠟為圎如梧子大作一服溫酒下又方大朱砂隨多少端午日晒至百日不得著而如滿百日取研如粉右用蠟月兔腦髓和圎如緑豆大欲覺産粥飲下一圓良久便産其藥男左女右手中把出又方臘月兔頭一枚燒為灰右為細末蔥白煎湯調二錢立生指迷方催生兔血散臘月兔血蒸餅切作片子蘸之以紙袋盛挂當風處隂乾為末煎乳香湯調下二錢又方臘月兔腦髓塗于一張薄紙上更用一張合拓以稱硾捶三五十下每遇難生看大小書天生兩字作符以醋湯調下極妙又方兔皮和毛燒為灰末之以酒調方寸匕服之即産衣不下者服之即下治橫倒生者或先手足者明阿膠炒一方用酥滑石末各一兩葵子二合右水一盞半煎至一盞去滓分二服治難産五六日不得分娩疲困虛乏者光明水膠二兩右用好酒一升半微火鎔膠入新雞子一箇鹽一錢匕攪溫令産婦坐椅物上伸腰大口作二次服之覺小腹重便生緣坐草早驚動故也救産難經日不生雲母粉半兩溫酒調服入口當産不順者即産萬不失一陸氏方云是何德揚方云已救三五千人却用雲母粉澄過研細取一團如雞子大臨時以無灰酒調下治橫逆産理不順子死腹中伏龍肝細研每服一錢酒調服之以土著兒頭上戴出妙廣濟療難産三日不下方吞雞子黃三枚并少苦酒服集驗療橫産及胎死腹中以三姓雞卵各一枚三姓鹽各一錢三姓水共一盞相和煮五七沸分溫二服令産母東首服之立出療難産日久氣力乏盡不能生此是宿疾赤小豆二升以水九升煮熟取汁入炙了明黃膠一兩同煎少時一服五合未效再服不過三四服即産備急方療難産三日不出吞槐子十四枚即下廣濟方有蒲黃一合千金集驗崔氏同又方當歸為末酒調方寸匕服催生如意散臨産腰疼方可服之人參為末乳香各一錢辰砂半錢右三味一處研臨産之時急用雞子清一箇調藥末再用生薑自然汁調開冷服如橫生倒生即時端順子母平善傳于鄂倅施漢卿屢見功效陳氏催生神效七聖散臨産腰疼方可服之延胡索沒藥白􅈨白芷薑黃當歸桂心等分右為細末臨産陳痛時燒鏵刃鐡犂頭是也令通赤淬酒調藥三錢服一二杯立産此方鳳州河池縣喬醫家貨每服錢引一道遇一士友楊濟伯密得之屢試屢驗催生神妙乳珠丹乳香研細以豬心血為圎如梧桐子大以朱砂為衣日乾每服一粒如催生冷酒化下良久未下再服一粒如大假難産時以蓮葉心蒂七箇水二盞煎至一盞放溫化下一粒良久未下亦可再服此藥靈驗如神無有不下者如胞漿先破惡水來多胎乾不得卧時須先與四物湯及通真圎補養其血氣次更濃煎蔥湯放冷如躰令坐婆洗産户須是欵曲洗令氣上下通暢仍更用酥調滑石末塗産户裏次服前催生藥則萬全矣如胎死不下者用黑豆三合好醋半升煮令豆爛取汁一盞放溫化下藥一粒須臾便下矣萬一未下亦可再服如胎下胞衣未下者服此亦便下也若胎橫逆不順即先服如神散方見前再服此藥復以此藥催之合藥時要五月五日午時極妙或七月七日或三月三日及月初上辰日合亦得小品療逆産方鹽塗兒足底又可急搔爪之并以鹽摩産婦腹上即産又方以鹽和粉塗兒兩足下即順矣集驗方療逆産燒錢令赤納酒中飲之又方取夫隂毛二七莖燒以豬膏和圎如豆大水吞下兒手即握出神驗刪繁療産難方取車􅤧中膏畫腋下及掌心崔氏文仲小品千金集驗備急同療逆産胞衣不出方取竈屋黑塵研為細末酒調方寸匕一方用梁上塵張文仲療橫生逆産服諸符藥不捷者灸右腳小指尖頭三壯艾炷如小麥大小品療橫生倒産手足先出方並出外臺用粗針刺兒手足入二分許兒得痛驚轉即縮自當回順文仲備急千金崔氏集驗同橫産逆産二條其理雖别療法蓋同可以意量逐善參用也郭稽中産難方論第四凡三方論曰産難者何胎側有成形塊為兒枕子欲生時枕破與敗血褁其子故難産但服勝金散逐其敗血即自生若橫生逆生並皆治之勝金散方麝香一錢研鹽䜴一兩以舊青布褁了燒令赤急以乳鉢研細右為末取稱錘燒紅以酒淬之調下一大錢陳無擇評曰産難不只胎側有兒枕破與敗血褁凝傷其胎息因緣自有難易其如橫逆多因坐草太早努力過多兒轉未逮或已破水其血必乾致胎難轉若先露腳謂之逆先露手謂之橫法當以針刺之便自縮入即服神應黑散以固其血必自轉生養生方云倉皇之間兩命所係不可不廣傳蓋贊黑散之功也或以鹽塗兒腳底抓搔之神應黑散方見前即催生如神散産難子死腹中方論第五凡十八方夫産難子死腹中者多因驚動太早或觸犯禁忌致令産難皆因穢沃先下産時未到穢露已盡而胎枯燥故子死腹中其候産母舌青黑及胎上冷者子已死也故産處坐卧須順四時方靣并避五行禁忌若有觸犯多招災禍也治妊娠三五箇月胎死在腹內不出大腹子赤芍藥榆白皮各三兩當歸一兩炒滑石末三分瞿麥葵子炒茯苓粉草子苓各半兩右為粗末每服四錢水一盞煎至七分去滓不拘時溫服療死胎腹內不出母已危殆不得已者立效方水銀半兩桂末一錢右只作一服溫酒調下粥飲亦可又方以利斧煆赤置酒中待溫飲之其子便下治妊娠胎死腹中候其母面赤舌青者是宜鍚粉圓出指迷錫粉水銀各一錢右同研不見水銀為度以棗肉和圎如豌豆大煎瞿麥湯吞下十全博救療胎死腹中以好辰砂一兩水煮數沸研令極細酒調二錢服又方以雞子黃一枚用薑汁一合調雞子黃令均頓服分娩後喫藝薹粥良趙和叔傳下死胎方桂心末二錢麝香當門子一箇右同研溫酒調服須臾如手推下比之用水銀等藥不損血氣何氏方無麝香每用桂末二錢痛陳密時用溫童子小便調下名觀音救生散兼治産難及橫倒生療胎死腹中不出母欲絶水銀二兩頓吞下兒立出又方用水銀如彈子大以棗肉均研和如大豆許水吞下立出救急治子死腹中取夫尿二升煮令沸飲之文仲療或半生胎不下或子死腹中或半著脊及在草不産血氣上蕩心母面無顔色氣欲絶方豬脂一升煎白蜜一升淳酒二升右三味合煎取二升分溫兩服不能飲隨所能服之又療子死腹中不出以牛屎塗母腹上立出崔氏療胎死甘草一尺蒲黃二合筒桂四寸香䜴二升雞子一枚右細切以水六升煮取三升頓服胎胞穢惡盡去大良産經數日不出或子死腹中母氣欲絶瞿麥六兩通草桂心各三兩牛膝四兩榆白皮一升右㕮咀以水九升煎取三升去滓分溫三服一字神散治子死胎不下胞破不生此方纍有效救人幾萬數鬼臼不拘多少黃色者去毛碾為末以手指撚之如粉極細為度每服二錢用無灰酒一盞同煎至八分通口服立生如神此藥不用羅只碾令極細鄧知縣傳方療死胎不出朴硝為末每用二錢溫童子小便調下知洪州進賢曾通仕定求云昔為豐城尉時有貓孕五子一子已生四子死腹中啼喚欲死試問醫者令用此藥灌之死子即下貓得再生後有一牛亦如此用此法亦活醫云本治人方用以治畜也後因以救人無不驗僕為兒時曾有一親戚胎死腹中不下數日百計已窮記憶我先人用朴硝半兩研細以童子小便調下胎即落矣治死胎不下其證指甲青舌青脹悶甚者口中作屎臭先以平胃散一貼作兩服每服酒水各一盞同煎至一盞却投朴硝半兩研細再煎三五沸傾出候微溫服盡其胎即化血水而下繆宅厥息孺人杜氏生産數日不下坐婆魂童救療皆無效召僕診之僕曰産前脈不可考但當察色而知之遂揭帳明燭以察之其靣色赤舌色青見此色者知胎已死母却無憂矣或問曰何以知之豫答曰面赤舌青者子死母活明矣供自合至寶丹二粒服之胎即落矣以此見古人處方神速至寶丹方見和劑方産難生死訣第六欲産之婦脈離經難經云一呼三至曰離經此是陽加于隂二倍一呼一至亦曰離經此是隂加于陽四倍也注云經者常也謂脈離常經之處細而言之一呼脈再至一吸脈再至曰平和之脈故一呼脈行三寸一吸脈行三寸呼吸定息脈行六寸一日一夜一萬三千五百息脈行八百一十丈乃為一周復從始之經再行今一呼脈三至一吸脈三至呼吸定息脈行九寸一日一夜脈行通計一千二百一十五丈過于平脈之數不在所起之經再起故曰離經若一呼一至脈行寸半一吸一至脈行寸半呼吸定息脈行三寸一日一夜通計脈行得四百單五丈乃為一周是不及平脈之數周而復始亦不在所起之經再起亦曰離經也沉細而滑也同名臨産之婦脈見沉細而滑者乃腎藏本脈之形然腎繫胞胎見此脈者亦與離經之脈同名也夜半覺痛應分誕來日日午定知生若妊婦夜半時覺得腹痛定知來日午時當分娩也聖惠方云夜半子時覺腹痛來日午時必定生産謂子午相對正半日時數也身重體熱寒又頻舌下之脈黑復青反舌上冷子當死腹中須遣母歸冥凡妊婦身體沉重者胃氣絶也又體熱寒栗頻并者陽氣衰隂氣盛也若舌根下脈見靑黑色及舌反捲上氷冷不溫者子母俱死之候面赤舌青細尋看子死母活定應難凡妊婦面赤色是榮氣流通母活之候舌上青色是妊脈絡絶胎死之候唇口俱青沫又出子母俱死總髙判若妊婦唇口俱靑色者榮衛氣絶也又口中吐出痰沫者是脾胃之氣俱絶此子母俱死之候也面青舌青沫出頻母死子活定知真不信若能看應驗尋之賢哲不虛陳凡妊婦面與舌皆青色又頻吐痰沫者是産母榮衛俱絶胎氣衝上之候此是子活母死之候産下子母必死也此古賢哲應驗之文不虛妄陳其説也新産之脈緩活吉實大弦急死來親凡婦人新産之後其脈來緩滑者為氣血通和是生活安吉之兆也若見實大弦急之脈則凶必死之候若得沉重小者吉忽若堅牢命不停若産婦診得沉重微小者此是形虛脈虛相應故云吉兆之脈忽然診得堅硬牢實之脈是脈盛形衰相反性命不可停留必死也寸口澀疾不調死若産後診得寸口脈澀疾大小不調勻者此是血氣衰絶之脈故云死也沉細附骨不絶生若重手按之乃得其脈沉細附著于骨不斷絶有力者此生活之兆也審看此候分明記長須念此向心經凡為醫者宜詳審脈證分明記于心胸也王子亨云凡産後諸疾最忌脈大婦人大全良方卷十七
