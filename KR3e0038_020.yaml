body:
  text: 婦人大全良方卷十六宋陳自明撰坐月門妊娠疾病既明須知坐月避忌故以次之産寶方周頲序第一頲聞至靈者人最重者命人皆知命之所重而不知養命之方天年未終疾病攻奪嗟乎世無良醫著述則急難倉卒尋醫其舛誤多矣醫之中惟産難為急子母性命懸在片時頲勤志方書常思救療每覽名醫著述皆志於心且夫男女構精隂陽分氣就中女弱疾狀頗多蓋其禀柔質以為人有血藏而抱育妊娠之內導理有常至于飲食之間動靜之際尤多制忌以節性情及乎既産鮮保安者蓋是損觸臟腑傷動筋骨將理稍失疾患便生更值盲醫取次下藥致其所苦積漸懸危日復一日亟至于死可不痛哉故易曰天地之大德曰生則知在天地之間以生育為本又豈因生産而反危人之命乎自惟攝理因循藥餌差謬致其産婦不保安全且婦人生産方二三次血氣未衰飲食易進但能節性則無病生縱或偶有微痾不難醫治至於四五次逮乎七八次傷敗已深血氣衰微子藏虛弱穢敗內滯風邪外攻若有病生宜須審療醫若不子細疾便危殆此醫殺之理甚明矣且仕俗之家婦人産後復乳其子産既損氣已甚乳又傷血至深蠧命耗神莫極於此稍失常理便合急醫或以家貧不及厚賂醫者醫者怠慢須臾困篤吁人之生産非小事也而醫者圗財侮而致死此醫殺之理又明矣且夫産前産後血氣未寧一疾茍生百疾同作古人所以著方論于産乳者正在此也至若鯉魚阿膠能治胎動芎藭當歸善療胎痛秪如胎動胎痛非至理也有因母疾而胎動者有因胎不堅固而自動者痛亦如之此略舉大綱蓋須知醫者之功也降及地黃益血生薑助氣芍藥止痛黃耆補虛用之得門其效如聖用之失理不如不醫乃知醫人不可茍作頲以此疾心常思著方以濟危急而學解不博未能自信所以偏採産術志在廣行復見咱殷産寶咱子感切深入醫門乃大中嵗相國白敏中傷茲婦人多患産難詢訪名醫思救人命或人舉殷相國迎召問其産乳殷乃撰方三卷贄于相國相國重其簡要命曰産寶此方雖存得者甚少頲志在愈疾常恨不家藏一本故輒敢序之蓋欲開其衆聽凡五十二篇三百七十一方兼拾咱氏之遺作小論三萹次于序末庶幾妊娠之家自得覽斯為家內明師爾時丁巳嵗秋八月序將護孕婦論第二凡婦人妊娠之後以至臨月藏府壅塞關節不利切不可多睡須時時行步不宜食粘硬難化之物不可多飲酒不可亂服湯藥亦不可妄行針炙須寬神减思慮不得負重或登髙涉險若偶然胎不安腰痛者須服安胎藥一二服得安即止周頲論曰生産雖然觸穢排比須要在先入月一日貼産圗并日逰胎殺所在并借地法於妊婦房內北壁上仍依位設床帳厚鋪茵蓐周密使無孔竅夏月亦鋪厚薦用好油單薄席紗帳以備之常焚香令潔净備辦湯藥器物既覺欲産不得喧閧人力雜亂大小愴惶驚動産婦宜預擇年髙厯練生婆一人并穩當曾經慣婦人一兩人扶持不得揮霍恐産婦憂驚又忌間雜外人并喪孝穢觸之人看視切不得驚動傷早若坐婆拙不能體候胎氣方轉動之際便為欲生多端下手驚動傷早則橫倒之憂從此而致也産寶方云妊娠欲産腹雖痛而腰不甚痛者未産也且令扶行熟忍如行不得則憑物扶立行得又行或衣漿先下然後作陳腰腹痛眼中如火生此是胎離腎經兒逼産門也即服催生藥一二服即扶上蓐草切不可坐草早務要産婦用力存養調停亦令坐婆先說諭之如覺心中煩悶可取白蜜一匙用新汲水調下或覺飢即喫軟飯或粥少許亦須預備勿令飢渴恐産婦無力困乏也若不饑渴亦不須强食大凡生産自有時候不可强服催生滑胎等藥或因坐草早勢不獲已則服之若無事強服恐變生他疾又須戒之滑胎例第三凡妊娠已滿十月形體成就神識咸備分氣趣産宜服滑胎湯藥滑胎枳殼散瘦胎易産胡陽公主每産纍日不下南山道士進此方商州枳殼二兩粉草一兩右為細末百沸湯㸃二錢服空心日三服凡懷孕六七箇月已上服之令兒易生初生胎小微黑百日已後肉漸變白此雖孫真人滑胎易産方然抑陽降氣為衆方之冠此方分兩出必用方以此為正一方枳殼六兩甘草一兩故加枳殼减甘草蓋未産人甘草性寒故也未産前一月日三服忌登髙厠一方有糯米半升淘洗控乾同炒為末米飲白湯調下一二錢溫隱居加當歸木香各等分張氏方治妊娠胎肥壅隘動止艱辛臨月服之縮胎易産兼治腸中諸疾下氣寬鬲枳殼五兩甘草一兩半香附子三兩炒去毛為末薑煎湯㸃亦可如丈夫婦人冷氣攻刺脅肋疼痛者用葱白三寸同煎服婦人脾寒血氣成塊作痛熱酒調服大小便不通白牽牛為末煎湯調服選奇方香附子枳殼各二兩甘草半兩內補元治妊婦衝任脉虛補血安胎熟地黃二兩當歸一兩微炒右為細末煉蜜元如梧子大溫酒下三四十元許學士云大率婦人妊娠唯在抑陽助隂蓋抑陽助隂之藥甚多然胎前藥唯惡羣隊若隂陽交錯别生他病唯是南山道士枳殼散所以抑陽四物湯所以助隂故爾然枳殼散差寒若單服之恐有胎寒腹痛之疾以內補元佐之則陽不至強隂不致弱隂陽調停有益胎嗣此前人未嘗論及也易産滑胎方其藥􅒏滑利小便車前子右為末酒調方寸匕服不能飲者水調詩云芣苡能令婦人樂有子矣陸機注云治婦人産難愚詳孔子序詩云樂然而生易于生育後人以為注喜誤矣治産難神寢元瘦胎滑利易産臨入月服之極有神效知蘄州施少卿方蘄州徐大丞傳通明乳香半兩别研枳殼一兩右為細末煉蜜元如梧子大空心溫酒吞下三十元日一服懷孕九箇月以後方可服陸氏方名寤生元乳香只一分酒糊元榆白皮散治妊娠滑胎易生榆白皮甘草各二兩葵子一兩右為粗末每服二錢水一盞煎至七分去滓溫服一方無榆白皮名葵子散主孕婦九箇月將産消息猪肚一全具依法用葱五味煮熟食食如不盡更食以盡為度不得與别人食無效保氣散安胎寬氣進食瘦胎易産設或居處失宜偶然頓仆胎動胎痛漏胎下血兼服佛手散見通用方神寢元枳殼散見前此三藥入月內大宜常服香附子四兩山藥二兩縮砂仁一兩木香四錢粉草一兩一分益智仁紫蘇葉各半兩右為細末白湯㸃二錢服月空方位例第四出太平聖惠外臺同正月三月五月七月九月十一月已上在丙壬二月四月六月八月十月十二月已上在甲庚逐月安産藏衣忌向方位第五凡安産藏衣方位並於卧閣內分布太平聖惠方云凡妊婦初入月便寫産圖一本以朱書某月某日空貼在某位如正月在丙壬可于壬位安産婦床帳丙位藏衣之類貼掛在産婦房內北壁上若值閏月只看節氣用之又云每月産圗有雷公招搖運鬼力士天狗軒轅大時咸池吳時豐隆白虎大夫天候狂虎凡十三神並從月建易其位所謂月空者按內經云月廓空無寫王水注云論月輪中空日也即非十三神之數今太平聖惠方以六陽月在丙壬以六隂月在甲庚正如外臺所言正月在丁壬至十二月在甲庚之類其理一也但外臺言之詳聖惠言之簡耳今人多依聖惠方者特從其簡而已或云凡逐月安産藏衣並向月德月空方位所有十三神殺並從節氣更换若交次月節便作次月用書産圖者非也假如正月十四日立春若妊婦十三日乳卧豈可作去年十二月用也必依月分用之乃是若依節氣更换則天德月德所在差矣然月空與壬謂之中天空頗相類議者以為天空者非十三神之數蓋課中有天乙貴人其位無可與對者故此空是謂天空值此神百事不宜止宜安産婦床帳藏衣之類耳集聖厯云天德正月在丁二月在坤三月在壬四月在辛五月在乾六月在甲七月在癸八月在艮九月在丙十月在乙十一月在巽十二月在庚又堪輿厯有逰年白虎殺神在太歲後一辰如太歲卯則白虎在寅餘倣此推之若産及藏衣犯之則子母皆不利也王子亨云難産逆生論稱犯一切神殺固有是理然亦有自然難産兒自逆生者及有産腸胃俱下者産已則復如故此非疾病所致氣血所主天下之理亦有不可窮詰者亦宜知之五月丙壬艮寅午卯辰辰申子申丑寅六月庚甲乾亥未子丑未酉卯巳寅卯七月丙壬坤申申子酉戍戍戍子寅卯辰八月庚艮甲巽巳酉酉午戍丑亥卯亥辰巳九月丙壬艮寅戍卯辰辰子午申巳午十月庚甲乾亥亥子丑未丑卯巳午未十一月壬巽丙坤申子酉戍戍寅午寅未申十二月庚甲巽巳丑午未丑卯酉亥申酉推婦人行年法第六生氣方産婦宜向之坐卧及産帳向之開門大吉反支月遇此月即鋪灰上用牛皮或馬驢皮訖鋪草勿令惡血汚地吉禍害月不得於其上産又不得向之大小便避之大吉絶命方不得于其上産又不得向之大小便避之大吉懸尸日遇此日産不得攀繩宜懸馬轡攀之大吉閉肚方臨月至滿月並不得向之大小便及棄不淨之水謹之吉八㽵方産帳不得向之開門忌之大吉體𤣥子借地法第七東借十步西借十步南借十步北借十步上借十步下借十步壁方之中四十餘步安産借地或有汚穢或有東海神王或有西海神王或有南海神王或有北海神王或有日逰將軍白虎夫人逺去十丈軒轅招搖舉髙十丈天符地軸入地十丈令此地空間産婦某氏安居無所妨礙無所畏忌諸神擁護百邪速去急急如律令𠡠前項借地法于入月一日朱書一本貼於産婦房內北壁上更不須避忌神殺也禁草法第八鋪草及氊褥訖即呪曰鐡鐡湯湯非公所當是王一言得之銅一言得之鐡母子相生俱篾鐡急急如律令禁水法第九欲産時貯水呪曰南無三寶水水在井中為井水水在河中為河水水在器中為净水水在法中為真水自知非真莫當真水以净持濁以正治邪日逰月殺五士將軍青龍白虎朱雀𤣥武招搖天狗軒轅女妭天吞地吞懸尸閉肚六甲禁諱十二神王土符伏神各安所在不得動靜不得忌干若有動靜若有忌干施以神呪當攝汝形阿佉尼阿毗羅莫多梨娑地梨娑訶入月預備藥物第十保氣散佛手散枳殼散神寢元榆白皮散保生元催生丹黑神散大聖散花蘂石散黑龍丹理中元催生符生地黃羌活葵子黃蓮竹茹烏梅雌雄石燕甘草海馬馬􅋦鐡棗子陳皮薑錢黑豆白蜜無灰酒童子小便好醋白米煎藥爐銚子煮粥沙瓶濾藥帛醋炭盆小石一二十顆湯瓶軟硬炭乾柴茅暖水釡洗兒肥皂頭髮斷臍線及剪刀斷臍本不用刀只用帛睘臍下齒齧斷乾蓐草卧交椅軟厚氊燈籠火把繳巾油燭發燭燈心催生靈符第十一書符時宜以水飛朱砂書之貼于房內北壁上遇坐蓐之時劄於針上就盞內以燈燒之庶免飛揚溫水調服婦人大全良方卷十六
