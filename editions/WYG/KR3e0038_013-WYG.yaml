body:
  text: 婦人大全良方卷九宋陳自明撰求嗣門疾病既無須知求嗣故以次之陳無擇求子論第一夫有夫婦則有父子婚姻之後必求嗣續故聖人謂不孝有三無後為大者言嗣續之至重也凡欲求子當先察夫婦有無勞傷痼害之屬依方調治使内外和平則婦人樂有子矣禇尚書澄求男論第二建平孝王妃姬寺皆麗無子擇良家未笄女入御又無子問曰求男有道乎澄對曰合男女必當其年男雖十六而精通必三十而娶女雖十四而天癸至必二十而嫁皆欲隂陽完實然後交合則交而孕孕而育育而為子堅壮强夀今未笄之女天癸始至已近男色隂氣早洩未完而傷未實而動是以交而不孕孕而不育育而子脆不夀此王之所以無子也然婦人有所産皆女者有所産皆男者大王誠能訪求多男婦人媒至宫府有男之道也王曰善未再朞生六男夫老陽遇少隂老隂遇少陽亦有子之道也婦人無子論第三夫婦人無子者其事有三也一者墳墓不嗣二者夫婦年命相尅三者夫病婦􅐄皆令無子若是墳墓不嗣年命相尅此二者非藥能益若夫病婦􅐄須将藥餌故得有效也然婦人挾疾無子皆由勞傷血氣生病或月經閉澁或崩漏𢃄下致隂陽之氣不和經血之行乖候故無子也診其右手闗後尺脉浮浮則為陽陽脉絶無子也尺脉微濇中年得此為絶産也少隂脉如浮𦂳則絶産惡寒脉尺寸俱虚弱者則絶産也又有因将攝失宜飲食不節乘風取冷或勞傷過度致令風冷之氣乘其經血結於子臟子臓得冷故令無子也千金翼求子方論第四凡十四方千金論曰夫婦人之别有方者以其血氣不調胎姙生産崩傷之異故也是以婦人之病比之男子十倍難療經言婦人者衆隂所集常與濕居十四嵗以上隂氣浮溢百想經心内傷五臟外損姿顔月水去留前後交互瘀血停凝中道斷絶其中傷墮不可具論生熟二臟虛實交錯惡肉内漏氣脉損竭或飲食無度損傷非一或胎瘡未愈而合隂陽或行歩風來便利於懸厠之上風從下入便成十二痼疾所以婦人别立方也若是四時節氣為病虚實冷熱為患者故與丈夫同也惟懐胎姙孕而挾病者避其毒藥耳其雜病與丈夫同則散在諸卷中可得而知也然而女人嗜慾多於丈夫感病倍於男子加以慈戀愛憎嫉妬憂恚染着堅牢情不自抑所以為病根深療之難差故養生之家特須教子女學此三卷婦人方令其精曉即於倉卒之秋何憂畏也夫四德者女子立身之樞機産育者婦人性命之長務若不通明於此則何以免其横夭者哉故傅母之徒亦不可不學常宜繕冩一本懐挾隨身以防不意也又曰人之情性皆願賢已而疾不及人至於學問則隨情逐物墮於事業詎肯專一推求至理莫不虚棄光隂沒齒無益夫婚姻養育者人倫之本王化之基聖人設教備論厥㫖後生莫能精曉臨事之日昏爾若愚是則徒願賢已而疾不及人之謬也斯實不逹賢已之趣而妄狥虚聲以终無用今􅄒求子之法以貽後嗣同志之士或可覧焉又論曰夫欲求子者當先知夫妻本命五行相生及與德合并本命不在子休廢死墓中生者則求子必得若其本命五行相尅及與刑煞衝破并在子休廢死墓中生者則求子了不可得慎無措意縱或得者於後終亦累人若其相生并遇福德者仍須依法如方避諸禁忌則所誕兒子盡善盡羙難以具陳矣禁忌法凡欲要兒子生吉良日交㑹之日常避丙丁及弦望晦朔大風大雨大霧大寒大暑雷電霹靂天地昏冥日月無光虹蜺地動日月薄蝕此時受胎非止百倍損於父母生子或瘖啞聾聵頑愚癲狂攣跛盲眇多病短夀不孝不仁又避日月火光星辰之下神廟佛寺之中井竈圊厠之側塜墓屍柩之旁皆悉不可夫交㑹如法則有福德大智善人降託胎中仍令父母性行調順所作和合家道日隆祥瑞競集若不如法則有薄福愚癡惡人來託胎中則令父母性行凶險所作不成家道日否殃咎屢至雖生成長家道滅亡夫禍福之驗如有影響此乃必然之理何不再思之男子受胎時日法凡男女受胎皆以婦人經絶一日三日五日為男仍遇月宿在貴宿日又以夜半後生氣時冩精者有子皆男必夀而賢明髙爵也若以經絶後二日四日六日冩精者皆女過六日皆不成子又遇旺相日尤吉推旺相日法春甲乙夏丙丁秋庚辛冬壬癸推貴宿日法正月一日六日九日十日十一日十二日十四日二十一日二十四日二十九日二月四日七日八日九日十日十二日十四日十九日二十二日二十七日三月一日六日七日八日十日十七日二十日二十五日四月三日四日五日六日八日十日十五日十八日二十二日二十八日五月一日二日三日四日五日六日十二日十三日十五日十六日二十日二十五日二十八日二十九日三十日六月二日三日十日十三日十八日二十三日二十六日二十七日二十八日二十九日七月一日十一日十六日二十一日二十四日二十五日二十六日二十七日二十九日八月五日八日十三日十八日二十一日二十二日二十三日二十四日二十五日二十六日九月三日六日十一日十六日十九日二十日二十一日二十二日二十四日十月一日四日九日十四日十七日十八日十九日二十日二十二日二十九日十一月一日六日十一日十四日十五日十六日十七日十九日二十六日二十九日十二月四日九日十二日十三日十四日十五日十七日二十四日二十七日若春合甲寅乙夘夏合丙午丁巳秋合庚申辛酉冬合壬子癸亥與上件月宿日合者佳論曰夫人求子者服藥須知次第不可不知其次第者謂男服七子散女服盪胞湯及坐導藥并服紫石門冬元則無不效矣不知此者得力鮮焉七子散主丈夫風虚目暗精氣衰少無子補不足方牡荆子五味子兎絲子車前子菥蓂子山藥石斛熟地黄杜仲鹿茸逺志各八分附子蛇床子川芎各六分山茱茰天雄各五分桂心十分白茯苓川牛膝人參黄耆各五分巴㦸十二分蓯蓉七分鍾乳粉八分右為細末酒服方寸匕日二服不知加至二匕以知為度忌生冷醋滑猪雞魚蒜油膩不能飲者蜜元服亦佳一方加覆盆子二兩行房法一依素女經女人月信斷一日為男二日為女三日為男四日為女以外無子每日午時夜半後行事生子吉餘時生子凶慶雲散主丈夫陽氣不足不能施化施化無成覆盆子五味子各二升兎絲子一升白术炒石斛各三兩麥門冬天雄各九兩紫石英二兩桑寄生四兩右為細末食後酒服方寸匕日三服素不能飲者米飲調下冷者去桑寄生加細辛四兩陽事少而無子者去石斛加㯽榔十五箇良盪胞湯治婦人立身已來全不産育及斷續久不産三十年者朴硝牡丹皮當歸大黄蒸一飯久桃仁各三兩細辛厚朴苦梗赤芍藥人參茯苓桂心甘草川牛膝陳皮各二兩附子炮一兩半䖟虫炒焦去翅足水蛭炒各六十枚右㕮咀每服四大錢酒水合琖半煎至六分去滓温服空心日三服夜一服少汗闕積血及冷赤膿如小豆汁斟酌不盡若力弱大段不堪者只一二服止然惡物不盡不得藥力能服盡儘好不爾著坐導藥坐導藥治婦人全不産及斷緒服前盪胞湯惡物不盡用此方皂角去皮子一兩吳茱茰當歸大黄蒸晉礬枯戎鹽川椒各二兩五味子細辛乾薑各三兩一方無茱茰有葶藶闕苦瓠各三分右為細末以絹袋盛大如指長三寸餘盛藥滿繫袋口内婦人隂中坐卧任意勿行走小便時去之了後更安一日一交易新者必下清黄冷汁汁盡止若未見病出亦可至十日安之本為子宫有冷惡物故令無子但天隂冷則發疼痛須候病出盡方已不可中輟每日早晩用苦菜煎湯熏洗外臺祕要云出千金翼千金方無葶藶有砒三分廣濟方同著藥後一日乃服紫石英元方見後紫石英元又名紫石門冬元紫石英天門冬各三兩紫葳牡蒙各二兩粉草一兩半桂心川芎卷栢烏頭炮熟地黄乾辛夷仁禹餘糧煅醋淬當歸石斛各三兩烏賊骨川牛膝薯預各六分桑寄生人參牡丹皮乾薑厚朴續斷食茱茰細辛各五分栢子仁一兩右為細末煉蜜元如梧桐子大每服三十元温酒吞下漸加至五十元慎如藥法經心録同延年方療婦人子臟偏僻冷結無子坐導藥蛇床子芫花等分右二味為末取棗大紗囊盛如小指長内隂中工作須去任意卧着避風冷内炙元廣濟療無子令子宫暖麝香二分皂莢去皮子炙十分川椒六分炒出汗右為末煉蜜為元如酸棗大綿褁内産宫中留少綿線出覺生寒不净下多即抽綿線出却凡藥一日一度換之無問晝夜皆内無所忌秦桂元治婦人無子知金州范羅言乞以此方試令婦人服之至四十九日如無子請斬臣一家以令天下何德揚方雖其言似誇然實有異驗秦芁桂心杜仲防風厚朴各三分附子生白茯苓各一兩半白薇乾薑沙參牛膝半夏各半兩人參一兩細辛二兩一分右十四味並生碾為細末煉蜜為元如赤豆大每服三十元空心食前醋湯米飲任下未效更加元數已覺有孕便不可服臣妻年二十七無子服此藥十二日便有孕殘藥與石門縣令妻年三十四斷産已十六年服此藥便有孕又殘藥與太子中守文季妻年四十無子服此遂有孕其效如神不可具述此仙方也養真元治婦人血虚氣憊隂陽不升䧏久不成姙娠者鹿茸當歸肉蓯蓉禹餘糧兎絲子覆盆子熟地黄紫石英桑螵蛸各二兩五味子真琥珀白芍藥川芎桑寄生卷栢艾葉川薑堅白茯苓人參牡蠣酸棗仁各一兩鍾乳粉四兩右為細末酒煑麫糊元如梧桐子大食前温酒吞下五十元日三服喫後用粥飯壓之屢試甚驗已上五方並出外臺祕要白薇元出廣濟療久無子白薇牡䝉藁本各五分薑黄當歸熟地黄各七分川芎人參栢子仁石斛桂心附子炮五味子防風甘草川牛膝吳茱茰桑寄生各六分秦椒二分禹餘糧八分右為末煉蜜元如梧桐子大空心酒下三十元日二服忌生菜葱熱麫蕎麥蒜猪肉炙煿葵菜蕪荑菘菜海藻粘食臭物等地黄湯療久無子斷緒小腹冷痛氣不調熟地黄乾川牛膝當歸各八分卷栢川芎防風各六分牽牛子末桂心各三分右㕮咀以水六升煑取二升三合去滓分三服服别和一分牽牛子末服如人行四五里更進一服以快利止忌同前千金療月水不利閉塞絶産十八年服此藥二十八日有子金城太守白薇元白薇細辛各五分人參杜衡厚朴牡䝉半夏殭蚕秦芁當歸紫苑各三分川牛膝沙參乾薑各二分川椒附子防風各六分右為末煉蜜元如梧桐子大先食服三圓不知稍加至四五圓此藥不長將服覺有身則止用大驗忌餳猪羊肉冷水生葱菜古今録驗不用杜衡用牡蠣三分熬延年方同前崔氏有桔梗桂丹參各三分千金翼白薇圓主久無子或斷緒上熱下冷百病皆療白薇車前子各三分當歸川芎蛇床子各四分太一餘糧六分紫石英菴閭子石膏藁本卷栢各五分澤蘭葉覆盆子桃仁熬麥門冬白芷人參各六分桂心蒲黄各十分乾薑椒炒出汗細辛乾地黄各十二分白茯苓赤石脂逺志白龍骨各八分橘皮二分右為末煉蜜圓如梧桐子大酒服十五圓日再增至四五十圓以知為度忌驢馬猪雞魚蒜及前所忌覺有身即止藥宜祕之勿妄傳也經心録茱茰圓療婦人隂寒十年無子者吳茱茰川椒各一升右為末煉蜜圓如彈子大綿褁内隂中日再易無所下但開子臟令隂温即有子也紫石英元紫石英阿膠當歸川芎赤芍藥川續斷各一分鹿茸白术桂心各半兩栢子仁二兩熟地黄三兩右為末煉蜜為圓如梧桐子大空心温酒下二十圓兼治虚中有熱頭目旋暈足如履空嘔吐不食月水不調或多或少皆虚候也久服能生髮令人有子更治虚悸常若憂思皆心血不足血室虛所致也温隠居求嗣保生篇方論第五凡一方昔東京有一焦公因三世無嫡嗣遂為商旅遊翫名山尋訪至人問其因果遂至京都見一老僧聲清而逺目視精光請教談論語言甚異故就齋而坐僧曰有何所諭焦曰貧家三世無嫡嗣奈何僧曰無嗣者有三一祖宗無德自身無行二夫妻年命恐犯禁忌三精神不守妻妾血寒焦公曰自身無行夫妻年命皆可受持若妻妾血寒有何法術冄拜告曰願聞一言僧曰不難先修德後修身三年之内可到五臺山當授異方説畢忽不見焦公自遇老僧之後時時行方便種種作隂功遇人臨難者効觀音之救苦見物垂死者助上帝之好生行恩布德如此三年竟往五臺山尋訪老僧數日不見方回歸忽見行童手持一書言曰老師傳語大夫功成行滿回宅合藥志誠服之富貴子孫隨念降生焦公曰但得嫡子足矣何望貴子乎於是遂生焦員外後員外養子不肖嘆曰有何損德如是忽遇一道人云汝有憂色何不往五臺山見老僧焦氏頓省遂往五臺山决其因果至五臺山不見老僧只見行童曰老師昨日言員外今日到山令行童相接冄三傳語何必來問但依父行愚者自賢爾後必生賢徳子孫焦氏曰豈愚子反賢乎行童曰昔竇氏五子皆不全形後行恩布德悉皆如故積德報應皆登科第焦氏拜謝而歸奉行雕板印施方書不及二十年富貴子孫數人長子横金出入金門後人收得行状及方受持行用求藥者獲其子孫皆有德行余躬受此方不敢緘黙併録篇論以告諸賢庶不致堙没耳方具于后續嗣䧏生丹治婦人禀受氣弱胎臟虛損子宫冷憊血寒痼冷難成子息功效如神當歸桂心龍齒烏藥真天台者佳益智杜仲石菖蒲吳茱茰各一兩半茯神川牛膝秦芁細辛苦桔梗半夏防風白芍藥各三分乾薑一兩半生半炒附子一隻重八錢者臍心作一竅如皂子大入朱砂一錢重濕麫褁煨川椒二兩湯浸半日焙牡蠣一大片要取漳泉二州者却用學堂童子小便浸四十九日五日一換取出用硫黄末一兩米醋塗遍却用皮紙褁又用米醋浸令紙濕塩泥厚固濟乾用炭五斤煅每遇合藥入二兩餘者留後次合藥用右為細末取附子内朱砂别研為細末糯米糊為元如梧桐子大每服三十元至百元空心淡醋温酒鹽湯皆可下一日二服此藥及療男子精寒不固陽事衰弱白濁夢泄及治婦人血虚𢃄下肌瘦寒熱但是男女諸虛百損客熱盗汗氣短乏力靣無顔色飲食少味並皆治之更有竒效難以具􅄒受持君子宜預行善及方便却服此藥無不感應婦人大全良方卷九
