body:
  text: 婦人大全良方卷三宋陳自明撰此一卷論中風角弓反張風痺手足不隨偏枯口噤口眼喎斜風眩頭痛血風心神驚悸癲狂骨節痛風血風走注瘙癢癮疹風痰脚氣腰痛諸疾已上諸症雖各有方論亦要先明其大體察脉之虚實辨證之冷熱相人之强弱入臓入腑在絡在經首以局方調治未要猛浪用藥今之治法先宜順氣然後治風萬不失一盖有中風中寒中暍中痰中氣皆能令人涎潮昏塞所謂朱紫相凌玉石不分醫者不可不詳而究之如中風若作中氣治之十愈八九中氣若作中風治之十無一生所以疑惑之間不問中風中氣首以蘓合香圓麝香煎五積散如中痰則有參蘓飲如中寒則有理中湯如中暍則有白虎湯如的然見得是中風如三生飲木香煑散排風續命風引大小竹瀝大八風湯至寳丹牛黄清心圓辨其冷熱虚實而投之未有不安者也然此疾積襲之乆非一日所能致今人服藥三五服便責無效其責醫者亦速矣正宜大劑乆服方有其效孟子曰七年之病求三年之艾也婦人中風方論第一夫中風者虚風中於人也風是四時八方之氣常以冬至之日自坎而起候其八方之風從其鄉来者主長養萬物若不從其鄉來者名為虚風賊害萬物人體虚者則中之當時雖不即發停在肌膚後或重傷於風前後重沓因體虚則發入臓腑俞俞皆在背中風多從俞入隨所中之俞而乃發病婦人血氣虚損故令中風也當察口眼開闔以别重輕涎沫有無以眀證治如眼開口閉手足不開涎不作聲者可治如眼閉口開聲如鼾睡遺尿者死至寳丹蘓合香圓五積散加麝香煎牛黄清心圓見和劑方大八風湯方見偏枯第七篇排風湯治男子婦人風虚濕冷邪氣入藏狂言妄語精神錯亂及風入五藏等證詳見和劑方白鮮皮白术白芍藥桂心川芎當歸防風杏仁去皮尖麩炒甘草各二兩白茯苓麻黄去節獨活各三兩右吺咀每服三錢水一盞半生薑四片煎至八分去滓温服無時候癸丑春有一婦人年四十四五其證説話氣短足弱行得數歩則口若􅅤霜七十日内三次經行遇行則口冷頭目眩暈足冷則透心冷痛每行則口中冷氣不相續有時鼻中熱面赤翕然而熱身體不仁不能行歩手足不隨不能俛仰冷痺骨疼有時悲傷夣與前夫相隨則上氣奄然而極心驚志意不定恍惚多忘却能食如此僅一年許醫者投熱藥則靣翕然而熱氣滿胷中咽中窒塞悶絶投冷藥則㵼又一醫者以十全湯服之則發煩躁心驚而跳一醫者以䨇和湯服之覺得靣上與腹中甚如火燂心愈驚欲吐不吐大府秘裏急後重求僕診之六脉弦緩喜見於春此是可治之疾未供藥間忽然吐㵼㵼後覺肛門如火雖㵼六次却不多僕一時識證未盡且與俞山人降氣湯八服次日診之脉差有力云服藥之後覺鼻中熱心煩悶絶齒噤與參蘓飲八服黄連圓一兩許越三日云服藥之後其疾如故與茯苓補心湯服之皆無效僕以脉證詳之只有排風湯甚對此證或曰何以見得是此證一能食飲此風飢也二七十日三次經行此是榮經有風血得風散也三頭目眩暈此肝風也四面赤翕然而熱悲傷此心風也五身體不仁不能行歩夣與前夫相隨此脾風也六手足不隨腰痛難以俛仰冷痺骨疼此腎風也諸有此候令人心驚志意不定恍惚多忘真排風湯證也或曰風脉當浮今脉弦緩微弱恐非風也荅曰風無一定之脉大抵此證虚極生風然排風湯所用之藥有十全大補湯料亦有平補之意却不僣燥供十服越三日云服之有效脉亦差勝只是心中如烟生似有微熱大便尚秘此真是風證冄與排風湯十服兼牛黄清心圎皂角圎助之越三日云服前藥一二日大煩躁與熱諸證悉除只是足弱不能支持脉亦弱與秘傳降氣湯十服又越三日云諸證悉退只是夣裏虚驚大便滑泄如食傷相似奏厠頻數脉尚弱與五積散數服加人參塩煎兼感應元即愈自後云皆無恙矣但上重而頭眩不能乆立乆坐再與排風湯則脱然安矣以此方知要依古法不可杜撰臆度處方三生散治卒中昏不知人口眼喎斜半身不遂咽喉作聲痰氣上壅無問外感風寒内傷喜怒或六脉沉伏或指下浮盛並宜服之兼治痰厥飲厥及氣虚眩暈悉有神效生南星一兩生烏頭去皮尖生附子各半兩去皮木香一分右㕮咀每服半兩水二大琖生薑十片煎至六分去滓温服或口噤不省人事者用北細辛皂角各少許為細末或只用半夏為細末用少許以蘆管吹入鼻中俟噴􅅉其人少甦然後進藥如氣盛人只用南星五錢重木香一錢加生薑十四片煎作兩服飲之名星香飲參蘇飲治痰飲停積胷中中脘閉塞嘔吐痰涎眩暈嘈煩忪悸噦逆及痰氣中人停留闗節手足嚲曳口眼喎斜半身不遂食已即嘔頭疼發熱狀如傷寒人參紫蘇葉半夏茯苓乾葛前胡各三分甘草木香陳皮枳殻製苦梗各半兩右㕮咀每服四錢水一琖半薑七片棗一枚煎七分去滓空心温服腹痛加芍藥木香煮散治左癱右瘓并素有風濕諸藥不效常服調氣進食寛中蘇沈良方言之甚詳羗活麻黄去節各一兩防風三分白术陳皮黒附子炮南木香㯽榔牛膝大川烏炮草豆蔲連皮煨杏仁去皮尖麩炒人參白茯苓川芎當歸甘草桂心各半兩右㕮咀每服四錢重水一大琖半生薑五片煎至八分去滓熱服大便不通加大黄心腹脹加苦葶藶滑石膈上壅滯咳嗽氣促加半夏川升麻天門冬知母繆安人年六十五六忽然中風不省人事無汗有痰已辦後事衆醫以為不可治也召僕診之六脉浮緩脾脉溢闗此真風脉也先投參蘓飲六服先寛氣下痰次以木香煑散而愈又享十年之壽附子理中湯治五臟中寒口噤四肢强直失音不語昔有武士守邉大雪出帳外觀瞻忽然暈倒時林繼作隨行醫官灌以此藥兩劑遂醒大附子炮人參去蘆乾薑炮甘草炙白术等分右細剉每服四錢重水一琖半􅋩七分去滓不以時候服口噤斡開灌之開慶己未年七月間裕齋馬觀文夫人曹氏病氣弱倦怠四肢厥冷惡寒自汗不進飲食一醫作伏暑治之投暑藥一醫作虚寒治之投熱藥無效召僕診之六脉雖弱而兩闗差甚裕齋問曰此何證也僕荅曰以脉觀之六部雖弱而闗獨甚此中焦寒也中焦者脾也脾胃既寒非特但有是證必有腹痛吐㵼之證今四肢厥冷四肢属脾是脾胃虚冷無可礙者荅云未見有腹痛吐㵼之證合用何藥治之僕荅曰宜用附子理中湯未服藥間旋即腹痛而㵼莫不神之即治此藥一投而差加減小續命湯治卒暴中風不省人事漸覺半身不遂口眼喎斜手足戰掉語言蹇澁肢體麻痺神情昏亂頭目眩重痰涎併多筋脉拘攣不能屈伸骨節煩疼不得轉側及治諸風服之皆驗若治脚氣緩弱乆服得差久病風人每遇天色隂晦節候變更宜預服之以防瘖瘂麻黄去根節防已人參去蘆黄芩桂心甘草白芍藥川芎杏仁各一兩附子炮半兩防風一兩半右㕮咀每服五錢水一琖半薑七片􅀥兩箇煎至七分去滓不以時候服取汗隨人虚實與所中輕重有人脚弱服此六七劑得瘥精神恍惚加茯神逺志骨節煩痛有熱者去附子倍芍藥心煩多驚者加犀角半兩骨間冷痛者倍用桂附嘔逆腹脹者倍人參加半夏一兩躁悶大便澁者去附子倍芍藥入竹瀝一合􅋩服臟寒下利者去防已黄芩倍附子一兩加白术一兩古今録驗有白术無杏仁救急無芎藭杏仁止十味延年無防風一云違失便利産後失血并老人小兒用麻黄桂心甘草各二兩一法治或歌哭或笑語無所不及用麻黄三兩人參桂枝白术各二兩無附子防風生薑有當歸一兩自汗者去麻黄杏仁加白术脚弱加牛膝石斛各一兩身疼痛加秦芁一兩腰疼加桃仁杜仲各半兩失音加杏仁一兩春加麻黄一兩秋加當歸四兩夏加黄芩三分冬加附子半兩小風引湯防風獨活細辛川芎北五味子白茯苓人參白芍藥白术甘草等分右吺咀每服三錢水一琖薑三片杏仁五箇去皮尖搥碎同煎至七分去滓温服如加麻黄蓯蓉附子當歸羚羊角六味等分即大風引湯千金竹瀝湯大治熱即生風竹瀝二升生葛汁一升生薑汁三合右三味相和温暖分三服朝晡夜各一服必效竹瀝湯治中風涏潮譫語昏塞四肢緩縱秦芁防風獨活附子各一分右㕮咀以水四琖煎至二琖入生地黄汁淡竹瀝各半琖再煎四五沸去滓分作四服無時熱服病勢去以他藥扶持未愈再作近世貴人用之多有神效燒竹瀝法新竹截尺許長去節作兩邊用兩磚對立相去八寸置竹仰在磚上急着㷔火燒之磚外兩頭以椀盛瀝瀝盡以絹澄清夏秋湏沉冷水中以防瀝酸凡大熱有風人亦可單服冷暖隨人勿過度荆瀝亦然婦人中風角弓反張口噤方論第二夫婦人角弓反張者是體虚受風風入諸陽之經也人之隂陽經絡周環於身風乘虚入於諸陽之經則腰背反折攣急如角弓之狀宜用小續命湯方見前活人書論曰婦人産後血虚多汗出喜中風身體强直口噤背反張作痙治之属太陽經先因傷風又感寒濕而致然也古人謂之痓病外證發熱惡寒與傷寒相似但其脉沉遲弦細而項背反張强硬如發癎之狀此為異耳新産血虚多汗出喜中風亦有此證當察有汗無汗以分剛柔二痓無汗惡寒名剛痓有汗不惡寒名柔痓陽痙属剛痓隂痙属柔痓無汗葛根湯主之有汗桂枝加葛根湯主之凡剛柔二痓小續命湯並可與之有汗者去麻黄加葛根若審知剛痓者胷滿口噤其人卧不着席脚攣急咬齒當行大承氣湯注云外臺云熱而痙者死熱病痙者反折瘈瘲齒噤齗也附术湯桂心白术散附子防風湯八物白术湯桂枝煮散可選而用之觧惑論云合面而卧為隂痓仰卧者為陽痓又云或因濕寒發汗多則發痓也葛根湯治剛痓無汗惡風産後有疾凡用麻黄更宜斟酌葛根一兩麻黄去根節炮薑皮各三分桂枝粉草芍藥各半兩大􅀥三箇右㕮咀每服三錢水一琖􅋩七分去滓温服取汗為度桂枝加葛根湯治柔痓有汗不惡寒桂枝芍藥甘草各六錢三字乾葛一兩三錢生薑一兩􅀥四枚右㕮咀每服三錢水一琖煎七分去滓温服取汗為度大承氣湯愚詳之産後難用此藥故不録附术散治傷寒手足逆冷筋脉拘急汗出不止項强直摇頭口噤附子白术各一兩川芎三錢肉桂二錢獨活半兩右為細末每服三錢棗二箇水一中琖煎至一半温服桂心白术湯治傷寒隂痙手足厥冷筋脉拘急汗出不止白术桂心附子炮防風川芎甘草各兩半右㕮咀每服五錢水二琖薑四片􅀥三枚煎八分去滓温服附子防風散治傷寒隂痙閉目合面手足厥逆筋脉拘急汗岀不止柴胡一兩半五味子白术各一兩茯苓甘草乾薑附子炮防風各三分桂心半兩右為粗末每服三錢薑四片水一琖煎七分去滓温服八物白术散治傷寒隂痙三曰不差手足厥冷筋脉拘急無汗恐隂氣内傷白术麻黄去根節茯苓五味子羗活各半兩附子炮桂心各三分良薑一分右為粗末每服四錢水一琖薑四片煎七分去滓温服凡用麻黄宜斟酌用之不可過多白殭蚕散治婦人中風角弓反張口噤不能言皮膚頑痺筋脉抽掣殭蚕一兩烏蛇肉炙天麻獨活南星炮川烏炮去皮尖防風蟬蛻洗白附子炮犀角屑朱砂研桑螵蛸各半兩麝香一分研右為細末每服一錢温酒調下無時候烏蛇圓治婦人中風牙闗𦂳急手足頑麻心鬲痰涎壅滯烏蛇肉炙天麻白附子炮南星炮各一兩獨活烏犀屑殭蚕炒全蝎炒半夏麯麻黄去根節當歸晚蚕沙各半兩炒右為細末煉􅁡元如梧桐子大每服七元温酒吞下亦治角弓反張婦人中風口噤方論第三夫婦人中風口噤者是體虚受風風入頷頰夾口之筋也手三陽之筋結入於頷頰足陽明之筋上夾於口而風挾冷乘虚入其筋則筋攣故引牙關急而口噤也天南星散治婦人中風口噤四肢拘急天南星薑汁炒黄白附子炮黒附子炮烏蛇肉酒炙全蝎等分炒右為細末每服半錢以生薑汁温酒調下無時拗開口灌走馬散治婦人中風口噤四肢强直黒附子炮天麻各半兩桂心石膏麻黄去根節蝎梢炒川烏炮去皮尖南星炮各一分麝香半分研右為細末入研藥令停每服一字無時豆淋酒調灌烏蛇散治婦人中風口噤烏蛇肉炙全蝎炒天麻南星炮殭蚕各半兩炒膩粉半分右為細末入膩粉令停每服一字以生薑酒調灌下婦人中風不語方論第四巢氏云脾脉絡胃夾咽連舌本散舌下心之别脉係舌本今心脾二臟受風邪故舌强不得語也喉嚨者氣之所以上下也㑹厭者音聲之尸舌者聲之機唇者聲之扇風寒客於㑹厭之間故卒然無音皆由風邪所傷故謂之中風失音不語經云醉卧當風使人發瘖神仙觧語丹治心脾經受風言語蹇澁舌强不轉涎唾溢盛及療淫邪搏隂神内欝塞心脉閉滯暴不能言白附子炮石菖蒲去毛逺志去心甘草水煑十沸天麻全蝎酒炒羗活白殭蚕炒南星牛膽釀如無只炮各一兩木香半兩右為細末煑麫糊為圓如梧桐子大量入辰砂為衣每服二十圓至三十圓生薄荷湯吞下無時候防風湯治中風内虚脚弱語蹇石斛一兩半酒炒乾地黄杜仲去皮切薑汁炒丹參各一兩一分防風川芎麥門冬去心桂心川獨活各一兩右㕮咀每服五錢水盞半􅀥二枚煎至八分去滓温服竹瀝湯治中風入肝脾經年四肢不遂舌强語蹇葳靈仙附子炮苦梗蔓荆子防風枳殻去穣麩炒川芎當歸各等分右㕮咀每服四錢水一盞竹瀝半盞薑三片煎至八分温服日四服忌茶婦人風痺手足不隨方論第五夫婦人風痺者由風寒濕三氣合而為痺風多者為風痺其狀肌膚盡痛諸陽之經皆起於手足而循行於身體風寒之氣客於肌膚始為痺復傷陽經隨其虚處而停滯與血氣相摶血氣行則遲緩使機闗弛縱故風痺而復手足不隨也三痺湯治血氣凝滯手足拘攣風痺氣痺等疾皆療川續斷杜仲去皮切薑汁炒防風桂心華隂細辛人參白茯苓當歸白芍藥甘草各一兩秦芁生地黄川芎川獨活各半兩黄耆川牛膝各一兩右㕮咀爲末每服五錢水二琖薑三片􅀥一枚煎至一琖去滓熱服無時候但腹稍空服有人病左臂不隨後已痊平而手指不便無力試諸藥不驗服此藥纔半即安三五七散亦妙方見局方不復贅録婦人中風自汗方論第六尋古治中風方續命排風越婢等悉能除去而千金多用麻黄令人不得慮虚凡以風邪不得汗則不能泄也然此治中風無汗者為宜若治自汗者更用麻黄則津液轉使脱泄反為大害中風自汗仲景雖處以桂枝湯至於不住發搐口眼瞤動遍身汗岀者豈勝對治當此之時獨活湯續命煑散復榮衞却風邪不可闕也獨活湯治風虚昏憒不自覺知手足棄縱坐卧不能或發寒熱血虚不能服發汗藥及中風自汗尤宜服之川獨活羗活人參防風當歸北細辛茯神去木半夏桂心白薇逺志去心菖蒲去毛川芎各半兩甘草三分右㕮咀每服五錢水盞半薑五片煎七分去滓無時温服續命煑散治風氣留滯心中昏憒四肢無力口眼瞤動或時搐搦亡失津液渇欲引飲此能扶榮衛去虚風中風自汗及産後中風自汗尤宜服之防風獨活當歸人參細辛葛根芍藥川芎甘草熟地黄半夏逺志去心荆芥穗各半兩桂心七錢半右㕮咀每服五錢水一琖生薑三大片煎至七分去滓温服不拘時汗多不止者加牡蠣粉一分半婦人臂痛方論第七論曰夫婦人臂痛筋脉攣急不得屈伸遇寒則劇由肝虚為風寒邪氣流於血脉客於經絡摶於筋筋不榮則乾急而痛其脉𦂳細宜服栢子仁圓舒經湯若臂痛不能舉或左或右時復轉移一臂由中脘伏痰脾氣滯而不行上與氣相摶四肢皆属於脾脾氣滯而氣不下上攻於臂故痛其脉沉細宜茯苓圓控涎丹栢子仁圓王氏指迷方栢子仁乾地黄各二兩茯苓枳實去穣麩炒覆盆子炒北五味附子炮石斛去根切酒蒸炒鹿茸酥炙酸􅀥仁炒桂心沉香黄耆各一兩􅁡水炙一方等分右為細末煉蜜為丸如梧桐子大空心酒下三十圓舒經湯治臂痛又名五痺湯亦治腰下疾片子薑黄四兩甘草羗活各一兩白术海桐皮當歸赤芍藥各二兩右為粗末每服三錢水一琖半煎至七分去滓温服如腰以下疾空心服腰以上疾食後服茯苓圓茯苓一兩半夏二兩枳殻半兩見製風化朴硝一分右四味為末薑汁煮糊為圓如梧桐子大生薑湯下二十圓食後服控涎丹凡人忽患胷背手足頸項腰胯隠痛不可忍連筋骨牽引釣痛坐卧不寕時時走易不定俗醫不曉謂之走疰便用風藥及針灸皆無益又疑是風毒結聚欲為癰疽亂以藥貼亦非也此乃痰涎伏在心膈上下變為此疾或令人頭痛不可舉或神意昏倦多睡或飲食無味痰唾稠粘夜間喉中如鋸聲多流睡涏手脚重膇冷痺氣脉不通誤認為癱瘓亦非也凡有此疾但以此藥不過數服其疾如失甘遂去心大㦸去皮真白芥子各等分炒右為細末糊圓如梧桐子大臨卧淡薑湯吞下五七圓如痰猛加至十圓白芥子散治臂痛外連肌肉牽引背胛時發時止此由榮衞之氣循行失度留滯經絡與正氣相搏其痛發則有似癱瘓真白芥子木鼈子各二兩麩炒没藥别研桂心木香各半兩右為細末入研藥令停每服一錢温酒調下流氣飲子紫蘇葉青皮苦梗大黄煨當歸芍藥烏藥茯苓川芎黄耆枳殻去穣麩炒防風各半兩甘草橘皮各三分木香連皮大腹二兩剉薑汁炒右㕮咀每服五錢水二琖薑三片􅀥一枚煎一琖去滓服婦人賊風偏枯方論第八論曰賊風偏枯者是體偏虚受風風客於半身也人有勞傷血氣半身偏虚者風乘虚入客於半體名為偏風也其風邪入深真氣去邪氣留發為偏枯此由血氣衰損為風所客令血氣不相周榮於肌故令偏枯也論曰夫偏枯者其狀半身不隨肌肉枯痩骨間疼痛神智如常名曰偏枯僕原疾之由皆由隂陽偏虧臟腑怯弱經絡空虚血氣不足當風衝坐風邪乗虚而入疾從斯作内經云汗出偏沮使人偏枯詳其義理如樹木或有一邉津液不䕃注而先枯槁然後被風所害人之身體或有一邉血氣不能榮養而先枯槁然後被風所苦其理顯然王子享有云舟行於水人處於風水能泛舟而亦能覆舟風能養體而亦能害體盖謂舡漏水入體漏風傷古人有云醫風先醫血血行風自㓕是也治之先宜養血然後驅風無不愈者宜用大八風湯増損茵芋酒續斷湯大八風湯治中風偏枯失瘖半身不遂時復恍惚當歸杏仁去皮尖麩炒黄甘草桂心乾薑各二兩炮五味子升麻各兩半川烏炮去皮尖黄芩芍藥獨活防風川芎麻黄去節秦芁石斛去根切酒蒸炒人參茯神石膏黄耆紫苑各一兩大豆三兩去皮炒右為粗末每服五錢水二琖酒一合煎至一琖去滓温服恍惚者不用酒煎増損茵芋酒治半身不隨肌肉乾燥漸漸細痩或時㾓痛病名偏枯茵芋葉川烏炮去皮尖石楠葉防風川椒炒出汗女萎附子炮北細辛獨活卷栢肉桂天雄炮去皮秦芁防已各一兩躑躅花炒當歸生乾地黄各二兩芍藥一兩右㕮咀酒二㪷漬之冬七日夏三日春秋各五日初服一合漸増之以知為度令酒氣相續出指迷方續斷湯治偏枯少血當歸三兩陳皮芍藥北細辛各一兩生乾地黄二兩右為粗末每服五錢水二琖煎至八分去滓温服臟寒多利者入熟附子一兩和前藥偏風口喎方論第九凡五方論曰偏風口喎者是體虚受風風入於夾口之筋也足陽眀之筋上夾於口其筋偏虚風因虚而乗之使其筋偏急不調故令口喎僻也防風湯治卒然口喎斜言語牽急四肢如故别無所苦防風一兩羗活半兩甘草一分右為粗末每服五錢水二琖煎至一琖去滓入麝香研一字温服治口眼喎斜用萆麻子七粒去皮殻細研作餅安在手心右喎安左手左喎安右手却用銅盂乘湯坐于藥上纔正即洗去一方用巴豆不用萆麻出本草廣濟療風著口面喎斜語聲不轉方生地黄汁一升竹瀝一升獨活切三兩右相和􅋩取一升頓服未正更進一劑深師續命湯療中風口僻噤諸疾卒死不知人補虛起死神方人參防已麻黄去根節芍藥川芎甘草黄芩白术各半兩桂心附子炮防風各一兩生薑五兩右切以水一㪷二升煑取三升分為三服不差復作忌海藻菘菜桃李生菜葱雀肉猪肉又千金方炒大豆三升令焦以酒三升淋取汁頓服又方用大皂荚五兩去皮子為末以三年大醋調如左喎塗右右喎塗左乾更塗婦人血風心神驚悸方論第十夫婦人血風驚悸者是風乗於心故也心藏神為諸藏之主若血氣調和則心神安定若虚損則心神虚弱致風邪乗虚干之故驚而悸動不定也其驚悸不止則變恍惚而憂懼也排風湯亦可用茯神散治婦人血風五臓大虚驚悸安神定志茯神去木人參龍齒别研獨活酸棗仁各一兩炒防風逺志去心桂心細辛白术各三分甘草乾薑各半兩炮右為粗末每服四錢水琖半煎至八分去滓温服龍齒圓治婦人血風上攻心神恍惚驚悸眠卧不安龍齒别研茯神各一兩朱砂研人參當歸天麻各三分犀角屑㯽榔防風生乾地黄各半兩逺志去心赤箭各一分麝香一錢右為細末煉􅁡圓如梧桐子大每服二十圓薄荷温酒下朱賁琥珀散治婦人血風琥珀研没藥研木香當歸芍藥白芷羗活乾地黄延胡索川芎各半兩土𤓰根牡丹皮去心白术桂心各一兩右為末每服一錢水一琖煎至七分益酒三分再煎少時熱服重者數服效失血過多心神不安方第十一寧志膏治婦人因失血過多心神不安言語失常不得睡辰砂研酸棗仁炒人參白茯神去木琥珀各一分研滳乳一錢研右為末和停每服一錢濃􅋩燈心􅀥湯空心調下一方無茯苓琥珀􅁡圓如弹子大薄荷湯化下一粒婦人風邪顛狂方論第十二夫婦人顛狂病者由血氣虚受風邪所為也人禀隂陽之氣而生而風邪入并於隂則為顛入并於陽則為狂隂之與陽有虚有實隨其虚時為邪所并則發也顛者卒發意不樂直視仆地吐涎沫口喎目急手足撩戾無所覺知良乆乃甦狂者少卧不饑自髙賢也自辨智也自貴倨也妄笑好歌樂妄行不休故曰顛狂也防風散治婦人風邪顛狂或啼泣不止或歌笑無度或心神恐懼或言語失常防風茯神獨活人參逺志去心龍齒菖蒲去毛石膏牡蠣各一兩煆秦芁禹餘糧桂心各半兩甘草三分蛇蜕一尺炙右為粗末每服三錢水琖半􅋩七分去滓温服又一方羚羊角屑三分獨活逺志去心菖蒲去毛防風各半兩茯神去木石膏麥門冬去心龍齒别研白蘚皮各一兩人參生乾地黄各三分右為粗末每服三錢水琖半煎七分温服無時素問云陽厥狂怒飲以鐵落狂怒出於肝經肝属木鐵落金也以金制木之意愚曽治一女人眼見鬼物言語失常循衣直視衆醫多用心藥治之無效僕投養正丹二貼煎乳香湯送下以三生飲佐之立愈百又一男子亦曽病此證亦用此藥收效然養正丹與一方抱膽圓無異抱膽圓内中無硫黄有乳香也自合方見效婦人飛尸血厥方論第十三夫飛尸者遊走皮膚穿藏府每發刺痛變作無常遁尸者附骨入肉攻鑿血脉每發不可得近見尸䘮聞哀哭便發風尸者滛濯四肢不知痛之所在每發昏沉得風雪便作沉尸者纒骨結藏衝心脇每發絞切遇寒冷便作注尸者舉身沉重精神錯雜常覺昏廢每節氣至變輙成大惡皆宜用此方忍冬葉剉數斛煑令濃取汁煎之服如雞子大日三服太一神精丹出千金方治中風之要藥治客忤霍亂腹痛脹滿尸注惡風顛狂鬼語蠱毒妖魅癥瘕積聚温瘧積乆百方不差但是一切惡毒無所不治但近世少得曽青磁石為難合爾故不録蘇合香元亦治此疾方見和劑更不贅録雄朱散治因䘮驚憂悲哀煩惱感尸氣而成變動不已似冷似熱風氣觸則發雄黄研朱砂研苦梗羗活當歸升麻川烏炮龍齒别研犀角屑白术芍藥鬼箭羽白殭蚕炒木香虎頭骨酥炙紫蘇子炒川芎南星炮山梔子陳皮莽草枳殻去穣麩炒黄芩各一分麻黄半兩去根節蜈蚣二條炙去頭足㯽榔二箇全蝎一分炒右為細末每服二錢温酒調下一日三服人平居無疾苦忽如死人身不動摇黙黙不知人目閉不能開口噤不能言或微知人惡聞人聲但如眩冐移時方寤此由汗過多血少氣併於血陽獨上而不下氣壅塞而不行故身如死氣過血還隂陽復通故移時方寤名曰欝冐亦名血厥婦人多有之宜服白薇湯倉公散白薇湯方白薇當歸各一兩人參半兩甘草一分右㕮咀每服五錢水二琖􅋩至一琖温服倉公散治卒鬼擊鬼疰鬼刺心腹如刺下血便死不知人及卧魘嚙脚趾不覺者并諸毒氣等疾𤓰蔕末九籥衛生方無𤓰蔕末有皂角末梨蘆末雄黄研礜石煅研各等分右為末研停用少許吹入鼻中得􅅉氣通便活未􅅉再吹以得􅅉為度此藥能起死人恐皂荚者為正白术散治中風身體麻痺不仁白术炒芍藥藁本去苗土各一兩續斷去枯者當歸酒洗焙各二兩虎骨酥炙烏蛇肉各半兩右為細末每服二錢匕温酒調下藏寒多利者加附子半兩骨中煩熱者加生地黄一兩婦人大全良方卷三
