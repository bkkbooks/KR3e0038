body:
  text: 婦人大全良方目録上醫家類卷一調經門凡醫婦人先須調經故以為初月經序論第一精血篇第二産寳方序論第三王子亨論第四月水不調方論第五凡四方月水不通方論第六産寳方論附養生必用論經病第七凡十方室女月水不通方論第八凡二方室女經閉成勞方論第九凡十方血枯方論第十凡四方月水不利不流利也方論第十一凡四方月水行或不行心腹刺痛方論第十二凡六方月水不斷方論第十三凡六方婦人殺血心痛方論第十四凡二方崩暴下血不止方論第十五凡三十六方崩中帶下方論第十六崩中漏下生死脉論第十七凡三十三方婦人白濁白滛方論第十八凡一方婦人天癸過期經脉不調方論第十九凡二方婦人血分水分腫滿方論第二十凡三方卷二衆疾門經脉不調衆疾生焉故以次之極一方總論第一産寶方論第二博濟方論第三冦宗奭論第四通用方序第五凡十七方卷三婦人中風方論第一凡十方婦人中風角弓反張口噤方論第二凡八方婦人中風口噤方論第三凡三方婦人中風不語方論第四凡三方婦人風痺手足不隨方論第五凡二方婦人中風自汗方論第六凡六方婦人臂痛方論第七凡三方婦人賊風偏枯方論第八凡三方婦人偏風口喎方論第九凡六方婦人血風心神驚悸方論第十凡三方婦人失血過多心神不安方第十一凡一方婦人風邪顛狂方論第十二凡四方婦人飛尸血厥方論第十三凡六方卷四婦人血風身體骨節疼痛方論第一凡五方婦人血風白虎歴節走疰方論第二凡七方婦人血風􅇙瘙痒方論第三凡八方婦人虛風頭目眩暈及心眩方論第四凡七方婦人血風頭痛方論第五凡九方婦人項筋强痛方論第六凡五方婦人腰痛方論第七凡二方婦人腰脚疼痛方論第八凡三方婦人脚氣方論第九凡十一方卷五婦人勞療序論第一凡二十一方二十四種蒸病論附婦人骨蒸勞方論第二凡十五方婦人血風勞氣方論第三凡十四方婦人風虚勞冷方論第四凡二方婦人冷勞方論第五凡七方卷六婦人熱勞方論第一凡四方婦人客熱方論第二凡三方婦人寒熱方論第三凡四方寡婦寒熱如瘧方論第四凡一方婦人惡寒方論第五凡一方婦人血風煩悶方論第六凡四方婦人血風攻脾不能食方論第七凡四方婦人夢與鬼交方論第八凡三方婦人傷寒傷風方論第九凡八方婦人熱入血室方論第十凡五方婦人咳𠻳方論第十一凡九方婦人勞𠻳方論第十三凡二方婦人喘滿方論第十四凡六方婦人風痰方論第十五凡八方婦人心胷嘈雜方論第十六凡二方卷七婦人嘔吐方論第一凡六方婦人霍亂方論第二凡六方婦人翻胃吐食方論第三凡二方婦人血膈方論第四凡一方婦人鼻衂方論第五凡七方婦人吐血方論第六凡十三方婦人痃癖諸氣方論第七凡四方婦人疝瘕方論第八凡四方婦人八瘕方論第九凡一方婦人腹中瘀血方論第十凡二方婦人癥痞方論第十一凡三方婦人食癥方論第十二凡二方婦人積年血癥塊方論第十三凡七方婦人血氣心痛方論第十四凡六方婦人血氣心腹疼痛方論第十五凡二十方婦人血氣小腹疼痛方論第十六凡四方婦人兩脇脹痛方論第十七凡六方婦人心腹脹滿方論第十八凡三方卷八婦人淋瀝小便不通方論第一凡十一方婦人脬轉不得小便方論第二凡五方婦人小便數方論第三凡二方婦人遺尿失禁方論第四凡七方婦人小便出血方論第五凡九方婦人大便不通方論第六凡八方婦人風入腸間或祕或利方第七凡四方婦人泄瀉方論第八凡八方婦人恊熱下利方論第九凡三方婦人滯下方論第十凡十三方婦人痢後嘔噦方論第十一凡七方婦人大便下血方論第十二凡八方婦人痔瘻方論第十三凡五方婦人脱肛候方論第十四凡五方婦人隂腫方論第十五凡六方婦人隂痒方論第十六凡十方婦人隂冷方論第十七凡六方婦人隂挺出下脱方論第十八凡六方婦人隂中生瘡方第十九凡五方婦人傷丈夫頭痛方第二十凡二方婦人交接輒血出痛方第二十一凡二方婦人交接他物傷方第二十二凡三方小户嫁痛方第二十三凡四方卷九求嗣門疾病既無須知求嗣故以次之陳無擇求子論第一褚尚書求男論第二婦人無子論第三千金翼求子方論第四凡十四方温隱居求嗣保生篇方論第五凡一方婦人大全良方目録上
