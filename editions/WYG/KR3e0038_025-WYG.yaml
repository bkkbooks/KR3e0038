body:
  text: 婦人大全良方卷二十一宋陳自明撰産後口乾痞悶方論第一論曰産後口乾痞悶者何答曰産後榮衞大虛血氣未定食麪太早胃不能消化麪毒結聚於胃脘上熏胸中是以口乾燥渴心下痞悶醫者不識認為胸膈壅滯以藥下之萬不得一但服見現圓則愈見現元方薑黄三稜蓽澄茄陳皮良薑人參莪荗等分右為細末用蘿蔔浸煮爛研細將汁煮麪糊元如梧桐子大用蘿蔔湯下三十元評曰産後口乾痞悶未必只因食麪或産母内積憂煩外傷燥熱飲食甘辛使口乾痞悶當隨其所因調之可也煩心宜四物湯去地黄加人參烏梅煎若外傷燥熱看属何經當隨經為治難以備舉飲食所傷見現元却能作効四物湯方見本卷第二論産後血渴方第二産寳療産後大渴不止蘆根切一升栝樓人參甘草茯苓各三兩大􅀥二十枚麥門冬生四兩右以水九升煮取三升分三服頓服四劑即差忌菘菜楊氏家藏方黄芩散治産後血渴飲水不止黄芩麥門冬等分右㕮咀每服三錢水琖半煎至八分去滓温服無時栝樓根湯集驗療産後血渴栝樓根四兩麥門冬人參各三兩生乾地黄甘草各二兩土𤓰根五兩大棗二十枚右㕮咀以水八升煮取二升半分三服産寳無地黄麥門冬有牡蠣粉等分竹葉湯千金療産後虛渴少氣力竹葉三升甘草人參茯苓各一兩小麥五合生薑半夏各三兩麥門冬五兩大􅀥十五枚右㕮咀以水九升先煮竹葉小麥生薑􅀥取七升去滓内藥再煎取二升去滓一服五合日三夜一延胡散博濟療産後血渴不止延胡索蔚金乾葛桂心青皮枳殻製等分右並以好醋浸一宿焙乾杵為細末每服一錢冷橘皮湯調下不過三服差産後乍寒乍熱方論第三産後瘧疾附凡九方論曰産後乍寒乍熱者何答曰隂陽不和敗血不散能令乍寒乍熱産後血氣虛損隂陽不和隂勝則乍寒陽勝則乍熱隂陽相乗則或寒或熱若因産勞傷臓腑血弱不得宣越故令敗血不散入於肺則熱入於脾則寒醫人若誤作瘧疾治之則謬矣隂陽不和宜增損四物湯敗血不散宜奪命丹又問二者何以别之時有刺痛者敗血也但寒熱無他證者隂陽不和也増損四物湯不一皆隨病加減増損四物湯方人參當歸芍藥川芎乾薑各一兩甘草四錢重右㕮咀每服四錢水一琖薑錢三片煎至七分去滓熱服無時候評曰乍寒乍熱榮衞不和難以輕議若其敗血不散豈止入脾肺二蔵邪大抵一隂閉一陽即作寒熱隂勝故寒陽勝故熱只可云敗血循經流入閉諸隂則寒閉諸陽則熱血氣與衞氣解則休遇再㑹而復作大調經散五積散入醋煎佳大調經散治産後血虛惡露未消氣為敗濁凝滯榮衞不調隂陽相乗增寒發熱或自汗或腫滿皆氣血未平之所為也大豆一兩半炒去皮茯神一兩真琥珀一錢重右為細末濃煎烏豆紫蘇湯調下五積散方見局方産寳療産後惡寒壯熱一夜三五度發惡語口中生瘡時時乾嘔困乏悶絶人參獨活白鮮皮葛根防風青竹茹逺志各六分茯神八分白斂十分𤣥參十二分竹瀝二升半右銀一斤水一㪷五升煎取七升下諸藥重煎取三升分温三服忌魚酒麪等物産後乍寒乍熱心痛月候不來如何答曰敗血充心痛遶臍腹面色無采縦然得效暫時安痊不過三兩日又發服局方黒神散大効知母湯治産後乍寒乍熱通身温壯胸心煩悶方知母三兩芍藥黄芩各二兩桂心甘草各一兩右五味㕮咀以水五升煮取二升半分三服一方不用桂心加生地黄産後方論附評曰郭稽中云産後乍寒乍熱者多是敗血為害或隂陽不和所作若作瘧疾治之誤矣如陳無擇評曰只可云敗血循經流入閉諸陽則熱閉諸隂則寒血氣與衞氣解則休亦未盡善亦有産後病瘧而作寒熱有一日一發或一日二三發或間日一發或三兩日一發或先寒後熱或先熱後寒或寒多熱少或熱多寒少或但寒但熱者亦有産前病瘧而産後未愈者最難用藥如柴胡常山信砒等㫁不可用今有經效草果飲子生熟飲子用之有效謾備檢閲如易簡方四獸飲亦可用男六徳補遺草果飲子治婦人産後瘧疾寒熱相半者或多熱者宜半夏泡赤茯苓甘草炙草果炮去皮川芎陳皮白芷各二錢青皮去白良薑紫蘇各一錢乾葛四錢右㕮咀每服三錢重水一大琖薑三片􅀥二箇同煎至七分去滓當發日侵早連進三服無有不安生熟飲子治産後瘧疾多寒者肉豆􅅳草果仁厚朴生去粗皮半夏陳皮甘草大􅀥去核生薑右八味等分細剉和匀一半生一半用濕皮帋裹煨令香熟去帋與一半生者和匀每服秤五錢重水二琖煎至七分食前一服食後一服産後蓐勞方論第四夫産後蓐勞者此由生産日淺血氣虛弱飲食未平復不滿日月氣血虛羸將養失所而風冷客之風冷搏於血氣則不能温於肌膚使人虛乏勞倦乍卧乍起顔容憔悴食飲不消風冷邪氣而感於肺肺感㣲寒故欬嗽口乾遂覺頭昏百節疼痛榮衞受於風邪流注藏府須㬰頻發時有盜汗寒熱如瘧背膊煩悶四肢不舉沈重著床此則蓐勞之候也又論曰婦人因産理不順疲極筋力憂勞心慮致令虛羸喘乏寒熱如瘧頭痛自汗肢體倦怠咳嗽痰逆腹中絞刺名曰蓐勞石子湯療産後虛羸喘乏乍寒乍熱如瘧四肢疼痛面色痿黄名為蓐勞猪腎一雙去脂膜四破香豉一方無此有知母葱白粳米當歸芍藥各二兩右㕮咀分為兩劑用水三升煮取一小椀去滓分三服廣濟方無芍藥有人參許仁則療産後日淺久坐視聽言語多或運用氣力遂覺頭􅈩肢節皮肉痛乍寒乍熱此為蓐勞猪腎一雙去脂膜四破當歸芍藥生薑各二兩葱白切桂心各一兩右水八升煮腎取六升下藥煎取二升分温為二服胡氏方人參鼈甲散治婦人産後蓐勞皆由在産内未滿百日體中虛損血氣尚弱失於將理或勞動作傷致成蓐勞其狀虚羸乍起乍卧飲食不消時有咳嗽頭目昏痛發歇無常夜有盜汗寒熱如瘧背膊拘急沈困在床服此大効人參桂心當歸桑寄生白茯苓白芍藥桃仁熟地黄甘草麥門冬各半兩續㫁一分牛膝三分鼈甲炙黄耆各一兩右為細末每服先以猪腎一對去筋膜以水兩大琖生薑半分􅀥三箇煎至一琖去猪腎薑􅀥然後入藥末二錢入葱三寸烏梅一箇荆芥五穂煎至七分去滓空心晩食前温服此藥神妙老孫太保增損柴胡湯治産後虚羸發寒熱飲食少腹脹方出養生必用北柴胡人參甘草半夏陳皮川芎白芍藥各等分右㕮咀每服三錢水一大琖薑五片􅀥二枚煎七分去滓食後温服日二服熟地黄散治産後蓐勞皆由體虛氣力未復勞動所致四肢煩疼時發寒熱不思飲食熟乾地黄人參白芍藥白茯苓白术各一兩續㫁黄耆桂心五味子當歸麥門冬川芎各三分右㕮咀每服四錢水一大琖薑三片􅀥一箇煎至七分去滓温服無時白茯苓散治産後蓐勞蓋緣生産日淺久坐多語運動用力遂致頭目四肢疼痛寒熱如瘧狀宜服白茯苓一兩當歸川芎桂心白芍藥黄耆人參各半兩熟乾地黄半兩右㕮咀先以水二琖入猪腎一雙去脂膜細切以生薑三片􅀥三枚煎取一琖去腎薑􅀥入藥半兩煮取七分去滓食前分温二服黄耆圓治産後蓐勞寒熱進退頭目眩痛百骨節疼痠氣力羸乏黄耆鼈甲當歸炒各一兩桂心續㫁白芍藥川芎牛膝蓯蓉沉香柏子仁枳殻各三分北五味熟地黄各半兩右為細末煉蜜元如梧桐子大食後粥飲吞下四十元療産後大虚心腹急痛血氣上搶心氣息乏補益方黄耆白术當歸甘草人參各二兩生薑四兩右先以白羊肉三斤去膜以水一㪷九升煮肉取汁五升後下諸藥更煎取三升分温三服療産後喘乏氣羸腹内絞痛自汗出黄耆人參茯苓甘草白术五味子芎藭當歸各八分澤蘭葉陳皮各六分麥門冬訶子各二十分桂心熟乾地黄各十二分右為細末煉蜜元如梧桐子大空心温酒下三四十元日再服胡氏牡丹散治婦人産後虚羸發熱自汗欲變蓐勞或血氣所摶及經候不調及發寒熱自汗羸痩並宜服之白芍藥當歸五加皮地骨皮人參各半兩沒藥桂心各二錢牡丹皮三錢右為細末每服二錢水酒各半琖如不飲酒只用水一琖開通錢一錢麻油蘸之同煎七分去滓通口服煎不得攪喫不得吹黄耆煮散治産後蓐勞肌膚黄痩面無顔色或增寒壯熱四肢痠疼心煩頭痛黄耆鼈甲醋炙各一兩桂心當歸炒桑寄生白茯苓白芍藥人參熟地黄麥門冬去心甘草炙各半兩牛膝三分右為細末每服用猪石子一對去脂膜先以水一琖入薑半分􅀥三枚煎至七分去滓并石子却下藥五錢更煎至四分去滓空心晩食前温服二滓併煎産後虚羸方論第五産寳論曰産後虛羸者因産傷損臓腑勞侵氣血輕者將養滿日即差重者日月雖滿氣血猶不調和故患虛羸也夫産後氣血虛竭臓腑勞傷若人年齒少盛能節慎將養滿月便得平復如産後多因血氣虛弱雖逾日月猶常疲乏或因飲食不節調適失宜為風冷邪氣所侵摶於氣血流注於五臓六腑則令肌膚不榮顔容痿悴故曰虛羸人參散治産後虚羸脾胃乏弱四肢無力全不思飲食心腹脹滿黄耆人參草果仁厚朴附子各一兩白术當歸白茯苓木香川芎桂心甘草各半兩陳皮良薑阿棃勒皮各三分右㕮咀每服四錢水一琖薑三片􅀥一枚煎至六分去滓無時温服熟乾地黄湯治産後虚羸短氣不能食熟乾地黄二兩人參北五味子石斛白茯苓白术鹿角膠附子各一兩桂心當歸川芎澤蘭葉黄耆續㫁各三分右㕮咀每服四錢薑􅀥依前煎服澤蘭補虚元刪繁療婦人虚勞或本來虚寒或産後血脈虛竭四肢羸弱飲食減少血脈㫁絶血脈不通虚實依源澤蘭葉九分石膏八分川芎甘草當歸各七分白芷防風白术藁本川椒厚朴乾薑桂心細辛各五分右為細末煉蜜元如梧桐子大酒下二三十元日再忌海藻菘菜桃李生葱雀肉羊腎湯治産後虚羸乏力短氣羊腎一雙去脂膜麥門冬羚羊角屑北五味子茯神桂心續㫁黄耆川芎當歸各半兩人參附子炮乾薑各三分熟乾地黄一兩右㕮咀先以水二大琖煮腎至一琖去腎入藥五錢椒二七粒薑錢二片􅀥三枚煎至五分去滓空心温服羊肉當歸湯治産後虚羸乏弱無力喘急汗出腹中㽲痛肥羊肉二斤當歸白芍藥各半兩桂心附子炮川芎黄耆人參龍骨白术各三分熟地黄一兩右為粗末先以水五大升煮羊肉取汁二大琖每服四錢汁一中琖薑三片􅀥一枚煎至七分去滓温服黄雌雞湯治産後虛羸腹痛宜服小黄雌雞一隻去頭足翅羽腸肚細切當歸白术熟地黄桂心黄耆各半兩右㕮咀先以水七升煮雞至三升每服藥四錢以雞汁一琖煎至六分去滓温服日三産寳療産後經三臈諸疾退後身虚無力澤蘭葉炒細辛熟乾地黄各五分黄耆當歸防風各十八分麥門冬去心八分石膏七分煅藁本白芷川芎柏子仁五味子甘草各四分桂心三分右為細末煉蜜元如梧桐子大空心温酒下三四十元救急療産後羸乏不復令肥白方大烏豆浄拭熬熟如造豆黄法去皮𢷬為末以臘月猪脂成煉者和元如梧桐子大酒下五十元日再服一月内肥白也無所忌婦人方當歸散治産後補虚益血當歸羌活各一兩延胡索半兩右為細末用猪腰子一隻切作片以水一琖入藥末二錢同煎至七分同腰子喫佛手散治産後血虚勞倦盜汗多困少力咳嗽有痰當歸川芎黄耆各一兩北柴胡前胡各一分右㕮咀每服三錢水一大琖桃栁枝各三寸􅀥子烏梅各一枚薑三片煎至六分去滓温服如有痰去烏梅當歸羊肉湯許仁則療産後雖無疾狀但覺虚弱兼心腹痛欲得補氣力肥羊肉一斤去脂水一㪷煮取八升去肉當歸五兩黄耆四兩生薑六兩右以肉汁煮三味取二升五合分為四服若覺惡露下不盡加桂心三兩惡露下多覺有風加芎藭三兩有冷加茱茰一兩有氣加細辛二兩有熱加生地黄汁二合療産後雖無餘苦但覺氣虚當歸十二分乾地黄十分澤蘭葉八分地骨皮芍藥各七分黄耆防風續㫁各六分人參桂心各五分右為細末煉蜜元如梧桐子大温酒吞下二十元療産後虚羸黄雌雞一隻去毛背上破生百合煨三枚白粳米半升右依尋常着五味調和縫背合五味汁煮令熟開腹取百合并飰相和汁作羮食之肉亦食令盡略卧佳産寳療産後虚乏不思飲食四肢皆倦心腹陣痛補虚治氣人參芍藥桂心甘草生薑各一兩當歸一兩半生地黄二兩右㕮咀每服三錢水兩琖棗二枚煎至一琖去滓温服日三服地黄羊脂煎方古今録驗療産後諸疾羸痩欲令肥白飲食和調生地黄汁一升生薑汁五升羊脂二斤白蜜五升右四味先煎地黄汁令餘五升下羊脂煎減半次下薑次下蜜便以銅器盛著湯中煎令如飴狀空肚酒一升取煎如雞子大投酒中飲日三良産後風虚勞冷方論第六夫産則血氣勞傷臟腑虛弱而風冷客之冷摶於血氣血氣不能温於肌膚使人虚乏疲頓致羸損不平復若久不平復若久不瘥風冷入於子臟則胞臟冷亦使無子謂之風虚勞損也黄耆散治産後風虚勞損羸痩不思飲食四肢疼痛黄耆白术木香羚羊骨屑人參當歸桂心川芎白芍藥白茯苓各半兩甘草一分右㕮咀每服三錢水一琖薑三片􅀥一箇煎至七分去滓温服無時木香散治産後風虚勞損氣攻心腹四肢疼痛不思飲食木香人參陳皮白茯苓白芍藥黄耆川芎各三分熟乾地黄當歸附子各一兩甘草一分桂心白术各半兩右㕮咀每服三錢水一琖薑三片􅀥一枚煎至七分去滓温服人參散療産後風虚勞損羸痩四肢無力不思飲食人參黄耆熟地黄各一兩羚羊角屑三分桂心川芎防風當歸北五味子白茯苓白术各半兩甘草一分右為粗末每服三錢先用水二大琖獖猪腎一雙切去脂膜薑棗同煎至一琖去猪腎入藥煎至四分去滓空心温服枸杞子元療産後風虚勞損四肢疼痛心神虚煩不飲食枸杞子牛膝白茯苓人參黄耆各一兩當歸漏蘆防風桂心酸􅀥仁羚羊角屑羌活五加皮白术川芎各三分熟地黄二兩甘草半兩麥門冬一兩半右為細末煉蜜元如梧桐子大温酒下三十元荆芥湯亦可白薇元治産後風虚勞損腹痛冷氣脚膝無力面色痿黄飲食減少日漸羸痩補益木香當歸桂心澤蘭葉牛膝白薇牡丹皮枳殻人參川芎厚朴白术續㫁熟地黄北細辛赤石脂龍骨禹餘粮黄耆各一兩白茯苓附子各三分吴茱茰一分右為細末煉蜜為元如梧桐子大食前温酒下三十元産寳療産後風虚羸痩勞弱不生肌肉黄耆當歸芍藥人參各二兩桂心甘草川芎生薑各八分大􅀥十二箇右水七升煮取三升分温三服療産後虚勞骨節疼痛頭痛汗不出當歸人參生薑各二兩正方二分黄耆三兩淡豉五合猪腎一雙粳米三合薤白三合右水一㪷五升先煮猪腎取六升後下諸藥煎至二升分為三服又方猪腎一雙煮入葱豉作臛如常食之延年澤蘭元主産後風虚損痩不能食令肥悦方澤蘭葉熬當歸甘草各七分厚朴藁本食茱茰蕪荑白芷乾薑芍藥各三分石膏八分人參柏子仁桂心各四分白术五分右為細末煉蜜元如梧桐子大酒服十五元至二十五元日二服忌生冷鮓滑猪牛肉麪生葱桃李雀肉海藻菘菜古今録驗澤蘭元産後風虚勞損羸弱百病必效方澤蘭葉六分白芷川椒蕪荑仁藁本北細辛各四分人參白术柏子仁防風桂心厚朴丹參各五分川芎當歸甘草各七分乾地黄十分右為細末煉蜜元如梧桐子大空心温酒下二十元至三十元日二服忌如前廣濟療産後患風虚冷氣腹内不調補益肥白恱澤方澤蘭七分厚朴人參石斛蕪荑仁續㫁防風桂心各三分川芎白术柏子仁北五味子黄耆逺志各四分赤石脂甘草乾地黄各六分右為細末煉蜜元如梧桐子大酒下二十元至三十元日二服忌如前延年增損澤蘭元主産後風虛勞損黄痩方澤蘭熬七分防風乾地黄當歸北細辛桂心茯苓芍藥人參甘草藁本烏頭炮麥門冬石斛紫苑川芎各五分乾薑栢子仁蕪荑仁厚朴川椒各四分白术黄耆各六分紫石英石膏各八分右為細末煉蜜元如梧桐子大酒下二十元或三十元産後腹脹滿悶嘔吐不定方論第七論曰産後腹脹滿悶嘔吐不定者何答曰敗血散於脾胃脾受之則不能運化精微而成腹脹胃受之則不能受納水穀而生吐逆醫者不識若以尋常治脹止吐藥治之病與藥不相干轉更傷動正氣疾愈難治但服抵聖湯則愈抵聖湯方赤芍藥半夏澤蘭葉人參陳皮各一分甘草一錢右㕮咀每服一劑用水一碗生薑焙乾半兩煎至半碗去滓分熱三服産後嘔逆不食方論第八夫胃為水穀之海水穀之精以為血氣榮潤蔵府因産則臓腑傷動有時而氣獨盛者則氣乗腸胃腸胃燥澁其氣則逆故嘔逆不下食也丁香散治産後脾胃氣寒心胸滿悶吐逆四肢少力不納飲食丁香人參㯽榔白术桂心當歸厚朴前胡各三分甘草半兩良薑一兩右為粗末每服四錢水一琖薑三片煎至七分去滓温服空心開胃散治産後胃氣不和嘔吐不止全不納食宜服訶子肉兩半人參一兩甘草半兩右三味為細末别以半夏半分生薑一分薤白二七莖水一大琖煎至六分去滓分為兩服療産後嘔逆不止鄧知縣傳橘紅一兩半夏麯甘草各半兩藿香三兩右為細末每服二錢水一琖半薑三片煎至六分無時候治産後更無他疾但多嘔逆不能食白术五分生薑六分右細切酒水各二升煎取一升分三服産後霍亂方論第九夫産後霍亂氣血俱傷臓腑虚損或飲食不消觸冒風冷所致隂陽不順清濁相干氣亂於腸胃之間真邪相摶冷熱不調上吐下痢故曰霍亂也經云渇而飲水者五苓散寒多不飲水者理中元大段虚冷者加附子來復丹亦妙見局方白术散治産後霍亂吐利腹痛煩渇手足逆冷白术橘紅麥門冬人參乾薑各一兩甘草半兩右為粗末每服四錢生薑五片水一琖煎至七分去滓温服附子散療産後霍亂吐利不止手足逆冷附子白术當歸吴茱茰桂心人參丁香橘紅甘草各半兩右為細末粥飲調下二錢無時候温中散治産後霍亂吐瀉不止人參白术當歸草豆􅅳仁乾薑各一兩厚朴二兩右為粗末每服三錢水煎服髙良薑散治産後霍亂吐利腹中㽲痛良薑當歸草豆􅅳仁右等分為細末每服二錢粥飲調下訶子散胡椒湯亦妙方見第七卷第二論婦人大全良方卷二十一
