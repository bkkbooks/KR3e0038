body:
  text: 婦人大全良方卷十宋陳自明撰胎教門求嗣已明須知胎教故以次之姙娠總論第一凡婦人姙娠十月其説見於古書有不同者多矣按巢氏病源論婦人姙娠一月名始胚足厥隂脉養之二月名始膏足少陽脉養之三月名始胎當此之時血不流行形象始化未有定儀見物而變欲子端正荘嚴當令母見貴不可見状貎醜惡人也欲生男宜操弓矢乗牡馬欲生女宜著珥璫施環珮欲子美好玩白璧觀孔雀欲子賢能宜讀詩書務和雅手心脉養之四月始受水精以成血脉手少陽脉養之五月始受火精以成其氣足太隂脉養之六月始受金精以成其筋足陽明脉養之七月始受木精以成其骨手太隂脉養之八月始受土精以成膚革手陽明脉養之九月始受石精以成毛髪足少隂脉養之十月五臟六腑闗節人神皆備此其大略也又五臟論有稱耆婆者論一月如珠露二月如桃花三月男女分四月形象具五月筋骨成六月毛髪生七月逰其魂兒能動左手八月遊其魄兒能動右手九月三轉身十月受氣足更有稱張仲景者亦然又顱􅇟經云一月為胎胞精血凝也二月為胎形成胚也三月陽神為三魂四月隂靈為七魄五月五行分五臟也六月六律定六腑也七月精闗竅通光明也八月元神具降真靈也九月宫室羅布以定生人也十月受氣足萬象成也今推究數説之理如五臟論者類皆淺鄙不經往往妄託其名至於三藏佛書且語渉怪誕漫不可考今按顱􅇟經三卷云中古巫方所撰隋人巢氏方亦嘗序之今巢氏論婦人姙娠乃不見言之聖濟經原化篇亦獨取顱􅇟經更不言巢氏論者何哉嬰童寳鑑集云小兒方論起自巫方黄帝云吾不能察㓜小賴國有巫方能知小兒之夀夭耳及觀巢氏論小兒候亦云中古有巫方立小兒顱􅇟經以占夀夭世所相傳者有少小方焉是巢氏論小兒則取於顱􅇟經則是未盡其理故不言之若聖濟經者但取其文句不若巢氏之論其間有胎教之法為可取所以巢氏論姙娠至三月始胎之時欲令見貴人荘嚴若操弓矢施環珮觀孔雀讀詩書之類豈非胎教之理乎嘗試推巢氏所論姙娠脉養之理若足厥隂肝脉也足少陽膽脉也為一臟腑之經餘皆如此且四時之令必始於春木故十二經之養始於肝也所以一月二月手心主心胞絡脉也手少陽三焦脉也屬火而夏旺所以胎養在三月四月也屬手少隂心手太陽小腸者以君主之官無為而尊也足太隂脾脉也足陽明胃脉也屬土而旺長夏所以養胎而五月六月手太隂肺脉也手陽明大腸脉也屬金而旺秋所以養胎在七月八月足少隂腎脉也屬水而旺冬所以養胎在九月又况母之腎臟繫於胎是母之真氣子之所賴也至十月兒於母腹之中受足諸臟氣脉所養然後待時而生此論奥微而有至理餘書所論皆不能及也觀此則知巢氏所論世更有明之者亦未有過於巢氏之論矣余因述其説娠子論第二夫至精纔化一氣方凝始受胞胎漸成形質子在腹中隨母聽聞自姙娠之後則須行坐端嚴性情和悦常處静室多聽羙言令人講讀詩書陳禮説樂耳不聞非言目不觀惡事如此則生男女福夀敦厚忠孝賢明不然則男女既生則多鄙賤不夀而愚此所謂因外象而内感也昔太任娠文王目不視惡色耳不聽惡聲口不談惡言世傳胎教之道是謂此也前論亦畧叙之矣然則婦人有終身無子者何也按巢氏病源云婦人無子者盖有三焉一者墳墓不嗣二者夫婦年命相尅三者夫疹婦病皆令無子若夫疹婦病可以服藥而後能有子餘皆不可致也今觀是説亦未盡善有人以婦人無子問西京常器之者乃曰女人自少多病服燥藥無節使天癸耗動且早故终身無子又有問襄陽宋大亨者亦然然則婦人姙娠有兩胎者何也按古今方書並無論及此者惟巢氏論云陽施隂化精氣有餘故生二胎且謂成一胎之理其精有幾耶今觀婦人有兩胎者其精神氣宇畧無小異至於數有兩胎或間成兩胎者有俱男俱女者有一男一女者道藏經云有求子法云婦人月信初止後一日三日五日值男女旺相日陽日陽時交合有子多男若男女禀受皆壮則多子一有怯弱則少子以此推之理可槩見焉又婦人姙娠男女之别何也按顱􅇟經云陽盛發隂當孕成男六脉諸經皆舉其陽隂盛發陽當孕成女六脉諸經皆舉其隂巢氏病源云三陽所㑹則生男三隂所㑹則生女葛洪肘後方云男􅀙父氣女從母氣聖濟經云天之德地之氣隂陽之至和相為流薄於一體因氣而左動則屬陽陽資之則成男因氣而右動則屬隂隂資而成女易稱乾道成男坤道成女此男女之别也凡姙娠有疾投以湯藥有傷胎破血者之忌何也内經云婦人重身毒之柰何岐伯答曰有故無殞衰其大半而已也葢姙婦有疾不可不投藥也必在醫者審度疾勢輕重量度藥性髙下處以中庸不必多品視其疾勢已衰藥宜便止則病去母安子亦無損復何懼於攻治哉受形篇第三男女之合二精交暢隂血先至陽精後衝血開褁精精入為骨而男形成矣陽精先入隂血後参精開褁血血入居本而女形成矣陽氣聚面故男子面重溺死者必伏隂氣聚背故女子背重溺死者必仰走獸溺死仰伏皆然隂陽均至非男非女之身精血散分駢胎品胎之兆父少母老産女必羸母壮父衰生男必弱古之良工首察乎此氣受偏瘁與之補之補羸女則養血壮脾補弱男則壮脾節色羸女宜及時而嫁弱男宜待壮而婚此疾外所務之本不可不察也論胎教第四馬益卿先生論曰胎教産圖之書不可謂之迂而不加信然亦不可狎泥之方今俚俗之家與不正之屬將息避忌略不如儀或藥毒不侑或産於風露既無産厄子母均安固有之如不利嗣續或驕倨太甚却動必成咎雖隣家有所興修亦且犯其胎氣令兒破形殞命如刀犯者形必傷泥犯者竅必闕氣薄而生者也唯能順時數謹人事勿動而傷則生育之道得矣自一月積之至於十月所謂時數也保衞輔翼有其道防閑忌慎適其宜所謂人事也觀四序之運生長收藏貸出萬物有儀則咸備而天地之氣未始或虧者葢隂陽相養以相濟也隂陽離合論曰天覆地載萬物方生陽予之正隂為之主故生因春長因夏收因秋藏因冬失常則天地四塞荘子天地篇曰留動而生物物生成理謂之形形體保神各有儀則謂之性昧者曾不知此乃欲拂自然之理謬為求息之術方且推生死於五行蘄補養於藥石以偽勝真以人助天雖或有子孕而不育育而不夀者衆矣昔人論年老有子者男不過盡八八女不過盡七七則知氣血在人固自有量夫豈能逃隂陽之至數哉大真論帝曰有其年已老而有子者何也岐伯曰此其夭夀過度氣脉常通而腎氣有餘也此雖有子男不過盡八八女不過盡七七而天地之精氣皆竭矣註雖老而生子子夀亦不能過天癸之數凝形殊禀章第六天地者形之大也隂陽者氣之大也惟形與氣相資而立未始偏廢荘子則陽篇太公調曰天地者形之大者也隂陽者氣之大者也道者為之公氣以形載形以氣充推氣與形兩者相待故曰相資而立未始偏廢男女構精萬物化生天地隂陽之形氣寓焉係辭曰天地絪緼萬物化醇男女構精萬物化生語七八之數七少陽也八少隂也相感而流通故女子二七天癸至男子二八天癸至則以隂陽交合而兆始故也岐伯曰女子二七而天癸至任脉通衝脉盛月事以時下故有子丈夫二八腎氣盛天癸至精氣溢㵼隂陽和故能冇子傳曰女子十四有為人母之道四十九絶生育之理男子十六有為人父之道六十四絶陽化之理語九十之數九老陽也十老隂也相包而賦形故隂窮於十男能圍之陽窮於九女能方之則以隂陽相生而成終故也字説隂窮於十圍之者男陽窮於九方之者女九有變也女方之不足十無變也男足以圍之解曰男有家所以圍隂於外女有室所以方陽於内易曰婦人正吉􅀙一而終也夫子制義從婦凶也圍圓也君道也夫道也圓則可以制義而行匚方也臣道也婦道也方則從一而已男從圍與規從夫同意女從匚與臣從匚同意元氣孕毓皆始於子自子推之男左旋積嵗三十而至己女右旋積嵗二十而至己巳為正陽隂實從之自己懐姙男左旋十月而生於寅女右旋十月而生於申申為三隂寅為三陽而生育之時著矣其禀賦也體有剛柔脉有强弱氣有多寡血有盛衰皆一定而不易也十九難曰男生於寅寅為木陽也女子生於申申為金隂也楊氏注云元氣起於子人之所生也男從子左行三十女從子右行二十俱至於已為夫婦懐姙也古者男子三十女年二十然後行嫁娶法於此也十月而生男從已左行至寅為十月故男行年起於丙寅女從已右行至申為十月故女行年起於壬申以至分野異域則所産有多寡之宜吉事有祥則所夢各應其類是故荆揚薄壤多女雍冀厚壤多男熊羆為男子之祥蛇虺為女子之祥是皆理之可推也周官職方氏揚州其民二男五女荆州其民一男二女雍州其民三男二女冀州其民五男三女詩斯千篇名吉夢維何維熊維羆維虺維蛇大人占之維熊維羆男子之祥維虺維蛇女子之祥胎化之法有所謂轉女為男者亦皆理之自然如食牡雞取陽精之全於天産者帶雄黄取陽精之全於地産者千金方轉女為男丹參丸用東門上雄雞頭又方取雄黄一兩縫嚢盛帶之本草丹雄雞補虛溫中通神殺毒其肝補腎其冠血益陽雄黄人佩之鬼神不能近毒物不能傷操弓矢藉斧斤取剛物之見於人事者氣類潜通造化宻移必於三月兆形之先蓋方儀則未具陽可以勝隂變女為男理固然也巢氏論云姙娠三月始胎形像始化未有定儀見物而變欲得男者操弓矢射雄雞氣質生成章第七具天地之性集萬物之靈隂陽平均氣質員備咸其自爾然而奇耦異數有衍有耗剛柔異用或强或羸血榮氣衝不能逃於消息盈虛之理則禀貸之初詎可一槩論是以附贅垂疣駢拇枝指侏儒跛蹩形氣所賦有如此者瘡瘍癰腫聾盲瘖啞瘦瘠疲瘵氣形之病有如此者然則胚胎造化之始精移氣變之後保衛輔翼固有道矣孝經云天地之性人為貴書泰誓曰惟人萬物之靈天有五氣各有所凑地有五味各有所入所凑有節適所入有度量凡所畏忌悉知戒慎資物為養者理固然也寝興以時出處以節六節藏象論曰天食人以五氣地食人以五味王氷云天以五氣食人者臊氣凑肝焦氣凑心香氣凑脾腥氣凑肺腐氣凑腎地以五味食人者酸味入肝苦味入心甘味入脾辛味入肺鹹味入腎也可以髙明可以周宻使霧露風邪不得投間而入因時為養者理宜然也以至調喜怒寡嗜慾禮記月令仲夏之月可以居髙明可以處臺榭脉要精微論云冬日在骨蟄虫周宻君子屋室夏則順陽在上故可以髙明冬則順陽氣之伏藏故可以周宻作勞不妄而氣血從之皆所以保攝姙娠使諸邪不得干馬天真論岐伯曰上古之人其知道者不妄作勞故能形與神俱而盡終其天年通天論曰聖人陳隂陽筋脉和同骨髄堅固氣血皆從茍為不然方授受之時一失調養則内不足以為中之守外不足以為身之强氣形弗充而疾疢因之脉要曰五臟者中之守也得守者生失守者死又曰夫五臟者身之强也得强則生失强則死若食兎脣缺食犬無聲食雜魚而瘡癬之屬皆以食物不戒之過也孫思邈養胎法云姙娠食兎肉令子缺唇食犬肉令子無音聲食乾鯉魚令子多瘡又異法方宜論云者使人熱中注云魚發瘡心氣大驚而癲疾奇病論帝曰人生而病癲疾者何岐伯曰名為胎病此得之在腹中時其母有所大驚氣上不下精氣并居故令子發為癲疾也腎氣不足而解顱巢氏云解顱者其状小兒年大􅇟應合而不合頭縫開解是也腎氣不成故也腎主骨髓而腦為髓海腎氣不成則腦髓不足不能結成故頭顱開解脾胃不和而羸瘦巢氏云夫羸瘦不生肌膚皆為脾胃不和不能飲食故血氣衰弱不能榮於肌膚凡小兒在胎而遇寒冷或生而挾伏熱皆令兒不能食故羸瘦也心氣虚乏而神不足之屬皆以氣血不調之故也誠能食飲知所戒推而逹之五味無所傷誠能於氣血知所闕婦人大全良方卷十
