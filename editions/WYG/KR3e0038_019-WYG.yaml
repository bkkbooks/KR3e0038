body:
  text: 婦人大全良方卷十五宋陳自明撰姙娠泄瀉方論第一凡三方論曰凡姙娠泄瀉冷熱不同水㵼青白或黄白或水榖不化腹痛腸鳴其脉弱而緊此内傷冷也謂之洞泄寒中若泄注如水深黄色及有完榖小便赤腹脇脹滿煩躁喜飲時時嘔逆或下利清水或小便不利得熱則極脉虚大而數由乗虚熱入於胃湊滲下焦津液不分併於大腸謂之協熱利先以五苓散利小便次以黄連阿膠元或三黄熟艾湯凡泄㵼色黄而有沫腸鳴腹脹滿微痛其脉沉緊而小數謂之冷熱不調冝戊巳元和之凡暴下或青或白水榖或化或不化腹脇或脹或不脹或痛或不痛但餲生熟氣全不思食其脉内虚外實右闗脉沉緊者謂之飱泄先去沉積冝感應元後調和之凡治㵼先須理中焦如理中湯元是也次即分利水榖如五苓散是也治中不效然後斷下即用禹餘粮赤石脂是也亦可就第八卷第八論選方通用厚朴元治姙娠洞泄寒中乾薑厚朴去粗皮細剉右等分先杵令爛水拌同炒令乾再為末水煑麫糊為圓如梧桐子大每服五十圎食前米飲下草菓散治姙娠藏氣本虛宿挾風冷脾胃久弱藏府虚滑臍腹㽲痛日夜無度厚朴去粗皮薑汁浸炒黄二両肉豆􅅳一箇麫煨草豆􅅳一箇煨右㕮咀每服三錢水一琖薑三片煎至七分去滓熱服三黄熟艾湯方見第八卷第十論理中元理中湯五苓散黄連阿膠元戊巳元感應元已上並見和劑局方姙娠下痢赤白及黄水方論第二凡十五方論曰夫姙娠之人胞血既閉臟氣不理脾胃易傷或恣食腥肥生冷脾胃停滯不能尅化冷熱相摶致令心腹攪刺疼痛膿血赤白雜下古書所謂滯下是也原疾之由皆因冷熱不調大腸虚冷熱氣客於膓間熱氣乗之則赤冷氣乗之則白冷熱相交則赤白相雜而運滯水止名為滯痢也其狀白膿如涕而有血雜亦有血少者如白膿涕而有赤脉如魚腦此名魚腦痢又有血痢者熱乗血入於大腸為血痢也血之隨氣外行經絡内通臟腑常無滯積若觸冐勞動生熱熱乗血散滲入大腸腸虚相化故成血痢也療姙娠患痢膿血狀如魚腦髓小腹絞痛難忍阿膠炙二兩地榆酸石榴皮三兩薤白切一升黄連一方是黄蘖皮各三兩並細切右用水七升煎取二升温分三服忌生冷肥膩療姙娠白膿痢腹中冷乾薑四兩赤石脂六兩粳米一升炒黄右用水七升煎取二升温分三服忌如前療姙娠腹痛下痢赤白不可忍黄連一方是白术石榴皮當歸各三兩阿膠炙二兩熟艾一兩半右用水六升煑取二升温分三服忌如前療姙娠腹痛下痢膿血不止黄連八分厚朴製阿膠炙當歸各六分艾葉黄蘖各四分乾薑五分右為細末空心米飲調下方寸匕日三服療姙娠臍下刺痛大便白晝夜三五十行根黄厚者蜜煑令焦大蒜煨令熟爛去皮右以根黄為末研蒜作膏為元如梧桐子大空心粥飲下三十元日三服妙一方不用根黄用當歸以芍藥煎湯吞下療姙娠痢黄水不絶厚朴薑汁炙三兩黄連二兩肉豆􅅳五箇連皮右用水二升煑取一升頓服忌如前已上六方並出産寳文仲療姙娠下痢不止方黄蘗乾薑赤石脂各二兩酸石榴皮一枚右細切以水八升煑取二升分三服古今録驗療姙娠下痢方酸榴皮黄芩人參櫸皮各四兩粳米三合右細切以水七升煑取二升分三服療姙娠挾熱下痢冷熱不調千金翼同黄連一升黄蘖一升梔子仁二十枚右為末每服五錢水二琖浸三時久煑十沸頓服嘔者加橘皮一兩生薑二兩亦治丈夫常痢一方治中暑挾熱下痢無梔子仁用薑錢羊脂煎服肘後方療姙娠下痢赤白如魚腦腹中絞痛阿膠炒黄蘗地榆當歸各一兩川芎酸榴皮各三分右為細末葱白粥飲調二錢療姙娠下痢腹痛不食薤白切一合當歸炒地榆各一兩甘草半兩糯米一合右為散以水七升煑取二升去滓温分三服療姙娠下痢腹痛小便澁糯米一合當歸炒黄耆各一兩右細切和停以水二琖煑取一琖二分去滓温分四服治姙娠臨産下痢右梔子不以多少燒存性為細末每服一大錢空心熟水調服甚者連進四五服即止治姙娠藏府氣素弱頻併下利時時腹痛漸覺羸瘦面色痿黄不美飲食厚朴一兩半白术川芎白芍藥當歸炒熟地黄各一兩乾薑人參各五錢訶子三分甘草一分右㕮咀每服四錢水一琖棗三枚煎至六分温服療姙娠下痢赤白絞刺疼痛出三因方烏雞子一枚就頭上開一宂傾去清只留黄黄丹一錢入雞子殻内打令均以厚紙褁黄泥固濟煨取乾為細末右每服二錢米飲調下一服愈者是男兩服愈者是女姙娠大小便不通方論第三凡十方論曰夫姙娠大小便不通者由藏府氣實而生於熱熱者隨停之處則成病也若熱結於大腸則大便不通結於小腸則小便不通若大小腸俱為熱所結故煩滿而大小便皆不通也小品療姙娠子淋大小便並不利氣急已服猪苓散不差宜服甘遂散下之太山赤皮甘遂二兩右一味為末以白蜜二合和服如大豆粒多覺心下煩得微下者日一服下之後還將猪苓散不得下日兩服漸加至五分以微利為度經心録同猪苓散療姙娠小便澁痛兼療胎水猪苓五兩去皮右為末白湯調方寸匕加至二匕日三夜二不差宜轉下之服前藥古今録驗療姙娠得病六七日以上身熱入藏大小便不利安胎除熱葵子湯葵子二升滑石四兩碎右以水五升煑取一升去滓盡服須㬰當下便愈又方葵子一合川朴硝二兩右研每服三錢水一琖煎至六分去滓温服治姙娠大小便不通心腹脹滿妨悶不欲飲食手足煩熱㯽榔赤茯苓大腹皮木通郁李仁去皮尖北五味各一兩桑寄生甘草苦梗各半兩右為粗末每服三錢水一琖煎至六分温服治姙娠大小便不通熱閉心膈腹脇妨悶妨害飲食大黄木通㯽榔各一兩枳殻三分大腹子三枚訶梨勒四箇去核半生半煨右為末以童便一琖葱白二寸同煎至六分調下二錢當歸散治胎前諸疾或因怒中氣充子藏或充脬脉腹急肚脹腰腹時疼不思飲食四肢浮腫氣急時喘大便忽難小便忽澁産門忽腫當歸一兩赤茯苓枳殻白芍藥川芎各二兩川白薑炮木香炮粉草各五錢右㕮咀每服三大錢水一琖半薑三片煎至八分去滓無時温服如禀受氣弱及南人枳殻减半如氣實及北人於内加分兩服之或連日大便祕澁加蜜同煎初虞世治姙娠大便祕澁方枳殻三兩防風二兩甘草炙一兩右為細末沸湯㸃服一二錢空心日三又治虚羸大便祕方枳殻製阿膠炒等分右為細末煉蜜和劑杵二三千下元如梧子大别研滑石末為衣温水下二十元半日來未通再服三十元止於五十元又方車前子一兩大黄五錢炒右為細末每服三錢空心蜜湯調下姙娠小便不通方論第四凡八方論曰夫姙娠小便不通者由小腸有熱熱入於脬内熱結甚者故令小便不通也若小便不通則心脇小腹氣澁而喘急也陳無擇云凡姙娠胎滿逼脬多致小便不利者或心腎氣不足不能使脬冷清濁相干為諸淋病或胞系了戾小便不通名曰轉胞又胎滿尿出不知時名曰遺尿治之各有方古今録驗療姙娠卒不得小便杏仁二十箇去皮尖熬令變色右一味搗元如大豆燈心煎湯吞七粒立得利又方以滑石末水和泥臍下又方用車前草汁調滑石末塗臍四畔方四寸熱即易之治姙娠卒然小便不利方滑石末杏仁等分右先搗杏仁令爛次入滑石末以軟飯搗和為元如小豆大每服二十元白湯送下治姙娠小便不通臍下妨悶心神煩亂葵子研榆白皮切各一兩葱白七莖右以水二大琖煎取一琖三分去滓分三服又方用紫苑去苖為末井花水調下二錢一方用紫草苦參元治姙娠小便難飲食如故當歸貝母去心炒苦參各三兩滑石半兩右為末蜜元如小豆大以米飲下二十元不拘時葵子散治姙娠小便不利身重惡寒起則眩暈及水腫者王子亨云姙娠小便不通特避寒藥又名茯苓湯千金翼要同葵子五兩赤茯苓三兩右二味為末每服二錢米飲調下小水利即愈一方無茯苓有榆白皮一兩八味元治婦人病飲食如故煩熱不得卧而反倚息以脬系了戾不得溺故致此病名轉脬但利小便則愈以此藥有茯苓故也此藥雖局中有賣除非自合方有効熟地黄八兩山藥山茱茰去核各四兩附子炮桂心各二兩牡丹皮去心茯苓去皮澤㵼各三兩右為末蜜元如梧子大每服三十元空心温酒下姙娠子淋方論第五凡五方論曰夫淋者由腎虚膀胱熱也腎虚不能制水則小便數也膀胱熱則小便行澁而數不宣姙娠之人胞繫於腎腎間虚熱而成淋疾甚者心煩悶亂故謂之子淋也小品療姙娠患子淋宜下地膚大黄湯川大黄地膚草各三兩知母黄芩猪苓赤芍藥通草川升麻枳實甘草各二兩右㕮咀每服四錢水一琖煎至七分去滓温服經心録療姙娠患子淋小便數出少或熱疼痛及足煩地膚草三兩右細切水四升煑取二升半去滓分三服日三服文仲小品同療姙娠患淋小便澁不利小腹水道熱痛冬葵子一升芍藥二兩黄芩赤茯苓車前子各三兩右㕮咀以水七升煎至二升温分三服療姙娠數月小便淋瀝疼痛心煩悶亂不思食瞿麥穗赤茯苓桑白皮木通葵子各一兩黄芩芍藥枳殻車前子各五錢右為粗末每服四錢水一琖煎至六分温服療姙娠子淋小便澁痛冬葵子滑石木通各等分右為末每服四錢水一琖葱白七寸煎至六分去滓服猪苓散療姙娠子淋小便澁痛子母祕録療姙娠胎水方見本卷第三論姙娠遺尿方論第六凡三方療姙娠尿不知出時胎滿故也宜服白薇散白薇芍藥各一兩右為細末温酒調二錢又方白礬牡蠣等分右為細末温酒調二錢亦可治男子又方用鷄毛灰末之酒調方寸匕亦見第八卷第四論姙娠尿血方論第七凡五方論姙娠尿血者由勞傷經絡有熱在内熱乗於血血得熱則流溢滲入脬故令尿血也千金療姙娠卒下血及子淋方三方並出外臺葵子一升研右以水五升煑取二升分温三服又方生艾葉一斤研冬用莖乾者亦得右以酒五升煑二升分三服又方生地黄一升切右以酒四升煑取二升温分三服亦療落身後血續斷湯治姙娠下血及尿血當歸生地黄各一兩續斷五錢赤芍藥一分右為末空心葱白煎湯調下二錢療姙娠尿血阿膠熟地黄右各等分為細末空心粥飲調二錢姙娠胎水腫滿方論第八凡十一方産寳論曰夫姙娠腫滿由藏氣本弱因産重虚土不尅水血散入四肢遂致腹脹手足面目皆浮腫小便祕澁陳無擇云凡婦人宿有風寒冷濕姙娠喜脚腫俗呼為皺脚亦有通身腫滿心腹急脹名曰胎水論曰凡姙娠之人無使氣極若心靜氣和則胎氣安穏若中風寒邪氣及有所觸犯則隨邪而生病也凡姙娠經血壅閉以養胎若忽然虚腫乃胎中挾水水血相摶脾胃惡濕主身之肌肉濕漬氣弱則肌肉虚水氣流溢故令身腫滿也然其由有自或因泄㵼下痢藏府虚滑耗損脾胃或因寒熱瘧疾煩渇引飲太過濕漬脾胃皆能使頭面或手足浮腫也然水漬於胞兒未成形則胎多損壊及其臨産日脚微腫乃胞藏水少血多水出於外故現微腫則易生也宿有寒氣因寒冷所觸故能令腹脹腫滿也産乳集養子論姙娠自三月成胎之後兩足自脚面漸腫腿膝以來行歩艱辛以至喘悶飲食不美似水氣狀至於脚指間有黄水出者謂之子氣直至分娩方消此由婦人素有風氣或衝任經有血風未可妄投湯藥亦恐大段甚者慮將産之際費力有不測之憂故不可不治於未産之前也古方論中少有言者按名醫録云宋少主元徽與徐文伯微行學鍼法文伯見一娠婦足腫不能行少主脉之此女形也文伯診之曰此男胎也在左則胎黑色少主怒欲破之文伯惻然曰臣請鍼之胎遂墮男形而色黒此姙娠足腫之説見於古者今巢氏病源中但有子煩之論千金并産寳方亦畧言之劉禹錫續傳廣信方以謂姙婦有水氣而成胎太平聖恵亦言之皆非也元豐中淮南陳景初名醫也獨有方論治此病方名初謂之香附散李伯時易名曰天仙藤散也天仙藤散方天仙藤洗畧炒香附子炒陳皮甘草烏藥不須要天台者但得軟白香而辣者良右等分净秤為細末每服三錢水一大琖薑三片木𤓰三片紫蘇三葉同煎至七分放温澄清空心食前服日三服小便利氣脉通體輕腫漸消更不須多服元豐末王荆公居金陵舉家病以詩贈景初曰舉族貧兼病煩君藥石功到家何所寄一一問征鴻因此見方得於李伯時家傳方録于臨川張右丞宅産寳療姙娠身腫有水氣心腹脹滿小便少茯苓四兩杏仁㯽榔各三兩旋覆花郁李仁各一兩右為粗末以水六升煑取二升去滓分温三服小便通即差崔氏療姙娠體腫有水氣心腹急滿茯苓白术各四兩旋覆花二兩杏仁黄芩各三兩右細切以水七升煑取二升半分温三服忌桃李雀肉鮓物千金救急古今録驗集驗同療姙娠遍身洪腫葶藶子一錢白术二錢茯苓二兩桑白皮二兩郁李仁八分右為粗末以水六升煑取二升分温三服小便利即差又方澤㵼葶藶各三兩茯苓枳殻白术各六兩右細切以水六升煑取二升分温兩服小便利即差澤㵼散治姙娠氣壅身體腹脇浮腫喘急大便不通小便赤澁澤㵼桑白皮木通枳殻㯽榔赤茯苓等分右㕮咀每服四錢水一琖薑四片煎至六分去滓食前温服防已湯治姙娠脾虛通身浮腫心腹脹滿喘促小便不利防己三分桑白皮紫蘇莖葉赤茯苓各一兩木香一分右為粗末每服四錢水一琖薑四片煎至七分去滓食前温服千金鯉魚湯治姙娠腹大胎間有水氣白术五兩茯苓四兩當歸芍藥各三兩右細剉以鯉魚一頭修事如食法煑取汁去魚不用每服四錢入魚汁一琖半薑七片橘皮少許煎至七分去滓空心服集驗同商陸赤小豆湯治姙娠手足腫滿攣急赤小豆商陸等分右㕮咀每服一兩用水一碗煎至七分澄清汁服集驗千金方有澤漆産寳方無澤漆有桑白皮腎著湯治姙娠腰脚腫茯苓白术各四兩乾薑甘草各二兩杏仁三兩右㕮咀每服四錢水一琖半煎至七分食前服指迷方治胎水五皮散尋常脾虚腫滿亦治大腹皮桑白皮生薑皮茯苓皮橘皮各等分右㕮咀每服半兩水二琖濃磨木香水一呷同煎至八分去滓空心温服亦治男子脾虚腫滿一方無桑白皮有白术倍之名白术散姙娠腹内鍾鳴方第九凡一方治孕婦腹内鍾鳴用鼠窟前後土為細末研麝香酒調下二錢其産立愈龔彦徳孕癰方第十凡一方治孕癰方立効烏藥研出洪州軟白香辣者良右用水一琖牛皮膠一片同煎至七分温服姙娠不語論第十一無方孕婦不語非病也間有如此者不須服藥臨産月但服保生元四物湯之類産下便語得亦自然之理非藥之功也醫家不説與人臨月則與尋常之藥産後能語則以為醫之功豈其功也哉黄帝問曰人有重身九月而瘖此為何也岐伯對曰胞之絡脉絶也帝曰何以言之岐伯曰胞絡者繫於腎少隂之脉貫腎繫舌本故不能言帝曰治之奈何岐伯曰無治也當十月復姙娠傷食方論第十二凡二方經云飲食自倍腸胃乃傷又云隂之所生本在五味隂之五宫傷在五味若姙子飲食不節生冷毒物恣性食噉致傷脾胃故姙娠傷食最難得藥唯此二方最穏捷木香元治婦人有孕傷食木香二錢三稜人參白茯苓各三錢右為細末麫糊元如緑豆大熟水吞三四十元白术散治姙娠氣不調和飲食易傷白术炒乾紫蘇各一兩人參白芷各三分炒川芎訶子皮青皮各五錢甘草一分右為末每服二錢水一琖薑三片煎至七分温服愚詳小七香元見局方保氣散見十六卷第三論豈無良効姙娠臟燥悲傷方論第十三凡一方許學士云鄉里有一婦人數欠無故悲泣不止或謂之有祟析禳請禱備至終不應予忽憶有一證云婦人臟燥悲傷欲哭象如神靈數欠者大棗湯予急令治藥盡劑而愈古人識病製方種種妙絶如此試而後知大棗湯治婦人臟燥悲傷欲哭象若神靈數欠者皆主之甘草三兩小麥一升大棗十枚右㕮咀以水六升煑取三升去滓分温三服亦補脾氣專治婦人方名甘草湯鄉先生程虎卿内人黄氏姙娠四五箇月遇晝則慘慼悲傷涙下數欠如有所慿醫與巫者兼治皆無益僕年十四正在齋中習業見説此證而程省元皇皇無計僕遂告之管先生伯同説記憶先人曽説此一證名曰藏燥悲傷非大棗湯不愈虎卿借方看之甚喜對證笑而治藥一投而愈矣婦人大全良方卷十五
