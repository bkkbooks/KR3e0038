body:
  text: 婦人大全良方卷五宋陳自明撰勞瘵叙論第一凡二十一方夫骨蒸殗殜復連尸疰勞疰䖝疰毒疰熱疰冷疰食疰鬼疰等皆曰傳尸以疰者注也病自上注下與前人相似故曰疰其變有二十二種或三十六種或九十九種大畧令人寒熱盗汗夢與鬼交遺泄白濁髪乾而聳或腹中有塊或腦後兩邉有小結核連復數箇或聚或散沉沉黙黙咳嗽痰涎或咯膿血如肺痿肺癰狀或復下利羸痩困乏不自勝持積月累年以致於死死後乃疰易傍人乃至㓕門者是也更有蜚尸遁尸寒尸䘮尸尸注等謂之五尸及大小附着等證不的知其所苦無處不惡乃挾諸鬼邪而害人以三因攷之内非七情所忤外非四氣所襲雖若麗乎不内外因奈其證多端傳變遷移難以推測故自古及令愈此病者十不得一所謂狸骨獺肝天靈盖銅鑑鼻徒有其説未嘗見效唯膏肓俞崔氏穴名四花有六穴若聞早灸之可否㡬半晚亦不濟也病者増寒發熱自汗面白目乾口苦精神不守恐畏不能獨卧其傳在肝病者増寒發熱面黒鼻燥忽忽喜忘大便苦難或復泄㵼口瘡其傳在心病者増寒發熱面青唇黄舌本强不能嚥飲食無味四肢羸痩吐涎沫其傳在脾病者増寒發熱面赤鼻白乾燥毛折咯嗽喘急時吐白涎或有血線其傳在肺病者増寒發熱面黄耳輪焦枯胻骨㾓痛小便白濁遺瀝胸痛其傳在腎二十四種蒸病論所謂勞蒸者二十四種隨證皆可考尋毛折髪焦肌膚甲錯其蒸在皮外人覺熱自反惡寒身振瞤劇其蒸在内髪焦鼻衂或復尿血其蒸在血身熱煩躁痛如針刺其蒸在脉爪甲焦枯眼昏兩脇急痛其蒸在筋版齒黒燥大杼酸痛其蒸在骨背膂疼痛胻骨酸􅤙其蒸在髓頭眩熱悶口吐濁涎眼多眵淚其蒸在腦男子失精女子白淫其蒸在玉房乍寒乍熱中脘與膻中煩悶其蒸在三焦小便赤黄凝濁如膏其蒸在膀胱傳道不均或祕或泄腹中雷鳴其蒸在小腸大腹隱痛右鼻乾疼其蒸在大腸口鼻乾燥腹脹睡卧不安白汗出其蒸在胃口苦耳聾脇下痛其蒸在膽裏急後重肛門澁祕其蒸在回腸小腹㽲痛筋脉縱緩隂噐自强其蒸在宗筋眼昏淚下時復眩暈躁怒不常其蒸在肝舌焦黒氣短煩悶洒洒浙浙其蒸在心唇乾口瘡胷腹脹悶畏寒不食其蒸在脾咳嗽喘滿咯痰吐血聲嘶音逺其蒸在肺耳輪焦枯脚氣酸疼起居不得其蒸在腎情想不寧無故泄精白物綿綿而下其蒸在右腎心主胞絡心膈噎塞攻擊疼痛俛仰煩寃其蒸在鬲諸證雖曰不同其根多有䖝囓其心肺治之不可不絶其根也神仙秘法取傳尸勞䖝服此藥須先擇良日焚香禱祝令病人設榻面向福德方服即有神效不可使病人知其藥味及子細青桑皮楊栁枝梅枝桃枝已上要取東引者各七莖葱白七莖青蒿一握如無以子代真安息香一分研去石阿魏一分右八味除阿魏外用童子小便一升半煑取藥耗及一半去滓將藥汁化阿魏再煑十數沸去滓候温作貳次調下件藥末朱砂半兩小㯽榔半兩麝香半分右三味研令極細分為二服用前湯使調下五更初一服三㸃再一服辰時間取下䖝遂絶根本若見䖝色白者此病必差若黒色則已傳入腎經不可救也服藥後只以淡粥補之並不動元氣効驗無比切須祕之世傳勞䖝有靈輕易傳之則傷醫者此説殆醫者祕惜其方不可以授人耳要須宻重之則無洩慢天機乃起死還生功同造化鬼神䕶助自有靈效大凢傳屍勞者必須先服此一藥後十五方隨證治不可以槩用藥調治三五箇月再服此取䖝藥則永除根本如取下䖝色已黒縱服後藥亦無補也然亦能使不傳它人治心胷積氣作胷痺引兩脇痛昏悶不収音聲不清虚熱上壅作鼻衂方桑白皮三分枳殻木通子芩生乾地黄白芍藥甘草各半兩右為粗末每服三錢重水琖半煎至七分去滓温服食後治伏瘀血在心肺時作衂心胷徹背痛方白芍藥牡丹皮各一兩生犀屑半兩生地黄三兩别槌碎入右㕮咀每服半兩水一大琖煎至七分去滓温服調榮衞消瘀血出聲音治痰嗽方川當歸牡丹皮白芍藥子芩木通麥門冬甘草華隂細辛各半兩生乾地黄一兩右㕮咀每服三錢水一琖薑三片煎至七分去滓温服治虚熱昏冐倦怠下虚上壅嗽血衂血雞蘇圓雞蘓葉半斤黄耆半兩甘草川芎各一分防風一兩苦梗半兩荆芥穗一兩甘菊花一分真腦子半錢重生乾地黄半兩右為細末煉蜜圎如彈子大每服一圓用麥門冬去心煎湯嚼下又治肺損吐血日漸乏力痩弱行歩不得喘嗽痰涎飲食不美或發寒熱小便赤澁加車前子一分每服一圓煎桑枝湯嚼下日可六七服桑枝剉炒香每用水三琖煎至一琖去滓下藥治勞氣食後身疼倦夜間盗汗此病因失血榮衞損也宜防風湯方黄耆一兩白芍藥防風各三分甘草半兩當歸生乾地黄各三分右㕮咀每服三錢水一琖薑三片棗一箇煎至七分去滓温服食前服治勞嗽温金散甘草黄芩桑白皮防風各一兩杏仁二十七粒製人參去蘆茯神各半兩麥門冬一分以前五味用米泔浸一宿曬乾次入人參茯神麥門冬三味同為細末每服二錢水一琖蠟一豆大煎至八分食後温服治勞嗽有四滿員極妙方見勞嗽門治心氣不足觧勞倦益血桔梗飲子苦梗甘草黄耆人參去蘆麥門冬各一兩青皮半兩右為末每服二錢水一琖煎至七分温服治胷痺𤓰樓湯枳殻四箇厚朴薤白各一兩𤓰樓一箇桂枝一兩有熱除此一味右㕮咀水七升煎取四升去滓温服涼心肺觧勞除熱使榮衛順血不絶子芩散黄耆一兩白芍藥子芩人參白茯苓麥門冬苦梗生乾地黄各半兩右為粗末先用竹葉一握小麥七十粒水三琖薑三片煎至水一琖半入藥末三錢重煎至七分去滓温服治積氣堅硬作氣噎胷脅引背痛方白芍藥一兩半鱉甲醋炙枳殻去穰麩炒北柴胡各一兩甘草赤茯苓各半兩右㕮咀每服三錢水一大盞薑三片􅀥一箇煎至七分去滓温服治伏連傳注腹中有堅硬積氣壅心胷作痺痛引脇背痛脘膈滿悶方鬼臼天門冬去心各三分巴豆一分去皮心炒莽草不蛀皂角酥炙各半兩葉子雄黄一兩右為細末煉蜜為圎如小豆大每服一圎漸加至三二圎空心湯水吞下臨卧一服常宜斟酌勿令泄㵼忌鯉魚山猪蘆笋出聲音方訶子炮去核木通各一兩甘草半兩右㕮咀用水三升煎至升半入生地黄汁一合再煎數沸放温分六服食後日作半料治咽喉痛方百藥煎去黒皮鵬砂甘草生白礬等分右四味為細末每服一錢食後米飲調細細呷嚥治肺間邪氣胷中積血作痛失音含化圎方蛤蚧一䨇去口足炙訶子去核阿膠粉炒麥門冬去心北細辛甘草生乾地黄各半兩右為細末煉蜜為圎如雞頭子大食後含化一圎已上諸方辰州李倅名景遹録示云傳之於五羊大帥方侍郎上務下徳治瘵疾得效方河車圎治勞𠻳一切勞瘵虚損骨蒸等疾河車一枚初生男子者􅀹良於長流水中蕩洗盡血净入鍋内煑熟以手擘成小片焙乾須在一日内便碾成末纔經宿即不乾碾不成末矣按本草云人肉治瘵病胞衣飄生者尤佳主血氣羸痩婦人勞損面䵟皮黒腹内諸疾漸漸痩悴者以五味和之如䭔􅀈法與服之勿令病者知亦治天行熱癘立效胞衣埋地中七八年化成水澄清如真水南方之人以甘草升麻和諸藥罐盛埋之三五年揆之此為藥服雪白茯苓半兩揀參一兩乾山藥二兩右為細末麫糊為圎如梧桐子大以少麝香末為衣每服三五十圎米飲温酒鹽湯送下空心服嗽甚者五味子湯下又方治肌痩咯血肺痿等疾蛤蚧一䨇全者酒浸一宿酥炙知母貝母去心人參去蘆甘草杏仁去皮尖麩炒枇杷葉去毛炒鹿角膠粉炒右各一兩依方事治净秤為末每服三錢水一琖入桑白皮煎至八分温服日三夜二治勞嗽補肺湯桑白皮熟地黄各二兩人參去蘆紫苑黄耆川五味子各一兩右為細末每服二錢水一琖煎至七分入蜜少許食後温服又四君子湯加秦芁黄蠟煎服尤妙辰陽李倅云已上藥方乃趙世則傚之次子公璵並服此乃安傳之仲弟屢救人甚驗服藥止可食淡煑猪蹄肉仍須先煑熟肉去元汁再以白湯熟煑仍忌房勞一切生冷魚腥鹹毒醃藏等物無不痊愈修合藥及煎藥時忌生人孝子婦人雞犬猫畜見仍勿令病人知用藥味大有功效治傳尸出汗取䖝辟邪養正膏鼈甲一兩醋炙青蒿一握淡䜴三七粒葱白兩莖安息香一分研桃栁桑枝各七莖桃仁四十九箇去皮尖䨇仁天靈盖用七頭大一片酥炙右十味隔夜以水一升浸至五更煎至半升再以童便半升同煎取四合又用㯽榔一箇為末麝香一錢匕將所煎藥去滓調下至日髙二丈時放温頓服以衣覆出汗審看十指汗出如藕絲五色臭穢汗出後仍㵼下䖝狀惡物盡甚者旬日再服永效猪肚元治骨蒸勞唇頰赤氣粗口乾遍身壯熱或多虚汗大腸澁祕小便赤黄飲食全少出博濟方青蒿鼈甲醋炙北柴胡木香生乾地黄各一兩青皮半兩宣黄連二兩右為末以猪肚一箇洗净入藥在内繫定蒸令極軟研如泥為圓如緑豆大湯下十五元空心日三服忌濕麫毒物婦人骨蒸勞方論第二凢十五方夫骨蒸勞者由熱毒氣附骨故謂之骨蒸也亦曰傳尸亦謂殗殜亦稱復連亦名無辜丈夫以痃癖為根女人以血氣為本無問少長多染此病内既傷於臓腑外則損於肌膚日乆不痊遂至羸痩因服冷藥過度則傷於脾脾氣既衰而傳五臓脾初受病或脹或妨遂加洩痢肌肉痩瘠轉増痿黄四肢無力飲食少味脾既受已次傳於腎腎既受病時時盗汗腰膝冷疼夣鬼交侵小便赤黄腎既受已次傳於心心既受病徃徃忪悸或喜或嗔兩頰常赤唇色如朱乍熱乍寒神氣不守心既受已次傳於肺肺既受病胷滿短氣咳嗽多唾皮膚甲錯狀如麩片肺既受已次傳於肝肝既受病兩目昏暗脇下妨痛不欲見人常懐忿怒五臓既病漸漸羸痩即難療也天靈盖散治婦人骨蒸勞四肢無力每至晚間即熱兩頰紅色食飲不下心神煩躁天靈盖酥炙安息香地骨皮當歸山梔子仁人參去蘆貝母去心黄連桃仁去皮尖䨇仁麩炒黄㯽榔各一兩鼈甲醋炙北柴胡生乾地黄赤茯苓麥門冬各一兩半阿魏右為粗末以童子小便一大琖桃栁枝各七寸薑五片葱白五寸藥四錢煎至七分去滓温服獺肝元治婦人骨蒸勞熱體痩煩疼不欲飲食獺肝一具鼈甲醋炙北柴胡各兩半朱砂桃仁去皮尖䨇仁麩炒黄川升麻天靈盖酥炙犀角屑梔子仁地骨皮知母各一兩黄耆三分甘草半兩麝香一分研右為細末煉蜜貟如梧桐子大温水下三十貟無時候黄耆元治婦人骨蒸煩熱四肢羸痩疼痛口乾心躁不得眠卧黄耆麥門冬去心茯神北柴胡甘草生乾地黄各一兩酸􅀥仁炒郁李仁杏仁去皮尖䨇仁麩炒黄枸杞子人參去蘆黄芩各三分百合枳殻去穰麩炒赤芍藥知母各半兩鼈甲二兩製右為細末煉蜜為貟如梧桐子大清粥吞下三十貟無時候煞鬼貟治婦人骨蒸傳尸勞痩鬼氣伏連已上出聖惠方麝香三分犀角屑木香白术各一兩鬼箭羽虎頭骨酥炙天靈盖酥炙辰砂桃仁去皮尖䨇仁麩炒黄雄黄各兩半右為細末煉􅁡為貟如梧桐子大温水下二十貟此藥亦辟瘟疫亦可帯之鼈甲煎治勞見專治婦人方雄鼈一个重一斤者杏仁去皮尖双仁炒北柴胡貝母去心知母各四兩右除鼈外諸藥細剉以好酒五升入鍋内將活鼈在中以藥和停圍定上用板子石壓定令鼈在藥内喫酒藥候来日却以慢火煮候酒盡為度却取鼈令患人喫盡次將鼈甲用醋炙黄入在前項諸藥内焙乾為細末用酒煮麫糊元如梧桐子大用米飲吞下三十元無時候日五服麥煎散治少男室女骨蒸婦人血風攻疰四肢心胷煩壅赤茯苓當歸乾漆生鼈甲醋炙常山大黄煨北柴胡白术生乾地黄石膏各一兩甘草半兩右為細末每服二錢水一琖小麥五十粒煎至六分食後臨卧時温服有虚汗加麻黄根一兩蘇東坡云此黄州呉判官方療骨蒸黄痩口臭肌熱盗汗極效麥煎散甚多此方呉君寳之如希世之珍其效可知筒骨煎治諸虚勞疾羸痩乏力腰背引痛心煩喘嗽唾膿嘔血頑涎壅盛睡卧有妨胷滿氣促夜多盗汗髪焦耳鳴皮寒骨熱一切五勞七傷骨蒸等候並皆療治許元林先生方地骨皮粉草北柴胡前胡烏藥麻黄不去節乾葛青蒿苦梗知母天仙藤北黄芩各一兩人參生乾地黄秦芁鼈甲黄耆各半兩右㕮咀每服三錢水一琖酒一分猪筒骨一莖炙焦分為四服桃栁枝各七寸杏仁五粒去皮尖槌碎煎至七分去滓温服加烏梅半箇尤妙一方加當歸白芍藥華佗方大靈治傳尸明月丹方雄黄木香各半兩天靈盖炙一兩輕粉一分鼈甲醋炙一兩兎屎二兩右為末用法酒一大升大黄半兩為末􅆈膏入前藥為元如彈子大朱砂為衣傳尸勞肌痩面黄嘔吐咳嗽不定先燒安息香令烟出吸之不嗽非傳尸也不可用此藥若烟入口咳不能禁止乃傳尸也宜用此藥五更初服勿令人知以童便共酒一琖化一元服如人行十里乆必吐出䖝狀如燈心細長及寸或如爛𤓰李又如蝦蟇狀各不同未效次日再服以應為度蘓沈良方治諸勞明月丹兎糞四十九枚碙砂如兎屎大四十九枚右細研生􅁡元如梧桐子大以甘草半兩碎之水浸一宿取汁五更初下七元勿令病人知勞藥下後頻看若有䖝急打殺以桑火油煎使焦棄急水中三日不下更服須在月望前日服忌見䘮服色衣婦人猫犬之類後服治勞補氣藥取差沈内翰云威愍孫元規藏此方數能活人江隂萬融病勞四體如焚垂困一夜夣人腹壅一月如大盤明爛不可正視逼人心骨皆寒已而悸寤俄頃扣闗乃威愍使人遺之藥服之遂差問其名則明月丹也始悟向之所夣大體此藥最治熱勞又云傷寒煩躁骨熱皆能治療一方有鵬砂等分觧勞生肌進食活血養心地黄煎元有人云甚妙華佗方生地黄汁杏仁汁生薑汁藕汁各五升薄荷汁鵝梨汁各一升法酒二升沙􅁡四升右慢火􅆈成膏入後藥北柴胡去蘆三兩木香人參茯苓山藥栢子仁去皮炒研逺志去心枳實去穣麩炒白术各一兩秦芁苦梗並去蘆各二兩麝香半兩研熟地黄洗焙酒蒸四兩右為末以前膏子和貟如梧桐子大食後甘草湯下二十元治骨蒸寒熱名醫録云睦州楊寺丞有女事鄭廸功女有骨蒸肉熱之病時發外寒寒過内熱附骨蒸盛之時四肢微痩足趺腫者其病在五臓六腑之中衆醫不瘥因遇處州呉醫看曰請為治之只單用石膏散服之體微凉如故石膏散方見靈苑方真石膏不以多少研令極細右新汲水和服方寸匕取身無熱為度外臺秘要本草同青蒿散治男子婦人肢體倦疼虚勞寒熱靈苑方青蒿八九月間成實時採去枝梗以蒿用童子小便浸三日㬠乾為末每服二錢烏梅一箇煎至七分温服青蒿鼈甲煎元治骨蒸勞退熱觧肌進食出博濟方九肋鼈甲一箇北柴胡二兩甘草杏仁桔梗當歸人參地骨皮赤芍藥各一兩胡黄連宣連各一分官桂木香各半兩麝香一字酥􅁡各三兩右十四味同為細末用青蒿一斤童子小便五升好酒一升熬青蒿汁約二升已來摝去青蒿不用入酥􅁡再熬成膏冷後入藥末捜和為元如梧桐子大每服十五元温酒下米飲亦得日進三服如秋後合時更入桃栁枝七莖此藥甚妙五心煩熱附五心煩熱頰赤宜局方逍遥散秦芁散方見第六卷第一論逍遥散治血虚勞倦五心煩熱肢體疼痛頭目昏重心忪頰赤口燥咽乾發熱盗汗减食嗜卧及血熱相摶月水不調臍腹脹痛寒熱如瘧又療室女血弱隂虚榮衞不和痰嗽潮熱肌體羸痩漸成骨蒸白茯苓白术當歸去蘆酒浸半日微炒白芍藥北柴胡去苗各一兩甘草炙兩半右㕮咀每服三錢水一琖煨生薑一塊切片薄荷三葉同煎至七分去滓熱服無時候枳殻散治婦人手足煩熱夜卧多汗肌肉黄瘁經候不調四肢煩倦心胷滿悶狀如勞氣枳殻去穰麩炒二兩半夏麴赤芍藥各一兩柴胡黄芩各一兩半右為細末每服二錢水一琖生薑一塊擘破􅀥二枚煎至八分去滓温服候五心煩熱及身體壯熱潮熱退方續服婦人血風勞氣方論第三凡十四方夫婦人血風勞者由氣血虚損經候不調或外傷風邪或内挾宿冷致使隂陽不和經絡否澁腹中堅痛四肢酸疼月水或斷或來面色萎黄羸痩又有因産後未滿百日不謹將䕶臓腑虚損百脉枯竭遂致勞損之疾也人參荆芥散治婦人血風勞氣身體疼痛頭昏目澁心忪煩倦寒熱盗汗頰赤口乾痰嗽胷滿精神不爽或月水不調臍腹㽲痛痃癖塊硬疼痛發歇或時嘔逆飲食不進或因産將理失節淹延痩瘁乍起乍卧甚即着床荆芥穗人參桂心生乾地黄北柴胡鼈甲醋炙酸棗仁炒枳殻製羚羊角屑别為末白术各七錢半川芎當歸防風甘草各半兩右為粗末每服三錢水一琖半生薑三片煎至八分去滓熱服無時候日二服常服除一切風虚勞冷宿疾孕婦休服鼈甲元治婦人血風勞氣四肢羸痩疼痛經脉不利飲食無味漸加虚困鼈甲紫苑桂心川芎防風川牛膝當歸秦芁人參桃仁琥珀各一兩麝香一分黄耆赤芍藥蝱䖝製水蛭製鬼箭羽白术羌活各三分熟乾地黄兩半右為細末煉􅁡元如梧桐子大食前温酒吞下三十元琥珀元治血風虚勞上熱下冷或發動即心中煩燥困乏無力不美飲食醋心口瘡月水不調肌肉黄瘁腹痛腸鳴或有氣塊攻衝或時作寒熱頭旋痰逆手足麻痺大宜常服出傳濟方琥珀當歸木香川芎防風㯽榔各四分三稜炮乾薑炮桂心各五分呉白术洗柴胡人參各二分青皮吳茱萸洗泡炒黒全蝎炒附子炮草豆䓻赤芍藥柏葉白芷各三分桃仁去皮尖炒敗龜醋炙鼈甲各六分天麻三分右為細末煉蜜元如梧桐子大每日空心酒下二十元午前近晚更進一服如覺煖近晚不須服如腹内塊積攻築於鼈甲桃仁㯽榔三稜各加一倍為妙忌生冷葱莧菜毒魚等物香甲散治婦人血氣虚勞四肢少力肌肉黄瘁多困減食遍身痠疼真邪相擊心腹撮疼木香乾薑各三分鼈甲醋炙二兩牡丹皮赤芍藥橘紅桂心人參茯苓熟地黄秦芁柴胡白术炒當歸炒附子炮去皮各一兩甘草半兩右為粗末每服二錢水一琖生薑三片􅀥二枚煎至七分去滓稍熱服如煩渴心躁入烏梅一兩同杵為末地黄煎治婦人血風勞心忪發熱不退出經驗方生乾地黄熟乾地黄右二味等分為細末用生薑自然汁入水相和打糊為元如梧桐子大每服三十元用地黄湯下或只茶酒醋湯下亦可食後日三服覺臓腑虚冷早間先服八味員一服不可謂地黄性冷沮洳壞脾大槩隂虚則發熱盖地黄大能補隂精血也荆芥散治血風諸般疾産後並宜服食乆服諸疾除去荆芥雀腦芎各三兩當歸人參各半兩桂心牡丹皮羌活防風苦梗大腹子甘草蒲黄白茯苓枳殻厚朴半夏杏仁欵冬花各三分附子炮乾地黄鼈甲白芍藥北柴胡黄耆各一兩乾薑木香各半分沉香一分右為細末每服二錢薑三片􅀥一枚水一琖煎至七分温服荆芥煮散治婦人血海虚冷手足煩疼頰赤口乾背甲勞倦寒熱徃來咳嗽痰涎飲食進退血經不調多驚盗汗胷膈不快但是風勞氣冷並皆治之荆芥穗四兩比柴胡秦芁白芷黄耆各二兩當歸莪荗川芎麥門冬白茯苓人參白芍藥沉香海桐皮枳殻熟地黄甘草酸􅀥仁木香㯽榔各一兩鼈甲製白豆䓻桂心苦梗各二兩右為細末每服二錢生薑三片烏梅一箇煎至七分無時温服如極虛去㯽榔每日兩服臨卧服尤佳忌生冷動風甜物腹有顆塊服之便消如聖散治婦人所禀血氣不足不耐寒暑易冐疾傷月水不調乆而心虚狀若心勞四肢易倦筋骨少力盗汗易驚或時不寧五心煩熱肌膚不長間作頭昏飲食無味胷膈不利或産前産後受病並可服之北柴胡白茯苓甘草熟地黄人參當歸各一兩鼈甲胡黄連沉香知母各半兩桑寄生乾葛各三分右為細末每服二錢水一琖烏梅一箇􅀥二枚麥門冬數粒煎至八分無時候乞力伽散治血虛肌熱又治小兒脾虚蒸熱羸痩不能飲食白术白茯苓白芍藥各一兩甘草半兩右為細末薑􅀥煎二錢服油煎散治血虚寒熱四肢酸倦無力痩瘁不進飲食日三服川烏海桐皮地骨皮五加皮桂心牡丹皮陳橘皮白芍藥川芎當歸烏藥白芷莪茂等分右為末每服二錢水二琖入生麻油三四㸃煎至七分温服無時候大效油煎散治血風勞氣攻疰四肢腰背疼痛嘔逆醋心不思飲食日漸羸痩面色痿黄手足麻痺血海冷敗服此神效五加皮川烏炮芍藥海桐皮牡丹皮各一兩桂心乾薑川芎各半兩右為細末每服二錢水一琖油浸錢一文同煎至六分温服常服以油浸二錢煎藥時不可攪喫藥時不可吹局方亦有油煎散方見和劑四白散子亦妙見四卷第九論治血風勞方牡丹皮地骨皮防風甘草黒豆白芷白芍藥各一兩荆芥穗二兩川芎一分右為細末每服二錢水一琖薑三片􅀥一箇葱白一寸煎至八分温服無時候香甲散治熱病後虚勞或四肢倦怠脚手疼痛飲食無味肌膚黄痩或熱瘧盗汗頭暈虚煩此藥乆服駐顔其妙不可具述鼈甲三兩醋浸去裙炙黄又入醋蘸炙七次當歸木香人參羌活川芎沉香肉豆䓻酸棗仁附子㯽榔大腹子各半兩北柴胡兩半厚朴川牛膝白茯苓秦芁各兩一桂心半兩右㕮咀每服五錢水一琖生薑三片烏梅一箇煎至八分去滓温服日三服空心忌生冷麫食雞肉鮓醬之類馬鞭草散治血風攻透肢體疼痛或覺㿋痒或覺痺麻作寒作熱飲食减味並皆治之已上出專治婦人方馬鞭草去粗梗荆芥穗北柴胡烏梅肉各二兩枳殻白术羌活白芍藥各一兩秦芁天台烏藥麻黄各兩半木香半兩當歸川烏炮甘草各一兩右為細末每服二錢水一盞生薑二片􅀥一枚葱白二寸煎至七分日午臨卧温服常服無忌有孕莫服婦人風虚勞冷方論第四凡二方夫婦人風虛勞冷者是人體虚勞而受於冷也夫人將攝順理則血氣調和風寒暑濕不能為害若勞傷氣血便至虚損則風冷乗虚而干之或客於經絡或入於腹内其經絡得於冷則氣血凝滯不能自温於肌膚也腹内得於風冷則脾胃氣弱不能消於飲食也隨其所傷變成疾病若大腸虚者則變下利若風冷入於子臓則令臓冷致令無子若摶於血則澁壅亦令經水不利斷絶不通也澤蘭散治婦人風虚勞冷氣攻心腹疼痛肢節拘急體痩無力經候不調飲食减少牡丹皮赤芍藥栢子仁續斷各半兩麝香一分澤蘭葉二兩當歸延胡索桂心附子炮川牛膝川芎桃仁乾漆炒琥珀没藥木香各三分右十七味為細末每服二錢温酒調下紫石英圓治婦人風虚勞冷經候不調四肢羸弱不能飲食紫石英熟乾地黄白石英各二兩續斷白芍藥桂心木香當歸白术乾薑白薇各半兩川牛膝川芎北五味子人參各三分椒紅炒附子黄耆各一兩右為末煉蜜為元如梧桐子大每服三十元温酒吞下空心服婦人冷勞方論第五凢七方夫婦人冷勞者由血氣不足表裏俱虚臟腑久挾宿冷致令飲食不消腹内積聚臍下冷痛月候不調骨節痠痛手足無力肌膚羸痩面色痿黄故曰冷勞也桃仁散治婦人冷勞氣滯經脉不通腹脇妨悶四肢羸痩不思飲食木香訶子白薑桃仁人參各半兩陳皮琥珀桂心各一兩赤芍藥延胡索赤茯苓川牛膝當歸白术各三分右㕮咀每服四錢水一盞薑三片煎至七分去滓空心温服木香元治婦人冷勞經脉不調臓腑氣滯四肢疼痛飲食無味漸加羸痩木香琥珀呉茱茰泡當歸牡丹皮赤芍藥三稜附子炮延胡索川芎各三分乾薑人參桂心各半兩北柴胡白术鼈甲醋煮去裙炙厚朴熟地黄陳橘皮各一兩右為末煉􅁡元如梧桐子大每服三十元空心温酒下熟乾地黄元治婦人冷勞虚損肌體消痩顔色痿黄四肢無力月候不調少思飲食乾熟地黄鼈甲陳皮各一兩北五味子當歸川芎桂心各半兩川牛膝人參白芍藥白术附子白茯苓黄耆各三分甘草一分右為細末煉􅁡元如梧桐子大空心温酒下三十元碙砂煎元治婦人冷勞心腹積聚腹脇疼痛四肢羸痩不食鼈甲醋炙桃仁去皮尖麩炒木香五靈脂去砂石炒當歸各一兩碙砂二兩醋一升􅆈成膏右為細末用碙砂膏為元如梧桐子大空心温酒下二十元煑肝散治婦人冷勞脾胃虚乏大腸轉洩水榖不化四肢羸痩口内生瘡不思飲食漸加無力宜服此藥北柴胡縮砂仁蒔蘿蓽撥各三分白术白芷胡椒白薑陳皮山茵蔯人參蕪荑仁木香紫苑白芍藥北細辛桂心各半兩右為細末以獖猪肝一具去脂膜切如栁葉片以新汲水洗過入葱白三寸細切入藥末半兩於銚内以新水二大琖入鹽醋少許以瓷椀合煑令水盡空心以意食之喫粥飲下食後良乆飲暖酒一盞為妙晚食前再服亦佳煮肝散治婦人冷勞面色痿黄不多思食或時腹痛四肢少力積漸羸痩白芍藥川芎苦梗厚朴桂心各三分陳皮一兩半白薑當歸荆芥穗蒔蘿胡椒蕪荑仁藁本柴胡紫苑各半兩右為細末每服半兩以獖猪肝一具用鹽醋葱白各少許相和如尋常煑熟空心任意食之然後飲温酒二琖尤佳大香甲元散治婦人血臓風虚冷氣肌肉黄痩飲食進退經候不調心腹多脹漸變如勞補血海調氣鼈甲醋炙一兩沉香柴胡人參川芎羌活當歸附子炮去皮木香安息香桔梗茯苓藿香葉陳橘皮牡丹皮三稜厚朴薑汁炙桂心桃仁去皮尖炒牛膝去苗各半兩㯽榔和皮大腹子各一分右為細末每服二錢水一琖生薑烏梅各少許煎至八分温服餘一半更加乾漆炒一分阿魏半分赤芍藥一分同為末煉􅁡元如梧桐子大空心煎烏梅地黄湯下二三十元與散子相間服博濟方婦人大全良方卷五
