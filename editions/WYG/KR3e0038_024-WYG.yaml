body:
  text: 婦人大全良方卷二十宋陳自明撰産後遍身疼痛方論第一凡二方論曰産後遍身疼痛者何答曰産後百節開張血脉流散遇氣弱則經絡肉分之間血多流滯累日不散則骨節不利筋脉急引故腰背不得轉側手足不能動摇身熱頭痛也若醫以為傷寒治之則汗出而筋脉動惕手足厥冷變生他病但服趂痛散除之趂痛散方牛膝半兩甘草薤白各一分當歸桂心白术黄耆獨活生薑各半兩右㕮咀每服半兩水三盞煎至盞半去滓食前服陳無擇評曰趂痛散不特治産後氣弱血滯兼能治太陽經感風頭疼腰背痛自汗發熱若其感寒傷食憂恐驚怒皆致身疼發熱頭痛况有蓐勞諸證尤甚趂痛散皆不能療不若五積散入醋煎用却不妨五積散方見和劑局産後腰痛方論第二凡十方論曰腎主腰脚産後腰痛者為女人腎位繋於胞産則勞傷腎氣損動胞絡虛未平復而風冷客之冷氣乘腰故令腰痛也若寒冷邪氣連滯背脊則痛久未已後忽有娠必致損動蓋胞絡屬腎腎主腰故也療産後風冷腰痛不可轉獨活川芎芍藥桂心續斷生薑桑寄生各六分當歸防風各八分右㕮咀以水三升煑取一升去滓空心分二服廣濟療産後虛冷血氣流入腰腿痛不可轉敗醬當歸各八分川芎芍藥桂心各六分右㕮咀水二升煑取八合空心分温二服並忌葱救急療婦人産後餘血不盡血流入腰脚疼痛胷滿氣急兩脇痛方生薑一斤淡竹葉一升切右二味以水二升煑取一升去滓分温二服千金療産後中風腰背强痛中風煩熱苦渇頭身皆重此因風冷所致及傷寒大豆酒方大豆五升炒令煙出以酒一升投之密蓋令温去豆服一升日夜數服卧取微汗避風亦有加羗活者亦佳廣濟療産後三日患腰疼腹中餘血未盡并手脚疼不下食生地黄湯方生地黄汁一升芍藥甘草各二兩丹參四兩蜜一合生薑汁半合右切以水三升煑取一升去滓内地黄汁蜜薑汁微火煎一二沸一服三合日二夜三利一兩行中間進食與藥更進服陳氏如神湯亦効方見第四卷七論中右生料五積散加桃仁煎亦妙此藥逐敗血去風濕産後惡露方行忽然漸少斷絶不來腰中重痛下注兩股痛如錐刀刺痛入骨中此由血滯於經絡不即通之有大痛處必作癰疽宜桃仁湯恐作癰者預服五香連翹湯桃仁湯方桃仁去皮尖蘇木生地黄各半兩䖟虫去足翅炒水蛭炒各三十箇右為粗末每服三錢水一盞煎至六分去滓温服無時候惡露下即住服五香連翹湯方一方有大黄一兩木香沉香丁香乳香麝香升麻獨活桑寄生連翹木通各二兩右為粗散每服五錢水二盞煎至一盞入竹瀝少許攪停去滓温服産後惡露不絶方論第三凡九方夫産後惡露不絶者由産後傷於經血虛損不足或分解之時惡血不盡在於腹中而臟腑挾於宿冷致氣血不調故令惡露淋瀝不絶也廣濟療婦人産後惡血不絶崩血不可禁腹中絞痛氣息急療蓐中三十六疾亂髪燒一兩阿膠二兩代赭乾薑各三兩馬蹄一箇燒乾地黄四兩牛角䚡五兩酥炙右為細末煉蜜圓如梧桐子大空心米飲下三四十圓日兩服文仲葛氏療惡露不絶方右以鋸截桑木取屑五指撮酒服日三差療産後泄血不止無禁度及治腹痛胷鬲悶乾黄末酒服方寸匕日三四服胡氏方云薑黄治惡露不止療産後血不止虛羸迨死亦治血氣二方並出産寳蒲黄二兩水二升煎取八合頓服獨聖湯療産後亡血過多心腹徹痛然後血下久而不止亦治赤白帶下年深諸藥不能療者良驗此京師祝景助教方貫衆狀如刺蝟者一箇全用不剉斷只揉去毛花蕚用之右用好醋蘸濕慢火炙令香熟候冷為細末用米飲調下二錢空心食前服療産後七八日惡露不止敗醬當歸各六分芍藥續斷各八分川芎竹茹各四分生地黄炒乾十二分右細剉以水二升煑取八合空心頓服治産後虛羸臍腹冷痛淋露不止或惡物不下方養生必用當歸白芍藥甘草乾薑桂心熟地黄蒲黄各半兩黒豆一兩炒右為細末温酒調下二錢食前服米飲亦可似黒神散牡蠣散治産後惡露淋瀝不絶心悶短氣四肢乏弱不思飲食頭目昏重五心煩熱靣黄體瘦牡蠣川芎熟地黄白茯苓龍骨各一兩續斷當歸炒艾葉酒炒人參五味子地榆各半兩甘草一分右為末每服二錢水一中琖生薑三片棗一枚煎至六分去滓食前服産後惡露不下方論第四凡六方夫惡露不下者由産後臟腑勞傷氣血虛損或胞絡挾於宿冷或産後當風取凉風冷乘虛而摶於血血則壅滯不宣積蓄在内故令惡露不下也療産後三四日惡露不下嘔逆壯熱芍藥十分知母八分生薑當歸蒲黄各四分紅花二分荷葉中心蒂七箇生地黄汁二合右細切以水二升煎至七合去滓下蒲黄煎四沸分温空心三服治産後惡血衝心胎衣不下腹中血塊等備急丹出産乳右以錦紋大黄一兩杵為細末用釅醋半升同熬成膏元如梧桐子大患者用醋七分盞化五元至七元服之須􅁷血下即愈亦治墜馬内損惡血不出神効此藥難用大叚虛弱不可服仍調藥醋不宜太酸便損肺臟全在醫者斟酌荷葉散療産後惡露不下腹中疼痛心神煩悶乾荷葉二兩鬼箭羽桃仁劉寄奴蒲黄各一兩右為粗末每服三大錢以童子小便一大盞薑錢三片生地黄一分搥碎同煎至六分去滓無時熱服廣濟療産後惡露不多下方川牛膝大黄各八分牡丹皮當歸各六分芍藥蒲黄桂心各四分右為末以生地黄汁調酒服方寸匕日二服血下愈生料五積散局方治産後惡露不快腹中疼痛或腹有塊及發寒熱並加醋少許煎通口服亦能療血崩見易簡方不復重録産後惡露方行而忽然斷絶驟作寒熱臍腹百脉皆痛如以錐刺非常此由冷熱不調或思慮動作氣所擁遏血畜經絡宜没藥圓當歸一兩桂心芍藥各半兩桃仁去皮尖炒碎研没藥研各一分䖟䖝去足翅炒水蛭炒各三十箇右為末醋糊元如豌豆大醋湯下三元産後餘血上搶心痛方論第五凡三方論曰夫産後血上搶心由産後氣虛挾宿冷冷摶於血則凝結不消氣逆上者則血隨上衝擊而心痛也凡産後餘血不盡得冷則留結與氣相摶則痛困重遇寒結血尤甚則變成血瘕亦令月水否澁不通也論曰産後心痛者何答曰心者血之主人有伏宿寒因産大虛寒摶於血血凝不得消散其氣遂上衝撃於心之絡脉故心痛但以大岩蜜湯治之寒去則血脉温而經絡通心痛自止若誤以為所傷治之則虛極寒益甚矣心絡寒甚傳心之正經則變為真心痛朝發夕死夕發朝死藥不可輕用如此大岩蜜湯方生乾地黄當歸獨活呉茱茰芍藥乾薑甘草桂心小草各一兩細辛半兩右為散每服半兩水三琖煎至一琖去滓稍熱服評曰産後心痛雖非産蓐常疾庸或有九痛未必便是血痛設是岩蜜湯豈可用熟地黄熟地黄泥血安能去痛此方本出千金用生乾地黄耳茱茰一升合凖五兩乾薑三兩細辛治陳寒在下焦方本一兩却减半兩制竒制偶量病淺深自有品數不可妄意加减然以岩蜜湯治血痛不若失笑散用之有効失笑散治心腹痛欲死百藥不効服此頓愈與第八論紫金元大同小異見本卷八論五靈脂蒲黄等分右為末先用釅醋調二錢熬膏入水一盞煎至七分食前熱服是驗經心録蜀椒湯療産後心痛此大寒所為方蜀椒二合芍藥三兩半夏當歸桂心人參甘草茯苓各二兩生薑汁五合蜜一升右切以水九升煑椒令沸下諸藥煑取二升半去滓下薑汁蜜等更煎取三升一服五合至六合千金同産後惡露不盡腹痛方論第六凡十二方論曰産後惡露不盡腹痛者何答曰産後惡血雖常通行或因外感五邪内傷七氣致令斬然而止餘血停積壅滯不行所下不盡故令腹痛産寳云皆因姙娠當風取凉則胞絡有冷至於産時其血必少或新産時而取風凉皆令風冷摶於血血則壅滯不得宣通蓄積在内有時惡露不盡故令腹痛温隱居澤蘭湯療産後惡露不盡腹痛往來兼胷滿少氣澤蘭􅆈生乾地黄當歸各三分芍藥生薑各十分甘草六分大棗十四箇右細切以水九升煑取三升分為三服欲死塗身得瘥救急療惡露不盡腹脹痛取亂髪如雞子大灰汁洗盡净燒為末酒調服二錢又療産後血不盡血痛悶方取荷葉燒作灰暖水和服煑取汁亦良又方以鐵秤錘一枚燒赤投酒五升中用此酒煑當歸三兩取二升去滓分温再服千金同一方無當歸療産後下血不盡腹内堅痛不可忍當歸芍藥桂心各三兩桃仁一百二十枚製右細切以水六升煑取二升分温二服如未差加大黄三兩療産後血結下不盡腹中絞痛不止大黄别浸生乾地黄當歸各十分川芎芍藥桂心各八分甘草黄芩各六分桃仁四十九粒製右細切以水七升煑取二升半下大黄更煎三沸分温三服療産後血下不盡腹中痛無計青木香當歸牛膝川芎黄耆芍藥各八分大黄十三分浸芒硝十二分右細切以水七升煑取二升入大黄更煎三沸分三服療産後惡露不盡結聚小腹疼痛當歸三分香附子一兩琥珀没藥青皮赤芍藥木香桂心各半兩右為細末以豆淋酒調下二錢産寳療産後餘血作疼痛兼塊者桂心薑黄等分右為細末酒服方寸匕血下盡妙地黄散治産後惡物不盡腹内㽲痛産後常服甚妙生乾地黄當歸並畧炒各一兩生薑細切如蝇頭大新瓦炒令焦黒半兩右為細末炒薑酒調一大錢服卷荷散治産後血上衝心血刺血暈血氣腹痛惡露不快初出卷荷紅花當歸各一兩蒲黄紙炒牡丹皮各半兩右為細末每服二平錢空心温酒調下一臈内只使童子小便調如纔産後便服此藥即諸疾不生出婦人方芸臺散療産後惡露不下血結不散衝心刺痛將來纔冐寒踏冷其血必往來心腹間刺痛有不可忍謂之血母塊但産後心腹諸疾並宜服之出産乳芸臺子紙炒當歸桂心赤芍藥各等分右為細末温酒調服二平錢趕下惡物産後三日不可無此産後兒枕心腹刺痛方論第七凡十八方夫兒枕者由母胎中宿有血塊因産時其血破散與兒俱下則無患也若産婦臟腑風冷使血凝滯在於小腹不能流通則令結聚疼痛名曰兒枕也産寳論産後心腹痛者由産後氣血俱虛遇風寒乗之與血氣相摶隨氣上衝於心或下攻於腹故令心腹痛若久痛不止則變成疝瘕也延胡索散治産後兒枕腹痛得効出經驗婦人方延胡索當歸各一兩真琥珀蒲黄各一分炒赤芍藥半兩桂心三分紅藍花二錢右為細末以童子小便合細酒温温調三錢食前服治産後兒枕亦治赤白痢丁香三錢罌粟殻去穰蜜炙香白芷各半兩百草霜六錢重右為細末毎服二錢童子小便調下如痢疾米飲調下産後兒枕痛不可忍五靈脂慢火熬為細末毎服二錢温酒調下天僊藤散治産後腹痛不止及一切血氣腹痛出經驗婦人方天僊藤五兩炒焦為細末毎服二錢産後腹痛用炒生薑小便和細酒調下常患血氣用温酒調服効産後腹中有塊上下時動痛發不可忍此由姙娠聚血産後氣羸惡露未盡新血與故血相摶而痛俗謂之兒枕乃血瘕也宜蒲黄散真蒲黄研飲調服二錢如燥渴者新水調黒神散療産後血塊痛經脉行後腹疼并經脉不調熟地黄一斤陳生薑半斤右拌同炒乾為末毎服二錢産前烏梅湯調下常服酒調經脉不通烏梅荆芥酒調下療新産後腹痛惡血不盡行黒神散方見局方療新産後七八日腹痛兩脇痛當歸劉寄奴苦梗各十二分延胡索别為末桂心陳皮各四分茯苓􅆚藥各八分右㕮咀以水二升煑取八合調延胡索末空心服療先患冷氣因産後發腹痛芎藭桂心當歸吴茱茰茯苓芍藥甘草各六分桃仁十分右㕮咀水七升煑取二升去滓分三服桃仁􅆚藥湯千金療産後腹痛桃仁半升芍藥當歸川芎乾漆碎熬桂心甘草各二兩右細切以水八升煑取二升半去滓分三服廣濟療腹中絞痛不可忍當歸白芍藥川芎乾薑右等分為末毎服二錢温酒調下一方加延胡索妙必効方療産後腹痛方羌活四兩切以酒二升煑取一升分服千金治産後餘疾腹中絞痛不下食瘦乏方當歸黄耆芍藥各六分乾地黄白术各八分桂心甘草各四分棗十四箇右㕮咀水二升煑取八合去滓空心作兩大服忌生葱千金茱茰酒治心腹内外痛呉茱茰一升酒三升煑取一升空心分二服聖惠療同前生地黄汁藕汁童子小便各三合右同煎三二沸分温三服薑黄散治産後腹疼没藥一分川薑黄末三分右以水童子小便各一盞入藥煎至一盞半分作三服通口服約行五七里再進一服即止不過三服便安療血氣痛欲死槐雞半兩為末酒濃煎頓服立愈獨聖散療産後腹痛當歸為末每服二錢水一盞煎至七分温服又局方當歸散亦治産後腹痛不録外臺療新産後腹中如弦常堅絞痛無聊方白蜜一升當歸一兩右當歸為末入蜜中煎融二沸適寒温頓服産後小腹疼痛方論第八凡六方夫産後小腹痛者此由産時惡露下少胞絡之間有餘血與氣相擊摶令小腹痛也因重遇於冷則血結變成血瘕亦令月水不利也延胡索散治産後臍下痛延胡索桂心各半兩當歸一兩右為細末熱酒調下二錢香桂散治産後臍下疼痛不止川芎當歸各一分桂心半兩右為細末分為三服每服酒一盞煎三五沸更入小便少許煎至七分温服甚者不過再服即差出博濟又方釡底墨醋炒令乾延胡索劉寄奴桂心菴閭子右等分為末熱酒調下二錢紫金圓治産後惡露不快腰痛小腹如刺時作寒熱頭痛不思飲食亦治久有瘀血月水不調黄瘦不思飲食並能治之亦可療心痛與失笑散同出産乳五靈脂水淘去石焙乾秤炒為末真蒲黄右以好米醋調五靈脂末慢火熬成膏子次以蒲黄末搜和圓如櫻桃大每服一元水與童子小便各半盞煎至七分令藥化温服之少頃再一服惡露即下久有疼血成塊月信不利者並用酒磨下産後六七日忽然臍腹痛皆由呼吸之間冷氣乗虛而入宜服當歸建中湯和四順理中元共研再元作小元飯飲吞下極妙産後寒疝方第九凡三方王子亨云産後臍腹大痛由呼吸冷氣乗虛入客於血宜局方當歸建中湯羊肉湯療虛及産婦腹中痛虛眩不能支持兩脅當臍急痛氣上衝前後相引痛治之如神精羊肉四兩當歸川芎各半兩生薑一兩右細切以水十盞煎至三盞掠去沫去滓分四服空心熱服一日來日再作兩日滓合為一日煎當一劑服千金當歸湯療婦人寒疝虛勞不足若産後腹中絞痛其方無川芎有芍藥陳無擇云仲景羊肉湯治寒疝右用生薑羊肉湯服之無不驗有一人産當寒月寒氣入産門臍下脹滿手不得犯此寒疝也醫將治之以抵當湯謂有瘀血或曰非其治也可服仲景羊肉湯少减水二服遂愈羊肉湯外臺療産後内虛寒氣入腹腹中絞痛下赤白痢讝語見鬼肥羊肉一斤當歸甘草芍藥各一分産寳各一兩右㕮咀以水一㪷先煑羊肉取七升入藥更煑取二升去滓分服産寳療産後心腹切痛不能飲食乏氣忽然往來寒熱當歸川芎黄芩人參甘草芍藥防風生薑各三分大黄二分宜相人强弱方可投之桃仁八十个右水七升煑取二升下大黄更煎三沸分作三服千金羊肉湯無大黄人參桃仁有羊肉煑汁煎藥崔氏同産後兩脇脹滿氣痛方論第十凡六方論曰産後兩脇脹滿疼痛由膀胱宿有停水因産後惡露下不盡水壅痞與氣相摶積在膀胱故令脇肋脹滿氣與水相激故令痛也經効療産後血氣脇肋脹痛當歸十二分芍藥苦梗㯽榔枳殻各八分桂心青木香柴胡各六分右㕮咀以水二升煎取八合去滓空心分温二服療産後惡露不下血氣壅痞脹痛不下食蘇木紫葛各十二分芍藥當歸各八分桂心蒲黄各六分生地黄汁三合右㕮咀以水二升煎取七合下蒲黄分兩服當歸散治産後腹痛腹脇脹滿當歸乾薑等分右為末每服三錢水一盞煎八分入鹽醋少許食前熱服選竒方用酒煎經効理血氣煩悶脇肋脹滿及痛芍藥八分蒲黄延胡索各四分當歸六分荷葉蒂三枚炙右水二升煎取七合後入蒲黄空心分作兩服廣濟療産後腹痛氣脹脇下悶不下食兼微痢茯苓人參當歸甘草各六分生薑陳皮各四分厚朴八分右㕮咀以水二升煎取八合去滓分温服産後積聚癥塊方論第十一凡三方夫積者隂氣也五臟所生聚者陽氣也六腑所成皆由飲食不節寒熱不調致五臟之氣積六腑之氣聚積者痛不離其部聚者其痛無有常處所以然者積為隂氣隂性沉伏故痛不離其部聚為陽氣陽性浮動故痛無常處産後血氣傷於臟腑臟腑虛弱為風冷所乗摶於臟腑與血氣相結故成積聚癥塊也治産後餘血不散結成癥塊疼痛宜服桃仁散桃仁當歸鬼箭羽大黄鱉甲各一兩赤芍藥延胡索琥珀各三分川芎桂心各半兩右為粗末每服三大錢水一盞薑三片煎至七分去滓温服京三稜散治産後積血不散結聚成塊或時寒熱不思飲食京三稜熟地黄鱉甲各一兩桂心當歸川芎牡丹皮劉寄奴赤芍藥各半兩大黄炒桃仁牛膝各三分右為粗末每服三錢水一大盞薑三片煎至七分去滓温服桂心元治産後血氣不散積聚成塊上攻心腹或成寒熱四肢羸瘦煩疼不思飲食青皮乾漆炒煙盡各三分没藥㯽榔當歸桂心赤芍藥牡丹皮各半兩大黄炒桃仁鱉甲厚朴三稜延胡索各一兩右為細末煉蜜元如梧桐大温酒下三十元産後血瘕方論第十二凡八方夫新産後有血與氣相摶而痛者謂之瘕瘕之言假也謂其痛浮假無定處也此由宿有風冷血氣不治至産血下則少故致此病也不急治則多成積結妨害月水輕則否澁重則不通也鱉甲元治産後惡露不盡結成血瘕乍寒乍熱心腹脹痛不欲飲食四肢羸瘦或時口乾當歸木香赤芍藥各半兩鱉甲一兩大黄一兩炒牛膝白术水蛭製䖟䖝製各一分牡丹皮桂心各三分鬼箭羽半兩右為細末煉蜜元如梧桐子大桃仁湯吞下二十元食前服更宜加减不可連併服治産後血氣不調腹中生瘕結而不散生地黄煎元一名萬病元方見第一卷第七論産寳療血瘕痛無定處童便三升生地黄汁生藕汁各一升生薑汁三升右先煎前三味約三分减二次下薑汁慢火煎如稀􅄳每取一合暖酒調下療血瘕痛臍下脹不下食當歸八分桂心芍藥麒麟竭蒲黄各六分延胡索四分右為細末空心温酒調二錢匕千金療血瘕生乾地黄一兩烏賊骨二兩右為細末空心温酒調二錢匕服凌霄花散治血瘕血塊及産後穢露不盡兒枕急痛應干積聚疼痛漸成勞瘦悉皆治之凌霄花一分牡丹皮山梔子仁赤芍藥紫荷車血竭没藥碙砂地骨皮五加皮甘草各二兩紅娘子十一箇桃仁紅花桂心延胡索當歸各一兩右為細末温酒調一錢服葛氏方療腹中瘕痛桂心為末温酒調二錢産後血瘕腹痛及喉痺熱塞本人呼血瘕為兒枕産後即起痛不可忍鐵秤錘煅令通赤淬酒中候温飲之用斧亦得治産後血海氣虛腹臟疼痛心胷注悶每遇紅脉行或多或少及有塊積者􅅾莪茂散出博濟莪茂桃仁去皮尖麩炒大黄濕紙煨當歸炒各一兩桂心川芎木香牡丹皮延胡索炒赤芍藥各半兩右為細末温酒調一錢空心臨卧服産後餘血奔心煩悶方論第十三虛煩當附於此論曰餘血奔心蓋是分解了不便與童子小便并擀心下及卧太速兼食不相宜之物所致但能依方療之無不痊可療産後餘血不盡奔衝心煩悶腹痛川芎生乾地黄枳殻芍藥等分右為末酒服方寸匕日二服廣濟療血氣煩悶方生藕汁飲二升甚效竹瀝亦得千金同集驗療産後血氣煩方千金同生地黄汁清酒各一升右相和煎一沸分為兩服療産後七日内宿血不散時時衝心迷悶荷葉六分延胡索八分地黄汁二合右水二升煑二味取八合下延胡索空心三服忌肉食一日療産後餘血攻心或下血不止心悶靣青冷氣欲絶羊血一盞頓服如不定更服立效經效療産後氣虛冷摶於血血氣結滯上衝心腹脹滿當歸桂心川芎呉茱茰橘皮生薑各二兩芍藥三兩右㕮咀以水三升煮取一升去滓空心服治産後餘血奔心右用陳白梅搥碎濃煎湯喫金黄散治産後惡血衝心時發躁出博濟延胡索一兩蒲黄半兩桂心一分右為細末烏梅煎湯冷調下一錢没藥元治産後心胷煩躁惡血不快博濟没藥研蠻薑延胡索乾漆炒當歸桂心牛膝牡丹皮乾薑等分右為細末醋煑麫糊元如梧桐子大煎麯湯下十元至十五元産後虛煩方第十四凡七方薤白湯治産後胷中煩熱逆氣方薤白半夏甘草人參各二兩栝樓根三兩麥門冬半升右六味㕮咀以水一㪷三升煑取四升去滓分五服日三夜二熱甚即加知母一兩竹根湯治産後虛煩方甘竹根細切一㪷五升水二㪷煑取七升去滓内小麥二升大棗二十枚復煑麥熟三四沸内甘草一兩麥門冬一升湯成去滓服五合不差更服取差短氣亦服之人參當歸湯治産後煩悶不安方人參當歸麥門冬桂心乾地黄各一兩大棗二十枚粳米一升淡竹葉三升芍藥四兩右九味㕮咀以水一㪷二升先煑竹葉及米取八升去滓内藥煑取三升去滓分三服若煩悶不安者當取䜴一升以水三升煑取一升盡服之甚良甘竹茹湯治産後内虛煩熱短氣方甘竹茹一升人參茯苓甘草各一兩黄芩三兩右五味㕮咀以水六升煑取二升去滓分三服日三千金療婦人産後短氣欲絶心中煩悶不解必效方竹葉切麥門冬小麥各一升甘草一兩生薑二兩大棗十四箇右六味細切以水一㪷煑竹葉小麥取八升去滓内餘藥煑取三升去滓温服若虛悸加人參二兩少氣力加粳米五合一方用竹皮若胷中氣逆加半夏二兩忌如常法與竹根湯淡竹茹湯大同小異赤小豆散治産後煩悶不能食虛滿方赤小豆三七枚燒作末以冷水和頓服之治産後煩悶蒲黄散蒲黄以東流水和服方寸匕極良尋常治諸虛煩熱者以竹葉石膏湯温膽湯殊不知産後與尋常不同如石膏等藥不宜輕用用之必死婦人大全良方卷二十
