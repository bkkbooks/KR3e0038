body:
  text: 婦人大全良方原序世之醫者於婦人一科有専治婦人方有産寳方治以専言謂専攻也方以寳方愛重之也蓋醫之術難醫婦人尤難醫産中數證則又險而難彼其所謂専治者産寳者非不可用也綱領散漫而無統節目疏略而未備醫者畫於簡易不能深求徧覽有才進方不效輒束手者有無方可據揣摩臆度者有富貴家鄙藥賤而不服者有貧乏人憚藥貴而無可得服者有醫之貪利以賤代貴失其正方者古云看方三年無病可治治病三秊無藥可療又云世無難治之病有不善治之醫藥無難代之品有不善代之人此之謂也僕三世學醫家藏醫書數千卷既又徧行東南所至必盡索方書以觀暇時閉關浄室繙閲涵泳究極天人採摭諸家之善附以家傳經驗方萃而成編始自調經訖於産後凡八門門數十餘證總二百六十餘論論後有藥藥不惟其貴賤惟其效綱領節目燦然可觀庶幾病者隨索隨見隨試隨愈僕於此編非敢求異昔人也葢亦補其偏而會其全聚於散而歛於約期使無憾云愚者千慮必有一得君子毋以人廢言峕嘉熙元年八月良日建康府明道書院醫諭臨川陳自明良父序
