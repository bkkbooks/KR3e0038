body:
  text: 婦人大全良方卷八宋陳自明撰婦人淋瀝小便不通方論第一凡十一方夫婦人淋者由腎虗而膀胱熱也膀胱與腎為表裏俱主於水行於脬者為小便也臟腑不調為邪所乘腎虛則小便數膀胱熱則小便澁其状小便疼痛澁數淋瀝不宣故謂之淋也小便不通脹滿氣喘急用藥無異木通散治婦人五淋木通榆白皮瞿麥穗大麻仁滑石各一兩貝齒葵子白茅根各二兩甘草半兩右為粗末每服五錢水煎空心温服石韋散治婦人小便卒淋瀝石韋黄芩木通榆白皮葵子瞿麥穗甘草右等分為粗末每服半兩水盞半薑三片煎七分去滓熱服桃膠散治婦人氣淋勞淋桃膠榆白皮各一兩車前子冬𤓰子鯉魚齒葵子瞿麥木通各半兩枳殻一分右㕮咀每服四錢重水一琖煎至七分去滓温服金沙散治淋海金沙草隂乾為末煎生甘草湯調二錢甚者不過三四服又方真琥珀研細不以多少研麝香白酒調下此二方出陳總領方雞蘇散治婦人血淋雞蘇葉木通各二兩生乾地黄滑石各三兩刺薊根一両右為粗末每服半兩水琖半筀竹葉三七片煎至七分去滓食前温服治婦人血淋及尿血澁痛生乾地黄三兩鬱金蒲黄各二兩右為細末每服二錢車前子葉煎湯調下日三服以利為度亦有血瘕似淋小便不通臍腹脹滿痛宜桃仁煎方見血瘕門第七卷第九論後有用亂髪方治脬轉不得小便亦可治血淋尿血亦好火府丹治心經熱小便澁及治五淋加甘草㕮咀煎名導赤散本事方生地黄二兩木通黄芩各一兩右為細末煉蜜為圓如梧桐子大木通煎湯下三十圓此藥治淋瀝臍下滿痛許學士云壬戌年一卒病渇日飲水一㪷不食者三月心中煩悶時已十月予謂心經有㐲熱與此藥數服越二日不覺來謝當日三服渇止又三服飲食如故此本以治淋用以治渇可謂通變也治婦人諸般淋苦杖根俗呼為杜牛膝多取净洗碎之以一合用水五盞煎至一盞去滓用麝香乳香少許調下鄞縣武尉耿夢得其内人患沙石淋者十三年每漩痛楚不可忍溺器中小便下砂石剥剥有聲百方不效偶得此方服之一夕而愈目所視也本草云牛膝治莖中痛婦人脬轉不得小便方論第二凡十方夫婦人脬轉之病者由脬為熱所廹或忍小便俱令水氣廹於脬屈辟不得充張外水應入不得入内溲應出不得出内外壅滯脹滿不通故為脬轉其状少腹急痛不得小便甚者至死不可治也局方有八味圓治婦人脬轉不得小便滑石散治婦人丈夫脬轉小便數日不通滑石一兩寒水石二兩葵子一合右為末以水一斗煑取五升時時服一升即利又方亂髪燒灰葵子車前子右等分為細末每服二錢茶湯調下蒻葉散治婦人脬轉小便不通亦可治男子褁茶蒻葉燒灰一両滑石研細半兩右研停沸湯調二錢服石葦湯治脬轉小便不通出指迷方前同石韋去毛車前子右等分為粗末每服五錢水二琖煎至一琖去滓服治婦人忍小便不得依時而起致令脬轉經四五日困篤欲死方滑石二兩亂髪灰一兩右研停取桃白皮一斤熟𢷬以水三琖絞取汁無時温半琖調二錢服又方以滑石末葱湯調下二錢服千金翼治婦人不得小便杏仁七粒去皮尖右一味麩炒黄為細末水調服立通又方紫草為末井華水調取三指撮立通又云紫苑皆可用若卒暴不通小腹膨急氣上衝心悶絶欲死此由暴寒乘并膀胱或從憂驚氣無所伸鬱閉而不流氣衝脬系不正診其脉右手澁小左手急大宜葱白湯方橘皮三兩葵子一兩葱白一莖右㕮咀水五升煑取二升分三服出指迷方婦人小便數方論第三凡二方夫婦人小便數者由腎與膀胱俱主於水腎氣通於隂此二經俱虛而有熱乗之則小便澁虛則小便數也鹿茸散治婦人久虛冷小便日夜三五十行鹿茸烏賊骨桑寄生龍骨各一兩白芍藥當歸附子各三兩桑螵蛸半兩右為細末食前温酒調下二錢桑螵蛸散治婦人虛冷小便數桑螵蛸三十枚鹿茸牡蠣粉甘草二兩黄耆半兩右為細末食前薑湯調一錢服遺尿失禁方論第四凡七方經云膀胱不利為癃不約為遺尿者乃心腎之氣傳送失度之所為也故有小便澁而遺者有失禁出而不自知者又婦人産蓐産理不順致傷膀胱遺尿無時又有脬寒臟冷而遺尿不禁治之各有方鹿茸圓治婦人久積虛冷小便白濁滑數不禁鹿茸椒紅桂心附子牡蠣補骨脂石斛蓯蓉雞䏶胵沉香各一兩桑螵蛸三分右為細末酒煑麫糊圓梧桐子大空心温酒下三十圓又方以鹿角屑炒令黄為細末空心温酒調二錢又方雞䏶胵炙為末空心酒調二錢治婦人遺尿不知出時出千金翼白薇白芍藥等分右為末酒服方寸匕日三服空心又方桑螵蛸酒炒為細末每服二錢生薑湯調下又方白礬牡蠣等分右為細末飲服方寸匕亦能療丈夫遺尿療婦人小便不禁以雄雞翎燒灰為末酒服方寸匕婦人小便出血方論第五凡九方夫婦人小便出血者由心主於血血之行身通遍經絡循環臟腑血牲得寒則凝澁得熱則流散失其常經溢滲入於脬内故小便出血也治婦人卒傷於熱尿血陳總領云余頃在章貢時年二十六忽小便後出鮮血數㸃不勝驚駭全却不疼如是一月苦不飲酒則血少終不能止偶有鄊兵告以市醫張康者常療此疾遂呼之來供一器清汁云是草藥添少蜜解以水兩服而愈既厚酬之遂詢其藥名乃鐃靣草一名螺靨草其色青翠所在石堦縫中有之鹿茸散治婦人勞損虚羸尿血鹿茸當歸熟地黄葵子蒲黄續斷等分右為細末酒調二錢日三服髪灰散治小便尿血或先尿而後血或先血而後尿亦逺近之謂也又治飲食忍小便或走馬房勞皆致脬轉臍下急痛不通兼治肺疽心衂内崩吐血一兩口或舌上血出如針孔若鼻衂吹内立已亂髪燒灰本草云能療瘀血通闗鬲利水道破癥瘕癰腫狐尿刺尸疰雜瘡療脬轉通大小便止欬嗽鼻衂右一味用二錢以米醋二合湯少許調服井華水調亦得服藥訖即炒黒豆葉蹲其上則通生乾地黄散治婦人尿血不止生乾地黄二兩栢葉黄芩各半兩阿膠炒成珠一兩右為粗末每服三錢水一琖薑三片煎七分去滓温服又方羚羊角屑龍骨當歸蒲黄各一兩生地黄二兩右為細末粥飲調下二錢食前服當歸散治婦人小便出血或時尿血當歸羚羊角屑赤芍藥各半兩生地黄一兩刺薊葉三分右為粗末每服三錢水煎去滓服又方以生地黄𢷬取汁每服一小琖日三服又方以蒲黄末酒調二錢服之水調亦可又方鹿角膠三兩炙令黄以水一大琖煎至半琖去滓分為三服食前服婦人大便不通方論第六凡八方夫婦人大便不通者由五臟不調冷熱之氣結於膓胃則津液燥竭大腸壅澁故大便不通也仲景云婦人經水過多則亡津液亦大便難也局方四物湯加青皮煎服大三脘散又名三和散見第七卷第十七論七宣圓麻仁並見局方不復重録牽牛子散治婦人大便不通木香半兩郁李仁去皮微炒青皮去白木通枳殻去白麩炒桂心各一兩黒牽牛三兩半生半炒右為細末每服二錢如煎茶一沸攪起放温空心服通神散治婦人大便不通熱而實者方可投此藥其證心腹脹痛手不得近心胷煩悶六脉沉滑而實是其證也大黄芒硝㯽榔桃花郁李仁湯浸去皮微炒各一兩木香半兩右為細末空心粥飲調下二錢牽牛圓博濟方有大黄㯽榔名氣針員治婦人大便不通心腹虛脹黑牽牛二兩青皮去白一兩木香半兩右為細末煉蜜圓如梧桐子大空心温水下二十圓大麻仁圓治婦人腸胃風結大便常祕大麻仁去殻秤别研如膏大黄各二兩炒㯽榔木香枳殻各一兩右為細末與麻仁研停煉蜜圓如梧桐子大空心温水下二十圓論老人虛人風人大便祕不可用駃藥初虞世云余厯觀古人用通藥率用降氣等藥葢肺氣不下降則大腸不能傳送以杏仁枳殻訶子等藥是也又老人虛人風人津液少大便祕經云澁者滑之故用胡麻杏仁麻子仁阿膠之類是也今人學不師古妄意斟酌每至大便祕燥即以駃藥蕩滌之既走津液氣血大便隨手愈更祕澁兼生它病余昔在魯山日有一譞少自稱太醫曹鎮有寄居王世安少府本京師人始病風淫末疾為此生以駃藥累累利之後為肺痿咯膿血卒至大便不通而死古人服藥尤所謹重不若今人之輕生故舉此以戒後人治風入腸間或祕或利方論第七凡四方經云春傷於風夏必飱泄蓋木氣刑土也土不能滲泄則木氣勝故泄風氣行津液燥故祕即不可專以祕燥為風也余家中宗親張公度母氏年七十日下利數十行百方治之不愈又苦腰脚拘攣公度以蒺藜酸棗仁治拘攣而利愈黄魯直母安康郡太苦祕結以公度藥投之而大便利故知祕與利皆出於風公度潞人名騤世有令德公度承父醫學而克其家清修不妄取真有德君子今見於此治風人脚氣人大便或祕或利虛人尤宜方皂莢子三百枚破作兩片慢火炒燥甚即入酥一棗大又炒至燥又入酥至焦黒為細末右煉蜜圓如梧桐子大每服三十圓煎蒺藜酸棗仁湯下空腹服兩時久未利再進一服漸加至百圓不妨以通為度蒺藜湯方蒺藜不以多少炒至赤黒色臼内以木棒舂去刺揀簸净每蒺藜三兩以酸棗仁一兩炒令香同杵為麄末馬尾羅篩每三錢水一琖煎至七分去滓温服下前圓子藥大五柔圓主臟氣不調大便難通榮衛利九竅進飲食方大黄㪷米下蒸切焙枳殻去穰麩炒白芍藥葶藶炒香别研牛脂去筋膜熬成油與葶藶杏仁杵蓯蓉酒浸軟温水洗切焙各一兩桃仁百枚杏仁四十枚並去皮尖麩炒黄别杵右除有油藥並為末煉蜜圓入牛脂桃杏仁葶藶杵數千下圓如梧桐子大米飲下三圓日三服腹稍空時服未知稍增以知為度安康郡太苦風祕予為處只可二仁圓杏仁去皮尖麥炒黄麻仁别研枳殻去穰麩炒赤訶子慢火炒搥去核右二物各一兩為細末同二仁杵煉蜜和杵圓如梧桐子大温水下二三十圓未知稍增潞公在北門日盛夏間苦大腹不調公隨行醫官李琬本衢州市户公不獨終始涵容之又教以醫事公病泄利琬以言動摇之又求速效即以赤石脂龍骨乾薑等藥饋公公服之不大便者累日其勢甚苦予方自共城來見公未坐定語及此事公又不喜服大黄藥予告曰此燥糞在直腸藥所不及請以蜜兊導之公為然時七月中苦熱予撝汗為公作蜜兊是夕三用藥下結糞四五十枚大如胡桃色黑如橡栗公二三日間飲食已如故世有一種虛人不可服利藥今載其法蜜兊法好蜜四五兩銀石器中微火熬不住手以匙攪候可圓見風硬即以蛤粉塗手揑作人指状長三寸許坐厠上内之以手掩定候大便通即放手未快再作已上四方出初虞世婦人泄㵼方論第八凡八方三因論曰夫婦人泄㵼者經中所謂洞泄飱泄溏泄濡泄胃泄脾泄大腸泄大瘕泄小腸泄水榖注下其實一也原疾之由皆因腸胃虛冷而邪氣乘之經云寒甚則泄春傷於風夏必飱泄蓋風傷肝肝正旺而移氣尅於脾也又云寒則溏熱則垢此得於外也喜怒憂思恐致使臟氣隔絶精神奪散必致溏泄此屬内也如飲食生冷食傷脾胃而泄者屬不内外也寒者温之熱者凉之滑者澁之濕者燥之治利之法無以過也香朴圓治腸胃虚冷泄㵼注下無度脾虚氣閉不進飲食大厚朴五兩北茴香白术陳皮各三兩訶子赤石脂各一兩半右為細末麵糊圓如梧桐子大空心米飲下五十圓如常服暖脾胃桂香圓治臟腑虛為風濕寒所摶冷滑注下不禁老人虛人危篤累效附子肉豆蔲並炮白茯苓各一兩桂心木香炮白薑炮各半兩丁香一分右為細末米糊圓如梧桐子大空心米飲下五十圓豆蔲分氣飲治臟腑虛寒泄㵼無度瘦極及婦人産後洞泄危篤甚藿香葉草豆蔲仁炮青橘皮各四兩甘草丁香各半兩烏梅五十箇肉豆蔲十箇炮右㕮咀每服四錢水二琖糯米一撮煎七分去滓温服五香散治食魚傷泄㵼不止氣刺奔衝及婦人産前産後腹痛血氣等疾用温酒下産後敗血衝心用敗蒲煎湯下安胎以糯米飲調下孕婦脾泄㵼痢煎陳米飲調下食前烏藥白芷炒枳殻白术炒良薑炒甘草莪术有孕减半右等分為細末每服二錢温酒調下豆蔲圓治臟寒泄㵼不止服諸藥無效亦可治男子肉豆蔲麫褁煨香不以多少碾細入陳米白飯搗令得所圓如緑豆大空心煑粟米飲吞下百圓本家累以此藥救人有效胃苓散亦療男子治夏秋之間脾胃傷冷水榖不分泄㵼不止五苓散平胃散並見局方右合和薑棗煎空心服妙陳日華方人參豆蔲散治久㵼不止服諸藥無效僕累試之有效人參肉豆䓻乾薑厚朴甘草陳橘皮各一兩川芎桂心訶子北茴香各半兩右為細末每服三錢水一小琖薑三片棗一枚煎至六分服方出石道人木香散治臟腑冷極及乆冷傷憊口瘡下泄米榖不化飲食無味肌肉瘦悴心多嗔恚婦人産後虛冷下泄及一切水㵼冷痢木香破故紙炒各一兩良薑縮砂仁厚朴製各三分赤芍藥橘紅桂心白术各半兩胡椒吳茱茰湯泡七次各一分肉豆蔲四箇㯽榔一箇右為散每服三錢用不經水猪肝四兩許去筋膜批為薄片重重摻藥置一鼎中入漿水一碗醋一茶脚許蓋覆煑肝熟入鹽一錢葱白三莖細切生薑彈子許拍破同煑水欲盡空心為一服冷食之初服微㵼不妨亦是逐下冷氣少時自止經年冷痢滑㵼只是一服渇即飲粥湯忌生冷油膩如不能食冷物即添少漿暖服嘉興謝醫得此方惡其繁只用漿水煑猪肝圓如梧桐子大粥飲下五十圓其效亦若暴㵼痢只是一服唯熱痢熱㵼不治趙府博上與下輈婺州人也宜人病泄㵼不止如附子木香訶子肉豆蔲龍骨等藥及諸丹服之皆無效召僕診之肝腎脉虛弱此肝腎虛也府博云其説見在何經僕曰諸方論泄㵼止是言脾胃病不過謂風冷濕毒之所侵入及飲食傷滯遇腸虚則泄痢而不知肝腎氣虛亦能為洩痢古書所載甚明不可不辨經曰洩痢前後不止腎虛也又曰諸厥固泄皆屬於下下謂下焦肝腎之氣也門户束要肝之氣也守司於下腎之氣也肝氣厥而上行故下焦不能禁固而泄痢腎為胃闗門户不要故倉廪不藏也若病泄痢其源或出于此而專以脾胃藥治之則謬固千里矣遂服木香散數服而愈協熱下利方論第九凡三方論曰若下利清水其色赤黄或米糓不化但欲飲冷時時嘔逆小便不利得熱則極心胷煩躁脉虛大而數此由乘虚熱入於胃凑滲下焦津液不分併於大腸謂之恊熱下利先用五苓散利小便次以玉粉丹四味阿膠圓玉粉丹蛤粉硫黄等分右同研細白麵糊和圓如梧桐子大飲下五十圓四味阿膠圓黄蓮赤茯苓去皮二兩芍藥三兩阿膠炒燥一兩右先将三味為末却以好醋熬阿膠成稀膏圓如梧桐子大飲下三十員滯下方論第十凡十三方夫赤白痢疾者古人名之滯下是也究疾之原皆因外感五邪之氣内傷生硬冷熱之食其證不一有赤有白有赤白相雜有冷有熱有虛有實大抵四時皆以胃氣為本未有不因外感寒暑燥濕風之氣而傷於脾胃脾胃既虧而又内傷飲食飲食不能尅化致令積滯而成滯下古人云無積不成痢者此也經云春傷於風夏生飱泄蓋風喜傷肝然春時肝木正旺而不受邪反移氣尅於脾土然脾既受尅又不能忌慎口腹恣飡生冷粘硬之物致令脾胃不能尅化因此積滯又夏秋之間或再感暑濕風冷之氣發動而成痢也其證必先臍腹㽲痛洞泄水㵼裏急後重或有或無或赤或白或赤白相雜日夜無度如有此證不問冷熱虛實但當先服神术散可以發散風冷寒濕之氣次服五苓散分利水榖兼用加巴感應圓温脾胃去積滯或六神圓未有不安者也或曰雖古人有言無積不成痢亦不專以去積為先豈有一嵗之内獨於夏秋之間人皆有積而春冬無之蓋風邪入胃木來勝土不為暴下則為痢疾其神术散要藥也又有一方一郡之内上下傳染疾状相似或只有一家長㓜皆然或上下隣里間相傳染或有病同而證異亦有證異而治同或用温劑而安或用凉藥而愈有如此等是毒疫痢也治疫毒痢者雖當察五運六氣之相勝亦不可狎泥此説且如運氣相勝豈獨偏於一方一郡而獨於一家二家者乎如有此證當先察其虚實冷熱首以敗毒散多加人參甘草陳米薑棗煎服及三黄熟艾湯黄連阿膠圓五苓散駐車圓可選而用之如下痢赤多或純下鮮血裏急後重大便不通身體壮熱手足心熱大煩躁渇腹脇脹痛小便赤澁六脉洪大或𦂳而數或沉而實此熱痢也宜白頭翁湯及三黄熟艾湯五苓散可選而用之若風痢下血太過宜用胃風湯加木香黒豆煎服若夏秋之間下痢或赤或白或赤白相雜臍腹㽲痛裏急後重增寒發熱心胷煩悶燥渇引飲嘔逆惡心小便不利及五心煩熱六脉虛弱此等脉證正因伏暑而得此疾冝服香薷散加黄連甘草當歸酒水濃煎沉令氷冷頓服仍兼服酒烝黄連圓或小紫胡湯加人參煎服必愈沈内翰云治痢之藥極多然無如此藥之妙蓋小柴胡湯能治暑毒如雜證一退而痢尚未止則以四物湯加膠艾煎服以調隂陽未有不安者也如水榖不分小便不利宜用五苓散淡竹葉煎湯調服如煩渇甚者亦宜服之若不明伏暑之證但以脉虛而妄投硫附薑桂丹石之藥而殺之深可嘆息若下痢純白状如魚腦臍腹冷痛日夜無度手足逆冷或有嘔逆全不入食飲食欲温而惡冷六脉微細此由臟腑虛冷之極宜木香散加服四味理中湯及鍾乳建脾圓甚者四肢逆冷六脉沉絶當一味峻補兼灸氣海丹田二穴更以助胃之藥此守而不攻之意也宜四順附子湯三建丹白丹加味參附湯薑附湯皆可選用如年尊虚弱之人或素來禀受怯弱亦宜以此法詳酌調理然大宜開胃進食為先食可得入則脾胃運化糟粕便聚糟粕既聚垢膩鮮血瘀滯不患其不除矣如乆痢不差腸滑不禁溏洩不止諸藥無效方可施之澁腸止痢之劑亦宜先以龍骨肉豆蔲訶子鍾乳胡粉之藥近人多用鶯粟殻地榆之屬然此物性太𦂳澁能損胃氣如少壮之人壮徤者服之間奏竒功若是疫毒受暑受濕之證及年尊之人或禀受怯弱服此莫不受其大害若以固祕澁膓為先則風寒暑濕之邪非惟澁而不去而胃管閉而不通禁口不食日見羸瘦糟粕不入腸中所患無由可除矣若有此證宜以參苓白术散四君子湯及以石蓮山藥之劑治之必愈治利欲投補藥必須有温通之意在焉如四君子湯理中湯十全湯加木香白豆蔲茯苓官桂厚朴之屬可以散風邪可以分水道可以開胃管可以治纒擾可以通祕澁此攻守之意兩全也大抵治痢之法虛者補之實者㵼之滑者澁之閉者通之有積者推之風則散之暑則滌之濕則燥之熱則涼之冷則温之冷熱者調之以平為期不可以過此為大法藥隱老人序白頭翁方治熱痢下血連月不差白頭翁二兩黄連黄蘗皮秦皮各三兩右㕮咀每服四錢水一琖半煎至七分去滓無時温服神术散治春傷於風夏生飱泄大治傷風頭痛項背拘急鼻流清涕蒼术一斤藁本川芎各六兩羌活四兩粉草二兩六錢細辛一兩六錢右為粗末每服三錢水一盞薑三片煎七分要出汗加葱去滓稍熱服無時候六神圓治赤白痢神麴别為末留作糊麥芽茯苓枳殻木香煨倍白痢之黄連六味等分赤痢倍之右為末用神麴末作糊為圓如梧桐子大每服五十圓赤痢甘草湯下白痢乾薑湯下赤白痢乾薑甘草湯下此藥得之山東饒殿講云是京城醫官見傳愚詳此方有黄連可以解暑毒清臟腑厚腸胃有木香能温脾胃逐邪氣止下痢有枳殻能寛腸胃有也茯苓能水道有神麵麥芽可以消滯真痢中之要藥三黄熟艾湯治傷寒四五日大下熱痢時作白通湯諸藥多不止宜服此湯除熱止痢亦有人作圓子熟水吞下四十圓治時行毒痢良驗黄芩黄連黄蘗各二分熟艾半箇雞子大右㕮咀每服三錢重水一琖煎至七分去滓温服無時四順附子湯生附子去皮白薑炮甘草人參各一兩右㕮咀每服四錢重水二琖煎至七分去滓空心服吐㵼腹痛加桂半兩小便不利者加茯苓半兩大凡痢疾雖體寒手足逆冷冷汗自出六脉沉伏不宜輕用附子多因伏暑而得此疾亦有冷汗自出四肢逆冷六脉虛弱但背寒靣垢或靣如塗油齒乾煩寃燥渇引飲此伏闕之證若手足和暖則為陽只須服五苓散用粟米飲調下次服感應圓二十粒即愈若覺手足厥冷則為隂當服暖藥如巳寒圓附子之類如此治痢無不效此方親曾用有效有人夏月患痢一日六七十行用五苓散兩服止酒烝黄連圓局方治状不言治痢疾僕嘗用之良驗薑附湯小柴胡湯參苓白术散香薷散敗毒散理中圓四君子湯黄連阿膠圓鍾乳建脾圓駐車圓感應圓亦有用蘇合香元和圓服名蘇感圓亦有外加黄䗶圓如梧桐子大十粒兼服胃風湯四物湯玉華白丹十全大補湯斗門散五苓散真人養臟湯水煑木香圓大巳寒圓已上諸方並出官局不復重録如斗門散養臟湯水煑木香圓參香散豆蔲餅其中皆使罌粟殻然此藥大能壊脾胃古方不用如脾胃壮健之人服者多有良驗姑存於後參香散治男子婦人小兒隂陽不和冷熱相搏積而成痢或赤或白或赤白相雜日夜無度裏急後重臍腹㽲痛甚不可忍又治水㵼不止腸鳴腹痛或熱毒中傷或寒氣久積並冝治之罌粟殻製陳皮去白粉草各一兩厚朴半兩青皮白薑各一分右為末每服二錢赤痢甘草湯調白痢陳米飲調赤白相雜紫蘇湯調如冷㵼陳米飲調熱㵼新井水調空心服此藥正脾去積和氣理中忌生冷肥膩油麵醃藏豆蔲餅治赤白痢臍腹刺痛久而不愈大治冷痢罌粟殻製一兩白芍藥黄耆三錢陳皮青皮木香訶子肉豆蔲人參各錢半羌活當歸各一錢右為末蜜煉圓如彈子大毎服二圓水一小琖煎至七分温服二方余明仲先生方不曾有一婦人病痢疾月四十日服諸藥愈召僕診之六脉沉弱大凡下痢之脉宜沉宜弱但服十全大補湯薑棗煎成加白蜜半匙再煎數沸服之愈甲子夏秋間僕處趙經畧􅈦有姪孫年九嵗病痢甚重召小方脉未至遂令僕診之六脉平細以證觀之云是血痢其實非也只是血水而已僕云記得調中湯治状云治夏月初秋忽有暴寒折於盛熱結於四肢則壮熱頭痛寒傷於胷則下痢或血或水或赤壮熱㝠悶脉數宜服此遂合之去大黄服之而愈調中湯方葛根黄芩芍藥桔梗藁本赤茯苓白术甘草炙等分右㕮咀每服三錢水一琖煎至七分去滓温服移時再服又有一婦人泄㵼不止似痢非痢似血非血其色如濁酒召予診之則六脉沉絶衆醫用熱藥及丹藥服之則發煩悶僕先用敗毒散數服加陳米煎次又用胃風湯加粟米煎愈調中湯去大黄亦療此證痢後嘔噦方論第十一凡七方凡滯下病之稍久或欲愈之時多有咳逆及嘔逆之證然欬逆者古人所謂噦是也噦者胃寒所生此證最危其它病亦惡欬逆如見此證宜用橘皮乾薑湯半夏生薑湯丁香柿蒂湯若陽證欬逆者小柴胡湯橘皮竹茹湯僕嘗治一痢疾欬逆不止六脉沉弱諸醫用藥灼艾皆無效僕投退隂散兩服愈又嘗治許主簿痢疾愈後咳逆不止服諸藥無效遂灸期門穴不三壮而愈其穴在第六卷十五論中如有咳逆之證雖經云無隂則嘔然多有胃熱而嘔亦有胃寒而生亦有暑毒而生如胃熱而嘔宜服小柴胡湯孫兆竹茹湯蘆根湯官局桔梗湯竹葉石膏湯加生薑主之嘔而發渇者猪苓湯僕嘗治一痢後嘔不止六脉虛弱此胃寒而嘔又似暑毒凝於胃脘投局方香薷圓愈橘皮乾薑湯治噦橘皮通草乾薑桂心甘草各四錢人參二錢右㕮咀每服四錢水一琖煎至七分去滓温服半夏生薑湯治噦欲死半夏一兩一分洗生薑二兩切右以水二琖煎至八分去滓分為二服丁香柿蒂湯治欬逆丁香十粒柿蒂十五箇右㕮咀用水一琖半煎至八分去滓温服橘皮竹茹湯治噦逆橘皮二兩竹茹二升甘草二兩人參半兩半夏一兩湯洗右㕮咀每服四錢水二琖生薑六片棗一枚煎至七分去滓温服生薑橘皮湯治乾嘔噦若手足厥冷者橘皮四兩生薑半升右㕮咀每服半兩水一琖煎至七分去滓温服退隂散治隂毒傷寒手足逆冷脉沉細頭痛腰重連進三服小小傷寒每服一字入正元散内同煎入鹽一捻隂毒傷寒咳逆煎一服細細熱呷便止乾薑烏梅右等分為粗末炒令黄色候冷搗為末每服一錢水一琖鹽一捻煎至半琖服猪苓湯治咳而嘔渇心煩不得眠猪苓赤茯苓澤㵼阿膠炒滑石各半兩右㕮咀每服三錢水一琖煎候膠消盡服孫兆竹茹湯方見第六卷蘆根湯方見第六卷小柴胡湯官局桔梗湯竹葉石膏湯香薷圓已上並出局方不復重録婦人大便下血方論第十二凡八方夫婦人臟腑損傷風邪易入凡熱氣在内令人下血風氣在内亦大便血色或如豆汁腹中疼痛若糞後下血者其來逺糞前有血者其來近逺近者言病在上下也婦人面無血色時寒時熱脉浮弱按之絶者為下血也防風如神散治婦人風虛大便後時時下血宜服防風枳殻等分右㕮咀每服三錢水一琖煎至七分去滓空心服治腸風下血赤芍藥一兩瓦上燒存性右為末温酒調下二錢又方枳殻十五合毎合入巴豆三粒去殻皮安在内以綿裹之用好米醋於砂盆内煑候醋乾更加無灰酒煑令糜爛去巴豆研成膏以黄耆五兩為末入膏内為圓如梧桐子大每服二十圓空心米飲吞下酒亦可治痢久不安下血成片頭髪一團洗燒灰研每服一二錢新汲水調下瘡癤之毒以温酒服佳空心木香烏荆圓治腸風酒痢已上四方出專治婦人方木香一分荆芥穗川烏炮各一兩右為末酒糊圓如梧桐子大毎服二十圓食前臨卧濃煎栗根白皮酒吞下忌羊血此同舍處傳之曾服有效又方荆芥穗黄耆熟地黄當歸桑耳地榆樗白皮皂角利乾薑槐豆牛蒡子甘草右等分為細末每服二錢粥飲調下空心服治腸風下血蒼术不以多少以皂角濃挼汁浸一夕次日煑令水乾焙燥右一味為細末麵糊圓如梧子大米飲空心下五十圓日三經云結隂者便血一升再結者二升三結三升宜用地榆湯駱龍吉方地榆四兩甘草一兩半縮砂仁四七枚右為粗末每服三錢水一琖煎至七分去滓空心温服腸風黒散治榮衛氣虛風邪冷氣進襲臟腑之内或食生冷或啖炙􅘤或飲酒過度積熱腸間致使脾虛弱糟粕不聚大便鮮血臍腹疼痛裏急後重或肛門脱出或久患酒痢大便頻併並皆治之敗棕燒木饅頭燒烏梅去核粉草炙各等分右為細末每服二錢水一琖煎至七分空心温服僕嘗治一婦人便血不止用煑附圓加五靈脂效方見第一卷婦人痔瘻方論第十三凡五方夫婦人痔瘻者皆由酒色氣風食及勞傷經絡其血滲而成之亦有長年久坐而成者其痔有五種肛邊瘡如乳出於外時出膿血者為牡痔也肛邊腫生瘡而出血者為牝痔也肛邊生瘡痒而復痛者為脉痔也肛邊腫核痛發寒熱而出血者為腸痔也因便轉而清血隨出者為血痔也治之各有方鼈甲散治婦人五種痔疾鼈甲露蜂房蛇蛻蝟皮猪後懸蹄甲五味燒存性各二分麝香一分右各研為末和藥令停每服一錢空心用生乾地黄煎湯調下若肛門有竅腫痛傅之即愈忌莧菜局方釣腸圓黒玉丹服之皆驗僕嘗治一婦人久病心焦多怒遂成痔疾状如蓮子熱腫而痛遂用熊膽入梅花腦子並研更用猪膽汁調開塗痔立愈方出張氏又方療痔熱腫痛鄔子華解元方蛞蝓大者一條江西名蜒蚰湖廣名石夾子廣州名鼻涕虫研令爛入研了龍腦一字坯子半錢研令停傅之愈先以石薜荔煑水熏洗尤妙五羊大帥趙尚書上汝下暨云母夫人病此只用蛞蝓與京墨研塗亦愈婦人脱肛候方論第十四凡五方夫肛門者大腸候也大腸虛冷其氣下衝肛門反出亦有因産用力努躽氣衝其肛亦令反出也治大腸久積虛冷每因大便脱肛收不得出聖惠方蝸牛一兩去殻生研猪脂和傅之立縮藥性論云蝸牛有小毒能治大腸脱肛小范旺方云此螺全似蝸牛色黄而兩後好緣桑葉者佳孫真人同姚和衆治男子女人小兒大腸虛冷肛門脱出以鐵精粉傅之良聖惠方亦治隂脱隂腫集驗方療脱肛厯年不愈以生鐵三斤水一㪷煑取五升去鐵以汁洗日再姚和衆治大人小兒因痢脱肛鼈頭骨燒灰研取粉撲之日華子云鼈頭燒灰療脱肛圖經同藥性論鼈頭血塗脱肛孫真人療脱肛腸頭若挺出一片蝦蟇皮瓶中燒烟熏功效覺𤣥微婦人隂腫方論第十五凡六方夫婦人隂腫者是虛損受風邪所為胞絡虚而有風邪客之風氣乘於隂與血氣相摶令氣否澁腠理壅閉不得泄越故令腫也菖蒲散治婦人月水澁滯隂間腫痛菖蒲當歸各一兩炒秦芁三分吳茱茰半兩製右為粗末每服三錢水一琖葱白五寸煎至六分去滓空心温服經心録治婦人隂中腫痛不可忍艾葉五兩防風三兩大㦸二兩右剉細以水一㪷煑取五升熱洗日三切宜避風冷麻黄湯洗方古今録驗治婦人隂腫或瘡爛者麻黄黄連蛇床子各二兩北艾葉一兩半烏梅十箇右剉細以水一㪷煑取五升去滓熱洗避風冷白􅈨散古今録驗治婦人隂腫堅痛白礬半兩甘草半分生大黄一分生右為細末每用棗大綿裹内隂中日兩換肘後方療隂中腫痛方枳殻半斤炒令熱以故帛褁熨冷即換之子母祕録療隂腫鐵精粉傅上婦人隂痒方論第十六與第二十三卷第十論通用凡十方夫婦人隂痒者是蟲蝕所為三蟲在於腸胃之間因臟虛三蟲動作蝕於隂内其蟲作熱微則為痒重者乃痛也大黄散治婦人隂痒大黄微炒黄芩黄耆炙各一兩赤芍藥𤣥參丹參山茱茰蛇床子各半兩右為細末食前温酒調二錢服廣濟方療婦人隂痒不止蚺蛇膽雄黄硫黄朱砂硝石蕪荑各半兩藜蘆二錢半右為細末研停以臈月猪脂和如膏用故布作纒子如指長一寸半以藥塗上内隂中日一易之易時宜用猪椒根三五兩水煑稍熱洗乾拭内之效又方小蘇不拘多少水煑作湯熱洗日三用之崔氏療隂痒不可忍方杏仁燒作灰承熱綿褁内隂中日二易之又方蒜煑湯洗之一方用枸杞根又方狼牙二兩細剉蛇床子三兩右以水三升煑十沸熱洗又方取雞肝承熱内隂中如有蟲蟲當盡下古今録驗療婦人隂痒如有蟲状右取牛肝切取三寸内隂中其蟲盡入肝内出之效猪肝亦可礬石散千金翼治婦人隂痒脱礬石為末空心酒服方寸匕日三服婦人隂冷方論第十七凡六方婦人胞絡勞傷子臟虚損風冷客之冷乘於隂故令冷也療婦人癖瘦隂冷五加皮浸酒方五加皮乾薑丹參蛇床子熟地黄杜仲製各三兩鍾乳粉四兩天門冬一兩地骨皮二兩右細剉以生絹袋盛用酒十五升漬二宿毎服温一中琖空心晩食前各一服治婦人隂冷痒方逺志二分乾薑生蓮花各三分蛇床子五味子各四分右為細末先以兎尿塗隂門中然後綿褁一錢内隂中熱即為效傳心方治玉門寛冷方硫黄末煎湯洗近效坐導藥主隂冷子門痒閉方吳茱茰葶藶子炒各二分蛇床子三分没石子一枚右為末以綿褁如棗子内子宫中又方五味子四兩為細末每用以口中玉泉和如兎屎大内隂中熱即效通真論療婦人子門冷坐藥法蛇床子四分吳茱茰六分麝香少許右為細末煉蜜圓如酸棗大以綿褁内隂中下惡物為度婦人隂挺出下脱方論第十八凡八方夫婦人胞絡傷損子臟虛冷氣下衝則令隂挺出謂之下脱亦有因産而用力躽氣而隂下脱者診其少隂脉浮動浮為虛動為悸故令下脱也當歸散千金翼療婦人隂挺下脱當歸炒黄芩各二兩牡蠣二兩半蝟皮一兩炙焦赤芍藥一兩半右為細末毎服二錢食前煖酒調下米飲亦可又方當歸三兩敗醤二兩獨活白芷地榆白礬各半兩右細剉水一㪷煑取二升去滓稍熱洗廣濟方治状同前皂角去皮弦子炙焦黄半夏炒令黄大黄北細辛各一兩蛇床子一兩半右為細末薄絹袋盛如指長内隂中日二易之又方蛇床子五兩烏梅十四枚右剉以水五升煑取三升去滓熱洗日五次又方川烏白及等分右為細末綿褁一錢内隂中令入三寸腹内熱即止來辰再用一方有生椒一兩千金翼療婦人隂脱兼療脱肛羊脂煎訖適冷暖塗上以鐵精粉傅脂上多少令調以火炙布令温以熨上漸漸推内之更細末磁石酒調服方寸匕日三服婦人隂中生瘡方苐十九又見二十三卷第十論凡五方集驗療婦人隂中痛生瘡羊脂一斤當歸杏仁白芷芎藭各一兩右五味細切羊脂和置甑中蒸之藥成取如大豆一枚綿裹藥内隂中日一度肘後療女人隂中生瘡方杏仁燒末雄黄礬石各二分麝香半分右四味研細和傅隂中又方硫黄細研傅之黄芩湯洗方古今録驗療婦人隂中生瘡雄黄當歸黄芩芎藭大黄礬石各二分黄連一分右七味切以水五升煑取四升洗瘡日三度又方雄黄散雄黄芎藭辰砂梨蘆北細辛當歸川椒等分右為末綿褁内隂中又傅外瘡上忌如常法女人傷丈夫頭痛方第二十凡二方集驗療女人傷丈夫四體沉重嘘吸頭痛方生地黄八兩芍藥五兩香豉一升葱白一升生薑四兩甘草二兩右六味切以水七升煑取二升半分三服不得重作忌房事千金同桑白皮湯千金翼療諸婦人傷丈夫苦頭痛欲嘔悶桑白皮半兩乾薑二絫桂心五寸大棗二十枚右四味切以酒一㪷煑三四沸去滓分温服衣適厚薄毋令汗出千金同女人交接輙血出痛方第二十一凡二方千金療女人交接輙血出方桂心伏龍肝各二分右為末酒服方寸匕差止又方黄連六分牛膝甘草各四分右三味細切以水四升煑取二升洗之日三四度差止女人交接它物傷方第二十二凡三方集驗療女人交接陽道違理及它物所傷犯血出流漓不止方取釡底墨斷葫蘆塗藥内之又療女童交接陽道違理血出不止方燒髪并青布末為粉塗之又方割雞冠血塗之小户嫁痛方第二十三凡四方千金療小户嫁痛連日方甘草三分白芍藥二分生薑三分桂心一分右四味細切以酒二升煑取三沸去滓温服神良又療小户嫁痛單行方牛膝五兩右一味切以酒三升煑取二升分三服又療婦人嫁痛單行太和湯方大黄三兩右一味切以酒一升煑一沸頓服又療婦人小户嫁痛海螵蛸散方烏賊魚骨二枚右一味燒研為細末酒服方寸匕日三服婦人大全良方卷八
