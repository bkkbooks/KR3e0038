body:
  text: 婦人大全良方卷十三宋陳自明撰姙娠數墮胎方論第一凡五方夫陽施隂化故得有胎榮衞調和則經養周足故胎得安則能成長若血氣虚損者子臟為風寒所苦則血氣不足故不能養胎所以數墮胎也其姙娠腰疼者喜墮胎也千金療姙娠二箇月數墮胎法灸膝下一寸七壯又方赤小豆為末酒調方寸匕日二服亦治姙娠數月月水尚来刪繁方療姙娠懐胎數落而不結實或冷或熱百病之源甘草黄耆人參川芎白术地黄吳茱茰各等分一方有當歸乾薑右為末空心温酒調二錢忌菘菜桃李雀肉醋物經心録同廣濟療婦人懐姙數傷胎方鯉魚二斤粳米一升右二味如法作臛少着鹽勿着葱豉醋食之甚良一月中須三遍作效安穏無忌集驗文仲備急崔氏延年方同經心録紫石英圓主風冷在子宫有子常落或始為婦便患心痛乃成心疾月水都未曽來服之肥恱令人有子方紫石英天門冬去心五味子各三兩烏頭炮卷栢烏賊魚骨雲母燒研禹餘粮當歸川椒如常製桑寄生石楠葉各一兩澤瀉杜仲逺志去心蓯蓉桂心甘草石斛人參辛夷栢子仁各二兩右為末煉蜜為圓如梧桐子大温酒下二十圓至三四十圓千金方同療姙娠數墮胎皆因氣血虚損子臓風冷致胎不堅固頻有所傷冝服卷栢圓卷栢鍾乳粉鹿角膠炒紫石英飛陽起石飛桑螵蛸炒禹餘粮研熟地黄各一兩桂心川牛膝桑寄生北五味蛇床子牡丹皮杜仲川芎當歸各十二分右為末煉蜜圓如梧桐子大每服三四十圓空心温酒吞下姙娠胎不長養方論第二凡五方夫姙娠之人有宿痾挾疾而後有娠或有娠時節適乖理致生疾病並令臓腑衰損氣力虚羸令胎不長故須服藥去其疾病益其氣血以扶養胎也集驗治婦人懐胎不長方鯉魚長一尺者去腸肚鱗以水漬没内鹽及棗煑令熟取汁稍稍飲之當胎所腹上當汗出如牛鼻狀雖有所見胎雖不安者十餘日輙一作此令胎長大甚平安古今録驗療姙娠養胎白术散白术川芎各四分川椒炒出汗三分牡蠣煅二分右四味為細末酒調一錢七日三夜一但苦痛加芍藥心下毒痛倍加川芎吐唾不能飲食加細辛一兩半夏大者二十枚服之復更以漿水服之若嘔亦以醋漿水服之復不解者小麥汁服之已後其人若渴者大麥粥服之病雖愈盡服之勿置裴伏仲景方忌雀肉桃李療姙娠胎不長冝服安胎和氣思食利四肢黄耆散黄耆白术陳皮麥門冬白茯苓前胡人參各三分川芎甘草各半兩右㕮咀每服三錢水一琖薑三片棗一枚煎至七分去滓温服療姙娠胎不長冝服養胎人參圓人參白茯苓當歸柴胡刺薊厚朴桑寄生各一兩枳殻三分甘草半兩右為細末煉蜜為圓如梧桐子大每服二十圓食前温水吞下白术圓調補衝任扶養胎氣治姙娠宿有風冷胎痿不長或失於將理傷動胎氣多致損墮娠孕常服益血保䕶胎臓白术川芎阿膠炒地黄炒令六分焦當歸去尾炒各一兩牡蠣煅為粉二分川椒三分如常製右為末煉蜜為圓如梧桐子大空心米飲吞三四十圓酒醋湯亦可姙娠胎動安不得却須下方論第三凡七方病姙娠得欲去子方附夫姙娠羸瘦或挾疾病臟腑虚損氣血枯竭既不能養胎致胎動而不堅固終不能安者則可下之免害姙婦也療胎動安不得尚在腹母欲死須以牛膝湯下之牛膝去苖剉半兩水銀二兩朱砂二兩半研右以水五大琖煑牛膝可得一半去滓即以蜜和朱砂及水銀研如膏每服以牛膝汁一小琖調下半匙頓服桂心散治姙娠母因疾病胎不能安可下之桂心𤓰樓牛膝瞿麥各二兩當歸一兩右㕮咀每服四錢水一琖煎至七分空心去滓服又方瞿麥桂心各一兩牛膝二兩蟹爪二合右為細末空心温酒調一錢服又方牛膝一握右細𢷬以無灰酒一大琖煎取七分温二服又方取七月七日法麯四兩水二大琖煎取一琖三分綿濾去滓分温三服立下小品療姙娠得病須去胎方麥蘖一升為末和煑二升服之即下神効文仲療姙娠得病欲去胎方取雞子一枚以三指撮鹽置雞子中服之立出與阮河南療産難同千金經心録同姙娠墮胎後血下不止方論第四凡九方夫墮胎後復損於經脉經脉既虚故下血不止也下血多者便致煩悶乃至死矣治姙娠損動下血不止腹痛冝服此方阿膠一兩炒艾葉半兩右以水一琖煎至六分去滓温服空心治姙娠損動下血不止甘草一兩炙阿膠二兩炒雞子一枚右細剉以水二大琖煑甘草一琖三分去滓下雞子及阿膠候膠消攪令停無時分温三服龍骨散廣濟療因損娠下惡血不止龍骨當歸地黄各八分艾葉四分炒地榆阿膠芍藥乾薑各六分蒲黄五分牛角䚡炙焦十分右為細末食前粥飲調下二錢治姙娠墮胎下血不盡苦煩滿欲極時發寒熱狂悶方鹿角屑一兩熬右以水一大琖煎䜴一合取汁六分分為三服調鹿角屑二錢服日三服須㬰血下古今録驗同千金療落胎下血不止方右以生地黄汁一小琖調代赭末一錢日三服治姙娠下血疼痛不止亦治小便不禁右以家雞翎燒灰細研以温酒調下二錢如人行五里再服以効為度千金療姙娠胎墮下血不止方丹參一味十二兩右細切以酒五升煑取三升分三服救急療損娠方右取朱砂末一錢匕生雞子三顆取白和朱砂頓服胎若死即出如未死即安姙娠日月未足欲産方第五凡四方集驗知母圓治日月未足而痛如欲産者兼治産難及子煩知母一味為細末煉蜜圎如雞頭大温酒嚼下日三服千金崔氏小品同一方圎如梧桐子大粥飲下二十圎槐子圓治姙娠月數未足而似欲産腹痛者槐子蒲黄等分右為末蜜圓如梧桐子大温酒下二十圓以痛止為度又方取蒲黄如棗核大篩過以井花水調服又方梁上塵竈突煤右二味為細末空心酒服方寸匕斷産方論第六凡七方論曰欲斷産者不易之事雖曰天地大徳曰生然亦有臨産艱難或生育不已或不正之屬為尼為娼不欲受孕而欲斷之者故録驗方以備所用然其方頗衆然多有用水銀䖟虫水蛭之類孕不復懐難免受病此方平和而有異驗列具于後小品方療婦人斷産驗方千金翼外䑓祕要同故蚕紙方圓一尺燒為末酒飲調服終身不復懐孕也療姙娠欲去之并斷産方栝樓桂心各二兩豉一升右三味切以水四升煑取一升半分服之又方附子二枚為末以淳苦酒和塗右足去之大良千金斷産方油煎水銀一日方息空心服如棗大一圓永斷不損人廣濟落胎方栝樓根四兩肉桂五兩牛膝三兩瞿麥一兩右切以水七升煎二升三合去滓温分三服服後如人行五里又進一服無忌小品療羸人欲去胎粉草乾薑人參川芎生薑肉桂蟹爪黄芩右八味等分細切以水七升煑取二升分三服忌海藻菘菜生葱千金欲去胎大麯五升清酒一㪷煑二沸去滓分五服隔宿勿食旦再服其子如糜令母肥盛無疾苦千金不傳姙娠咳嗽方論第七凡八方夫肺感於寒寒傷於肺則成咳嗽也所以然者肺主氣而外合皮毛毛竅不宻則寒邪乗虛而入故肺受之也五臟六腑俱受氣於肺以其時感於寒而為嗽也秋則肺受之冬則腎受之春則肝受之夏則心受之其諸藏嗽不已則傳於腑姙娠病乆不已者則傷胎也欵冬花散療姙娠心鬲痰毒壅滯肺氣不順咳嗽頭疼欵冬花麻黄貝母煨前胡桑白皮紫苑各半兩旋覆花白术甘草各一分石膏一兩右㕮咀每服四錢水一琖薑三片煎至七分去滓温服食後桔梗散治姙娠肺壅咳嗽喘急不食天門冬去心一兩桑白皮苦梗紫蘇各半兩赤茯苓一兩麻黄去節三分貝母人參甘草各半兩右㕮咀每服四錢水一琖薑三片煎至七分去滓不拘時候服馬兠鈴散治姙娠胎氣壅滯咳嗽喘急馬兠鈴苦梗人參甘草貝母各半兩陳皮去白大腹皮紫蘇桑白皮各一兩五味子七文半右㕮咀每服四錢水一琖薑三片煎至七分去滓無時温服麻黄散治姙娠外傷風冷痰逆咳嗽不食麻黄陳皮前胡各一兩半夏人參白术枳殻貝母甘草各半兩右㕮咀每服四錢葱白五寸薑半分棗三箇水一盞煎至六分去滓温服百合散治姙娠咳嗽心胷不利煩悶不食川百合紫苑麥門冬苦梗桑白皮各一兩甘草半兩右㕮咀每服四錢水一琖竹茹一分煎至六分去滓入蜜半匙更煎三兩沸不拘時温服紫苑湯治姙娠咳嗽不止胎不安八方出産科甘草杏仁各一分紫苑一兩桑白皮一分苦梗三分天門冬一兩右㕮咀每服三錢水一琖竹茹一塊煎至七分去滓入蜜半匙再煎二沸温服療姙娠咳嗽方以車􅤧燒赤投酒中候冷飲之良療姙娠傷寒涎多咳嗽知母杏仁天門冬桑白皮等分右㕮咀每服三錢水一琖煎至七分去滓服姙娠喘嗽不止冝服局方華葢散穏重而有効姙娠吐血衂方論第八凡二方論曰夫姙娠吐血者皆由臟腑所傷為憂思驚怒皆傷臟腑氣逆吐血吐血而心悶胷滿未欲止心悶甚者死姙娠病此多墮胎也局方必勝散有効治吐血不止馬勃用生布擦為末濃米飲調下昌黎先生云牛溲馬勃敗鼓之皮俱收並蓄待用無遺者醫師之良也治鼻衂以白茅花濃煎汁服亦可就第七卷吐血方中選用姙娠子煩方論第九凡十方論曰姙娠苦煩悶者以四月受少隂君火氣以養精六月受少陽相火氣以養氣若母心驚膽寒多有煩悶名曰子煩也産寳云夫姙娠而子煩者是肺臟虚而熱乘於心則令心煩也停痰積飲在心胷之間或衝於心亦令煩也若熱而煩者但熱而已若有痰飲而煩者嘔吐涎沫惡聞食氣煩躁不安也大抵姙娠之人既停痰積飲又虚熱相摶氣鬱不舒或煩躁或嘔吐涎沬劇則胎動不安均謂之子煩也竹葉湯治子煩防風黄芩麥門冬各三兩白茯苓四兩右㕮咀每服四錢水一琖竹葉數片煎至七分去滓温服忌酢物外臺祕要有竹瀝三合無竹葉名竹瀝湯指迷同一方無黄芩有知母又方時時飲竹瀝隨多少竹茹湯療姙娠煩燥或胎不安淡青竹刮茹一兩右以水一大升煑取四合徐徐服盡為度麥門冬散治姙娠心煩憤悶虚躁吐逆惡聞食氣頭眩四肢沉重百節疼痛多卧少起麥門冬子芩赤茯苓各一兩柴胡赤芍藥陳皮人參苦梗桑寄生甘草旋覆花各半兩生地黄二兩右為粗末每服四錢水一琖薑半分煎至六分去滓無時温服又方麥門冬苧根各二兩黄芩茯神各一兩甘草炙一分犀角屑半兩右㕮咀每服四錢水一琖生地黄一分淡竹葉二㭍片煎至六分去滓温服柴胡散治姙娠心煩頭目昏重心胷煩悶不思飲食或嘔吐柴胡一兩五錢赤茯苓麥門冬各一兩枇杷葉去毛人參橘紅甘草各半兩右㕮咀每服四錢水一琖薑三片煎至七分去滓温服人參散治姙娠熱氣乗於心脾津液枯少煩躁壅熱口舌乾渇人參麥門冬赤茯苓地骨皮家乾葛黄芩犀角屑各三分甘草半兩右㕮咀每三錢水一琖煎至六分去滓温服治姙娠子煩口乾不得卧黄連去鬚右為細末每服一錢粥飲調下酒烝黄連圓亦妙治姙娠心煩熱不止葱白一握䜴二合右以水二大琖煎取一琖半去滓温分三服一母圓治姙娠因服藥致胎氣不安有似虚煩不得卧者巢氏謂之子煩也知母一兩洗焙右為細末以棗肉為圓如彈子大每服一圓細嚼煎人參湯送下次見醫者不識此證作虚煩治之損動胎氣冝矣有識者亦見有藥也産科鄭宗文得於陳藏器本草拾遺中也用之良驗方出産乳姙娠煩躁口乾方論第十凡四方夫足太隂脾之經也其氣通於口手少隂心之經也其氣通於舌若姙娠之人臟腑氣虚榮衛不理隂陽隔絶熱氣乗於心脾津液枯少故令心煩而口乾也愚考此證與子煩大同小異其方亦可就子煩中通用一母圓亦妙升麻散治姙娠壅熱心神煩躁口乾渇逆川升麻黄芩人參麥門冬梔子仁柴胡茯神𤓰蔞根犀角屑各一兩知母甘草各半兩右㕮咀每服四錢水一琖煎至六分去滓温服知母散治姙娠煩躁悶亂口乾及胎臟熱知母麥門冬甘草各半兩黄耆子芩赤茯苓各三分右㕮咀每服四錢水一琖煎至七分去滓入竹瀝一合更煎二沸温服葛根散治婦人姙娠數月胷鬲煩躁唇口乾渇四肢壯熱少食葛根不用野葛黄芩人參萎蕤黄耆麥門冬甘草等分㕮咀右每服四錢水一琖竹茹一塊如錢大煎至七分去滓温服無時人參黄者散治姙娠身熱煩躁口乾食少人參黄耆家葛根秦芁麥門冬各一兩知母三分甘草半兩赤茯苓一兩右㕮咀每服四錢水一琖薑三片淡竹葉二七片煎至六分去滓温服婦人大全良方卷十三
