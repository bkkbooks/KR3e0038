body:
  text: 婦人大全良方卷十三宋陳自明撰妊娠數墮胎方論第一凡五方夫陽施隂化故得有胎榮衛調和則經養周足故胎得安則能成長若血氣虛損者子臟為風寒所苦則血氣不足故不能養胎所以數墮胎也其妊娠腰疼者喜墮胎也千金療妊娠二箇月數墮胎法灸膝下一寸七壯又方赤小豆為末酒調方寸匕日二服亦治妊娠數月月水尚來刪繁方療妊娠懷胎數落而不結實或冷或熱百病之源甘草黃耆人參川芎白术地黃吳茱茰各等分一方有當歸乾薑右為末空心溫酒調二錢忌菘菜桃李雀肉醋物經心録同廣濟療婦人懷妊數傷胎方鯉魚二斤粳米一升右二味如法作臛少著鹽勿著葱豉醋食之甚良一月中須三遍作效安穩無忌集驗文仲備急崔氏延年方同經心録紫石英圓主風冷在子宫有子常落或始為婦便患心痛乃成心疾月水都未曽來服之肥恱令人有子方紫石英天門冬去心五味子各三兩烏頭炮卷柏烏賊魚骨雲母燒研禹餘糧當歸川椒如常製桑寄生石楠葉各一兩澤瀉杜仲逺志去心蓯蓉桂心甘草石斛人參辛夷柏子仁各二兩右為末煉蜜為圓如梧桐子大溫酒下二十圓至三四十圓千金方同療妊娠數墮胎皆因氣血虛損子臟風冷致胎不堅固頻有所傷冝服卷柏圓卷柏鍾乳粉鹿角膠炒紫石英飛陽起石飛桑螵蛸炒禹餘糧研熟地黃各一兩桂心川牛膝桑寄生北五味蛇床子牡丹皮杜仲川芎當歸各十二分右為末煉蜜圓如梧桐子大每服三四十圓空心溫酒吞下妊娠胎不長養方論第二凡五方夫妊娠之人有宿痾挾疾而後有娠或有娠時節適乖理致生疾病並令臟腑衰損氣力虛羸令胎不長故須服藥去其疾病益其氣血以扶養胎也集驗治婦人懷胎不長方鯉魚長一尺者去腸肚鱗以水漬沒內鹽及棗煮令熟取汁稍稍飲之當胎所腹上當汗出如牛鼻狀雖有所見胎雖不安者十餘日輒一作此令胎長大甚平安古今録驗療妊娠養胎白术散白术川芎各四分川椒炒出汗三分牡蠣煅二分右四味為細末酒調一錢七日三夜一但苦痛加芍藥心下毒痛倍加川芎吐唾不能飲食加細辛一兩半夏大者二十枚服之復更以漿水服之若嘔亦以醋漿水服之復不解者小麥汁服之已後其人若渴者大麥粥服之病雖愈盡服之勿置裴伏仲景方忌雀肉桃李療妊娠胎不長冝服安胎和氣思食利四肢黃耆散黃耆白术陳皮麥門冬白茯苓前胡人參各三分川芎甘草各半兩右㕮咀每服三錢水一盞薑三片棗一枚煎至七分去滓溫服療妊娠胎不長冝服養胎人參圓人參白茯苓當歸柴胡刺薊厚朴桑寄生各一兩枳殼三分甘草半兩右為細末煉蜜為圓如梧桐子大每服二十圓食前溫水吞下白术圓調補衝任扶養胎氣治妊娠宿有風冷胎痿不長或失於將理傷動胎氣多致損墮娠孕常服益血保護胎臟白术川芎阿膠炒地黃炒令六分焦當歸去尾炒各一兩牡蠣煅為粉二分川椒三分如常製右為末煉蜜為圓如梧桐子大空心米飲吞三四十圓酒醋湯亦可妊娠胎動安不得却須下方論第三凡七方病妊娠得欲去子方附夫妊娠羸瘦或挾疾病臟腑虛損氣血枯竭既不能養胎致胎動而不堅固終不能安者則可下之免害妊婦也療胎動安不得尚在腹母欲死須以牛膝湯下之牛膝去苖銼半兩水銀二兩朱砂二兩半研右以水五大盞煮牛膝可得一半去滓即以蜜和朱砂及水銀研如膏每服以牛膝汁一小盞調下半匙頓服桂心散治妊娠母因疾病胎不能安可下之桂心瓜樓牛膝瞿麥各二兩當歸一兩右㕮咀每服四錢水一盞煎至七分空心去滓服又方瞿麥桂心各一兩牛膝二兩蟹爪二合右為細末空心溫酒調一錢服又方牛膝一握右細搗以無灰酒一大盞煎取七分溫二服又方取七月七日法麯四兩水二大盞煎取一盞三分綿濾去滓分溫三服立下小品療妊娠得病須去胎方麥蘖一升為末和煮二升服之即下神效文仲療妊娠得病欲去胎方取雞子一枚以三指撮鹽置雞子中服之立出與阮河南療産難同千金經心録同妊娠墮胎後血下不止方論第四凡九方夫墮胎後復損於經脉經脉既虛故下血不止也下血多者便致煩悶乃至死矣治妊娠損動下血不止腹痛冝服此方阿膠一兩炒艾葉半兩右以水一盞煎至六分去滓溫服空心治妊娠損動下血不止甘草一兩炙阿膠二兩炒雞子一枚右細銼以水二大盞煮甘草一盞三分去滓下雞子及阿膠候膠消攪令停無時分溫三服龍骨散廣濟療因損娠下惡血不止龍骨當歸地黃各八分艾葉四分炒地榆阿膠芍藥乾薑各六分蒲黃五分牛角䚡炙焦十分右為細末食前粥飲調下二錢治妊娠墮胎下血不盡苦煩滿欲極時發寒熱狂悶方鹿角屑一兩熬右以水一大盞煎䜴一合取汁六分分為三服調鹿角屑二錢服日三服須㬰血下古今録驗同千金療落胎下血不止方右以生地黃汁一小盞調代赭末一錢日三服治妊娠下血疼痛不止亦治小便不禁右以家雞翎燒灰細研以溫酒調下二錢如人行五里再服以效為度千金療妊娠胎墮下血不止方丹參一味十二兩右細切以酒五升煮取三升分三服救急療損娠方右取朱砂末一錢匕生雞子三顆取白和朱砂頓服胎若死即出如未死即安妊娠日月未足欲産方第五凡四方集驗知母圓治日月未足而痛如欲産者兼治産難及子煩知母一味為細末煉蜜圎如雞頭大溫酒嚼下日三服千金崔氏小品同一方圎如梧桐子大粥飲下二十圎槐子圓治妊娠月數未足而似欲産腹痛者槐子蒲黃等分右為末蜜圓如梧桐子大溫酒下二十圓以痛止為度又方取蒲黃如棗核大篩過以井花水調服又方梁上塵竈突煤右二味為細末空心酒服方寸匕斷産方論第六凡七方論曰欲斷産者不易之事雖曰天地大德曰生然亦有臨産艱難或生育不已或不正之屬為尼為娼不欲受孕而欲斷之者故録驗方以備所用然其方頗衆然多有用水銀虻蟲水蛭之類孕不復懷難免受病此方平和而有異驗列具于後小品方療婦人斷産驗方千金翼外臺祕要同故蠶紙方圓一尺燒為末酒飲調服終身不復懷孕也療妊娠欲去之并斷産方栝樓桂心各二兩豉一升右三味切以水四升煮取一升半分服之又方附子二枚為末以淳苦酒和塗右足去之大良千金斷産方油煎水銀一日方息空心服如棗大一圓永斷不損人廣濟落胎方栝樓根四兩肉桂五兩牛膝三兩瞿麥一兩右切以水七升煎二升三合去滓溫分三服服後如人行五里又進一服無忌小品療羸人欲去胎粉草乾薑人參川芎生薑肉桂蟹爪黃芩右八味等分細切以水七升煮取二升分三服忌海藻菘菜生葱千金欲去胎大麯五升清酒一㪷煮二沸去滓分五服隔宿勿食旦再服其子如糜令母肥盛無疾苦千金不傳妊娠咳嗽方論第七凡八方夫肺感於寒寒傷於肺則成咳嗽也所以然者肺主氣而外合皮毛毛竅不密則寒邪乘虛而入故肺受之也五臟六腑俱受氣於肺以其時感於寒而為嗽也秋則肺受之冬則腎受之春則肝受之夏則心受之其諸藏嗽不已則傳於腑妊娠病久不已者則傷胎也欵冬花散療妊娠心鬲痰毒壅滯肺氣不順咳嗽頭疼欵冬花麻黃貝母煨前胡桑白皮紫苑各半兩旋覆花白术甘草各一分石膏一兩右㕮咀每服四錢水一盞薑三片煎至七分去滓溫服食後桔梗散治妊娠肺壅咳嗽喘急不食天門冬去心一兩桑白皮苦梗紫蘇各半兩赤茯苓一兩麻黃去節三分貝母人參甘草各半兩右㕮咀每服四錢水一盞薑三片煎至七分去滓不拘時候服馬兜鈴散治妊娠胎氣壅滯咳嗽喘急馬兜鈴苦梗人參甘草貝母各半兩陳皮去白大腹皮紫蘇桑白皮各一兩五味子七文半右㕮咀每服四錢水一盞薑三片煎至七分去滓無時溫服麻黃散治妊娠外傷風冷痰逆咳嗽不食麻黃陳皮前胡各一兩半夏人參白术枳殼貝母甘草各半兩右㕮咀每服四錢葱白五寸薑半分棗三箇水一盞煎至六分去滓溫服百合散治妊娠咳嗽心胸不利煩悶不食川百合紫苑麥門冬苦梗桑白皮各一兩甘草半兩右㕮咀每服四錢水一盞竹茹一分煎至六分去滓入蜜半匙更煎三兩沸不拘時溫服紫苑湯治妊娠咳嗽不止胎不安八方出産科甘草杏仁各一分紫苑一兩桑白皮一分苦梗三分天門冬一兩右㕮咀每服三錢水一盞竹茹一塊煎至七分去滓入蜜半匙再煎二沸溫服療妊娠咳嗽方以車􅤧燒赤投酒中候冷飲之良療妊娠傷寒涎多咳嗽知母杏仁天門冬桑白皮等分右㕮咀每服三錢水一盞煎至七分去滓服妊娠喘嗽不止冝服局方華蓋散穩重而有效妊娠吐血衄方論第八凡二方論曰夫妊娠吐血者皆由臟腑所傷為憂思驚怒皆傷臟腑氣逆吐血吐血而心悶胸滿未欲止心悶甚者死妊娠病此多墮胎也局方必勝散有效治吐血不止馬勃用生布擦為末濃米飲調下昌黎先生云牛溲馬勃敗鼓之皮俱收並蓄待用無遺者醫師之良也治鼻衄以白茅花濃煎汁服亦可就第七卷吐血方中選用妊娠子煩方論第九凡十方論曰妊娠苦煩悶者以四月受少隂君火氣以養精六月受少陽相火氣以養氣若母心驚膽寒多有煩悶名曰子煩也産寶云夫妊娠而子煩者是肺臟虛而熱乘於心則令心煩也停痰積飲在心胸之間或衝於心亦令煩也若熱而煩者但熱而已若有痰飲而煩者嘔吐涎沫惡聞食氣煩躁不安也大抵妊娠之人既停痰積飲又虛熱相摶氣鬱不舒或煩躁或嘔吐涎沫劇則胎動不安均謂之子煩也竹葉湯治子煩防風黃芩麥門冬各三兩白茯苓四兩右㕮咀每服四錢水一盞竹葉數片煎至七分去滓溫服忌酢物外臺祕要有竹瀝三合無竹葉名竹瀝湯指迷同一方無黃芩有知母又方時時飲竹瀝隨多少竹茹湯療妊娠煩燥或胎不安淡青竹刮茹一兩右以水一大升煮取四合徐徐服盡為度麥門冬散治妊娠心煩憤悶虛躁吐逆惡聞食氣頭眩四肢沉重百節疼痛多卧少起麥門冬子芩赤茯苓各一兩柴胡赤芍藥陳皮人參苦梗桑寄生甘草旋覆花各半兩生地黃二兩右為粗末每服四錢水一盞薑半分煎至六分去滓無時溫服又方麥門冬苧根各二兩黃芩茯神各一兩甘草炙一分犀角屑半兩右㕮咀每服四錢水一盞生地黃一分淡竹葉二㭍片煎至六分去滓溫服柴胡散治妊娠心煩頭目昏重心胸煩悶不思飲食或嘔吐柴胡一兩五錢赤茯苓麥門冬各一兩枇杷葉去毛人參橘紅甘草各半兩右㕮咀每服四錢水一盞薑三片煎至七分去滓溫服人參散治妊娠熱氣乘於心脾津液枯少煩躁壅熱口舌乾渴人參麥門冬赤茯苓地骨皮家乾葛黃芩犀角屑各三分甘草半兩右㕮咀每三錢水一盞煎至六分去滓溫服治妊娠子煩口乾不得卧黃連去鬚右為細末每服一錢粥飲調下酒蒸黃連圓亦妙治妊娠心煩熱不止葱白一握䜴二合右以水二大盞煎取一盞半去滓溫分三服一母圓治妊娠因服藥致胎氣不安有似虛煩不得卧者巢氏謂之子煩也知母一兩洗焙右為細末以棗肉為圓如彈子大每服一圓細嚼煎人參湯送下次見醫者不識此證作虛煩治之損動胎氣冝矣有識者亦見有藥也産科鄭宗文得於陳藏器本草拾遺中也用之良驗方出産乳妊娠煩躁口乾方論第十凡四方夫足太隂脾之經也其氣通於口手少隂心之經也其氣通於舌若妊娠之人臟腑氣虛榮衛不理隂陽隔絶熱氣乘於心脾津液枯少故令心煩而口乾也愚考此證與子煩大同小異其方亦可就子煩中通用一母圓亦妙升麻散治妊娠壅熱心神煩躁口乾渴逆川升麻黃芩人參麥門冬梔子仁柴胡茯神瓜蔞根犀角屑各一兩知母甘草各半兩右㕮咀每服四錢水一盞煎至六分去滓溫服知母散治妊娠煩躁悶亂口乾及胎臟熱知母麥門冬甘草各半兩黃耆子芩赤茯苓各三分右㕮咀每服四錢水一盞煎至七分去滓入竹瀝一合更煎二沸溫服葛根散治婦人妊娠數月胸鬲煩躁唇口乾渴四肢壯熱少食葛根不用野葛黃芩人參萎蕤黃耆麥門冬甘草等分㕮咀右每服四錢水一盞竹茹一塊如錢大煎至七分去滓溫服無時人參黃者散治妊娠身熱煩躁口乾食少人參黃耆家葛根秦芁麥門冬各一兩知母三分甘草半兩赤茯苓一兩右㕮咀每服四錢水一盞薑三片淡竹葉二七片煎至六分去滓溫服婦人大全良方卷十三
