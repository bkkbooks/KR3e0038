body:
  text: 婦人大全良方卷四宋陳自眀撰婦人血風身體骨節疼痛方論第一凡五方夫婦人血風身體骨節疼痛者由體虛氣血不調為風冷所侵故也其狀風邪在於皮膚肌肉歷於骨節邪氣與正氣交擊故令疼痛也芎藭散治婦人血風身體骨節疼痛心膈壅滯少思飲食川芎一兩赤茯苓赤芍藥酸棗仁炒桂心當歸木香川牛膝各三分羌活枳殼去穰麩炒甘草各半兩右為粗末每服三錢水一大盞薑三片煎至七分去滓熱服無時候羚羊角散治血風身體疼痛手足無力心神壅悶羚羊角屑酸棗仁炒生乾地黃檳榔各一兩五加皮防風赤芍藥當歸骨碎補炒去毛海桐皮川芎各三分甘草半兩右為末每服二錢溫酒調下通靈圓治男子婦人手足痛風不可忍者白附子殭蠶各一兩炒去絲全蝎半兩炒麝香一字右為末煉蜜元如梧子大每服七圓溫酒下一日三服當歸沒藥圓療婦人血風血氣腹脅刺痛筋攣骨痺手足麻木皮膚瘙癢當歸五靈脂各一兩炒沒藥半兩右為末醋糊圓如梧桐子大每服三十圓生薑湯空心下大效虎骨散治血風走疰疼痛丈夫筋骨疼及打撲傷損疼痛甚者虎骨酥炙敗龜醋炙當歸桂心地龍去土牛膝漏蘆葳靈仙𤣥胡索自然銅製右各等分為末每服二錢熱酒調下每曰一服婦人血風白虎歷節走疰方論第二凡七方夫婦人體虛受風邪之氣隨血而行或淫易皮膚卒然掣痛遊走無有常處故名為走疰也加減小續命湯主之漏蘆散治婦人血風走疰疼痛無有常處漏蘆當歸牛膝各三分桂心地龍去土防風羌活白芷沒藥研甜瓜子各半兩虎脛骨酥炙敗龜各一兩醋炙右為細末每服二錢熱酒調下無時候四生圓治血風骨節疼痛擡舉臂不起行履不得并渾身麻痺白殭蠶炒去絲地龍去土白附子生五靈脂草烏去皮尖各等分右為末以米糊元如梧桐子大每服二十元茶酒任下或作末酒調半錢亦可麝香圓治白虎歷節諸風疼痛逰走不定狀如蟲囓晝靜夜劇及一切手足不測疼痛大八角川烏頭三箇去皮尖生生全蝎二十一箇生黑豆二十一粒生地龍去土净半兩右為細末入麝香一字同研停糯米糊為元如緑豆大每服七圓甚者十元夜卧令鬲空溫酒吞下微出冷汗一身便瘥許學士云豫得此方凡是歷節及不測疼痛一二服便瘥在歙川日有一貴家婦人遍身走疰疼痛至夜則發如蟲囓其肌多作鬼邪治豫曰此正歷節病也三服愈芍藥知母湯治諸肢節疼痛身體魁瘰腳腫如脫頭眩短氣溫溫欲吐三因方桂心知母防風各四兩芍藥甘草麻黃去根節各三兩泡附子三兩炮右㕮咀每服四錢水一盞半生薑五片煎七分去滓空心服一法有白术川芎杏仁半夏附子八物湯治風歷節四肢疼痛如鎚鍛不可忍附子乾薑芍藥茯苓人參甘草桂心各三兩白术四兩右㕮咀每服四大錢水二盞煎七分去滓食前服一方去桂用乾地黃二兩獨活寄生湯最治歷節風近人用之甚效見本卷第七論小續命湯大治白虎歷節痛不可忍方見第三卷有一婦人先自兩足踝骨痛不可忍次日流上於膝一二日流於髀骨甚流至於肩肩流於肘肘流於後溪或如鎚鍛或如蟲囓痛不可忍晝靜夜劇服諸藥無效召僕診之六脉緊豫曰此真歷節證也非解散之藥不能愈但用小續命湯一劑而愈僕又鄧安人夏月亦病歷節痛不可忍諸藥無效召診之人迎與心脉虛此因中暑而得之合先服酒蒸黃連元衆醫莫不笑用此藥服一貼即愈自後與人良驗婦人血風疹瘙癢方論第三凡八方局方治婦人時發遍身瘙癢或赤腫癮疹五心煩熱血風攻疰與人參荆芥散消風散四物湯加荆芥煎或人參當歸散或逍遙散兼服導赤圓如不通者食後服皂角元氣虛老人不可久服如服皂角圓不退者此凝滯熱甚者宜先服青木香圓三兩服以開氣道却服前藥即效夫婦人體虛為風邪氣客於皮膚復逢風寒相折則起風瘙癮疹若赤疹者由凉濕折于肌肌中之極熱結成赤疹也得天熱則劇取冷則差白疹者由風氣折於肌中肌中熱熱與風相摶所以為白疹也得天隂雨冷則劇出風中亦劇得晴暖則減著衣暖亦差也脉當浮而洪浮即為風洪即為氣風氣相摶則為癮疹身體為癢凡人汗出不可露卧及浴素問云汗出見濕乃生痤痱使人身振寒熱生風疹也雷公炮炙序云遍體疹風酒調生側何首烏散治婦人血風皮膚瘙癢心神煩悶及血風逰走不定並宜服之何首烏防風白蒺藜枳殼天麻殭蠶胡麻茺蔚子蔓荆子各等分右為細末每服二錢煎茵蔯湯調下無時候附子酒治痛風婦人血風身上瘙癢出張氏方生附子不去皮重一兩一隻皂角刺二十一箇黑豆一合右三味細銼分為二處用好酒二瓶入上件藥慢火輝候乾至半瓶却合作一處密縛泥頭經二宿每服一盞溫服無時候未效再服治女人風癢癮疹不止聖惠方蒼耳花葉子各等分右為細末用豆淋酒調下二錢治癮疹白蜜不以多少好酒調下已試有效治皮膚有風熱遍身生癮疹方初虞世牛蒡子水煮一兩净㬠乾炒令香浮萍蒸過焙乾等分右為細末每服二錢薄荷湯調下日二服又治風氣客於皮膚搔之不已方蟬蛻洗大葉薄荷右等分為細末無時溫酒調下方寸匕此一方出本草又方露蜂房洗過蜜炙令焦蛇蛻洗炙令焦等分右為細末溫酒調下一錢日二三服婦人虛風頭目眩暈及心眩方論第四凡七方夫婦人風眩是體虛受風風入於腦也諸臟腑之精皆上注於目其血氣與脉并上屬於腦也循脉引於目系目系急故令眩也其眩不止風邪甚者變成癲疾也養正丹治虛風頭旋吐涎不已蓋此藥升降隂陽補接真氣非止頭旋而已黑鉛水銀硫黃研朱砂各一兩研右用建盞一隻火上鎔鉛成汁次下水銀用栁杖子打停取下歇少時入二味打停候冷取下研為粉以糯米軟飯元如緑豆大每服三十元棗湯吞下空心食前日二服鈎藤散治肝厥頭暈清頭目出本事方鈎藤陳皮半夏麥門冬去心茯苓茯神人參去蘆甘菊花防風各半兩甘草一分石膏一兩右㕮咀每服四錢水一盞半生薑七片煎至八分去滓熱服素問云頭痛顛疾下虛上實過在足少隂巨陽甚則入腎狥䝉招搖目眩耳聾下實上虛過在足少陽厥隂甚則在肝下虛者腎虛也故腎厥則頭痛上虛者肝虛也故肝虛則頭暈狥䝉者如以物䝉其首招搖不定目眩耳聾皆暈之狀故肝厥頭暈腎厥頭痛不同也斗門方治婦人血風攻腦頭旋悶絶忽死倒地不知人事者喝起草取其嫩心不以多少隂乾為末以常酒服一大錢匕無時候其功大效服之多連腦蓋善通頂門蔓荆子散治婦人風眩頭目昏悶煩疼言語謇澀痰逆不下飲食蔓荆子防風羌活川芎羚羊角屑枳殼前胡石膏赤茯苓麻黃去根節荆芥穗各三分北細辛甘菊花白芷藁本旋復花甘草各半兩右為粗末每服四錢薑三片水一盞煎七分去滓溫服無時候四神散治婦人血風眩暈頭痛九籥衛生方菊花當歸旋復花荆芥穗各等分右為細末每服一錢水一盞葱白三寸茶末一錢煎至七分通口服良久去枕仰卧少時川芎散治風眩頭暈龎安常方小川芎山藥白茯神甘菊花野菊不用人參各半兩山茱茰肉一兩右為細末無時候酒調二錢日三服治女人頭旋即天動地轉名曰心眩非血風也見普濟方膽子礬一兩細研用胡餅劑子一箇拌停放版子上按平一指厚以箆子勒成如骰子大塊不須界斷於瓦上焙乾每服一骰子大為末煎燈心竹茹湯調下婦人血風頭痛方論第五腎厥頭痛厥逆頭痛附凡九方許叔微云婦人患頭風者十居其半每發必掉眩如在車船上蓋因血虛肝有風邪襲之爾豫嘗處此方以授人比他藥效而捷川芎一兩當歸三分羌活旋復花華隂細辛蔓荆子防風石膏藁本荆芥穗半夏麴乾地黃甘草各半兩右㕮咀每服三錢水一盞薑三片煎至七分去滓溫服七生元治男子婦人八般頭風及一切頭痛痰厥腎厥飲厥傷寒傷風頭痛不可忍者並皆治療徐明仲先生方川烏草烏南星三味並生去皮半夏冷水洗去滑川芎石膏白芷並生用等分右為細末研韭菜自然汁圓如梧子大每服七圓加至十圓嚼生葱茶送下僕常療鄧安人頭痛如破服諸藥無效加北細辛等分全蝎减半為貟服二十粒即愈芎辛湯治狀如前但發熱者不可服生附子去皮生烏頭去皮尖南星乾薑炮北細辛川芎各一兩甘草三分右㕮咀每服四錢水二盞薑七片茶牙少許煎至六分去滓食前溫服中脘素有寒者不用茶牙局方如聖餅子加北細辛如半夏數自合服之見效甚速若頭痛筋攣骨重少氣噦噫腹滿時驚不嗜卧咳嗽煩寃其脉舉之則弦按之石堅由腎氣不足而內著其氣逆而上行謂之腎厥頭痛宜玉真圎與硫黃圎玉真圎方石膏煆研半夏洗為末各一兩硫黃二兩硝石一分並研右研令停生薑自然汁打糊圎如梧桐子大生薑湯下三十圎一方無半夏用天南星硫黃圎治頭痛不可忍或頭風年深暴患無所不治服此除根硝石一兩硫黃二兩右研令極細滴水貟如指頭大空心蠟茶清嚼下百一方云中暑者以氷水服之下咽即灑然治傷冷以艾湯下若頭痛連齒時發時止連年不已此由風寒中於骨髓留而不去腦為髓海故頭痛齒亦痛謂之厥逆頭痛宜白附子散灸曲鬢穴此穴在耳上將耳掩前正尖上可灸七壯左痛灸左右痛灸右白附子散方麻黃不去根節烏頭炮去皮南星炮各半兩白附子炮一兩全蝎炒五枚辰砂研一分麝香研一錢白薑炮一分右為細末酒調一字服訖去枕卧少時裕陵傳王荆公偏頭疼方云是禁中祕方用生蘆蔔汁即蘿蔔一蜆殼仰卧注鼻中左痛注左右痛注右或兩鼻皆注亦可數十年患皆一注而愈東坡云荆公與僕言已愈數人此方自後朝將仕明甫云是有效治頭風痛不可忍者硝石人中白腦子等分右研令極細用一字搐入鼻中項筋强痛方論第六凡五方此一卷論項筋拘攣强痛每得斯疾療之似易而實難然方册中所載亦少縱有言之議論亦略以僕考之然既有斯疾必有是方何古人言此疾證尚且略又無的然之論詳之必是挾諸疾而生所以絶無專門豫因暇日托古名方以備檢閲然自明學識淺鄙未必全備博學之士見其遺缺儻能補而完之不亦宜乎咸淳元年上元日藥隱老人書于存心堂夫頸項之處乃屬足太陽膀胱之經又許太學云是足少隂腎之經蓋腎與膀胱為表裏故也以感外邪論之則有太陽經先因感風又感寒濕致令外證發熱惡寒與傷寒相似頸項强急腰身反張如中風狀瘈瘲口噤其身體几几古人以强直為痓其脉沉遲弦細新産血虛多汗出喜中風亦有此證已上並載第三卷第二論中言之甚詳不復贅録又有挫枕轉項不得者與三五七散方見和劑追風散仍與急風散搽項上若因被風吹頭目昏眩太陽并腦俱痛項背筋脉拘急可與蝎附散都梁貟許太學治項筋强痛不可轉側者以木瓜煎追風散治年深日近偏正頭疼又治肝藏久虛血氣衰弱風毒之氣上攻頭痛頭眩目暈心忪煩熱百節酸疼腦昏目痛鼻塞聲重項背拘急皮膚瘙癢靣上遊風狀若蟲行及一切頭風兼療婦人血風攻疰頭目昏痛皆治之川烏炮去皮臍尖防風去蘆石膏煆川芎甘草炙荆芥穗白殭蠶炒去絲各一兩天南星炮羌活天麻地龍白附子炮全蝎去尾針白芷各半兩草烏炮去皮臍尖沒藥研乳香研雄黃研各一分右為細末每服半錢入好茶少許同調食後及臨卧服常服清頭目利咽鬲消風化痰急風散方草烏頭三兩一半燒存性於醋內蘸令冷餘一半生用生黑豆一分兩味一處為末丹砂一兩研麝香一分研右為細末研令停酒調塗痛處蝎附散治一切風邪頭痛夾腦風氣痰涎壅盛嘔逆惡心口吐清水暗風旋暈眼見黑花牙關緊急口眼喎邪面目瞤動頭項拘急肩背引疼耳癢目昏四肢麻木及沐頭浴出暴感風邪頭目昏痛兩太陽穴疼逺年頭風經隔嵗月乍差乍發服藥無效者並皆治之附子炮去皮臍川烏炮去皮尖麻黃去節殭蠶炒南星防風各三錢雄黃朱砂全蝎各錢半白芷藁本右為細末每服半錢葱茶調下食後服孕婦不可服京城之醫用此藥兼嚼如聖餅子治眼生眵糞􅉩􅉩不眀羞明多淚見物不明有效都梁貟方香白芷擇大塊白色新潔者先以棕刷去塵土用沸湯泡洗四五次為細末煉蜜貟如彈子大每服一貟多用荆芥㸃䗶茶細嚼下食後常服只乾嚼下亦可都無所忌此藥大治諸風眩暈婦人産前産後乍傷風邪頭目昏重及血風頭痛服之令人目眀凡浴沐後服一二粒尤佳暴寒乍暖神思不清傷寒頭目昏暈並宜服之木瓜煎方宣木瓜二箇取蓋去穰沒藥二兩研乳香一分研右二味內木瓜中用蓋子合了竹簽定之飯上蒸三四次爛研成膏子每服三匙生地黃汁半盞無灰上醖二盞和之用八分盞熱暖化膏子服有人患此病自午後發黃昏時定豫曰此患必先從足起經言十二經絡各有筋惟足下少隂之筋自足至項大抵筋者肝之合也日中至黃昏天之陽陽中之隂也又曰陽中之隂肺也自離至兊隂旺陽弱之時故靈寶畢法云離至乾腎氣絶而肝氣弱肝腎二藏受隂氣故發於是時豫授此方三服而愈婦人腰痛方論第七二方夫腎主於腰女人腎臟繫於胞絡若腎氣虛弱外感六淫內傷七情皆致腰痛古方亦有五種之說如風腰痛宜小續命湯加桃仁杜仲煎服脾胃氣蔽及寒濕腰痛宜五積散加桃仁如虛損及五種腰痛者青蛾元神應元諸方並見和劑皆可用也如氣滯腰痛如神保貟黑牽牛茴香橘核必有功也如神湯治男子婦人腰痛陳總領方延胡索當歸桂心等分一方無當歸有杜仲右為末溫酒調下二錢甚者不過數服潭人滕珂云此方得之於歙川祈門老醫真是如神故以名之獨活寄生湯夫腰痛者皆由腎氣虛弱卧冷濕地當風所得不時速治喜流入腳膝為偏枯冷痺緩弱疼重或腰痛拘攣腳重痺宜急服之獨活三兩桑寄生續斷杜仲北細辛川牛膝秦艽茯苓白芍藥桂心川芎防風人參熟地黃當歸各二兩右㕮咀每服三錢水一盞煎至七分去滓溫服空心氣虛下利除地黃并治新産腹痛不得轉動及腰腳攣痛痺弱不得屈伸此藥最能除風消血肘後有附子一枚無寄生人參當歸粉草近人將治歷節風腳氣流注亦效婦人腰腳疼痛方論第八凡三方夫腎主於腰腳女人腎藏繫於胞絡若勞傷腎氣虛弱而風冷客於胞絡邪氣與真氣交爭故令腰腳疼痛也酸棗仁散治婦人血氣風虛腰腳疼痛頭目昏悶食少無力酸棗仁炒川牛膝當歸各三分羌活川芎桂心防風木香海桐皮杜仲附子炮萆􅐺川續斷粉草各半兩右㕮咀每服四錢水一盞半薑三片煎七分去滓溫服骨碎補散治婦人血風氣攻腰腳疼痛腹脅拘急肢節不持骨碎補炒萆􅐺川牛膝桃仁海桐皮當歸桂心檳榔各一兩赤芍藥附子川芎各三分枳殼半兩右為粗末每服三錢水一大盞薑三片棗一箇煎至七分去滓食前熱服婦人腳氣方論第九凡十一方凡頭痛身熱肢節痛大便祕或嘔逆而腳屈弱者腳氣也輕者可與香蘇散加木瓜檳榔生薑煎服然後隨證治之要知有腳氣之人先從腳起或先緩弱疼痺或行起忽倒或兩脛腫滿或腳膝枯細或心中忪悸或小腹不仁皮禎不知有無也或舉體轉筋或見食嘔逆惡聞食氣或胸滿氣急或遍體酸痛皆腳氣候或之一字有無是也黃帝所謂緩風濕痺是也頑弱名緩風疼痛為濕痺寒中三陽所患必冷小續命湯主之煎成入生薑自然汁最暑中三隂所患必熱小續命湯去附子減桂一半主之大煩躁者紫雪最良若無紫雪以自合薄荷煎冷水調服極妙大便祕者脾約員麻仁員三和散主之方並見和劑局方中仍針灸為佳服補藥與湯淋洗皆醫之大禁也聖惠方婦人腳氣論夫婦人腳氣與丈夫不同男子則腎臟虛弱為風濕所乘女子以胞絡氣虛為風毒所摶是以胞絡屬於腎也腎主於腰腳又肝脾腎三臟經絡起於十足指若臟腑虛損則風邪先客於腳從下而上動於氣故名腳氣也此皆由體虛或當風取凉或久坐卑濕或産後勞損或恚怒傷肝心氣滯致令月候不通因其虛傷風毒摶於肌骨則令皮膚不仁筋骨抽痛五緩不遂六急拘攣或即冷痛或即腫滿或兩腳痺弱或舉體轉筋目眩心煩見食即嘔精神昏憒肢節煩疼小便赤黃大便祕澀並皆其證也其婦人腳氣治之與丈夫不同者以其氣血不調懷胎難産崩傷之異是以褚澄療寡婦師尼與妻妾殊别即其義也凡婦人有腳氣疾者必無生肓牛膝散治腳氣浮腫心神煩悶月候不通川牛膝羚羊角檳榔大黃炒芒硝各一兩防已桂心牡丹皮赤芍藥甘草各三分桃仁五十粒製右為粗末每服三大錢水一盞煎至七分去滓溫服利下惡物為度亦要相其强弱用之大腹皮散治婦人風毒腳氣肢節煩疼心神壅悶大腹皮紫蘇木通桑白皮羌活荆芥赤芍藥青皮木瓜獨活各一兩枳殼二兩右㕮咀每服四錢水一盞薑五片葱白七寸煎至七分去滓空心溫服半夏散治婦人腳氣發動心腹脹滿飲食不下嘔逆不止半夏陳皮人參大腹皮桂心各三分檳榔一兩赤茯苓紫蘇各兩半右㕮咀每服四錢水一盞半薑三片煎七分去滓溫服犀角散治婦人腳氣忽發衝心悶亂四肢煩疼有熱者犀角屑木香各半兩紫蘇赤茯苓檳榔各一兩赤芍藥紅花各三分紅雪一兩半右㕮咀每服四錢水一盞煎至七分去滓溫服木香散治婦人腳氣卒發衝心悶亂木香半兩郁李仁赤芍藥大腹皮紫雪各一兩桑白皮桂心檳榔茯苓各三分右㕮咀每服三錢水一盞薑三片煎至七分去滓溫服治婦人腳氣衝心悶亂不識人宜服此藥紫蘇松節各二兩吳茱茰半兩檳榔乾木瓜各一兩陳皮三分右㕮咀每服四錢水一盞煎至一半入童子小便二合再煎三沸溫服紫蘇散治婦人風毒腳氣腹內壅塞痰惡不思飲食腳重虛腫紫蘇莖葉木通桑白皮茴香根各一兩枳殼二兩羌活獨活荆芥穗木瓜青皮甘草各半兩大腹子十箇右㕮咀每服三錢水一盞薑三片葱白一莖煎至七分去滓溫服桑白皮散治婦人腳氣盛發兩腳浮腫小便赤澀腹脅脹滿氣急坐卧不得桑白皮郁李仁各一兩赤茯苓二兩木香防已大腹皮各半兩紫蘇子木通檳榔青皮各三分右㕮咀每服三錢水一盞薑三片煎至七分去滓溫服薏苡仁散治婦人腳氣緩弱及頑痺腫滿心下急大便澀薏苡仁防風猪苓川芎防已檳榔郁李仁大麻仁各一兩桑白皮二兩枳實三分甘草半兩羚羊角屑一兩右為散每服三錢水一盞煎至七分去滓放溫服四白散治男子婦人血虛發熱夜多盜汗不進飲食四肢羸瘦骨立拘攣腳痛不能行黃耆厚朴益智仁藿香白术白扁豆陳皮各一兩半夏白茯苓人參白豆䓻仁天台烏藥甘草各半兩京南芍藥兩半檀香沉香各一分右為細末每服三錢水一盞薑三片棗子一箇煎至七分溫服自後諸證退只有腳攣痛不能行以蒼术元治之效此藥大治乾濕腳氣筋脉拘攣疼痛不能行履兼補下部蒼术元方乳香沒藥各二錢别研川牛膝青鹽各半兩研熟艾四錢川烏三錢全蝎一錢炒右除研藥為細末入研藥令停以木瓜一箇大者切一頭留作蓋去穰入上件藥於木瓜內將蓋簽定安木瓜於黑豆中蒸令極爛取出去皮連藥研成膏却入生蒼术末拌令得所貟如梧桐子大每服五十貟空心用木瓜湯下或溫鹽酒亦得一日三服忌血與蒜乙巳年羅安人病發熱自汗心煩身體骨立足痛拘攣不能屈伸飲食不進雖老醫亦不能療召僕治之六脉弦弱僕曰雖脉似勞實非勞也似腳氣而非正腳氣但當調脾生血其熱必退然後攻足則可望安遍尋諸方皆無對證之藥遂處四白散子與服不半劑熱退能食又處蒼术貟繼之筋脉伸足能行而愈大便祕者可與七宣員神功員七聖檳榔員三和散服之效諸方並見和劑方婦人大全良方卷四
