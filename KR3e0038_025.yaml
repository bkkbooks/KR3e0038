body:
  text: 婦人大全良方卷二十一宋陳自明撰産後口乾痞悶方論第一論曰産後口乾痞悶者何答曰産後榮衛大虛血氣未定食麵太早胃不能消化麵毒結聚於胃脘上熏胸中是以口乾燥渴心下痞悶醫者不識認為胸膈壅滯以藥下之萬不得一但服見現圓則愈見現元方薑黃三稜蓽澄茄陳皮良薑人參莪荗等分右為細末用蘿蔔浸煮爛研細將汁煮麵糊元如梧桐子大用蘿蔔湯下三十元評曰産後口乾痞悶未必只因食麵或産母內積憂煩外傷燥熱飲食甘辛使口乾痞悶當隨其所因調之可也煩心宜四物湯去地黃加人參烏梅煎若外傷燥熱看屬何經當隨經為治難以備舉飲食所傷見現元却能作效四物湯方見本卷第二論産後血渴方第二産寶療産後大渴不止蘆根切一升栝樓人參甘草茯苓各三兩大棗二十枚麥門冬生四兩右以水九升煮取三升分三服頓服四劑即差忌菘菜楊氏家藏方黃芩散治産後血渴飲水不止黃芩麥門冬等分右㕮咀每服三錢水盞半煎至八分去滓溫服無時栝樓根湯集驗療産後血渴栝樓根四兩麥門冬人參各三兩生乾地黃甘草各二兩土瓜根五兩大棗二十枚右㕮咀以水八升煮取二升半分三服産寶無地黃麥門冬有牡蠣粉等分竹葉湯千金療産後虛渴少氣力竹葉三升甘草人參茯苓各一兩小麥五合生薑半夏各三兩麥門冬五兩大棗十五枚右㕮咀以水九升先煮竹葉小麥生薑棗取七升去滓內藥再煎取二升去滓一服五合日三夜一延胡散博濟療産後血渴不止延胡索蔚金乾葛桂心青皮枳殼製等分右並以好醋浸一宿焙乾杵為細末每服一錢冷橘皮湯調下不過三服差産後乍寒乍熱方論第三産後瘧疾附凡九方論曰産後乍寒乍熱者何答曰隂陽不和敗血不散能令乍寒乍熱産後血氣虛損隂陽不和隂勝則乍寒陽勝則乍熱隂陽相乘則或寒或熱若因産勞傷臟腑血弱不得宣越故令敗血不散入於肺則熱入於脾則寒醫人若誤作瘧疾治之則謬矣隂陽不和宜增損四物湯敗血不散宜奪命丹又問二者何以别之時有刺痛者敗血也但寒熱無他證者隂陽不和也增損四物湯不一皆隨病加減增損四物湯方人參當歸芍藥川芎乾薑各一兩甘草四錢重右㕮咀每服四錢水一盞薑錢三片煎至七分去滓熱服無時候評曰乍寒乍熱榮衛不和難以輕議若其敗血不散豈止入脾肺二藏邪大抵一隂閉一陽即作寒熱隂勝故寒陽勝故熱只可云敗血循經流入閉諸隂則寒閉諸陽則熱血氣與衛氣解則休遇再㑹而復作大調經散五積散入醋煎佳大調經散治産後血虛惡露未消氣為敗濁凝滯榮衛不調隂陽相乘增寒發熱或自汗或腫滿皆氣血未平之所為也大豆一兩半炒去皮茯神一兩真琥珀一錢重右為細末濃煎烏豆紫蘇湯調下五積散方見局方産寶療産後惡寒壯熱一夜三五度發惡語口中生瘡時時乾嘔困乏悶絶人參獨活白鮮皮葛根防風青竹茹逺志各六分茯神八分白斂十分𤣥參十二分竹瀝二升半右銀一斤水一㪷五升煎取七升下諸藥重煎取三升分溫三服忌魚酒麵等物産後乍寒乍熱心痛月候不來如何答曰敗血充心痛繞臍腹面色無采縱然得效暫時安痊不過三兩日又發服局方黑神散大效知母湯治産後乍寒乍熱通身溫壯胸心煩悶方知母三兩芍藥黃芩各二兩桂心甘草各一兩右五味㕮咀以水五升煮取二升半分三服一方不用桂心加生地黃産後方論附評曰郭稽中云産後乍寒乍熱者多是敗血為害或隂陽不和所作若作瘧疾治之誤矣如陳無擇評曰只可云敗血循經流入閉諸陽則熱閉諸隂則寒血氣與衛氣解則休亦未盡善亦有産後病瘧而作寒熱有一日一發或一日二三發或間日一發或三兩日一發或先寒後熱或先熱後寒或寒多熱少或熱多寒少或但寒但熱者亦有産前病瘧而産後未愈者最難用藥如柴胡常山信砒等斷不可用今有經效草果飲子生熟飲子用之有效謾備檢閲如易簡方四獸飲亦可用男六德補遺草果飲子治婦人産後瘧疾寒熱相半者或多熱者宜半夏泡赤茯苓甘草炙草果炮去皮川芎陳皮白芷各二錢青皮去白良薑紫蘇各一錢乾葛四錢右㕮咀每服三錢重水一大盞薑三片棗二箇同煎至七分去滓當發日侵早連進三服無有不安生熟飲子治産後瘧疾多寒者肉豆蔲草果仁厚朴生去粗皮半夏陳皮甘草大棗去核生薑右八味等分細銼和勻一半生一半用濕皮紙裹煨令香熟去紙與一半生者和勻每服稱五錢重水二盞煎至七分食前一服食後一服産後蓐勞方論第四夫産後蓐勞者此由生産日淺血氣虛弱飲食未平復不滿日月氣血虛羸將養失所而風冷客之風冷搏於血氣則不能溫於肌膚使人虛乏勞倦乍卧乍起顔容憔悴食飲不消風冷邪氣而感於肺肺感微寒故咳嗽口乾遂覺頭昏百節疼痛榮衛受於風邪流注藏府須㬰頻發時有盜汗寒熱如瘧背膊煩悶四肢不舉沈重著床此則蓐勞之候也又論曰婦人因産理不順疲極筋力憂勞心慮致令虛羸喘乏寒熱如瘧頭痛自汗肢體倦怠咳嗽痰逆腹中絞刺名曰蓐勞石子湯療産後虛羸喘乏乍寒乍熱如瘧四肢疼痛面色痿黃名為蓐勞猪腎一雙去脂膜四破香豉一方無此有知母葱白粳米當歸芍藥各二兩右㕮咀分為兩劑用水三升煮取一小碗去滓分三服廣濟方無芍藥有人參許仁則療産後日淺久坐視聽言語多或運用氣力遂覺頭膊肢節皮肉痛乍寒乍熱此為蓐勞猪腎一雙去脂膜四破當歸芍藥生薑各二兩葱白切桂心各一兩右水八升煮腎取六升下藥煎取二升分溫為二服胡氏方人參鱉甲散治婦人産後蓐勞皆由在産內未滿百日體中虛損血氣尚弱失於將理或勞動作傷致成蓐勞其狀虛羸乍起乍卧飲食不消時有咳嗽頭目昏痛發歇無常夜有盜汗寒熱如瘧背膊拘急沈困在床服此大效人參桂心當歸桑寄生白茯苓白芍藥桃仁熟地黃甘草麥門冬各半兩續斷一分牛膝三分鱉甲炙黃耆各一兩右為細末每服先以猪腎一對去筋膜以水兩大盞生薑半分棗三箇煎至一盞去猪腎薑棗然後入藥末二錢入葱三寸烏梅一箇荆芥五穗煎至七分去滓空心晚食前溫服此藥神妙老孫太保增損柴胡湯治産後虛羸發寒熱飲食少腹脹方出養生必用北柴胡人參甘草半夏陳皮川芎白芍藥各等分右㕮咀每服三錢水一大盞薑五片棗二枚煎七分去滓食後溫服日二服熟地黃散治産後蓐勞皆由體虛氣力未復勞動所致四肢煩疼時發寒熱不思飲食熟乾地黃人參白芍藥白茯苓白术各一兩續斷黃耆桂心五味子當歸麥門冬川芎各三分右㕮咀每服四錢水一大盞薑三片棗一箇煎至七分去滓溫服無時白茯苓散治産後蓐勞蓋緣生産日淺久坐多語運動用力遂致頭目四肢疼痛寒熱如瘧狀宜服白茯苓一兩當歸川芎桂心白芍藥黃耆人參各半兩熟乾地黃半兩右㕮咀先以水二盞入猪腎一雙去脂膜細切以生薑三片棗三枚煎取一盞去腎薑棗入藥半兩煮取七分去滓食前分溫二服黃耆圓治産後蓐勞寒熱進退頭目眩痛百骨節疼痠氣力羸乏黃耆鱉甲當歸炒各一兩桂心續斷白芍藥川芎牛膝蓯蓉沉香柏子仁枳殼各三分北五味熟地黃各半兩右為細末煉蜜元如梧桐子大食後粥飲吞下四十元療産後大虛心腹急痛血氣上搶心氣息乏補益方黃耆白术當歸甘草人參各二兩生薑四兩右先以白羊肉三斤去膜以水一㪷九升煮肉取汁五升後下諸藥更煎取三升分溫三服療産後喘乏氣羸腹內絞痛自汗出黃耆人參茯苓甘草白术五味子芎藭當歸各八分澤蘭葉陳皮各六分麥門冬訶子各二十分桂心熟乾地黃各十二分右為細末煉蜜元如梧桐子大空心溫酒下三四十元日再服胡氏牡丹散治婦人産後虛羸發熱自汗欲變蓐勞或血氣所摶及經候不調及發寒熱自汗羸瘦並宜服之白芍藥當歸五加皮地骨皮人參各半兩沒藥桂心各二錢牡丹皮三錢右為細末每服二錢水酒各半盞如不飲酒只用水一盞開通錢一錢麻油蘸之同煎七分去滓通口服煎不得攪喫不得吹黃耆煮散治産後蓐勞肌膚黃瘦面無顔色或增寒壯熱四肢痠疼心煩頭痛黃耆鱉甲醋炙各一兩桂心當歸炒桑寄生白茯苓白芍藥人參熟地黃麥門冬去心甘草炙各半兩牛膝三分右為細末每服用猪石子一對去脂膜先以水一盞入薑半分棗三枚煎至七分去滓并石子却下藥五錢更煎至四分去滓空心晚食前溫服二滓併煎産後虛羸方論第五産寶論曰産後虛羸者因産傷損臟腑勞侵氣血輕者將養滿日即差重者日月雖滿氣血猶不調和故患虛羸也夫産後氣血虛竭臟腑勞傷若人年齒少盛能節慎將養滿月便得平復如産後多因血氣虛弱雖逾日月猶常疲乏或因飲食不節調適失宜為風冷邪氣所侵摶於氣血流注於五臟六腑則令肌膚不榮顔容痿悴故曰虛羸人參散治産後虛羸脾胃乏弱四肢無力全不思飲食心腹脹滿黃耆人參草果仁厚朴附子各一兩白术當歸白茯苓木香川芎桂心甘草各半兩陳皮良薑阿梨勒皮各三分右㕮咀每服四錢水一盞薑三片棗一枚煎至六分去滓無時溫服熟乾地黃湯治産後虛羸短氣不能食熟乾地黃二兩人參北五味子石斛白茯苓白术鹿角膠附子各一兩桂心當歸川芎澤蘭葉黃耆續斷各三分右㕮咀每服四錢薑棗依前煎服澤蘭補虛元刪繁療婦人虛勞或本來虛寒或産後血脈虛竭四肢羸弱飲食減少血脈斷絶血脈不通虛實依源澤蘭葉九分石膏八分川芎甘草當歸各七分白芷防風白术藁本川椒厚朴乾薑桂心細辛各五分右為細末煉蜜元如梧桐子大酒下二三十元日再忌海藻菘菜桃李生葱雀肉羊腎湯治産後虛羸乏力短氣羊腎一雙去脂膜麥門冬羚羊角屑北五味子茯神桂心續斷黃耆川芎當歸各半兩人參附子炮乾薑各三分熟乾地黃一兩右㕮咀先以水二大盞煮腎至一盞去腎入藥五錢椒二七粒薑錢二片棗三枚煎至五分去滓空心溫服羊肉當歸湯治産後虛羸乏弱無力喘急汗出腹中㽲痛肥羊肉二斤當歸白芍藥各半兩桂心附子炮川芎黃耆人參龍骨白术各三分熟地黃一兩右為粗末先以水五大升煮羊肉取汁二大盞每服四錢汁一中盞薑三片棗一枚煎至七分去滓溫服黃雌雞湯治産後虛羸腹痛宜服小黃雌雞一隻去頭足翅羽腸肚細切當歸白术熟地黃桂心黃耆各半兩右㕮咀先以水七升煮雞至三升每服藥四錢以雞汁一盞煎至六分去滓溫服日三産寶療産後經三臘諸疾退後身虛無力澤蘭葉炒細辛熟乾地黃各五分黃耆當歸防風各十八分麥門冬去心八分石膏七分煅藁本白芷川芎柏子仁五味子甘草各四分桂心三分右為細末煉蜜元如梧桐子大空心溫酒下三四十元救急療産後羸乏不復令肥白方大烏豆淨拭熬熟如造豆黃法去皮搗為末以臘月猪脂成煉者和元如梧桐子大酒下五十元日再服一月內肥白也無所忌婦人方當歸散治産後補虛益血當歸羌活各一兩延胡索半兩右為細末用猪腰子一隻切作片以水一盞入藥末二錢同煎至七分同腰子喫佛手散治産後血虛勞倦盜汗多困少力咳嗽有痰當歸川芎黃耆各一兩北柴胡前胡各一分右㕮咀每服三錢水一大盞桃栁枝各三寸棗子烏梅各一枚薑三片煎至六分去滓溫服如有痰去烏梅當歸羊肉湯許仁則療産後雖無疾狀但覺虛弱兼心腹痛欲得補氣力肥羊肉一斤去脂水一㪷煮取八升去肉當歸五兩黃耆四兩生薑六兩右以肉汁煮三味取二升五合分為四服若覺惡露下不盡加桂心三兩惡露下多覺有風加芎藭三兩有冷加茱茰一兩有氣加細辛二兩有熱加生地黃汁二合療産後雖無餘苦但覺氣虛當歸十二分乾地黃十分澤蘭葉八分地骨皮芍藥各七分黃耆防風續斷各六分人參桂心各五分右為細末煉蜜元如梧桐子大溫酒吞下二十元療産後虛羸黃雌雞一隻去毛背上破生百合煨三枚白粳米半升右依尋常著五味調和縫背合五味汁煮令熟開腹取百合并飰相和汁作羮食之肉亦食令盡略卧佳産寶療産後虛乏不思飲食四肢皆倦心腹陳痛補虛治氣人參芍藥桂心甘草生薑各一兩當歸一兩半生地黃二兩右㕮咀每服三錢水兩盞棗二枚煎至一盞去滓溫服日三服地黃羊脂煎方古今録驗療産後諸疾羸瘦欲令肥白飲食和調生地黃汁一升生薑汁五升羊脂二斤白蜜五升右四味先煎地黃汁令餘五升下羊脂煎減半次下薑次下蜜便以銅器盛著湯中煎令如飴狀空肚酒一升取煎如雞子大投酒中飲日三良産後風虛勞冷方論第六夫産則血氣勞傷臟腑虛弱而風冷客之冷摶於血氣血氣不能溫於肌膚使人虛乏疲頓致羸損不平復若久不平復若久不瘥風冷入於子臟則胞臟冷亦使無子謂之風虛勞損也黃耆散治産後風虛勞損羸瘦不思飲食四肢疼痛黃耆白术木香羚羊骨屑人參當歸桂心川芎白芍藥白茯苓各半兩甘草一分右㕮咀每服三錢水一盞薑三片棗一箇煎至七分去滓溫服無時木香散治産後風虛勞損氣攻心腹四肢疼痛不思飲食木香人參陳皮白茯苓白芍藥黃耆川芎各三分熟乾地黃當歸附子各一兩甘草一分桂心白术各半兩右㕮咀每服三錢水一盞薑三片棗一枚煎至七分去滓溫服人參散療産後風虛勞損羸瘦四肢無力不思飲食人參黃耆熟地黃各一兩羚羊角屑三分桂心川芎防風當歸北五味子白茯苓白术各半兩甘草一分右為粗末每服三錢先用水二大盞獖猪腎一雙切去脂膜薑棗同煎至一盞去猪腎入藥煎至四分去滓空心溫服枸杞子元療産後風虛勞損四肢疼痛心神虛煩不飲食枸杞子牛膝白茯苓人參黃耆各一兩當歸漏蘆防風桂心酸棗仁羚羊角屑羌活五加皮白术川芎各三分熟地黃二兩甘草半兩麥門冬一兩半右為細末煉蜜元如梧桐子大溫酒下三十元荆芥湯亦可白薇元治産後風虛勞損腹痛冷氣腳膝無力面色痿黃飲食減少日漸羸瘦補益木香當歸桂心澤蘭葉牛膝白薇牡丹皮枳殼人參川芎厚朴白术續斷熟地黃北細辛赤石脂龍骨禹餘糧黃耆各一兩白茯苓附子各三分吳茱茰一分右為細末煉蜜為元如梧桐子大食前溫酒下三十元産寶療産後風虛羸瘦勞弱不生肌肉黃耆當歸芍藥人參各二兩桂心甘草川芎生薑各八分大棗十二箇右水七升煮取三升分溫三服療産後虛勞骨節疼痛頭痛汗不出當歸人參生薑各二兩正方二分黃耆三兩淡豉五合猪腎一雙粳米三合薤白三合右水一㪷五升先煮猪腎取六升後下諸藥煎至二升分為三服又方猪腎一雙煮入葱豉作臛如常食之延年澤蘭元主産後風虛損瘦不能食令肥悅方澤蘭葉熬當歸甘草各七分厚朴藁本食茱茰蕪荑白芷乾薑芍藥各三分石膏八分人參柏子仁桂心各四分白术五分右為細末煉蜜元如梧桐子大酒服十五元至二十五元日二服忌生冷鮓滑猪牛肉麵生葱桃李雀肉海藻菘菜古今録驗澤蘭元産後風虛勞損羸弱百病必效方澤蘭葉六分白芷川椒蕪荑仁藁本北細辛各四分人參白术柏子仁防風桂心厚朴丹參各五分川芎當歸甘草各七分乾地黃十分右為細末煉蜜元如梧桐子大空心溫酒下二十元至三十元日二服忌如前廣濟療産後患風虛冷氣腹內不調補益肥白恱澤方澤蘭七分厚朴人參石斛蕪荑仁續斷防風桂心各三分川芎白术柏子仁北五味子黃耆逺志各四分赤石脂甘草乾地黃各六分右為細末煉蜜元如梧桐子大酒下二十元至三十元日二服忌如前延年增損澤蘭元主産後風虛勞損黃瘦方澤蘭熬七分防風乾地黃當歸北細辛桂心茯苓芍藥人參甘草藁本烏頭炮麥門冬石斛紫苑川芎各五分乾薑柏子仁蕪荑仁厚朴川椒各四分白术黃耆各六分紫石英石膏各八分右為細末煉蜜元如梧桐子大酒下二十元或三十元産後腹脹滿悶嘔吐不定方論第七論曰産後腹脹滿悶嘔吐不定者何答曰敗血散於脾胃脾受之則不能運化精微而成腹脹胃受之則不能受納水穀而生吐逆醫者不識若以尋常治脹止吐藥治之病與藥不相干轉更傷動正氣疾愈難治但服抵聖湯則愈抵聖湯方赤芍藥半夏澤蘭葉人參陳皮各一分甘草一錢右㕮咀每服一劑用水一碗生薑焙乾半兩煎至半碗去滓分熱三服産後嘔逆不食方論第八夫胃為水穀之海水穀之精以為血氣榮潤藏府因産則臟腑傷動有時而氣獨盛者則氣乘腸胃腸胃燥澀其氣則逆故嘔逆不下食也丁香散治産後脾胃氣寒心胸滿悶吐逆四肢少力不納飲食丁香人參檳榔白术桂心當歸厚朴前胡各三分甘草半兩良薑一兩右為粗末每服四錢水一盞薑三片煎至七分去滓溫服空心開胃散治産後胃氣不和嘔吐不止全不納食宜服訶子肉兩半人參一兩甘草半兩右三味為細末别以半夏半分生薑一分薤白二七莖水一大盞煎至六分去滓分為兩服療産後嘔逆不止鄧知縣傳橘紅一兩半夏麯甘草各半兩藿香三兩右為細末每服二錢水一盞半薑三片煎至六分無時候治産後更無他疾但多嘔逆不能食白术五分生薑六分右細切酒水各二升煎取一升分三服産後霍亂方論第九夫産後霍亂氣血俱傷臟腑虛損或飲食不消觸冒風冷所致隂陽不順清濁相干氣亂於腸胃之間真邪相摶冷熱不調上吐下痢故曰霍亂也經云渴而飲水者五苓散寒多不飲水者理中元大段虛冷者加附子來復丹亦妙見局方白术散治産後霍亂吐利腹痛煩渴手足逆冷白术橘紅麥門冬人參乾薑各一兩甘草半兩右為粗末每服四錢生薑五片水一盞煎至七分去滓溫服附子散療産後霍亂吐利不止手足逆冷附子白术當歸吳茱茰桂心人參丁香橘紅甘草各半兩右為細末粥飲調下二錢無時候溫中散治産後霍亂吐瀉不止人參白术當歸草豆蔲仁乾薑各一兩厚朴二兩右為粗末每服三錢水煎服髙良薑散治産後霍亂吐利腹中㽲痛良薑當歸草豆蔲仁右等分為細末每服二錢粥飲調下訶子散胡椒湯亦妙方見第七卷第二論婦人大全良方卷二十一
