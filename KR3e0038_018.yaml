body:
  text: 婦人大全良方卷十四宋陳自明撰妊娠中風方論第一論曰夫四時八方之氣為風也常以冬至之日候之若從其鄉來者長養萬物若不從其鄉來者名為虛邪賊害萬物人體虛則中之若風邪客於皮膚入於經絡即頑痺不仁若入於筋脈挾寒則攣急喎僻挾溫則弛縱若入臟腑則恍惚驚悸凡五臟俞皆在背臟腑虛風邪皆從俞而入隨所傷臟腑經絡而為諸病也妊娠中風若不早治則令墮胎也防風散治妊娠中風卒倒心神悶亂口噤不能言四肢強急防風桑寄生葛根各一兩菊花防己北細辛秦芁當歸桂心茯神甘草羚羊角各半兩右為粗末每服四錢水一盞薑三片煎至六分去滓入竹瀝半合溫服白术酒治妊娠中風口噤語言不得白术一兩半獨活一兩黑豆一合炒右細銼以酒三升煎取一升半去滓溫分肆服口噤者拗口灌之得汗即愈治妊娠中風口眼不正手足頑痺防風羌活防己各一兩麻黃去節半兩黃松木節一兩桂心荆芥穗羚羊角屑桑寄生甘草薏苡仁各半兩右㕮咀每服三錢水一盞生薑半分煎至六分去滓溫服治妊娠因感外風如中風狀不省人熟艾三兩右以米醋炒令極熱乘熱以絹帛褁尉臍下良久即省陳總領曄云余女夫趙汝磐居天台親見王清叔舍人療其嫂氏妊娠風痙方論第二凡三方論曰夫妊娠體虛受風而傷太陽之經絡後復遇風寒相摶發則口噤背強名之曰痙又云其候冒悶不識人須臾自醒良久復作謂之風痙亦名子癎亦名子冒甚則反張治妊娠中風角弓反張口噤語澀麻黃去節防風獨活各一兩羚羊角屑桂心升麻酸棗仁炒甘草秦芁各半兩川芎當歸杏仁製各三分右㕮咀每服四錢水一盞薑四片煎至六分去滓入竹瀝半合溫服治妊娠中風腰背強直時復反張防風葛根川芎生乾地黃各二兩杏仁製麻黃去節各兩半桂心獨活甘草防己各一兩右㕮咀每服四錢水一盞煎至七分去滓溫服小品療妊娠忽悶眼不識人須臾醒醒復發亦有不醒者名為痓病亦名子癎亦名子冒葛根湯若有竹近可速辦者當先作瀝汁次辦湯也其竹逺不可即辦者當先辦湯此二療會得其一種其竹瀝偏療諸痓絶起死也非但偏療妊娠産婦絶死者有效小兒或癎痓金瘡發痓療之亦驗作竹瀝法見第三卷第一論葛根湯療妊娠臨月因發風痓忽悶憒不識人吐逆眩倒小醒復發名為子癎葛根貝母去心牡丹皮去心木防己防風當歸川芎白茯苓桂心熬澤㵼甘草各二兩獨活石膏碎人參各三兩右細切以水九升煮取三升分二服貝母令人易産若未臨月者升麻代之忌海藻菘菜酢物其詳見第三卷第二論亦可選方詳而用之妊娠腹內有鬼胎方論第三凡三方夫人臟腑調和則血氣充實風邪鬼魅不能干之若榮衛虛損則精神衰弱妖魅鬼精得入於臟狀如懷娠故曰鬼胎也雄黃元療妊娠是鬼胎致腹中黑血散下腹痛雄黃細研鬼臼去毛莽草丹砂細研巴豆去皮心油獺肝炙令黃各半兩蜥蜴一枚炙黃蜈蚣一條炙微黃右為細末蜜元如梧桐子大空心溫酒下二元日兩服後當利如不利加至三元初下清水次下蟲如馬尾狀無數病極者下蛇蟲或如段卵雞子或如白膏或如豆汁其病即除療婦人鬼胎及血氣不可忍方斑貓去頭翼足製延胡索炒各三枚右為細末再研如麵以溫酒調下半錢以胎下為度治婦人虛羸有鬼胎癥塊經侯不通芫花根三兩右銼炒令黃色為細末每服一錢桃仁煎湯調下當下惡物妊娠傷寒方論第四凡二十方論曰夫冬時嚴寒人體虛為寒所傷即成病為傷寒輕者淅淅惡寒翕翕發熱微咳鼻塞數日乃止重者頭疼體痛先寒後熱久而不愈則傷胎凡妊婦傷寒仲景無治法用藥冝有避忌不可與尋常婦人一槩治之也妊婦産前腹痛及治月事或多或少或前或後胎氣不安産後血塊不散或亡血過多或惡露不下冝加減四物湯當歸川芎白芍藥熟乾地黃一方用生者各一兩右㕮咀每服四錢水一盞半煎至八分取六分清汁熱服日四服以知為度妊孕下血即入艾六七葉阿膠末一錢同煎病勢甚大散藥不及以四味各半兩細銼以水四盞煎至二盞半去滓分四服食前熱服一日之中令盡以知為度平常産乳服至三臘止如虛弱血臟不調至一月止因虛致熱熱與血摶口舌乾渴欲飲水者加栝樓根一兩麥門冬三分腹中刺痛惡物不下加當歸芍藥各一分血崩加地黃蒲黃各一兩因熱生風加川芎一分柴胡半兩身熱脈躁頭昏項強加柴胡黃芩各半兩大便祕結加大黃半兩桃仁一分炒如大便滑泄加桂心熟附子各一分發寒熱加乾薑牡丹皮芍藥各一分嘔者加白术人參各半兩腹脹加厚朴枳實各一分虛煩不得眠加竹葉人參各一分煩躁大渴加知母石膏各半兩水停心下微吐逆加豬苓茯苓防己各一分虛寒狀類傷寒加人參柴胡防風各三分妊婦傷寒瘟疫時氣先服此以安胎冝阿膠湯却以治病藥相間服阿膠白术桑寄生人參白茯苓右等分為細末煮糯米飲調服方寸匕日三服妊婦傷寒憎寒發熱當發其汗冝蔥白湯蔥白十莖生薑二兩右細切以水二盞煮取一盞連服取汗愈妊婦傷寒頭痛壯熱肢節煩疼冝前胡湯出廣濟方石膏一錢二分前胡六分甜竹茹三分外臺無黃芩大青五分知母梔子仁各四分右㕮咀每服五錢水一盞半蔥白三寸煎至八分去滓溫服集驗文仲備急救急同妊婦傷寒或中時行灑淅作寒振栗而悸或加噦者冝蘇木湯赤芍藥橘紅黃芩黃連甘草蘇木等分右㕮咀每服五錢水一盞煎至六分去滓溫服汗出瘥若胎不安兼服阿膠湯方見前妊婦寒熱頭疼默默不欲食脅下痛嘔逆痰氣及産後傷風熱入胞宫寒熱如瘧並經水適來適斷病後勞復餘熱不解冝黃龍湯柴胡去節一兩黃芩人參甘草各一分半右㕮咀每服五錢水一盞半煎至一中盞去滓溫服妊婦傷暑頭痛惡寒身熱躁悶四肢疼痛項背拘急口乾躁冝柴胡石膏湯柴胡四兩甘草二兩石膏八兩右㕮咀每服二錢水一盞薑五片煎至六分去滓溫服若氣虛體冷加人參四兩妊婦傷寒四日至六日以來加心腹脹上氣渴不止飲食不多腰疼體重冝枳實散枳實一兩炒陳皮三分麥門冬半兩右為細末每服三錢水一中盞生薑半分蔥白七寸煎至六分去滓溫服妊婦傷寒頭目旋疼壯熱心躁冝旋覆花湯旋覆花赤芍藥甘草各半兩前胡石膏各一兩白术人參麻黃去根節黃芩各三分右㕮咀每服四錢水一盞半薑半分煎至六分去滓溫服麥門冬湯治妊婦傷寒壯熱嘔逆頭疼不思飲食胎氣不安人參石膏各一兩前胡黃芩各三分家葛根麥門冬各半兩右㕮咀每服五錢水一盞半生薑四片棗二箇淡竹茹一分煎至八分去滓溫服妊婦發癍變為黑色尿血冝梔子大青湯升麻梔子仁各二兩大青杏仁黃芩各一兩半右㕮咀每服五錢水一盞半蔥白三寸煎至一盞去滓溫服芍藥湯治妊娠傷寒五箇月已前嘗用此方出傷寒括要黃芩當歸芍藥各四錢川芎一兩六錢白术八錢右為細末溫酒調服方寸匕日二服産後百病悉皆主之常服則易産無病苦王子亨為産後常服之藥當歸茯苓散治婦人傷寒腹中隱痛當歸茯苓白术各二兩白芍藥半斤澤㵼川芎各四兩右為細末酒服方寸匕日三白术散治妊婦傷寒煩熱頭痛胎氣不安或時吐逆不下食白术橘紅麥門冬人參前胡赤茯苓川芎各一兩甘草半夏各半兩右㕮咀每服四錢水一中盞薑四片淡竹茹一分煎至六分去滓無時溫服柴胡散治妊娠熱病骨節煩痛頭疼壯熱若不治熱不止則損胎柴胡家葛根知母梔子仁甘草各半兩石膏一兩大青黃芩升麻各三分右㕮咀每服四錢水一盞蔥白三寸煎至六分去滓無時熱服麻黃散治妊娠五六箇月傷寒頭疼壯熱四肢煩疼麻黃桂心柴胡赤芍藥各一兩甘草半兩右㕮咀每服三錢水一盞薑三片煎至六分去滓無時溫服升麻散治妊娠傷寒頭痛身體壯熱川升麻蒼术炒麥門冬麻黃各一兩黃芩大青各半兩石膏二兩右㕮咀每服四錢水一盞薑半分淡竹葉二七片煎至六分去滓無時溫服治孕婦傷寒柴胡前胡川芎當歸人參芍藥粉草生地黃等分右為細末每服二錢薑三片棗四箇煎至七分去滓溫服要出汗加蔥良方白术散治妊婦傷寒白术黃芩各等分新瓦上炒令香右為散每服三錢水一中盞薑三片棗一枚煎至七分溫服但覺頭痛發熱便可喫二三服即瘥唯四肢厥冷隂證者未可服此方本常州一士人賣此藥醫皆論斤售去行醫用之如神無人得此方豫自得此治疾無有不效者仍安胎益母子治妊婦傷寒頭疼腹痛升麻黃芩各六分家乾葛大青石膏甘草各三分苦竹葉一握並細銼右用水一升半先煮苦竹葉乾葛減一半入諸藥再煮至六合去滓溫服妊娠時氣方論第五凡三方論曰夫四時之間忽有非節之氣如春應暖而反寒夏應熱而反冷秋應涼而反熱冬應寒而反暖非其節而有其氣而一氣之至無人不傷長少雖殊病皆相似者多挾於表毒也言其時普行此氣故云此時氣也妊娠遇之重者致傷胎也秦芁散治妊婦時氣五六日不得汗口乾多喫冷水狂語嘔逆秦芁柴胡各一兩石膏二兩赤茯苓前胡甘草犀角屑家葛根川升麻黃芩各半兩右㕮咀每服四錢水一盞薑半分淡竹茹一分煎至六分去滓無時溫服葛根飲子治妊婦時氣煩熱口乾頭痛家乾葛麻黃去節根各半兩石膏一兩䜴一合白米半合梔子仁二七枚蔥白二莖連根右細切以水二大盞煎至一盞三分去滓無時分溫三服汗出為效消熱飲子治妊婦時氣六七日熱甚大小便不利最冝服之川芒硝一兩細研葵子三兩搗右如前煎服以利為效敗毒散升麻葛根湯皆可用凡用葛根冝用家葛曬乾用野葛能動胎氣養生必用方言之甚詳妊婦熱病方論第六凡五方論曰夫冬時嚴寒觸冒傷之藏於肌骨夏至乃發壯熱又為暑病即熱病也此寒氣藴積發即為病若妊娠遇之多致墮胎也經云熱病與中暑相似但熱病者脈盛中暑者脈虛治妊娠熱病壯熱頭痛嘔吐不止不食心胸煩悶人參一方無竹茹家葛根各一兩蘆根二兩麥門冬去心一兩半知母三分右㕮咀每服四錢水一盞連根蔥白三寸煎至七分去滓溫服梔子仁飲子治妊娠熱病癍出黑色小便如血氣急欲絶胎欲落梔子仁升麻石膏乾地黃各二兩黃芩大青各一兩右㕮咀每服半兩蔥白七寸䜴四十九粒水一盞煎至五分去滓無時溫服救急有杏仁無地黃石膏大黃飲子治妊娠熱病六七日熱入腹中大小便祕澀煩熱川大黃微炒石膏各一兩知母前胡赤茯苓各三分梔子仁甘草黃芩各半兩右㕮咀每服半兩水一大盞生地黃一分煎至六分去滓無時溫服又方以伏龍肝細研無時水調下一錢亦可調為泥塗臍下又方以家葛根煮汁無時服一小盞妊娠傷寒熱病防損胎方論第七凡七方論曰非節之氣傷於妊婦熱毒之氣侵損胞胎遂有墮胎漏血俱害子母之命也治妊娠傷寒骨節疼痛壯熱不急治則胎落蔥白切一升前胡家葛根石膏各一錢青黛六分升麻八分梔子仁一錢二分右㕮咀以水七升煮取二升半去滓分溫三服治妊娠時氣頭痛腰背強壯熱升麻青黛前胡梔子仁黃芩各二兩石膏八分家葛根三兩右㕮咀以水五升煎取二升半去滓分為三服治妊婦六七箇月傷寒熱入腹大小便祕結不通蒸熱前胡一錢大黃石膏各二錢梔子仁十枚知母黃芩茯苓生薑各八分右水八升煎取二升半後下大黃更煎三五沸分作三服治妊娠傷寒苦熱不止身上班出忽赤忽黑小便如血氣欲絶胎欲落梔子仁升麻各四兩青黛二兩石膏八兩蔥白切一升黃芩三兩生地黃二錢右㕮咀以水九升煎取三升去滓作三服忌熱物治妊娠時氣身大熱令子不落護胎方伏龍肝研令極細右水調塗臍下二寸乾則易差即止泔清亦可又方井中泥塗心下乾則易二方出本事再録有效又方浮萍川朴硝蛤粉藍根等分大黃微炒右為末水調傅臍上安胎解煩熱極妙妊娠熱病胎死腹中方論第八郭稽中凡四方論曰熱病胎死腹中者何答曰因母患熱病至六七日以後臟腑極熱熏煮其胎是以致死緣兒死身冷不能自出但服黑神散暖其胎須臾胎即自出何以知其胎之已死但看産母舌青者是其候也黑神散又名烏金散散靈苑方名肉桂桂心當歸芍藥甘草炙乾薑炮生乾地黃各一兩黑豆炒去皮二兩附子炮去皮臍半兩右為細末每服二錢空心溫酒調下一方無附子有地黃陳無擇評曰夫妊娠謂之重身二命係焉將理失冝皆能損胎不特病熏煮所致或因頓仆驚恐出入觸冒及素有癥瘕積聚壞胎最多其候舌青即知子死養胎論曰面青舌赤母死子生唇青吐沫子母俱斃又有雙懷二胎或一死一活其候尤難知自非臨岐觀變未易預述不可不備學也然以黑神散溫胎未若補助産母使其氣正免致虛乏困頓胎自下矣催生湯殊勝黑神散催生湯治胎死腹中或産母氣乏委頓産道乾澀蒼米泔浸洗炒二兩苦梗一兩陳皮六錢白芷桂心甘草各三錢川芎一錢五分川烏當歸乾薑炮厚朴製芍藥茯苓半夏湯泡附子炮去皮南星炮各二錢枳殼四錢製木香一錢杏仁去皮尖炒阿膠炒各一分右為細末每服一大錢溫酒調下覺熱悶加白蜜新汲水調服只是五積散無麻黃有川烏附子南星阿膠木香杏仁六味鹿角散治妊娠熱病胎死腹中下之鹿角屑一兩右以水一盞蔥白五莖䜴半合煎至六分去滓溫服良效又方取死胎烏雞一隻去毛右細銼以水三升煮取二升去雞通手用衣帛蘸摩臍下胎自出妊娠瘧疾方論第九凡四方論曰夫妊娠病瘧者由夏傷於暑客於皮膚至秋因勞動血氣腠理虛而風邪乘之動前暑熱隂陽交爭陽盛則熱隂盛則寒隂陽相離寒熱俱歇若邪動氣至交爭則發故瘧休作有時其發寒時節漸晏者此由風邪客於風府循膂而下衛氣至一日一夜常大會於風府故發日晏其發日早者衛氣之行風府日下一節二十一日下至尾骶二十二日入脊內上注於伏衛之脈其行九日出缺盆之內其氣既止故發更早其間日發者由風邪內摶五臟橫連募原其道逺其氣深其行遲不能日作故間日搐積乃發也妊娠而發則寒熱之氣相迫傷於胎故多損動也治妊娠瘧疾不差出集驗方千金救急古今録驗同常山石膏各一兩甘草炙黃芩各半兩烏梅十四箇炒右細切以酒水各一大盞相和浸一宿平旦煎至一盞去滓分二服千金療妊娠患瘧方恆山竹葉各三兩石膏八兩碎糯米百粒右切以水六升煮取二升半去滓分三服第一服未發前一食久服之第二服取臨欲發時服餘一服用塗頭額及胸前五心藥滓置頭邊當發一日勿進水及飲食發過後乃進粥飲忌生蔥菜集驗文仲備急同治妊婦患瘧寒熱頭疼心煩黃芩麥門冬去心各一兩石膏二兩甘草半兩烏梅十四箇右㕮咀每服四錢水一盞煎至陸分去滓溫服七寶散治男子婦人一切瘧疾或先寒後熱或先熱後寒或寒多熱少或熱多寒少或一日一發或一日兩三發或連日或間日發或三四日一發不問鬼瘧食瘧不伏水土山嵐瘴氣似瘧者並皆治之常山厚朴薑製青皮陳皮並不去白甘草檳榔草果去皮右等分㕮咀每服半兩於未發隔夜用水一碗酒一盞煎至一大盞濾出露一宿却將滓再用酒水更依前煎一次去滓别以碗盛貯亦露一宿來日當發之早蕩溫面東先服頭藥少歇再服藥滓大有神效出楊氏家藏僕嘗治一妊婦六七箇月而沾瘧疾先寒後熱六脈浮緊衆醫用柴胡桂枝無效僕言此疾非常山不愈衆醫不肯因循數日病甚無計黽勉聽僕治之遂用七寶散一服愈黃帝問曰婦人重身毒之奈何岐伯曰有故無殞帝曰願聞其故何謂也岐伯曰大積大聚其可犯也衰其太半而止豈不以審藥之性味明治療之方處以中庸與疾適好於半而止之勿過而餘則何疑於攻治哉妊娠霍亂方論第十凡四方此方論専治妊婦霍亂然亦可就第七卷第二論選方通用也故不繁引論曰夫隂陽清濁相干謂之氣亂於腸胃則為霍亂也但飲食過度觸冒風冷使隂陽不和致清濁相干腸胃虛者受之故霍亂也熱亂者先吐或心腹痛則吐痢並發有頭痛體疼發熱而吐痢者亦為霍亂所以然者挾風而有實故也風折於氣皮膚緻密故血氣不得宣通故令壯熱風邪乘其經脈氣上衝頭則頭痛風氣入於腸胃則泄痢胃逆則嘔逆故為吐痢也吐痢甚者則多煩臟腑虛故也又手逆冷陽氣暴竭謂之四逆也妊娠之病吐痢甚者則傷胎也人參散治妊婦霍亂吐㵼心煩腹痛人參去蘆厚朴薑製橘紅各一兩當歸炒乾薑炮甘草炙各半兩右為散每服四錢水一盞棗三箇煎至六分無時溫服白术散治妊娠霍亂腹痛吐逆不止白术炒益智仁枳殼製橘紅各三分草豆冦煨去皮良薑炒各半兩木瓜煎治妊娠霍亂吐㵼轉筋入腹則悶絶吳茱茰湯泡七次生薑切各一分木瓜切一兩半一方有茴香一分甘草一錢茱茰半兩加紫蘇煎右細銼水二盞煎一盞二分去滓分三服無時熱服一方止渴飲治妊婦霍亂吐㵼心煩悶亂作渴右用糯米一合泡令淨細研以水一大盞研濾取汁入蜜一合生薑汁半合相和渴即頓服立止縮脾飲亦妙五苓散局方訶子散理中元局方胡椒湯香薷散夏月預冝合此以防霍亂若有是證以此藥療之其效神速但要極冷服一方有黃連無扁豆已上五方並見第七卷第二論縮脾飲方解伏熱除煩渴消暑毒止吐痢霍亂之後服熱藥太多致煩躁者冝沈令氷冷頓服草果仁四兩烏梅肉三兩甘草二兩半右㕮咀每服半兩水一碗生薑十片煎至八分侵以熟水溫冷任意婦人大全良方卷十四
