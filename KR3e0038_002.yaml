body:
  text: 婦人大全良方目録下卷十胎教門求嗣已明須知胎教故以次之妊娠總論第一娠豫論第二受形篇第三論胎教第四孕元立本章第五凝形殊稟章第六氣質生成章第七轉女為男法第八卷十一脈例第一診婦人有妊歌第二驗胎法第三凡一方胎殺避忌産前將護法第四月逰胎殺第五十干日逰胎殺第六十二支日逰胎殺第七六甲旬逰胎殺第八太史局日逰胎殺第九食忌論第十孕婦藥忌歌第十一卷十二妊娠門胎教已明須知妊娠疾病故以次之妊娠隨月數服藥及將息法第一凡二十方妊娠惡阻方論第二凡十二方妊娠痰逆不思食方論第三凡六方胎動不安方論第四凡二十方妊娠漏胎下血方論第五妊娠卒然下血方論第六凡十二方妊娠驚胎及僵仆方論第七凡七方妊娠胎上逼心方論第八凡七方妊娠忽然下黃汁如膠或如豆汁胎動腹痛方第九凡一方妊娠誤服毒藥傷動胎氣方論第十凡三方妊娠心痛方論第十一凡七方妊娠心腹痛方論第十二凡十一方妊娠中惡方論第十三凡三方妊娠腰腹及背痛方論第十四凡十方妊娠小腹痛方論第十五凡一方妊娠心腹脹滿方論第十六凡三方卷十三妊娠數墮胎方論第一凡五方妊娠胎不長養方論第二凡五方妊娠胎動安不得却須下方論第三凡七方妊娠墮胎後血下不止方論第四凡九方妊娠日月未足欲産方第五凡四方斷産方論第六凡七方妊娠咳嗽方論第七凡八方妊娠吐血衄血方論第八凡二方妊娠子煩方第九凡十方妊娠煩燥口乾方論第十凡四方卷十四妊娠中風方論第一凡四方妊娠風痙方論第二凡三方妊娠腹內鬼胎方論第三凡三方妊娠傷寒方論第四凡二十方妊娠時氣方論第五凡三方妊娠熱病方論第六凡五方妊娠傷寒熱病防損胎方論第七凡七方妊娠熱病胎死腹中方論第八凡四方妊娠瘧疾方論第九凡四方妊娠霍亂方論第十凡四方卷十五妊娠泄瀉方論第一凡三方妊娠下痢赤白及黃水方論第二凡十五方妊娠大小便不通方論第三凡十方妊娠小便不通方論第四凡八方妊娠子淋方論第五凡五方妊娠遺尿方論第六凡三方妊娠尿血方論第七凡五方妊娠胎水腫滿方論第八産乳養子論附凡十一方妊娠腹內鍾鳴方第九凡一方龔彥德孕癰方第十凡一方妊娠不語論第十一妊娠傷食方論第十二凡二方妊娠臟燥悲傷方論第十三凡一方卷十六坐月門妊娠疾病已明須知坐月故以次之産寶方周頲序第一將護孕婦論第二滑胎例第三凡八方月空方位例第四逐月安産藏衣忌向方位第五推婦人行年法第六體玄子借地法第七禁草法第八禁水法第九入月預備藥物第十催生符第十一卷十七産難門坐月已明須知産難故以次之産難論第一楊子建十産論第二凡一方催生方第三凡三十六方郭稽中産難方論第四凡二方産難子死腹中方論第五凡十八方産難生死訣第六卷十八産後門産難既明須知産後疾病故以次之産後將護法第一産後調理法第二産後通用方論第三凡二十三方産科序論胞衣不出方論第四凡二十二方産後血暈方論第五凡十六方産後顛狂方論第六凡三方産後狂言譫語如有神靈方論第七凡一方産後不語方論第八凡二方卷十九産後乍見鬼神方論第一凡三方産後臟虛心神驚悸方論第二凡七方産後心驚中風方論第三凡五方産後中風恍惚方論第四凡四方産後所下過多虛極生風方論第五凡一方産後虛汗不止方論第六凡八方産後冒悶汗出不識人方論第七凡一方産後汗出多而變痓方論第八凡十四方中風口噤角弓反張方論附産後中風方論第九凡七方郭稽中産後中風方論産後中風筋脈四肢攣急方論第十凡四方産後熱悶氣上轉為腳氣方論第十一凡一方卷二十産後遍身疼痛方論第一凡二方産後腰痛方論第二凡十方産後惡露不絶方論第三凡九方産後惡露不下方論第四凡六方産後餘血上搶心痛方論第五凡三方産後惡露不盡腹痛方論第六凡十二方産後兒枕心腹刺痛方論第七凡十八方産後小腹疼痛方論第八凡六方産後寒疝方第九凡三方産後兩脅脹滿氣痛方論第十凡六方産後積聚癥塊方論第十一凡三方産後血瘕方論第十二凡八方産後餘血奔心煩悶方論第十三凡九方産後虛煩方第十四凡七方卷二十一産後口乾痞悶方論第一凡一方産後血渴方第二凡五方産後乍寒乍熱方論第三凡九方産後方論附産後蓐勞方論第四凡十一方産後虛羸方論第五凡十五方産後風虛勞冷方論第六凡十二方産後腹脹滿悶嘔吐不定方論第七凡一方産後嘔逆不食方論第八凡四方産後霍亂方論第九凡四方卷二十二産後傷寒方論第一凡七方産後頭痛方論第二凡三方産後咳嗽方論第三凡四方産後喉中氣急喘促方論第四凡四方産後口鼻黑氣起及鼻衄方論第五凡二方産後咳癔方論第六凡六方産後血崩方論第七凡八方産後月水不調方論第八凡二方産後月水不通方論第九産後四肢浮腫方論第十凡九方産後腹痛及瀉痢方論第十一凡七方産後赤白痢疾及虛羸氣痢方論第十二凡三十一方卷二十三産後痢疾作渴方論第一凡三方産後大便祕澀方論第二凡七方産後大小便不通方論第三凡三方産後遺糞方第四凡二方産後諸淋方論第五凡十五方産後小便數方論第六凡二方産後小便不禁方論第七凡四方産後小便出血方論第八凡三方産後隂脫玉門不閉方論第九凡十六方婦人隂蝕五疳方論第十凡八方産後乳汁或行或不行方論第十一凡十五方産後乳汁自出方論第十二凡十五方産後吹妳方論第十三凡六方産後妬乳方論第十四凡十方乳癰方論第十五凡二十五方卷二十四拾遺方産乳集將護嬰兒方論臣等謹案婦人大全良方二十四卷宋陳自明撰自明字良父臨川人官建康府醫學教諭是編凡分八門首調經次衆疾次求嗣次胎教次妊娠次坐月次産難次産後每門各立子目總二百六十餘論論後附方按婦人専科始唐咱殷産寶其後有李師聖之産育保慶集陸子正之胎産經驗方大抵卷帙簡略流傳亦鮮自明採托諸家持綱挈領於婦科證治詳悉無遺明薛已醫案曾以己意刪訂附入治驗自為一書是編刻於建陽余氏勤有書堂猶為自明原本前有嘉熙元年自序稱三世業醫家藏醫書若干又遍行東南所至必索方書以觀其用心亦可云勤矣乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
