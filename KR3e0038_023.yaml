body:
  text: 婦人大全良方卷十九宋陳自明撰産後乍見鬼神方論第一凡三方論曰産後乍見鬼神者何答曰心主身之血脈因産傷耗血脈心氣虛則敗血停積上干於心心不受觸遂致心中煩躁卧起不安乍見鬼神言語顛錯醫人不識呼為風邪如此治之必不得愈但服調經散每服加龍腦一捻得睡即安調經散方沒藥琥珀並細研桂心各一錢芍藥當歸各一分麝香研細辛各半錢右為末每服半錢生薑汁溫酒各少許調服柏子仁散治産後狂言亂語皆由內虛敗血挾邪氣攻心柏子仁遠志去心人參桑寄生防風琥珀别研當歸炒生地黃焙甘草等分右為粗末先用白羊心一箇切片以水一大盞半先煮至九分去羊心入藥末五錢煎至六分去滓無時服茯神散治産後血邪心神恍惚言語失度睡卧不安茯神一兩去皮人參龍齒研琥珀研赤芍藥黃耆牛膝各三分生地黃一兩半桂心半兩右為末每服三錢水一盞煎至七分不拘時去滓溫服産後臟虛心神驚悸方論第二凡七方夫産後臟虛心神驚悸者由體虛心氣不足心之經為風邪所乘也或恐懼憂迫令心氣受於風邪風邪搏於心則驚不自安若驚不已則悸動不安其狀目睛不轉而不能呼診其脈動而弱者驚悸也動則為驚弱則為悸矣産乳七寶散療初産後服之調和血氣補虛安神壓驚悸辰砂研桂心當歸川芎人參白茯苓羚羊角燒存性已上各二錢乾薑一錢産科各等分右為末每服一錢用羌活豆淋酒調下將護産婦用之如不飲酒用清米飲調下如覺心煩熱悶以麥門冬去心煎水調下若心下煩悶而痛用童子小便調下若覺心胸煩熱即減薑桂冷即加之腹痛加當歸心悶加羚羊角心虛氣怯加桂心不下食或惡心加人參虛顫加茯苓以意斟酌日二夜一服治産後臟虛心中驚悸志意不安言語錯亂不自覺知茯神遠志人參麥門冬甘草生地黃當歸龍齒桂心白芍藥羚羊角等分右為粗末每服三錢水一盞薑三片棗一箇煎至六分去滓溫服無時候治産後心虛驚悸神思不安龍齒黃耆白薇生地黃各一兩人參茯神逺志羌活各三分甘草桂心防風各半兩一方無黃耆有荆芥與銀右為粗末每服三錢水一盞薑三片棗一箇煎至六分去滓無時服治産後臟腑虛心怔驚悸言語錯亂麥門冬去心人參各八錢牛黃研白薇各二錢茯神獨活逺志生地黃朱砂飛防風天竺黃甘草龍齒研各四錢龍腦麝香並細研各一錢右為末用薄荷酒調下二錢療血虛多驚及産後敗血諸疾辰砂琥珀沒藥並細研當歸為末等分右為細末每服二錢空心日午臨卧白湯調服産後驚風亂道言語如見鬼狀精神不定者研好朱砂酒調下局方龍虎丹叄圓作一服兼琥珀地黃圓服之琥珀地黃圓方南番琥珀别研延胡索糯米同炒赤去米當歸各一兩蒲黃四兩炒香生地黃研裂汁留滓生薑各二斤洗研裂汁留滓以生薑汁於銀石器內炒地黃滓以地黃汁炒生薑滓各至乾堪為末則止右為末煉蜜圓如彈子大食前當歸湯化一圓服産後心驚中風方論第三凡五方論曰産後心悶氣絶眼張口噤遍身強直腰背反偃狀如癎疾心忪驚悸言語錯亂皆是宿有風毒因産心氣虛弱發成風痙療産後心氣虛損卒驚狂語或歌哭嗔笑性氣不定上等銀一斤桂心甘草各六分細辛四分人參生薑逺志茯神各八分生地黃二十分龍骨三分棗子一箇右㕮咀以水八升煮銀至一升半入藥煎至一升分作三服溫進療産後多虛羸弱若大汗利皆至於死此重虛故也若患中風語謬昏悶不知人者人參茯苓羌活桂心大棗逺志各十分竹瀝一升右用水六升煮取三升下竹瀝更煎取二升溫分三服療産後心驚中風防風當歸茯苓防己麻黃各八分秦芁人參川芎獨活白鮮皮甘草白薇各六分石膏十二分竹瀝二升右水七升先煮麻黃掠去沫下諸藥入竹瀝煎取二升半去滓溫分三服忌菘菜豬肉生冷茯苓散療産後狂語志意不定精神昏亂心氣虛風邪所致茯苓一方使茯神生地黃十二分遠志白薇龍齒各十分防風人參獨活各八分同為末右以銀一大斤水一斗五升煎取七升下諸藥煎取三升溫分三服忌如前一方治産後風邪所干心神恍惚志意不定加荆芥八分甘草五分療産後心虛忪悸不定亂語錯誤精神恍惚不主當由心虛所致人參甘草芍藥當歸生薑各八分逺志茯苓各十分桂心六分麥門冬大棗各十二分右為散以水八升煮取三升去滓溫分三服産後中風恍惚方論第四凡三方夫産後中風恍惚者由心主血血氣通於榮衛臟腑遍循經絡産則血氣俱傷腑臟皆虛心不能統於諸臟榮衛不足即為風邪所乘則令心神恍惚不定也千金療産後暴苦心悸不定言語錯亂恍惚皆因心虛所致茯苓三兩芍藥二兩甘草桂心當歸各一兩生薑六分麥門冬一升大棗三十枚右為散水三升煎取一升去滓分作兩服食後經效療産後心虛忪悸志意不定煩躁恍惚茯神當歸黃芩麥門冬去心甘草人參芍藥酸棗仁白鮮皮各三兩大棗七箇右為粗末水二升煮取七合去滓溫服療産後中風恍惚語澀四肢不利天麻圓天麻朱砂防風羌活各一兩殭蠶三分炒乾蝎炒白附子炮裂五靈脂各半兩雄雀糞炒牛黃各一分右為末糯米軟飯為員如梧桐子大以薄荷酒研十五圓服之産後所下過多虛極生風方論第五凡一方論曰産後所下過多虛極生風者何答曰婦人以榮血為主因産血下太多氣無所主唇青肉冷汗出目眩神昏命在須臾此但虛極生風也如此則急服濟危上丹若以風藥治之則誤矣濟危上丹方乳香研五靈脂硫黃玄精石同研極細阿膠卷柏生桑寄生陳皮各等分右將上四味同研停於銀石器內微火炒勿焦了再研極細復入餘藥為末用生地黃汁和員如梧桐子大每服二十員食前溫酒或當歸酒送下産後虛汗不止方論第六凡八方夫虛汗不止者由隂氣虛而陽氣加之裏虛表實陽氣獨發於外故汗出也血為隂産則傷血是為隂氣虛也氣為陽其氣實者陽加於隂故令汗出而隂氣虛弱不復者則汗出不止也凡産後血氣皆虛故多汗也因之遇風則變為痙縱不成痙則虛乏短氣身體柴瘦唇口乾燥久則經水斷絶由津液竭故也亦可就第三卷第六論中求之麻黃根散治産後虛汗不止當歸黃耆麻黃根牡蠣煅為粉人參粉草各等分右㕮咀每服四錢水一盞煎至七分去滓溫服又方當歸黃耆各一兩麻黃根二兩右㕮咀每服三錢水一盞煎至七分去滓溫服千金療産後風虛汗出不止小便難四肢微急難以屈伸甘草炙一兩附子半箇炮去皮臍桂心芍藥各一兩半右㕮咀每服三錢水一盞生薑四片棗一枚煎至七分去滓空心溫服忌豬肉冷水生蔥等物經效療産後汗出不止黃耆十二分白术牡蠣茯苓防風麥門冬去心生地黃各八分大棗七箇右㕮咀水二升煎取七合去滓空心分溫兩服又療産後血氣暴虛汗出淡竹葉煎湯三合微溫服之須臾再服又方馬齒莧研取汁三大合如無乾者亦可右煮一沸投蜜一匙令停頓服止汗散治産後盜汗不止應多汗者皆可服牡蠣煅研細小麥麩炒令黃色研為細末右等分研細煮生豬肉汁調下二錢無時候人參湯治産後諸虛不足發熱盜汗二方出胡氏人參當歸等分右為末以豬腰子一隻去脂膜切小片子以水三升糯米半合蔥白兩條煮米熟取清汁一盞入藥二錢煎至八分溫服不拘時候産後冒悶汗出不識人方論第七凡一方凡産後忽冒悶汗出不識人者暴虛故也破雞子三枚吞之便醒若未醒可與童子小便一升甚驗丈夫小便亦得切不得用病人者又若久不識人或時復發者此為有風因産血氣暴虛風行脈中故也若産後去血多者又增此疾與雞子不醒者可急作竹瀝汁一服五合須臾不定再與五合頻與三五服瘥産後汗出多而變痓方論第八中風口噤角弓反張附論曰産後汗出多而變痓者何答曰産後血虛肉理不密故多汗因遇風邪摶之則變痓痓者口噤不開背強而直如發癎狀搖頭馬鳴身反折須臾拾發氣息如絶宜速斡口灌小續命湯稍緩即汗出如雨手拭不及者不可治也小續命湯治中風及剛柔二痓及腳氣痺弱不能轉側兼治小兒驚風麻黃製可去加葛桂心甘草各半兩防風三錢三分芍藥白术人參川芎附子防己黃芩各一分右㕮咀每服五錢水一盞半煎至一盞去滓取八分清汁入生薑汁再煎一二沸溫服日三服夜二服若柔痓自汗者去麻黃夏間及病有熱者去附子減桂一半冬及初春去黃芩第三卷雖有然其中有杏仁無白术雖然陳無擇評曰産後汗出多變痓亦令服續命湯此又難信既汗多如何更服麻黃官桂防己黃芩輩不若大豆紫湯為佳太醫局方大聖散亦良藥也愚觀朱奉議云凡剛柔二痓小續命湯並可加減與之若柔痓自汗者有去麻黃加葛根之説朱奉議必有所據雖大豆紫湯大聖散良亦不可偏見曲説有妨古人之意大豆紫湯治中風頭眩惡風自汗吐冷水及産後百病或中風痱痙背強口噤直視煩熱脈緊大者不治小品方主産後中風困篤背強口噤或但煩躁或頭身皆重或身重癢劇嘔吐直視者指迷方名獨活湯川獨活兩半大豆半升酒三升右先以酒浸獨活煎一二沸别炒大豆極焦煙出急投酒中蜜封候冷去豆每服一二合許得少汗則愈日拾服此藥能去風消血結如妊娠折傷胎死腹中服此得差凡産後口噤腰背強直角弓反張皆名曰痙又名曰痓古人察有汗無汗以分剛柔隂陽而治今産寶諸書有中風口噤一門又有角弓反張一門其實一也如增寒發熱有類傷寒皆不論及豈可只以一二藥治之愚今取百問中方論已詳備前篇見三卷第二論庶幾覽者如指諸掌中風口噤角弓反張方論附凡産後中風口噤是其血氣虛而風入於頷頰夾口之筋也手三陽之筋結入於頷産則勞損腑臟傷於筋脈風若乘之其三陽之筋脈則偏摶之筋得風冷則急故令口噤也若角弓反張者是體虛受風風入於諸陽之經也人隂陽經絡周環於身風邪乘虛入於諸陽之經則腰背反折攣急如角弓之狀也愈風散療産後中風口噤牙關緊急手足瘈瘲如角弓狀亦治血暈四肢強直不省人事或築心眼倒吐瀉欲死出華他方百問經驗産寶陳氏本事同荆芥略焙為末右每服三錢豆淋酒調下用童子小便亦可其效如神口噤者灌齒齗噤者吹鼻中皆效一方用古老錢煎湯調服名一捻金散一方云用舉卿古拜二味蓋切腳隱語以祕方也此藥委有竒效神聖之功大抵産室但無風為佳不可衣被帳褥太暖暖即汗出則腠理開易於中風便昏冒指迷方但為粗末濃煎服許學士云記有一婦人産後護密閣內更生火睡久及醒則昏昏如醉不省人事其家驚惶醫用此藥佐以交加散祝云服之即睡睡中必以左手搔頭覺必醒矣果如其言交加散方見第二卷第五論又名交解散見産後虛煩専治婦人方治産後中風不省人事口吐涎手足瘈瘲當歸荆芥穗等分右為細末每服二錢水一盞酒少許煎至七分灌之如牙關緊急用匙斡微微灌下但下咽即有生理不問多少便服不可以藥味尋常忽之屢用救人有效小品療産後中風虛人不可服他藥者一物獨活湯主之及一物白鮮湯主之亦可與獨活合煮之川獨活三兩細切右水三升煮取一升分服奈酒者亦可酒水煮一方用白鮮皮亦依此法産後中風痙口噤靣青手足急強者以竹瀝二升分為五服溫溫頻服大效治産後中風口噤四肢頑痺不仁身體如角弓反張羌活酒羌活防風各三兩黑豆一升炒令煙出右細銼以好酒一斗於瓶中攪動密封經半日許又於鍋中重湯煮瓶至半日候瓶冷取出每服暖一中盞飲之日可三四服度之當汗出即差治産後中風身如角弓反張口噤不語方川烏五兩銼如豆大右取黑豆半升同炒半黑以酒三升㵼於鐺內急攪以絹濾取酒微溫服一小盞取汗若口不開者拗開口灌之未效加烏雞糞一合炒內酒中服之以瘥為度寶方療産後腹中堅硬兩脅膈脹手足冷心中煩熱欲飲水乾嘔關節勞痓中風之疾羚羊角二分防風十二分羌活苦梗敗醬各八分桂心柴胡大黃浸過各六分右水二升煎取八合空心兩服服了吐即良久更服了喫地黃酒用地黃切一升炒令黑瓷瓶中下熱酒三升密封口煮令減半任意服之千金雞屎醴療産後中風及男子諸風并産後百疾神效方又治産後中風口噤拘急困篤腰背強直時時反折烏雞屎三升大豆二升右先炒豆令聲絶次炒雞屎令黃以酒一升先淋雞屎取汁淋大豆每服一升重者凡四五服之極妙深師療産後中風口噤不任大小獨活八分乾葛六分甘草二分生薑五分右㕮咀以水二升煮取一大升分為兩服張文仲療産後中風風痙遍身冷直口噤不識人方白术四兩細切右以酒三升煮取一升頓服效經效療産後中風腰背強直時時反張名曰風痙防風葛根川芎地黃各八分麻黃去節甘草桂心川獨活防己各六兩杏仁五箇去皮尖炒右細切以水八升煮麻黃去沫後下諸藥煎取三升分溫三服有汗者不可服治産後中風口噤潰悶不能言身體強直羌活防風秦芁桂心粉草葛根各三分生薑八分附子一箇炮杏仁八十枚去皮尖麻黃十分去節右㕮咀水九升煮麻黃去沫後下諸藥煮取二升分為三服有汗者不可服産後中風方論第九凡七方論曰産後中風由産傷動血氣勞損臟腑未平復起早勞動氣虛而風邪氣乘虛傷之故中風風邪冷氣客於皮膚經絡但疼痺羸乏不任少氣若筋脈挾寒則攣急喎僻挾溫則緩弱若入諸臟恍惚驚悸隨其所傷臟腑經絡而生病焉郭稽中産後中風方論論曰産後中風者何答曰産後五七日內強力下床或一月之內傷於房室或懷憂怒擾蕩沖和或因著艾傷動臟腑得病之初眼澀口噤肌肉瞤搐漸至腰脊筋急強直者不可治此乃人作非偶爾中風所得也陳無擇評曰問産後中風風是外邪血虛則或有中之者直答以人作不可治問答不相顧解如何開示後人立論之難有如此者若是中風當以脈辨看在何臟依經調之強力下床月內房室憂怒著炙非中風類蓐勞性氣火邪治各有法非産後病不暇繁引學者識之經效療産後風虛頭目痛語言時僻防風乾葛茯苓各八分麥門冬去心八分芍藥黃芩各六分犀角四分甘草三分右㕮咀以水二升煎取七合分為兩服療産後中風心忪悸志意不定恍惚語言錯亂方人參六分羚羊角屑麥門冬茯神各八分黃芩白鮮皮甘草各四兩石膏十二分淡竹瀝兩大合右㕮咀水二大升煎至七合下竹瀝分三服療産後中風身背拘急如束并渴川芎羌活羚羊角屑酸棗仁芍藥各四兩桑白皮六分防風五分右㕮咀水四升煎取二升分溫三服療産後中風四肢拘束筋節掣痛不得轉側如角弓反張麻黃八分去根節生薑桂心白术各四分防風芍藥各六分川芎五分竹瀝二合右細銼以水三升先煮麻黃掠去沫下諸藥煎取七合下竹瀝再煎三沸分三服取微汗為度治産後納涼太過中風者或成喘急唇青鼻黑男六德續添以局方小續命湯連進三服即愈療産後中風煩渴紅花子五合炒微熱研碎右以水一升煎取七合每一匙頭徐徐呷治産後中風半身手足不遂言語謇澀恍惚多忘精神不定川獨活當歸芍藥防風川芎玄參各二分桂心分半右細銼以水八升煮取二升半分為三服覺效又更作一劑漸瘥須適寒溫將息如不差即以此方作元每服二十元有熱加乾葛五兩有冷加白术五兩有氣加生薑六分手足不穩加牛膝五分萆薢三兩黃耆四兩腹痛加當歸芍藥各三分不食加人參二分玄參四分産後中風筋脈四肢攣急方論第十凡四方夫産後中風筋脈攣急者是氣血不足臟腑俱虛日月未滿而起早勞役動傷腑臟虛損未復為風邪冷氣初客於皮膚經絡則令人頑痺不仁羸乏少氣風氣入於筋脈挾寒則攣急也治産後中風四肢筋脈攣急疼痛背項強直防風一兩赤芍藥桂心各半兩羚羊角屑川芎羌活當歸酸棗仁牛蒡子炒各三分右㕮咀每服四錢水一盞煎至六分去滓溫服療産後中風睡卧不安筋脈四肢攣急或強直獨活散獨活天麻防風各一兩桂心當歸荆芥川芎蔓荆子各半兩麻黃去節附子炮羚羊角屑赤芍藥各三分右㕮咀每服四錢水酒各半盞煎至六分去滓溫服有汗者莫服療産後中風四肢筋脈攣急疼痛羌活天麻酸棗仁川牛膝防風當歸薏苡仁柏子仁鹿角膠炒各一兩蔓荆子桂心各半兩羚羊角屑附子炮川芎各三分麝香一分研右為細末無時以豆淋酒調二錢服治産後中風四肢筋攣急疼痛心神煩悶背項強直羌活防風附子炮去皮羚羊角屑麻黃去節各一兩地黃桂心各三分酸棗仁炒黃耆當歸川牛膝川芎萆薢各半兩右為細末煉蜜元如梧桐子大每服三十丸溫酒吞下産後熱悶氣上轉為腳氣方論第十一凡一方論曰産後熱悶氣上轉為腳氣者何答曰産卧血虛生熱復因春夏取涼過多地之蒸濕因足履之所以著為腳氣其狀熱悶掣瘲驚悸心煩嘔吐氣上皆其候也可服小續命湯方見本卷第八論兩三劑必愈若醫者誤以逐敗血藥攻之則血去而疾益增矣陳無擇評曰腳氣固是常病未聞産後能轉為者往往讀千金見産婦多有此疾之語便出是證文辭害意槩可見矣設是熱悶氣上如何便服續命湯此藥本主少陽經中風非均治諸經腳氣要須依腳氣方論隂陽經絡調之此涉專門未易輕論既非産後要病更不繁引陳無擇雖有此評然小續命湯加減與之用無不效故百問云寒中三陽所患必冷小續命湯主之加生薑汁最快暑中三隂所患必熱小續命湯去附子減桂心一半大煩躁者紫雪最良僕取百問中加減法庶使後人均得治療如無紫雪用真薄荷煎冷水嚼下婦人大全良方卷十九
