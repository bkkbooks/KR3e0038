body:
  text: 婦人大全良方卷十九宋陳自明撰産後乍見鬼神方論第一凡三方論曰産後乍見鬼神者何答曰心主身之血脉因産傷耗血脉心氣虛則敗血停積上干於心心不受觸遂致心中煩躁卧起不安乍見鬼神言語顛錯醫人不識呼為風邪如此治之必不得愈但服調經散每服加龍腦一捻得睡即安調經散方没藥琥珀並細研桂心各一錢芍藥當歸各一分麝香研細辛各半錢右為末每服半錢生薑汁温酒各少許調服栢子仁散治産後狂言亂語皆由内虛敗血挾邪氣攻心栢子仁遠志去心人參桑寄生防風琥珀别研當歸炒生地黄焙甘草等分右為粗末先用白羊心一箇切片以水一大琖半先煑至九分去羊心入藥末五錢煎至六分去滓無時服茯神散治産後血邪心神恍惚言語失度睡卧不安茯神一兩去皮人參龍齒研琥珀研赤芍藥黄耆牛膝各三分生地黄一兩半桂心半兩右為末每服三錢水一琖煎至七分不拘時去滓温服産後臟虛心神驚悸方論第二凡七方夫産後臟虛心神驚悸者由體虛心氣不足心之經為風邪所乘也或恐懼憂迫令心氣受於風邪風邪搏於心則驚不自安若驚不已則悸動不安其狀目睛不轉而不能呼診其脉動而弱者驚悸也動則為驚弱則為悸矣産乳七寶散療初産後服之調和血氣補虛安神壓驚悸辰砂研桂心當歸川芎人參白茯苓羚羊角燒存性已上各二錢乾薑一錢産科各等分右爲末每服一錢用羌活豆淋酒調下將護産婦用之如不飲酒用清米飲調下如覺心煩熱悶以麥門冬去心煎水調下若心下煩悶而痛用童子小便調下若覺心胷煩熱即减薑桂冷即加之腹痛加當歸心悶加羚羊角心虛氣怯加桂心不下食或惡心加人參虛顫加茯苓以意斟酌日二夜一服治産後臟虛心中驚悸志意不安言語錯亂不自覺知茯神遠志人參麥門冬甘草生地黄當歸龍齒桂心白芍藥羚羊角等分右為粗末每服三錢水一琖薑三片棗一箇煎至六分去滓温服無時候治産後心虛驚悸神思不安龍齒黄耆白薇生地黄各一兩人參茯神逺志羌活各三分甘草桂心防風各半兩一方無黄耆有荆芥與銀右爲粗末每服三錢水一琖薑三片棗一箇煎至六分去滓無時服治産後臟腑虛心怔驚悸言語錯亂麥門冬去心人參各八錢牛黄研白薇各二錢茯神獨活逺志生地黄朱砂飛防風天竺黄甘草龍齒研各四錢龍腦麝香並細研各一錢右爲末用薄荷酒調下二錢療血虛多驚及産後敗血諸疾辰砂琥珀没藥並細研當歸為末等分右爲細末每服二錢空心日午臨卧白湯調服産後驚風亂道言語如見鬼狀精神不定者研好朱砂酒調下局方龍虎丹叄圓作壹服兼琥珀地黄圓服之琥珀地黄圓方南番琥珀别研延胡索糯米同炒赤去米當歸各一兩蒲黄四兩炒香生地黄研裂汁留滓生薑各二斤洗研裂汁留滓以生薑汁於銀石器内炒地黄滓以地黄汁炒生薑滓各至乾堪為末則止右爲末煉蜜圓如彈子大食前當歸湯化一圓服産後心驚中風方論第三凡五方論曰産後心悶氣絶眼張口噤遍身强直腰背反偃狀如癎疾心忪驚悸言語錯亂皆是宿有風毒因産心氣虛弱發成風痙療産後心氣虛損卒驚狂語或歌哭嗔笑性氣不定上等銀一斤桂心甘草各六分細辛四分人參生薑逺志茯神各八分生地黄二十分龍骨三分棗子一箇右㕮咀以水八升煑銀至一升半入藥煎至一升分作三服温進療産後多虛羸弱若大汗利皆至於死此重虛故也若患中風語謬昏悶不知人者人參茯苓羗活桂心大棗逺志各十分竹瀝一升右用水六升煑取三升下竹瀝更煎取二升温分三服療産後心驚中風防風當歸茯苓防己麻黄各八分秦芁人參川芎獨活白鮮皮甘草白薇各六分石膏十二分竹瀝二升右水七升先煑麻黄掠去沫下諸藥入竹瀝煎取二升半去滓温分三服忌菘菜猪肉生冷茯苓散療産後狂語志意不定精神昏亂心氣虛風邪所致茯苓一方使茯神生地黄十二分遠志白薇龍齒各十分防風人參獨活各八分同為末右以銀一大斤水一㪷五升煎取七升下諸藥煎取三升温分三服忌如前一方治産後風邪所干心神恍惚志意不定加荆芥八分甘草五分療産後心虛忪悸不定亂語錯誤精神恍惚不主當由心虛所致人參甘草芍藥當歸生薑各八分逺志茯苓各十分桂心六分麥門冬大棗各十二分右爲散以水八升煑取三升去滓温分三服産後中風恍惚方論第四凡三方夫産後中風恍惚者由心主血血氣通於榮衛臟腑遍循經絡産則血氣俱傷腑臟皆虛心不能統於諸臟榮衞不足即爲風邪所乘則令心神恍惚不定也千金療産後暴苦心悸不定言語錯亂恍惚皆因心虛所致茯苓三兩芍藥二兩甘草桂心當歸各一兩生薑六分麥門冬一升大棗三十枚右爲散水三升煎取一升去滓分作兩服食後經効療産後心虛忪悸志意不定煩躁恍惚茯神當歸黄芩麥門冬去心甘草人參芍藥酸棗仁白鮮皮各三兩大棗七箇右爲粗末水二升煑取七合去滓温服療産後中風恍惚語澁四肢不利天麻圓天麻朱砂防風羌活各一兩殭蚕三分炒乾蝎炒白附子炮裂五靈脂各半兩雄雀糞炒牛黄各一分右爲末糯米軟飯爲員如梧桐子大以薄荷酒研十五圓服之産後所下過多虛極生風方論第五凡一方論曰産後所下過多虛極生風者何答曰婦人以榮血爲主因産血下太多氣無所主唇青肉冷汗出目眩神昏命在須㬰此但虛極生風也如此則急服濟危上丹若以風藥治之則誤矣濟危上丹方乳香研五靈脂硫黄𤣥精石同研極細阿膠卷栢生桑寄生陳皮各等分右將上四味同研停於銀石器内微火炒勿焦了再研極細復入餘藥爲末用生地黄汁和員如梧桐子大每服二十員食前温酒或當歸酒送下産後虛汗不止方論第六凡八方夫虛汗不止者由隂氣虛而陽氣加之裏虛表實陽氣獨發於外故汗出也血爲隂産則傷血是爲隂氣虛也氣為陽其氣實者陽加於隂故令汗出而隂氣虛弱不復者則汗出不止也凡産後血氣皆虛故多汗也因之遇風則變為痙縱不成痙則虛乏短氣身體柴瘦唇口乾燥久則經水斷絶由津液竭故也亦可就第三卷第六論中求之麻黄根散治産後虛汗不止當歸黄耆麻黄根牡蠣煅為粉人參粉草各等分右㕮咀每服四錢水一琖煎至七分去滓温服又方當歸黄耆各一兩麻黄根二兩右㕮咀每服三錢水一琖煎至七分去滓温服千金療産後風虛汗出不止小便難四肢微急難以屈伸甘草炙一兩附子半箇炮去皮臍桂心芍藥各一兩半右㕮咀每服三錢水一琖生薑四片棗一枚煎至七分去滓空心温服忌猪肉冷水生葱等物經効療産後汗出不止黄耆十二分白术牡蠣茯苓防風麥門冬去心生地黄各八分大棗七箇右㕮咀水二升煎取七合去滓空心分温兩服又療産後血氣暴虛汗出淡竹葉煎湯三合微温服之須臾再服又方馬齒莧研取汁三大合如無乾者亦可右煑一沸投蜜一匙令停頓服止汗散治産後盗汗不止應多汗者皆可服牡蠣煅研細小麥麩炒令黄色研為細末右等分研細煑生猪肉汁調下二錢無時候人參湯治産後諸虛不足發熱盗汗二方出胡氏人參當歸等分右為末以猪腰子一隻去脂膜切小片子以水三升糯米半合葱白兩條煑米熟取清汁一琖入藥二錢煎至八分温服不拘時候産後冐悶汗出不識人方論第七凡一方凡産後忽冐悶汗出不識人者暴虛故也破雞子三枚吞之便醒若未醒可與童子小便一升甚驗丈夫小便亦得切不得用病人者又若久不識人或時復發者此為有風因産血氣暴虛風行脉中故也若産後去血多者又增此疾與雞子不醒者可急作竹瀝汁一服五合須㬰不定再與五合頻與三五服瘥産後汗出多而變痓方論第八中風口噤角弓反張附論曰産後汗出多而變痓者何答曰産後血虛肉理不密故多汗因遇風邪摶之則變痓痓者口噤不開背强而直如發癎狀摇頭馬鳴身反折須㬰拾發氣息如絶宜速斡口灌小續命湯稍緩即汗出如雨手拭不及者不可治也小續命湯治中風及剛柔二痓及脚氣痺弱不能轉側兼治小兒驚風麻黄製可去加葛桂心甘草各半兩防風三錢三分芍藥白术人參川芎附子防己黄芩各一分右㕮咀每服五錢水一琖半煎至一琖去滓取八分清汁入生薑汁再煎一二沸温服日三服夜二服若柔痓自汗者去麻黄夏間及病有熱者去附子减桂一半冬及初春去黄芩第三卷雖有然其中有杏仁無白术雖然陳無擇評曰産後汗出多變痓亦令服續命湯此又難信既汗多如何更服麻黄官桂防己黄芩軰不若大豆紫湯為佳太醫局方大聖散亦良藥也愚觀朱奉議云凡剛柔二痓小續命湯並可加减與之若柔痓自汗者有去麻黄加葛根之説朱奉議必有所據雖大豆紫湯大聖散良亦不可偏見曲説有妨古人之意大豆紫湯治中風頭眩惡風自汗吐冷水及産後百病或中風痱痙背强口噤直視煩熱脉緊大者不治小品方主産後中風困篤背强口噤或但煩躁或頭身皆重或身重痒劇嘔吐直視者指迷方名獨活湯川獨活兩半大豆半升酒三升右先以酒浸獨活煎一二沸别炒大豆極焦煙出急投酒中蜜封候冷去豆每服一二合許得少汗則愈日拾服此藥能去風消血結如姙娠折傷胎死腹中服此得差凡産後口噤腰背强直角弓反張皆名曰痙又名曰痓古人察有汗無汗以分剛柔隂陽而治今産寳諸書有中風口噤一門又有角弓反張一門其實一也如增寒發熱有類傷寒皆不論及豈可只以一二藥治之愚今取百問中方論已詳備前篇見三卷第二論庶幾覽者如指諸掌中風口噤角弓反張方論附凡産後中風口噤是其血氣虛而風入於頷頰夾口之筋也手三陽之筋結入於頷産則勞損腑臟傷於筋脉風若乘之其三陽之筋脉則偏摶之筋得風冷則急故令口噤也若角弓反張者是體虛受風風入於諸陽之經也人隂陽經絡周環於身風邪乘虛入於諸陽之經則腰背反折攣急如角弓之狀也愈風散療産後中風口噤牙關緊急手足瘈瘲如角弓狀亦治血暈四肢强直不省人事或築心眼倒吐瀉欲死出華佗方百問經驗産寳陳氏本事同荆芥畧焙為末右每服三錢豆淋酒調下用童子小便亦可其效如神口噤者灌齒齗噤者吹鼻中皆效一方用古老錢煎湯調服名一捻金散一方云用舉卿古拜二味蓋切脚隠語以祕方也此藥委有竒効神聖之功大抵産室但無風為佳不可衣被帳褥太暖暖即汗出則腠理開易於中風便昏冐指迷方但為粗末濃煎服許學士云記有一婦人産後護密閤内更生火睡久及醒則昏昏如醉不省人事其家驚惶醫用此藥佐以交加散祝云服之即睡睡中必以左手搔頭覺必醒矣果如其言交加散方見第二卷第五論又名交解散見産後虛煩専治婦人方治産後中風不省人事口吐涎手足瘈瘲當歸荆芥穗等分右為細末每服二錢水一琖酒少許煎至七分灌之如牙關緊急用匙斡微微灌下但下咽即有生理不問多少便服不可以藥味尋常忽之屢用救人有効小品療産後中風虛人不可服他藥者一物獨活湯主之及一物白鮮湯主之亦可與獨活合煑之川獨活三兩細切右水三升煑取一升分服奈酒者亦可酒水煑一方用白鮮皮亦依此法産後中風痙口噤靣青手足急强者以竹瀝二升分為五服温温頻服大効治産後中風口噤四肢頑痺不仁身體如角弓反張羌活酒羌活防風各三兩黒豆一升炒令烟出右細剉以好酒一㪷於瓶中攪動密封經半日許又於鍋中重湯煑瓶至半日候瓶冷取出每服暖一中琖飲之日可三四服度之當汗出即差治産後中風身如角弓反張口噤不語方川烏五兩剉如豆大右取黒豆半升同炒半黒以酒三升㵼於鐺内急攪以絹濾取酒微温服一小琖取汗若口不開者抝開口灌之未効加烏雞糞一合炒内酒中服之以瘥為度寳方療産後腹中堅硬兩脇膈脹手足冷心中煩熱欲飲水乾嘔關節勞痓中風之疾羚羊角二分防風十二分羗活苦梗敗醬各八分桂心柴胡大黄浸過各六分右水二升煎取八合空心兩服服了吐即良久更服了喫地黄酒用地黄切一升炒令黒甆瓶中下熱酒三升密封口煑令减半任意服之千金雞屎醴療産後中風及男子諸風并産後百疾神効方又治産後中風口噤拘急困篤腰背强直時時反折烏雞屎三升大豆二升右先炒豆令聲絶次炒雞屎令黄以酒一升先淋雞屎取汁淋大豆每服一升重者凡四五服之極妙深師療産後中風口噤不任大小獨活八分乾葛六分甘草二分生薑五分右㕮咀以水二升煑取一大升分為兩服張文仲療産後中風風痙遍身冷直口噤不識人方白术四兩細切右以酒三升煑取一升頓服効經效療産後中風腰背强直時時反張名曰風痙防風葛根川芎地黄各八分麻黄去節甘草桂心川獨活防己各六兩杏仁五箇去皮尖炒右細切以水八升煑麻黄去沫後下諸藥煎取三升分温三服有汗者不可服治産後中風口噤潰悶不能言身體强直羌活防風秦芁桂心粉草葛根各三分生薑八分附子一箇炮杏仁八十枚去皮尖麻黄十分去節右㕮咀水九升煑麻黄去沫後下諸藥煑取二升分為三服有汗者不可服産後中風方論第九凡七方論曰産後中風由産傷動血氣勞損臟腑未平復起早勞動氣虛而風邪氣乘虛傷之故中風風邪冷氣客於皮膚經絡但疼痺羸乏不任少氣若筋脉挾寒則攣急喎僻挾温則緩弱若入諸臟恍惚驚悸隨其所傷臟腑經絡而生病焉郭稽中産後中風方論論曰産後中風者何答曰産後五七日内强力下床或一月之内傷於房室或懷憂怒擾盪冲和或因着艾傷動臟腑得病之初眼澁口噤肌肉瞤搐漸至腰脊筋急强直者不可治此乃人作非偶爾中風所得也陳無擇評曰問産後中風風是外邪血虛則或有中之者直答以人作不可治問答不相顧解如何開示後人立論之難有如此者若是中風當以脉辨㸔在何臟依經調之强力下床月内房室憂怒着炙非中風類蓐勞性氣火邪治各有法非産後病不暇繁引學者識之經効療産後風虛頭目痛語言時僻防風乾葛茯苓各八分麥門冬去心八分芍藥黄芩各六分犀角四分甘草三分右㕮咀以水二升煎取七合分為兩服療産後中風心忪悸志意不定恍惚語言錯亂方人參六分羚羊角屑麥門冬茯神各八分黄芩白鮮皮甘草各四兩石膏十二分淡竹瀝兩大合右㕮咀水二大升煎至七合下竹瀝分三服療産後中風身背拘急如束并渇川芎羌活羚羊角屑酸棗仁芍藥各四兩桑白皮六分防風五分右㕮咀水四升煎取二升分温三服療産後中風四肢拘束筋節掣痛不得轉側如角弓反張麻黄八分去根節生薑桂心白术各四分防風芍藥各六分川芎五分竹瀝二合右細剉以水三升先煑麻黄掠去沫下諸藥煎取七合下竹瀝再煎三沸分三服取微汗為度治産後納凉太過中風者或成喘急唇青鼻黒男六徳續添以局方小續命湯連進三服即愈療産後中風煩渇紅花子五合炒㣲熱研碎右以水一升煎取七合每一匙頭徐徐呷治産後中風半身手足不遂言語謇澁恍惚多忘精神不定川獨活當歸芍藥防風川芎𤣥參各二分桂心分半右細剉以水八升煑取二升半分為三服覺効又更作一劑漸瘥須適寒温將息如不差即以此方作元每服二十元有熱加乾葛五兩有冷加白术五兩有氣加生薑六分手足不穩加牛膝五分萆薢三兩黄耆四兩腹痛加當歸芍藥各三分不食加人參二分𤣥參四分産後中風筋脉四肢攣急方論第十凡四方夫産後中風筋脉攣急者是氣血不足臟腑俱虛日月未滿而起早勞役動傷腑臟虛損未復為風邪冷氣初客於皮膚經絡則令人頑痺不仁羸乏少氣風氣入於筋脉挾寒則攣急也治産後中風四肢筋脉攣急疼痛背項强直防風一兩赤芍藥桂心各半兩羚羊角屑川芎羌活當歸酸棗仁牛蒡子炒各三分右㕮咀每服四錢水一琖煎至六分去滓温服療産後中風睡卧不安筋脉四肢攣急或强直獨活散獨活天麻防風各一兩桂心當歸荆芥川芎蔓荆子各半兩麻黄去節附子炮羚羊角屑赤芍藥各三分右㕮咀每服四錢水酒各半琖煎至六分去滓温服有汗者莫服療産後中風四肢筋脉攣急疼痛羌活天麻酸棗仁川牛膝防風當歸薏苡仁栢子仁鹿角膠炒各一兩蔓荆子桂心各半兩羚羊角屑附子炮川芎各三分麝香一分研右為細末無時以豆淋酒調二錢服治産後中風四肢筋攣急疼痛心神煩悶背項强直羌活防風附子炮去皮羚羊角屑麻黄去節各一兩地黄桂心各三分酸棗仁炒黄耆當歸川牛膝川芎萆薢各半兩右為細末煉蜜元如梧桐子大每服三十丸温酒吞下産後熱悶氣上轉為脚氣方論第十一凡一方論曰産後熱悶氣上轉為脚氣者何答曰産卧血虛生熱復因春夏取凉過多地之蒸濕因足履之所以着為脚氣其狀熱悶掣瘲驚悸心煩嘔吐氣上皆其候也可服小續命湯方見本卷第八論兩三劑必愈若醫者誤以逐敗血藥攻之則血去而疾益增矣陳無擇評曰脚氣固是常病未聞産後能轉為者往往讀千金見産婦多有此疾之語便出是證文辭害意槩可見矣設是熱悶氣上如何便服續命湯此藥本主少陽經中風非均治諸經脚氣要須依脚氣方論隂陽經絡調之此渉專門未易輕論既非産後要病更不繁引陳無擇雖有此評然小續命湯加减與之用無不效故百問云寒中三陽所患必冷小續命湯主之加生薑汁最快暑中三隂所患必熱小續命湯去附子减桂心壹半大煩躁者紫雪最良僕取百問中加减法庶使後人均得治療如無紫雪用真薄荷煎冷水嚼下婦人大全良方卷十九
