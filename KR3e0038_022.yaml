body:
  text: 婦人大全良方卷十八宋陳自明撰産後門産難既明須知産後疾病故以次之産後將䕶法第一周頲論併在其中論曰凡婦人生産畢且令飲童子小便一琖不得便卧且宜閉目而坐須臾方可扶上床仰卧不得側卧宜立膝不可伸足髙倚床頭厚鋪茵蓐遮圍四壁使無孔隙免被賊風兼時時令人以物従心擀至臍下使惡露不滯如此三日可止仍不可令多卧如卧多看承之人宜頻唤醒舊説産婦分㝃了三日方可上床若三日上床則必就地睡卧又豈可令産婦近地氣乎纔生産畢不得問是男是女且先研醋墨三分服之一法云不可服醋墨有傷肺經成欬𠻳之戒誠過慮也然醋墨本破凝結之血然不可用太釅之醋仍不可太多即不至傷肺然所在皆同亦有不喫者更産後三日内令産婦嘗聞醋炭氣或燒乾漆煙若無乾漆以破舊漆器燒之以防血逆血迷血運不省之患夏月宜扵房門外燒磚以醋沃之置於房中夏月房中不須着大火及煮粥煎藥之類分㝃之後須㬰且食白粥一味不可令太飽頻少與之為妙逐日漸增之煮粥時須是煮得如法不用經宿者又不可令温冷不調恐留滯成疾仍時與童子小便一琖飲之亦須先備小便若遇夏月以簿荷養之新産後不問腹痛不痛有病無病以童子小便以酒和半琖温服五七服妙一臈七日也之後方可少進醇酒并些小鹽味一法纔産不得與酒縁酒引血迸入四肢兼産母臓腑方虚不禁平聲酒力熱酒入腹必致昏悶七日後少進些酒不可多飲如未出月間欲酒喫或服藥者可用凈黒豆一升炒令煙出以無灰酒五升澆淋之仍入好羌活一兩洗净拍破同浸尤妙當用此酒下藥或時時飲少許可以辟風邪養氣血下悪露行乳脉也如産婦素不善飲酒或夏月之間亦不須強飲一臈之後恐喫物無味可爛煮羊肉或雌雞汁畧用滋味作粥飲之或喫爛煮猪蹄肉忌母猪及白脚猪肉不可過多今江浙間産婦多喫熟雞子亦補益亦風俗也三月之後方可少食温麵食麵早成腫病凡喫物過多恐成積滯若未滿月不宜多語喜笑驚恐憂惶哭泣思慮恚怒強起離床行動久坐或作鍼線用力工巧恣食生冷粘硬菓菜肥膩魚肉之物及不避風寒脱衣洗浴或冷水洗濯當時雖未覺大損滿月之後即成蓐勞手脚及腰腿痠重冷痛骨髄間颼颼如冷風吹繼有名醫亦不能療大都産婦將息須是滿百日方可平復大慎觸犯此多致身體强直如角弓反張名曰蓐風遂致不救又不得夜間獨處縁去血心虚恐有驚悸切宜謹之所有血衣洗濯不得扵日中晒曝免致邪祟侵傷又不得濯足恐血氣攻下又不得刮舌傷心刷齒及就下低頭皆成血逆血運此産家謹䕶之常法也滿月之後尤忌任意飲食觸冐風寒恣意喜怒梳頭用力髙聲作勞工巧房慾詳見産後通用方第一及上髙厠便溺之類如此節養攝至百晬始得血氣調和臓腑平復自然安帖設不依此即致産後餘疾矣小可虗羸失扵將補便成大患終身悔而不及或有諸疾不論巨細後並有方藥醫療不得信庸醫妄投藥餌經云婦人非止臨産須憂産後大須將理慎不得恃身體和平取次為之乃縦心恣意無所不為若有觸傷便難整理犯時㣲若秋毫感病重如山岳知命者可不謹之産後調理法第二若産後將息如法四肢安和無諸疾苦亦須先服黒神散四服亦畧備補益圎散之類不可過多又恐因藥致疾不可不戒如四物湯四順理中圎内補當歸圎當歸建中湯或産婦血盛初經生産覺氣悶不安者調七寳散在十九卷第二論中服之若寜帖不須服若三日後覺壯熱頭痛胸腑氣刺者不可便作傷寒傷風治之此是乳脉將行宜服玉露散一二服如無此證不須服若因床帳大暖或産婦氣盛或素多喜怒覺目眩暈如在舟車精神鬰冐者此是血暈即須服血暈藥一二服方見第五論仍須看承之人照管問當也設或覺粥食不羙虚困即服四順理中圎一二服若不如此不須服若扵兩三日間覺腹中時時撮痛者此為兒枕作痛必須服治兒枕藥一二服方見第二十卷若大便祕或小便澁切不可服通利藥以其無津液故也若投通利之藥則滑泄不禁不可治也切須戒之若祕甚必欲通利方可服和暖藥即通方見後二十二卷第一論産後通用方論第三凡二十三方千金云凡産後滿百日乃可㑹合不爾至死虚羸百病滋長慎之凡婦人患風氣臍下虚冷莫不由此早行房故也凡産後七日内悪血未盡不可服湯候臍下塊散乃進羊肉湯有痛甚切者不在此例候兩三日消息可服澤蘭圎比至滿月丸藥盡為佳不爾虚損不可平復也全極消痩不可救者服五石澤蘭圎補之服法必七日外不得早服也凡婦人因暑月産乳取凉太多得風冷腹中積聚百病竟起迄至扵死百方療不能差桃仁煎主之出蓐後服之婦人縦令無病毎至秋冬須服一二劑以至年内常將服之佳黒神散治婦人産後惡露不盡胞衣不下攻衝心胷痞滿或臍腹堅脹撮痛及血暈神昏眼黒口噤産後瘀血諸疾並皆治之熟乾地黄蒲黄炒當歸乾薑炮桂心芍藥甘草各四兩黒豆炒去皮半升右為細末每服二錢酒半琖童子小便半琖同煎調服烏金散治産後十八疾方論方與局方黒神散同有人選集為歌訣十八首言語鄙俚故不録一曰産後因熱病胎死腹中者何但服烏金散二曰産難者何但服烏金散三曰産後胞衣不下者何但服烏金散四曰産後血暈者何但服烏金散五曰産後口乾心悶者何但服烏金散六曰産後乍寒乍熱者何但服烏金散七曰産後虚腫者何但服烏金散兼朱砂圎八曰乍見鬼神者何但服烏金散九曰産後月内不語者何但服烏金散十曰産後腹内疼痛兼㵼者何但服烏金散兼用止㵼調氣藥十一曰産後遍身疼痛者何但服烏金散十二曰産後血崩者何但服烏金散十三曰産後血氣不通咳𠻳者何但服烏金散十四曰産後乍寒乍熱心痛月候不来者何但服烏金散十五曰産後腹脹滿嘔逆不定者何宜服烏金散次服朱砂圎三二日炒生薑醋湯下七圎十六曰産後口鼻黒氣及鼻衂者何論同此證不可治十七曰産後喉中氣喘急者何論同十死不治十八曰産後中風者何但服烏金散已上論與郭稽中二十一論問荅同故不詳録桃仁煎療萬病婦人産後百病諸氣方桃仁一千二百枚去皮尖及雙人煮令黄色右一味擣令極細熟以上等酒一㪷五升研三四遍如作麥粥法以極細為佳納小長項瓷缾中密塞以麵封之納湯中煮一復時不停火亦勿令火猛使缾口常出在湯上勿令没之熟訖出温酒服一合日再服丈夫亦可服千金增損澤蘭圎療産後百病理血氣補虚勞澤蘭甘草當歸川芎各七分附子炮乾薑白术白芷北細辛各四分北防風人参牛膝各五分栢子仁熟地黄石斛各六分厚朴藳本蕪荑各二分麥門冬去心八分桂心四分右二十味為末煉蜜圎如梧桐子大温酒下二十元産後醋墨松煙墨不拘多少用炭火煆通紅以米醋淬之再煆再淬如此七度研令極細用絹羅過纔産了喫醋墨二錢用童子小便調下四味湯療産後一切諸疾纔分㝃喫一服尤妙當歸心鬲煩加半錢延胡索氣悶喘急加半錢血竭惡露不快加半錢没藥心腹撮痛加半錢各等分右為細末每服各抄半錢用童子小便一琖煎至六分通口服玉露散治産後乳脉行身體壯熱疼痛頭目昏痛大便澁滯悉能治之凉膈壓熱下乳人參白茯苓甘草各半兩苦梗炒川芎白芷各一兩當歸一分芍藥三分右為細末每服二平錢水一琖煎至七分温服如煩熱甚大便秘者加大黄二錢半地黄煎治産後諸疾生地黄汁生薑汁各一升藕汁半升大麻仁三兩去殻為末右和停以銀器内慢火熬成膏温酒調半匙服更以北术煎膏半琖入之尤佳産寳方無麻仁用白蜜治産後虚憊盗汗嘔吐理中圎治新産血氣俱傷五臓暴虚肢體羸痩乏氣多汗纔産直至百晬日常服壯氣補虚和養臓氣蠲除餘疾消榖嗜食甘草二两一方三两白术人參乾薑各一两右為細末煉蜜為圓如梧桐子大温米飲下三十圎空心服纔産了以童子小便打開㸃服七日内日三服産乳方云此乃大理中圓加甘草兩倍耳然其功比之四味等分大故不同盖取甘味以緩其中而通行經絡之功最勝者也此産婦月内不可闕者出月不須服矣古方中有婦人補益之藥如大澤蘭圎小白薇圎熟乾地黄元大聖散之類其藥味稍衆而中下之家村落之地卒何以致且藥肆中少有真者不若以四順理中圓易之較其功比澤蘭圎之類主治頗多也黒龍丹治産後一切血疾産難胎衣不下危急惡疾垂死者但灌藥得下無不全活神驗不可言當歸五靈脂川芎良薑熟地黄各一兩右細剉以沙合盛赤石脂泯縫紙筋鹽泥固濟炭火十斤煆令通赤去火候冷取開㸔成黒糟色取出細研却入後藥百草霜五兩硫黄乳香各一錢半花蘂石琥珀各一錢右五味並細研與前五味再研如法修製和匀以米醋煮麵糊圓如彈子大每服一圎炭火燒令通赤投于生薑自然汁與童子小便入酒漉出晒乾研細只用此酒調下茂恂熙寜初従事濮上幙府郡之蓐醫胡者為予言數政之前有朱汴水部施黒龍丹凡産後諸病危甚垂死者無不愈郡中及村落人賴以全活者甚衆汴受代歸婦人數千號泣遮道送行尚有一二粒未之施也先人自三峯謫官淮陽家嫂馬氏蓐中大病醫者康従變投丹立愈訪之乃得於汴也且言每鬻一粒輙受千錢必其獲厚利不欲求之後起守汝海従變餞别一驛臨行出此方為獻每以救人無不驗者盧道原侍郎再帥陘原時姨母姙娠至臨潼就蓐後數日有盗夜入其室驚怖成疾衆醫不能治乃以忳弟嘗遺此藥服之遂安家人金華君在秦生文度數日苦頭痛未止又心痛痛發兩股上下走注疾勢甚惡昏躁煩憒目視燈如金色勺飲不下服藥甚衆無效忳弟曰黒龍丹可服初以半粒投之即能飲粥而他藥入輙吐出不受覺痛稍緩又投半粒又得安眠自中夜服藥至五鼓下惡物數升頭痛頓减又至食時復下數升渙然醒愈盖敗血所致其效如此建中靖國元年五月二十日郭茂恂記仲氏嫂金華君在秦産七日而不食始言頭痛頭痛而心痛作既而目晴痛如割如是者更作更止相去纔瞬息間每頭痛甚欲取大石壓食久漸定心痛作則以十指抓壁血流掌痛定目復痛又以兩手自剜取之如是者十日不已國醫二三軰郡官中有善醫者亦數人相顧無以為計且言其藥犯芎可以愈頭痛犯薑黄可以治心痛率皆悠悠不根之言竟不知病本所起張益困頓醫益術殚予度疾勢危矣非神丹不可愈方治藥而張召予夫婦付以諸子與仲氏别惨怛不復言予瞋目戒張曰弟安心養疾亟出召伯氏曰事急矣進此丹可乎仲氏尚遅遅以兩旬不食恐不勝任黄昏進半粒疾少間中夜再服藥下瞑目寢如平昔平旦一行三升許如蝗虫子三疾减半已刻又行如前則頓愈矣遣荆釵軰視之奄殆無氣午後體方凉氣方属乃㣲言索飲自此遂平復大抵産者以去敗惡為先血滯不快乃至是爾後生夫婦不習此理老媪庸醫不能中病所以疾苦之人十死八九大數雖定豈得無夭不遇良醫終抱遺恨今以施人俾終天年非祈于報者所兾救疾苦養性命爾崇寜元年五月五日郭忳序當歸散療産後氣血俱虚慎無大補恐增客熱别致他病常令惡露快利為佳當歸芍藥川芎黄芩各一兩白术半兩右為細末温童子小便或酒調下二錢出指迷方又出傷寒括要周頲傳授濟急方四道頲嘗見人傳經效諸方自曾修合實有大功遂編于卷末普用傳授以濟急難治産後血暈血氣及滯血不散便成癥瘕兼㵼面色黄腫嘔吐惡心頭痛目眩口吐清水四肢㽔弱五臓虚怯常日睡多喫食减少漸覺羸痩年久變為勞疾如此所患偏宜服勝金圓澤蘭葉四兩芍藥蕪荑仁甘草當歸芎藭各六分乾薑桂心各三分半石膏桔梗細辛厚朴吴茱茰栢子仁防風烏頭炮白薇枳殻南椒石頷蒲黄石斛茯苓各三分白术白芷人参青木香藁本各一分右揀擇上等州土如法修製為末煉蜜圎如彈子大有所患熱酒研一圎入口便愈大忌腥膩熱麵豉汁生葱冷水菓子等若死胎不下胎衣在腹並以炒鹽酒研服未效再服治産後諸疾聖散子方與局方大聖澤蘭散同但無地黄阿膠桔梗故不録黒散子神效産後一切疾鯉魚皮三两燒灰芍藥蒲黄各二两當歸没藥桂心好墨卷栢青木香麝香各一两丈夫髪灰鐺墨各半两右為細末以新瓷器盛宻封勿令走氣毎産後以好酒調下一錢匕如血暈衝心下血不盡臍下攪刺疼痛不可忍塊血癥疾甚者日加兩服不拘時候忌冷物菓子粘食保生元方與局方同却無麻仁有川椒故不復録朱砂元治産後虚中有積結成諸疾黒附子桂心白薑各半两巴豆一錢醋浸煮去皮研右為細末入巴豆研停醋煮麵糊元如麻子大毎服三圎至五圓冷水下服之取㵼為度薑粉散纔産服此蕩盡兒枕除百病當歸人参木香黄耆川芎甘草茯苓芍藥桂心知母大黄炒草豆䓻白术良薑訶子青皮熟地黄少許附子重半两一箇右除地黄附子外各等分焙乾生薑一斤研取自然汁于椀中停留食久傾去清汁取下面粉脚攤在蒻葉上入焙籠焙乾𢷬羅為末纔産後用藥三錢水一琖薑三片棗一箇煎至七分熱服服後産母自然睡着半日以来睡覺再服全除腹痛每日只三服至九日不可服肚中冷也地黄酒治産後百病未産一月先釀産訖可服地黄汁好麴好净秫米各二升右先以地黄汁漬麴令發凖家法釀之至熟封七日取清者服常令酒氣相接勿令絶忌蒜生冷鮓滑雞猪肉一切毒物婦人皆可服之但夏三箇月不可合春秋宜合以地黄汁并滓内米中炊合用之若作一碩十碩凖此一升為率先服當歸湯後服此妙地黄元治産後腹痛眼見黒花或發狂如見鬼狀或胎衣不下失音不語心胷脹滿水榖不化口乾煩渇寒熱往来口内生瘡咽喉腫痛心中忪悸夜不得睡産後中風角弓反張面赤牙關𦂳急或崩中如豚肝臍腹㽲痛煩躁恍惚四肢腫滿及受胎不穏唇口指甲青黒一方地黄减半當歸一两延胡索琥珀各一两名琥珀地黄元治狀同生地黄研取汁留滓生薑各二斤研取汁留滓蒲黄當歸各四两右于銀石器内用慢火取地黄汁炒生薑滓以生薑汁炒地黄滓各令乾四味同焙乾為細末醋煮麵糊圎如彈子大每服一圎食前用當歸酒化下神妙琥珀散治産後一切危困之疾琥珀朱砂麝香香墨醋炙白殭蚕當歸各一分鯉魚鱗炒焦桂心百草霜白附子梁上塵炒令煙出篩過秤各半两右為細末炒生薑熱酒調下二錢産後一切病服之竒效治産後諸疾如産卧畢切須用童子小便調黒神散數服除百病如無小便用白湯亦可或産勞力過度或下血頗多或㣲熱惡露来遅馬尾大當歸洗一两半右在未産前修製為末如遇産有疾無疾若産了但用童子小便調服令産婦月後並無他證果有神效療産後雖甚通利唯覺心腹滿悶脇脹咳𠻳不能食大便不通眼澁行坐心腹時痛許仁則秘方三道白术當歸桑白皮大黄各三两細辛桂心各二两生薑四两右㕮咀用水二升煎取一升分為三服如人行七八里久再服此湯當得利利又不宜過多所利者為不獲已而㣲利之其不然未合令利既初産後覺身皆虚尚藉藥食補之豈宜取利此縁病熱既要不利茍以當塗服湯得通氣息安帖利既未止即便須急取三匙醋飯喫即止止後但須適寒温將息後取痊復飯食之節量其所宜如利不减宜依後方服之産後不宜輕易便投大黄如不得已後人更斟酌强弱而用之方得穏當當歸十分白术八分甘草七分細辛四分桂心人参生薑各三分桑白皮六分右為末煉蜜圎如梧桐子大空心温酒下三十圓産後血氣不通當時不甚覺如在産出血少皆成癥結心便疼硬乍寒乍熱飲食不進不生肌肉心腹有時刺痛口乾粘手足沉重有此狀者宜此藥當歸芍藥甘草牛膝鬼箭羽人参各五分牡丹皮虎杖白术各六分大黄八分乾地黄七分朴硝十分烏梅肉炒白薇桂心各四分水蛭炒蒲黄各三分䖟虫十四枚製右為末煉蜜圎如梧桐子大空心酒下二十圎日兩服外䑓有石脂十分許公在西京為女秘妙不傳此方于人後仁則女壻尋得依狀相傳萬不失一餘散歸本門産科序論陳無擇世傳産書甚多千金外䑓㑹王産寳馬氏王氏崔氏皆有産書巣安世有衛生寳集子母祕録等備則備矣但倉卒之間未易厯試惟李師聖序郭稽中産科經驗寳慶集二十一篇凡十八方用之頗效但其間序論未為至當始用料理簡辯于諸方之下以備識之者非敢好辯也愚詳産後要病無出于郭稽中二十一論一十八方有益于世多矣予家三世用之未有不效雖陳無擇所評或是或否亦不可不詳而䆒之且如産後眩暈以牡丹散然其中有大黄芒消况新産後血氣大虚豈宜輕服又云去血過多而暈者或有之若言痰暈者十無一二又如産後熱悶氣上轉為脚氣不應用小續命湯僕以百問中方加减而用之此活法也故孟子云盡信書則不如無書此之謂也胞衣不出方論第四凡二十二方夫有産兒出胞衣不落者世謂之息胞由産初時用力此産兒出而體已疲憊不能更用力産胞經停之間而外冷氣乗之則血道澁故胞衣不出須急以方藥救治不妨害于兒所柰者胞係連兒臍胞不出即不得以時斷臍浴洗冷氣傷兒則成病也舊法胞衣不出恐損兒者依法截臍而已産處須順四時方面并避五行禁忌者若有觸犯多令産婦難産雖腹痛者未産也欲腹痛連腰痛甚者即産也所以然者腎係扵腰胞係腎故也診其脉轉急如切䋲無殊者即産也郭稽中論曰胎衣不下者何荅曰母生子訖流血入衣中衣為血所脹是故不得下治之稍緩脹滿腹中以次上衝心胸疼痛喘急者但服奪命丹以逐去衣中之血血散脹消胎衣自下而無所患更有牛膝湯等用之甚效録以附之奪命丹附子半两炮牡丹皮一两乾漆一分碎之炒令煙盡右為細末以釅醋一升大黄末一两同熬成膏和藥圎如梧桐子大温酒吞五七圎不拘時必效方牛膝湯治胎衣不出腹臍堅脹急痛即殺人服此藥胞即爛下死胎牛膝瞿麥各四两當歸三两通草六两滑石八两葵子五两右細切以水九升煮取三升分三服若衣不下腹滿即殺人推其源皆是胞衣有血奔心是以不出也或坐婆生踈斷帯収兒時衣失于繫住則帯縮入腹中便不得出宜服此藥衣即爛出也廣濟集驗千金崔氏同花蘂石散治産後氣欲絶縁敗血不盡血迷血暈惡血奔心胎死腹中胎衣不下至死者但心頭暖急以童子小便調一錢取下悪物如猪肝終身無血風血氣疾膈上有血化為黄水即吐出或小便中出也若先下胎衣則泛泛之藥不能逹若先治血悶則尋常之藥無此功無如此藥有兩全之妙也花蘂石一斤上色硫黄四两右二味相拌令均先用紙和膠泥固瓦礶子一箇内可容藥候泥乾入藥在内密泥封口了焙籠内焙令透熱便安在四方磚上磚上書八卦五行字用炭一秤籠叠周匝自己午時従下生火令漸漸上徹有墜下火放夹火上直至經宿火冷炭消盡又放經宿罐冷定取出細研以絹羅至細甆合内盛依法用之此藥便是療金瘡花蘂石散尋常人自宜時時収蓄以防急難至妙有一親戚婦人産後胞衣不下血脹迷悶不記人事告之曰死矣僕曰某收得趙大觀文局中真花蘂石散在笥中謾以一貼贈之以童便調灌藥下即甦衣與惡物旋即随下乗興無恙牛膝散治姙娠五六月墮胎胞衣不出牛膝川芎朴硝蒲黄各三两桂心半两當歸一两半右為粗末每服四錢水一盞薑三片生地黄一分煎至六分去滓温温頻服若胞衣不出若腹脹則殺人黒豆一合炒令熟右入醋一盞煎三五沸去豆分為三服酒煮亦可必效方療胞衣不出方服蒲黄如棗大集驗千金崔氏同又方以生地黄汁一升苦酒三合煖服之救急一方見子死腹中論中又方以水噀産婦面神驗延年方以洗兒水令産母飲半琖其衣便下勿令産婦知又方牛膝一两葵子一合右𢷬碎以水一琖半煎至一琖去滓分二服廣濟療胞衣不出方右以末竈突中土三指撮以水服之集驗千金備急文仲同又方竈下土一六寸研碎用好醋調令相合納臍中續煎生甘草湯三四合服又方以醋湯飲之出又方雞子一枚苦酒一合和飲之立出一方用萆蔴子名如聖膏見産難門延年方療胞衣不出腹脹則殺人吞雞子黄三箇仍解髮刺喉中令嘔即出若困極以水煮螻蛄一枚二十沸灌入口中汁下即出崔氏同救急方用赤小豆男用七粒女用十四粒東流順水吞下産乳療産後惡血衝心或胞衣不下腹中血塊等疾備急同右大黄一两為末以好醋半斤熬成膏以藥末搜膏為圎如梧桐子大温醋湯呑五圎良久取下悪物不可多服療胞衣不下栝樓實一箇取子研令細右酒與童子小便各半琖煎至七分去滓温服如無實根亦得又方紅花一两酒煮濃汁服又方以鹿角鎊屑三分為末煮葱白湯調下凡欲産時必先脱常所着衣以籠竈胞衣自下仍易産神驗廣濟方云取夫单衣盖井上立出千金集驗救急崔氏小品同治胞衣不下訣婦人百病莫甚于生産産科之難臨産莫甚于催生既産莫甚于胞衣不下惟有花蘂石散一件㝡為𦂳要如黒神散琥珀散諸方之類雖皆有驗然鄉居或逺于藥局倉卒之間無法可施今採得胡氏寳慶方一妙法云若産訖胞衣不下停待稍久非特産母疲倦又且血流入胞中為血所脹上衝心胸喘急疼痛必致危篤若有此證宜急斷臍帯以少物繋墜以物繋墜之時切宜用心先繋然後截斷不爾則胞上掩心而死使其子血脉不潮入胞中則胞衣自當痿縮而下縦淹延數日亦不害人只要産母心懐安㤗終自下矣屢試有驗不可輕信坐婆妄用手法多有因此而亡深可浩歎所以胡氏重引親見為據産後血暈方論第五凡十六方論曰産後血暈者由敗血流入肝經眼見黒花頭目旋暈不能起坐甚致昏悶不省人事謂之血暈細酒調黒神散最佳庸醫或作暗風中風治之凡暈血熱乗虚逆上蒸心故昏迷不省氣閉欲絶是也然其由有三有用心使力過多而暈者有下血多而暈者有下血少而暈者其暈雖同其治特異當詳審之下血多而暈者但昏悶煩亂而已當以補血清心藥治之下血少而暈者乃惡露不下上搶于心心下滿急神昏口噤絶不知人當以破血行血藥治之古法有云産婦纔分㝃了預燒秤鎚或江中黄石子硬炭燒令通赤置器中急于床前以醋沃之得酸氣可除血暈産後一臈不妨時作為妙崔氏云凡暈者皆是虛熱血氣奔迸腹中空所致欲分㝃者第一須先取釅醋以塗口鼻仍置醋于傍使聞其氣兼細細飲之此為上法如覺暈即以醋噀面甦来即飲醋仍少與解之一云仍少與水解之一法燒乾漆令煙濃熏産母靣即醒如無乾漆以舊破漆器以猛火燒熏之亦妙郭稽中論曰産後血暈者何荅曰産後氣血暴虚未得安靜血随氣上迷亂心神故眼前生花極甚者令人悶絶不知人口噤神昏氣冷醫者不識呼為暗風若作此治之病必難愈但服清魂散即省清魂散方澤蘭葉人参各一分荆芥一两川芎半两右為末用温酒熱湯各半盞調一錢急灌之下咽即開眼氣定即醒一方有甘草二錢若去血過多而暈者當服芎藭湯方見第二卷通用門當歸芍藥湯方見十二巻第十二論廣濟治産後血暈心悶不識人神言鬼語氣急欲絶芍藥甘草各一两丹參四分並㕮咀生地黄汁一升生薑汁白蜜各一合右水二升先煎前三味取八分下地黄生薑汁蜜分為两服又方荷葉二枚炙真蒲黄一两甘草二两生地黄汁半升白蜜一匙右切細以水三升煮取一升去滓入蒲黄蜜地黄汁暖服立愈療産後血暈心悶蒲黄四分紫葛芍藥八分紅花十二分右㕮咀以水二升煎至七合入生地黄汁二合更煎三五沸每服三合産後血暈心悶亂恍惚如見鬼生益母草汁三合根亦可生地黄汁二合童子小便一合雞子清三合右煎三四沸後入雞子清攪停作一服産後血暈狂語不識人狂亂童子小便五合生地黄汁一合赤馬通七枚紅雪八分右以上二味浸赤馬通絞去滓下紅雪温為兩服獨行散治産後血暈昏迷不省衝心悶絶衛生方名立應散五靈脂半生半炒二两右為末温酒調下二錢口噤者抝開口灌之入喉即愈一方加荆芥等分為末童便調下又方治産後血暈右神麯為末熱水調二錢療産後血暈狂言煩渇不止生香附子去毛右為末每服二錢水一琖薑三片棗一箇煎至七分温服治産後血暈危困國醫以此方獻禁中用之大效厚獲賞賚時庚寅嵗也生地黄汁一大琖當歸一分剉赤芍藥一分剉右水煎三五沸温服如覺煩熱去當歸入童子小便半琖妙張氏方治産後血暈全不省人事極危殆者用韮菜切入在一有嘴甆瓶内煎熱醋沃之便宻縛瓶口以瓶嘴向産婦鼻孔令醋氣透入須先扶病人起惡血衝心故有此證韮能去心之滯血加以醋氣運逹之用無不效近效方療血暈絶不識人煩悶言語錯亂惡血不盡腹中絞痛胎死腹中紅藍花酒紅花一两右為末分二服每服酒二盞童子小便二盞煮取盞半候冷分為二服留滓再煎一方無童便崔氏療産乳暈絶方以洗兒水飲三合良或以惡血服少許良又方半夏洗不以多少右為末圎如大豆内鼻中即省亦療五絶指迷文仲同又方生赤豆子𢷬為末取東流水和服方寸匕不瘥再服救急同奪命散治産後血暈血入心經語言顛倒健忘失志及産後百病没藥血竭等分右細研為末纔産下便用童子小便與細酒各半琖煎一二沸調下二錢良久再服其悪血自循下行更不衝上免生百疾專治婦人方只用白湯調五羊洪運使上天下錫子舎孺人産後語言顛倒譫語不已如有神靈服諸藥無效召予診之六脉和平僕以此藥兩服而愈産後顛狂方論第六凡三方療産後因驚敗血衝心昏悶發狂如有鬼祟冝用局方大聖澤蘭散除是自合者方有效加好辰砂研令極細毎服加一字許煎酸棗仁湯調下一服可安何氏方療産後因敗血及邪氣入心如見祟物顛狂方用大辰砂一二錢重研令極細用飲兒乳汁三四茶脚許調仍掘紫頂活地龍一條入藥候地龍衮三衮取出地龍不用不令帯藥出但欲得地龍身上涎耳却入無灰酒與前乳汁相合七八分琖重湯温遇疾作分三二服余家荆布方産一日忽見鬼物言語顛倒遂取自合蘇合香圎一錢重以童子小便調服即醒神思如故産後狂言譫語如有神靈方論第七凡一方夫産後言語顛倒或狂言譫語如見鬼神者其原不一須子細辯證用藥治療産後驚風言語亂道如見鬼神精神不定者研好朱砂酒調下龍虎丹見局方三圎作一服兼琥珀地黄圎服之一則因産後心虛敗血停積上干于心而狂言獨語者當在第十九卷第一論求之二則産後臓虛心中驚悸志意不安言語錯亂不自覺知神思不安者當在十九卷第二論求之三則宿有風毒因産心虚氣弱腰背強直或歌哭嗔笑言語亂道當作風痙治療當在十九卷第三論求之四則産後心虚中風心神恍惚言語錯亂當在十九卷第四論求之五則産後多因敗血迷亂心經而顛狂言語錯亂無常或暈悶者當于本卷第五六論求之六則因産後感冐風寒惡露斬然不行憎寒發熱如瘧晝日明了暮則譫語如見鬼狀當作熱入血室治之宜琥珀地黄圎及四物湯只用生乾地黄加北柴胡等分煎服如不退者以小柴胡湯加生乾地黄如黄芩分兩煎服愈雖然已上諸證大抵胎前産後之疾自有專門一定之法毫髪不同如産後首當逐敗生新然後子細詳辯疾證不可妄立名色自立新意妄自加減方藥大宜對證依古法施治未有不安者也琥珀地黄圎方見十九卷第二論四物湯方見二卷第五通用方小柴胡湯方見六卷第五論治産後敗血衝心發熱狂言奔走脉虛大者男六德續添乾荷葉生地黄乾牡丹皮等分不以多少右三味濃煎湯調生蒲黄二錢匕一服即定産後不語方論第八凡二方論曰産後不語者何荅曰人心有七孔三毛産後虛弱多致停積敗血閉于心竅神志不能明了又心氣通于舌心氣閉塞則舌亦強矣故令不語如此但服七珍散人參石菖蒲生乾地黄川芎各一兩細辛一錢防風辰砂别研各半两右為細末每服一錢薄荷湯調下不拘時胡氏孤鳳散治産後閉目不語白礬研細右每服一錢以熟水調下婦人大全良方卷十八
