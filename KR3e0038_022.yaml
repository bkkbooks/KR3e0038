body:
  text: 婦人大全良方卷十八宋陳自明撰産後門産難既明須知産後疾病故以次之産後將護法第一周頲論併在其中論曰凡婦人生産畢且令飲童子小便一盞不得便卧且宜閉目而坐須臾方可扶上床仰卧不得側卧宜立膝不可伸足髙倚床頭厚鋪茵蓐遮圍四壁使無孔隙免被賊風兼時時令人以物從心擀至臍下使惡露不滯如此三日可止仍不可令多卧如卧多看承之人宜頻唤醒舊説産婦分娩了三日方可上床若三日上床則必就地睡卧又豈可令産婦近地氣乎才生産畢不得問是男是女且先研醋墨三分服之一法云不可服醋墨有傷肺經成咳嗽之戒誠過慮也然醋墨本破凝結之血然不可用太釅之醋仍不可太多即不至傷肺然所在皆同亦有不喫者更産後三日內令産婦嘗聞醋炭氣或燒乾漆煙若無乾漆以破舊漆器燒之以防血逆血迷血運不省之患夏月宜于房門外燒磚以醋沃之置於房中夏月房中不須著大火及煮粥煎藥之類分娩之後須臾且食白粥一味不可令太飽頻少與之為妙逐日漸增之煮粥時須是煮得如法不用經宿者又不可令溫冷不調恐留滯成疾仍時與童子小便一盞飲之亦須先備小便若遇夏月以簿荷養之新産後不問腹痛不痛有病無病以童子小便以酒和半盞溫服五七服妙一臘七日也之後方可少進醇酒并些小鹽味一法才産不得與酒緣酒引血迸入四肢兼産母臟腑方虛不禁平聲酒力熱酒入腹必致昏悶七日後少進些酒不可多飲如未出月間欲酒喫或服藥者可用淨黑豆一升炒令煙出以無灰酒五升澆淋之仍入好羌活一兩洗淨拍破同浸尤妙當用此酒下藥或時時飲少許可以辟風邪養氣血下惡露行乳脈也如産婦素不善飲酒或夏月之間亦不須強飲一臘之後恐喫物無味可爛煮羊肉或雌雞汁略用滋味作粥飲之或喫爛煮豬蹄肉忌母豬及白腳豬肉不可過多今江浙間産婦多喫熟雞子亦補益亦風俗也三月之後方可少食溫麵食麵早成腫病凡喫物過多恐成積滯若未滿月不宜多語喜笑驚恐憂惶哭泣思慮恚怒強起離床行動久坐或作針線用力工巧恣食生冷粘硬果菜肥膩魚肉之物及不避風寒脫衣洗浴或冷水洗濯當時雖未覺大損滿月之後即成蓐勞手腳及腰腿痠重冷痛骨髓間颼颼如冷風吹繼有名醫亦不能療大都産婦將息須是滿百日方可平復大慎觸犯此多致身體強直如角弓反張名曰蓐風遂致不救又不得夜間獨處緣去血心虛恐有驚悸切宜謹之所有血衣洗濯不得于日中晒曝免致邪祟侵傷又不得濯足恐血氣攻下又不得刮舌傷心刷齒及就下低頭皆成血逆血運此産家謹護之常法也滿月之後尤忌任意飲食觸冒風寒恣意喜怒梳頭用力髙聲作勞工巧房欲詳見産後通用方第一及上髙厠便溺之類如此節養攝至百晬始得血氣調和臟腑平復自然安帖設不依此即致産後餘疾矣小可虗羸失于將補便成大患終身悔而不及或有諸疾不論巨細後並有方藥醫療不得信庸醫妄投藥餌經云婦人非止臨産須憂産後大須將理慎不得恃身體和平取次為之乃縱心恣意無所不為若有觸傷便難整理犯時微若秋毫感病重如山嶽知命者可不謹之産後調理法第二若産後將息如法四肢安和無諸疾苦亦須先服黑神散四服亦略備補益圎散之類不可過多又恐因藥致疾不可不戒如四物湯四順理中圎內補當歸圎當歸建中湯或産婦血盛初經生産覺氣悶不安者調七寶散在十九卷第二論中服之若寧帖不須服若三日後覺壯熱頭痛胸腑氣刺者不可便作傷寒傷風治之此是乳脈將行宜服玉露散一二服如無此證不須服若因床帳大暖或産婦氣盛或素多喜怒覺目眩暈如在舟車精神鬱冒者此是血暈即須服血暈藥一二服方見第五論仍須看承之人照管問當也設或覺粥食不美虛困即服四順理中圎一二服若不如此不須服若于兩三日間覺腹中時時撮痛者此為兒枕作痛必須服治兒枕藥一二服方見第二十卷若大便祕或小便澀切不可服通利藥以其無津液故也若投通利之藥則滑泄不禁不可治也切須戒之若祕甚必欲通利方可服和暖藥即通方見後二十二卷第一論産後通用方論第三凡二十三方千金云凡産後滿百日乃可會合不爾至死虛羸百病滋長慎之凡婦人患風氣臍下虛冷莫不由此早行房故也凡産後七日內惡血未盡不可服湯候臍下塊散乃進羊肉湯有痛甚切者不在此例候兩三日消息可服澤蘭圎比至滿月丸藥盡為佳不爾虛損不可平復也全極消瘦不可救者服五石澤蘭圎補之服法必七日外不得早服也凡婦人因暑月産乳取涼太多得風冷腹中積聚百病竟起迄至于死百方療不能差桃仁煎主之出蓐後服之婦人縱令無病每至秋冬須服一二劑以至年內常將服之佳黑神散治婦人産後惡露不盡胞衣不下攻衝心胸痞滿或臍腹堅脹撮痛及血暈神昏眼黑口噤産後瘀血諸疾並皆治之熟乾地黃蒲黃炒當歸乾薑炮桂心芍藥甘草各四兩黑豆炒去皮半升右為細末每服二錢酒半盞童子小便半盞同煎調服烏金散治産後十八疾方論方與局方黑神散同有人選集為歌訣十八首言語鄙俚故不録一曰産後因熱病胎死腹中者何但服烏金散二曰産難者何但服烏金散三曰産後胞衣不下者何但服烏金散四曰産後血暈者何但服烏金散五曰産後口乾心悶者何但服烏金散六曰産後乍寒乍熱者何但服烏金散七曰産後虛腫者何但服烏金散兼朱砂圎八曰乍見鬼神者何但服烏金散九曰産後月內不語者何但服烏金散十曰産後腹內疼痛兼㵼者何但服烏金散兼用止㵼調氣藥十一曰産後遍身疼痛者何但服烏金散十二曰産後血崩者何但服烏金散十三曰産後血氣不通咳嗽者何但服烏金散十四曰産後乍寒乍熱心痛月候不來者何但服烏金散十五曰産後腹脹滿嘔逆不定者何宜服烏金散次服朱砂圎三二日炒生薑醋湯下七圎十六曰産後口鼻黑氣及鼻衄者何論同此證不可治十七曰産後喉中氣喘急者何論同十死不治十八曰産後中風者何但服烏金散已上論與郭稽中二十一論問答同故不詳録桃仁煎療萬病婦人産後百病諸氣方桃仁一千二百枚去皮尖及雙人煮令黃色右一味搗令極細熟以上等酒一斗五升研三四遍如作麥粥法以極細為佳納小長項瓷瓶中密塞以麵封之納湯中煮一復時不停火亦勿令火猛使瓶口常出在湯上勿令沒之熟訖出溫酒服一合日再服丈夫亦可服千金增損澤蘭圎療産後百病理血氣補虛勞澤蘭甘草當歸川芎各七分附子炮乾薑白术白芷北細辛各四分北防風人參牛膝各五分柏子仁熟地黃石斛各六分厚朴藳本蕪荑各二分麥門冬去心八分桂心四分右二十味為末煉蜜圎如梧桐子大溫酒下二十元産後醋墨松煙墨不拘多少用炭火煆通紅以米醋淬之再煆再淬如此七度研令極細用絹羅過才産了喫醋墨二錢用童子小便調下四味湯療産後一切諸疾才分娩喫一服尤妙當歸心鬲煩加半錢延胡索氣悶喘急加半錢血竭惡露不快加半錢沒藥心腹撮痛加半錢各等分右為細末每服各抄半錢用童子小便一盞煎至六分通口服玉露散治産後乳脈行身體壯熱疼痛頭目昏痛大便澀滯悉能治之涼膈壓熱下乳人參白茯苓甘草各半兩苦梗炒川芎白芷各一兩當歸一分芍藥三分右為細末每服二平錢水一盞煎至七分溫服如煩熱甚大便祕者加大黃二錢半地黃煎治産後諸疾生地黃汁生薑汁各一升藕汁半升大麻仁三兩去殼為末右和停以銀器內慢火熬成膏溫酒調半匙服更以北术煎膏半盞入之尤佳産寶方無麻仁用白蜜治産後虛憊盜汗嘔吐理中圎治新産血氣俱傷五臟暴虛肢體羸瘦乏氣多汗才産直至百晬日常服壯氣補虛和養臟氣蠲除餘疾消榖嗜食甘草二兩一方三兩白术人參乾薑各一兩右為細末煉蜜為圓如梧桐子大溫米飲下三十圎空心服才産了以童子小便打開點服七日內日三服産乳方云此乃大理中圓加甘草兩倍耳然其功比之四味等分大故不同蓋取甘味以緩其中而通行經絡之功最勝者也此産婦月內不可闕者出月不須服矣古方中有婦人補益之藥如大澤蘭圎小白薇圎熟乾地黃元大聖散之類其藥味稍衆而中下之家村落之地卒何以致且藥肆中少有真者不若以四順理中圓易之較其功比澤蘭圎之類主治頗多也黑龍丹治産後一切血疾産難胎衣不下危急惡疾垂死者但灌藥得下無不全活神驗不可言當歸五靈脂川芎良薑熟地黃各一兩右細銼以沙合盛赤石脂泯縫紙筋鹽泥固濟炭火十斤煆令通赤去火候冷取開看成黑糟色取出細研却入後藥百草霜五兩硫黃乳香各一錢半花蘂石琥珀各一錢右五味並細研與前五味再研如法修製和勻以米醋煮麵糊圓如彈子大每服一圎炭火燒令通赤投于生薑自然汁與童子小便入酒漉出晒乾研細只用此酒調下茂恂熙寧初從事濮上幕府郡之蓐醫胡者為豫言數政之前有朱汴水部施黑龍丹凡産後諸病危甚垂死者無不愈郡中及村落人賴以全活者甚衆汴受代歸婦人數千號泣遮道送行尚有一二粒未之施也先人自三峯謫官淮陽家嫂馬氏蓐中大病醫者康從變投丹立愈訪之乃得於汴也且言每鬻一粒輒受千錢必其獲厚利不欲求之後起守汝海從變餞别一驛臨行出此方為獻每以救人無不驗者盧道原侍郎再帥陘原時姨母妊娠至臨潼就蓐後數日有盜夜入其室驚怖成疾衆醫不能治乃以忳弟嘗遺此藥服之遂安家人金華君在秦生文度數日苦頭痛未止又心痛痛發兩股上下走注疾勢甚惡昏躁煩憒目視燈如金色勺飲不下服藥甚衆無效忳弟曰黑龍丹可服初以半粒投之即能飲粥而他藥入輒吐出不受覺痛稍緩又投半粒又得安眠自中夜服藥至五鼓下惡物數升頭痛頓減又至食時復下數升渙然醒愈蓋敗血所致其效如此建中靖國元年五月二十日郭茂恂記仲氏嫂金華君在秦産七日而不食始言頭痛頭痛而心痛作既而目晴痛如割如是者更作更止相去才瞬息間每頭痛甚欲取大石壓食久漸定心痛作則以十指抓壁血流掌痛定目復痛又以兩手自剜取之如是者十日不已國醫二三輩郡官中有善醫者亦數人相顧無以為計且言其藥犯芎可以愈頭痛犯薑黃可以治心痛率皆悠悠不根之言竟不知病本所起張益困頓醫益術殫豫度疾勢危矣非神丹不可愈方治藥而張召豫夫婦付以諸子與仲氏别慘怛不復言豫瞋目戒張曰弟安心養疾亟出召伯氏曰事急矣進此丹可乎仲氏尚遲遲以兩旬不食恐不勝任黃昏進半粒疾少間中夜再服藥下瞑目寢如平昔平旦一行三升許如蝗蟲子三疾減半已刻又行如前則頓愈矣遣荆叉輩視之奄殆無氣午後體方涼氣方屬乃微言索飲自此遂平復大抵産者以去敗惡為先血滯不快乃至是爾後生夫婦不習此理老媪庸醫不能中病所以疾苦之人十死八九大數雖定豈得無夭不遇良醫終抱遺恨今以施人俾終天年非祈于報者所兾救疾苦養性命爾崇寧元年五月五日郭忳序當歸散療産後氣血俱虛慎無大補恐增客熱别致他病常令惡露快利為佳當歸芍藥川芎黃芩各一兩白术半兩右為細末溫童子小便或酒調下二錢出指迷方又出傷寒括要周頲傳授濟急方四道頲嘗見人傳經效諸方自曾修合實有大功遂編于卷末普用傳授以濟急難治産後血暈血氣及滯血不散便成癥瘕兼㵼面色黃腫嘔吐惡心頭痛目眩口吐清水四肢㽔弱五臟虛怯常日睡多喫食減少漸覺羸瘦年久變為勞疾如此所患偏宜服勝金圓澤蘭葉四兩芍藥蕪荑仁甘草當歸芎藭各六分乾薑桂心各三分半石膏桔梗細辛厚朴吳茱茰柏子仁防風烏頭炮白薇枳殼南椒石頷蒲黃石斛茯苓各三分白术白芷人參青木香藁本各一分右揀擇上等州土如法修製為末煉蜜圎如彈子大有所患熱酒研一圎入口便愈大忌腥膩熱麵豉汁生蔥冷水果子等若死胎不下胎衣在腹並以炒鹽酒研服未效再服治産後諸疾聖散子方與局方大聖澤蘭散同但無地黃阿膠桔梗故不録黑散子神效産後一切疾鯉魚皮三兩燒灰芍藥蒲黃各二兩當歸沒藥桂心好墨卷柏青木香麝香各一兩丈夫髮灰鐺墨各半兩右為細末以新瓷器盛密封勿令走氣每産後以好酒調下一錢匕如血暈衝心下血不盡臍下攪刺疼痛不可忍塊血癥疾甚者日加兩服不拘時候忌冷物果子粘食保生元方與局方同却無麻仁有川椒故不復録朱砂元治産後虛中有積結成諸疾黑附子桂心白薑各半兩巴豆一錢醋浸煮去皮研右為細末入巴豆研停醋煮麵糊元如麻子大每服三圎至五圓冷水下服之取㵼為度薑粉散才産服此蕩盡兒枕除百病當歸人參木香黃耆川芎甘草茯苓芍藥桂心知母大黃炒草豆䓻白术良薑訶子青皮熟地黃少許附子重半兩一箇右除地黃附子外各等分焙乾生薑一斤研取自然汁于碗中停留食久傾去清汁取下面粉腳攤在蒻葉上入焙籠焙乾搗羅為末才産後用藥三錢水一盞薑三片棗一箇煎至七分熱服服後産母自然睡著半日以來睡覺再服全除腹痛每日只三服至九日不可服肚中冷也地黃酒治産後百病未産一月先釀産訖可服地黃汁好麴好淨秫米各二升右先以地黃汁漬麴令發凖家法釀之至熟封七日取清者服常令酒氣相接勿令絶忌蒜生冷鮓滑雞豬肉一切毒物婦人皆可服之但夏三箇月不可合春秋宜合以地黃汁并滓內米中炊合用之若作一碩十碩凖此一升為率先服當歸湯後服此妙地黃元治産後腹痛眼見黑花或發狂如見鬼狀或胎衣不下失音不語心胸脹滿水榖不化口乾煩渴寒熱往來口內生瘡咽喉腫痛心中忪悸夜不得睡産後中風角弓反張面赤牙關緊急或崩中如豚肝臍腹㽱痛煩躁恍惚四肢腫滿及受胎不穩唇口指甲青黑一方地黃減半當歸一兩延胡索琥珀各一兩名琥珀地黃元治狀同生地黃研取汁留滓生薑各二斤研取汁留滓蒲黃當歸各四兩右于銀石器內用慢火取地黃汁炒生薑滓以生薑汁炒地黃滓各令乾四味同焙乾為細末醋煮麵糊圎如彈子大每服一圎食前用當歸酒化下神妙琥珀散治産後一切危困之疾琥珀朱砂麝香香墨醋炙白殭蠶當歸各一分鯉魚鱗炒焦桂心百草霜白附子梁上塵炒令煙出篩過稱各半兩右為細末炒生薑熱酒調下二錢産後一切病服之竒效治産後諸疾如産卧畢切須用童子小便調黑神散數服除百病如無小便用白湯亦可或産勞力過度或下血頗多或微熱惡露來遲馬尾大當歸洗一兩半右在未産前修製為末如遇産有疾無疾若産了但用童子小便調服令産婦月後並無他證果有神效療産後雖甚通利唯覺心腹滿悶脅脹咳嗽不能食大便不通眼澀行坐心腹時痛許仁則祕方三道白术當歸桑白皮大黃各三兩細辛桂心各二兩生薑四兩右㕮咀用水二升煎取一升分為三服如人行七八里久再服此湯當得利利又不宜過多所利者為不獲已而微利之其不然未合令利既初産後覺身皆虛尚藉藥食補之豈宜取利此緣病熱既要不利茍以當塗服湯得通氣息安帖利既未止即便須急取三匙醋飯喫即止止後但須適寒溫將息後取痊復飯食之節量其所宜如利不減宜依後方服之産後不宜輕易便投大黃如不得已後人更斟酌強弱而用之方得穩當當歸十分白术八分甘草七分細辛四分桂心人參生薑各三分桑白皮六分右為末煉蜜圎如梧桐子大空心溫酒下三十圓産後血氣不通當時不甚覺如在産出血少皆成癥結心便疼硬乍寒乍熱飲食不進不生肌肉心腹有時刺痛口乾粘手足沉重有此狀者宜此藥當歸芍藥甘草牛膝鬼箭羽人參各五分牡丹皮虎杖白术各六分大黃八分乾地黃七分朴硝十分烏梅肉炒白薇桂心各四分水蛭炒蒲黃各三分虻蟲十四枚製右為末煉蜜圎如梧桐子大空心酒下二十圎日兩服外臺有石脂十分許公在西京為女祕妙不傳此方于人後仁則女壻尋得依狀相傳萬不失一餘散歸本門産科序論陳無擇世傳産書甚多千金外臺會王産寶馬氏王氏崔氏皆有産書巢安世有衛生寶集子母祕録等備則備矣但倉卒之間未易厯試惟李師聖序郭稽中産科經驗寶慶集二十一篇凡十八方用之頗效但其間序論未為至當始用料理簡辨于諸方之下以備識之者非敢好辨也愚詳産後要病無出于郭稽中二十一論一十八方有益于世多矣豫家三世用之未有不效雖陳無擇所評或是或否亦不可不詳而究之且如産後眩暈以牡丹散然其中有大黃芒消况新産後血氣大虛豈宜輕服又云去血過多而暈者或有之若言痰暈者十無一二又如産後熱悶氣上轉為腳氣不應用小續命湯僕以百問中方加減而用之此活法也故孟子云盡信書則不如無書此之謂也胞衣不出方論第四凡二十二方夫有産兒出胞衣不落者世謂之息胞由産初時用力此産兒出而體已疲憊不能更用力産胞經停之間而外冷氣乘之則血道澀故胞衣不出須急以方藥救治不妨害于兒所奈者胞係連兒臍胞不出即不得以時斷臍浴洗冷氣傷兒則成病也舊法胞衣不出恐損兒者依法截臍而已産處須順四時方面并避五行禁忌者若有觸犯多令産婦難産雖腹痛者未産也欲腹痛連腰痛甚者即産也所以然者腎係于腰胞係腎故也診其脈轉急如切繩無殊者即産也郭稽中論曰胎衣不下者何答曰母生子訖流血入衣中衣為血所脹是故不得下治之稍緩脹滿腹中以次上衝心胸疼痛喘急者但服奪命丹以逐去衣中之血血散脹消胎衣自下而無所患更有牛膝湯等用之甚效録以附之奪命丹附子半兩炮牡丹皮一兩乾漆一分碎之炒令煙盡右為細末以釅醋一升大黃末一兩同熬成膏和藥圎如梧桐子大溫酒吞五七圎不拘時必效方牛膝湯治胎衣不出腹臍堅脹急痛即殺人服此藥胞即爛下死胎牛膝瞿麥各四兩當歸三兩通草六兩滑石八兩葵子五兩右細切以水九升煮取三升分三服若衣不下腹滿即殺人推其源皆是胞衣有血奔心是以不出也或坐婆生踈斷帶收兒時衣失于繫住則帶縮入腹中便不得出宜服此藥衣即爛出也廣濟集驗千金崔氏同花蘂石散治産後氣欲絶緣敗血不盡血迷血暈惡血奔心胎死腹中胎衣不下至死者但心頭暖急以童子小便調一錢取下惡物如豬肝終身無血風血氣疾膈上有血化為黃水即吐出或小便中出也若先下胎衣則泛泛之藥不能逹若先治血悶則尋常之藥無此功無如此藥有兩全之妙也花蘂石一斤上色硫黃四兩右二味相拌令均先用紙和膠泥固瓦罐子一箇內可容藥候泥乾入藥在內密泥封口了焙籠內焙令透熱便安在四方磚上磚上書八卦五行字用炭一稱籠疊周匝自己午時從下生火令漸漸上徹有墜下火放夾火上直至經宿火冷炭消盡又放經宿罐冷定取出細研以絹羅至細瓷合內盛依法用之此藥便是療金瘡花蘂石散尋常人自宜時時收蓄以防急難至妙有一親戚婦人産後胞衣不下血脹迷悶不記人事告之曰死矣僕曰某收得趙大觀文局中真花蘂石散在笥中謾以一貼贈之以童便調灌藥下即蘇衣與惡物旋即隨下乘興無恙牛膝散治妊娠五六月墮胎胞衣不出牛膝川芎朴硝蒲黃各三兩桂心半兩當歸一兩半右為粗末每服四錢水一盞薑三片生地黃一分煎至六分去滓溫溫頻服若胞衣不出若腹脹則殺人黑豆一合炒令熟右入醋一盞煎三五沸去豆分為三服酒煮亦可必效方療胞衣不出方服蒲黃如棗大集驗千金崔氏同又方以生地黃汁一升苦酒三合暖服之救急一方見子死腹中論中又方以水噀産婦面神驗延年方以洗兒水令産母飲半盞其衣便下勿令産婦知又方牛膝一兩葵子一合右搗碎以水一盞半煎至一盞去滓分二服廣濟療胞衣不出方右以末竈突中土三指撮以水服之集驗千金備急文仲同又方竈下土一六寸研碎用好醋調令相合納臍中續煎生甘草湯三四合服又方以醋湯飲之出又方雞子一枚苦酒一合和飲之立出一方用萆麻子名如聖膏見産難門延年方療胞衣不出腹脹則殺人吞雞子黃三箇仍解髮刺喉中令嘔即出若困極以水煮螻蛄一枚二十沸灌入口中汁下即出崔氏同救急方用赤小豆男用七粒女用十四粒東流順水吞下産乳療産後惡血衝心或胞衣不下腹中血塊等疾備急同右大黃一兩為末以好醋半斤熬成膏以藥末搜膏為圎如梧桐子大溫醋湯吞五圎良久取下惡物不可多服療胞衣不下栝樓實一箇取子研令細右酒與童子小便各半盞煎至七分去滓溫服如無實根亦得又方紅花一兩酒煮濃汁服又方以鹿角鎊屑三分為末煮蔥白湯調下凡欲産時必先脫常所著衣以籠竈胞衣自下仍易産神驗廣濟方云取夫單衣蓋井上立出千金集驗救急崔氏小品同治胞衣不下訣婦人百病莫甚于生産産科之難臨産莫甚于催生既産莫甚于胞衣不下惟有花蘂石散一件最為緊要如黑神散琥珀散諸方之類雖皆有驗然鄉居或逺于藥局倉卒之間無法可施今採得胡氏寶慶方一妙法云若産訖胞衣不下停待稍久非特産母疲倦又且血流入胞中為血所脹上衝心胸喘急疼痛必致危篤若有此證宜急斷臍帶以少物繫墜以物繫墜之時切宜用心先繫然後截斷不爾則胞上掩心而死使其子血脈不潮入胞中則胞衣自當痿縮而下縱淹延數日亦不害人只要産母心懷安泰終自下矣屢試有驗不可輕信坐婆妄用手法多有因此而亡深可浩歎所以胡氏重引親見為據産後血暈方論第五凡十六方論曰産後血暈者由敗血流入肝經眼見黑花頭目旋暈不能起坐甚致昏悶不省人事謂之血暈細酒調黑神散最佳庸醫或作暗風中風治之凡暈血熱乘虛逆上蒸心故昏迷不省氣閉欲絶是也然其由有三有用心使力過多而暈者有下血多而暈者有下血少而暈者其暈雖同其治特異當詳審之下血多而暈者但昏悶煩亂而已當以補血清心藥治之下血少而暈者乃惡露不下上搶于心心下滿急神昏口噤絶不知人當以破血行血藥治之古法有云産婦才分娩了預燒稱鎚或江中黃石子硬炭燒令通赤置器中急于床前以醋沃之得酸氣可除血暈産後一臘不妨時作為妙崔氏云凡暈者皆是虛熱血氣奔迸腹中空所致欲分娩者第一須先取釅醋以塗口鼻仍置醋于傍使聞其氣兼細細飲之此為上法如覺暈即以醋噀面蘇來即飲醋仍少與解之一云仍少與水解之一法燒乾漆令煙濃熏産母靣即醒如無乾漆以舊破漆器以猛火燒熏之亦妙郭稽中論曰産後血暈者何答曰産後氣血暴虛未得安靜血隨氣上迷亂心神故眼前生花極甚者令人悶絶不知人口噤神昏氣冷醫者不識呼為暗風若作此治之病必難愈但服清魂散即省清魂散方澤蘭葉人參各一分荆芥一兩川芎半兩右為末用溫酒熱湯各半盞調一錢急灌之下咽即開眼氣定即醒一方有甘草二錢若去血過多而暈者當服芎藭湯方見第二卷通用門當歸芍藥湯方見十二卷第十二論廣濟治産後血暈心悶不識人神言鬼語氣急欲絶芍藥甘草各一兩丹參四分並㕮咀生地黃汁一升生薑汁白蜜各一合右水二升先煎前三味取八分下地黃生薑汁蜜分為兩服又方荷葉二枚炙真蒲黃一兩甘草二兩生地黃汁半升白蜜一匙右切細以水三升煮取一升去滓入蒲黃蜜地黃汁暖服立愈療産後血暈心悶蒲黃四分紫葛芍藥八分紅花十二分右㕮咀以水二升煎至七合入生地黃汁二合更煎三五沸每服三合産後血暈心悶亂恍惚如見鬼生益母草汁三合根亦可生地黃汁二合童子小便一合雞子清三合右煎三四沸後入雞子清攪停作一服産後血暈狂語不識人狂亂童子小便五合生地黃汁一合赤馬通七枚紅雪八分右以上二味浸赤馬通絞去滓下紅雪溫為兩服獨行散治産後血暈昏迷不省衝心悶絶衛生方名立應散五靈脂半生半炒二兩右為末溫酒調下二錢口噤者拗開口灌之入喉即愈一方加荆芥等分為末童便調下又方治産後血暈右神麯為末熱水調二錢療産後血暈狂言煩渴不止生香附子去毛右為末每服二錢水一盞薑三片棗一箇煎至七分溫服治産後血暈危困國醫以此方獻禁中用之大效厚獲賞賚時庚寅嵗也生地黃汁一大盞當歸一分銼赤芍藥一分銼右水煎三五沸溫服如覺煩熱去當歸入童子小便半盞妙張氏方治産後血暈全不省人事極危殆者用韭菜切入在一有嘴瓷瓶內煎熱醋沃之便密縛瓶口以瓶嘴向産婦鼻孔令醋氣透入須先扶病人起惡血衝心故有此證韭能去心之滯血加以醋氣運逹之用無不效近效方療血暈絶不識人煩悶言語錯亂惡血不盡腹中絞痛胎死腹中紅藍花酒紅花一兩右為末分二服每服酒二盞童子小便二盞煮取盞半候冷分為二服留滓再煎一方無童便崔氏療産乳暈絶方以洗兒水飲三合良或以惡血服少許良又方半夏洗不以多少右為末圎如大豆內鼻中即省亦療五絶指迷文仲同又方生赤豆子搗為末取東流水和服方寸匕不瘥再服救急同奪命散治産後血暈血入心經語言顛倒健忘失志及産後百病沒藥血竭等分右細研為末才産下便用童子小便與細酒各半盞煎一二沸調下二錢良久再服其惡血自循下行更不衝上免生百疾專治婦人方只用白湯調五羊洪運使上天下錫子舍孺人産後語言顛倒譫語不已如有神靈服諸藥無效召豫診之六脈和平僕以此藥兩服而愈産後顛狂方論第六凡三方療産後因驚敗血衝心昏悶發狂如有鬼祟冝用局方大聖澤蘭散除是自合者方有效加好辰砂研令極細每服加一字許煎酸棗仁湯調下一服可安何氏方療産後因敗血及邪氣入心如見祟物顛狂方用大辰砂一二錢重研令極細用飲兒乳汁三四茶腳許調仍掘紫頂活地龍一條入藥候地龍衮三衮取出地龍不用不令帶藥出但欲得地龍身上涎耳却入無灰酒與前乳汁相合七八分盞重湯溫遇疾作分三二服余家荆布方産一日忽見鬼物言語顛倒遂取自合蘇合香圎一錢重以童子小便調服即醒神思如故産後狂言譫語如有神靈方論第七凡一方夫産後言語顛倒或狂言譫語如見鬼神者其原不一須子細辨證用藥治療産後驚風言語亂道如見鬼神精神不定者研好朱砂酒調下龍虎丹見局方三圎作一服兼琥珀地黃圎服之一則因産後心虛敗血停積上干于心而狂言獨語者當在第十九卷第一論求之二則産後臟虛心中驚悸志意不安言語錯亂不自覺知神思不安者當在十九卷第二論求之三則宿有風毒因産心虛氣弱腰背強直或歌哭嗔笑言語亂道當作風痙治療當在十九卷第三論求之四則産後心虛中風心神恍惚言語錯亂當在十九卷第四論求之五則産後多因敗血迷亂心經而顛狂言語錯亂無常或暈悶者當于本卷第五六論求之六則因産後感冒風寒惡露斬然不行憎寒發熱如瘧晝日明了暮則譫語如見鬼狀當作熱入血室治之宜琥珀地黃圎及四物湯只用生乾地黃加北柴胡等分煎服如不退者以小柴胡湯加生乾地黃如黃芩分兩煎服愈雖然已上諸證大抵胎前産後之疾自有專門一定之法毫髮不同如産後首當逐敗生新然後子細詳辨疾證不可妄立名色自立新意妄自加減方藥大宜對證依古法施治未有不安者也琥珀地黃圎方見十九卷第二論四物湯方見二卷第五通用方小柴胡湯方見六卷第五論治産後敗血衝心發熱狂言奔走脈虛大者男六德續添乾荷葉生地黃乾牡丹皮等分不以多少右三味濃煎湯調生蒲黃二錢匕一服即定産後不語方論第八凡二方論曰産後不語者何答曰人心有七孔三毛産後虛弱多致停積敗血閉于心竅神志不能明了又心氣通于舌心氣閉塞則舌亦強矣故令不語如此但服七珍散人參石菖蒲生乾地黃川芎各一兩細辛一錢防風辰砂别研各半兩右為細末每服一錢薄荷湯調下不拘時胡氏孤鳳散治産後閉目不語白礬研細右每服一錢以熟水調下婦人大全良方卷十八
