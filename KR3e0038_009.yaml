body:
  text: 婦人大全良方卷五宋陳自明撰勞瘵敘論第一凡二十一方夫骨蒸殗殜復連尸疰勞疰蟲疰毒疰熱疰冷疰食疰鬼疰等皆曰傳尸以疰者注也病自上注下與前人相似故曰疰其變有二十二種或三十六種或九十九種大略令人寒熱盜汗夢與鬼交遺泄白濁髮乾而聳或腹中有塊或腦後兩邉有小結核連復數箇或聚或散沉沉默默咳嗽痰涎或咯膿血如肺痿肺癰狀或復下利羸瘦困乏不自勝持積月纍年以致於死死後乃疰易傍人乃至滅門者是也更有蜚尸遁尸寒尸喪尸尸注等謂之五尸及大小附著等證不的知其所苦無處不惡乃挾諸鬼邪而害人以三因考之內非七情所忤外非四氣所襲雖若麗乎不內外因奈其證多端傳變遷移難以推測故自古及令愈此病者十不得一所謂狸骨獺肝天靈蓋銅鑑鼻徒有其説未嘗見效唯膏肓俞崔氏穴名四花有六穴若聞早灸之可否幾半晚亦不濟也病者增寒發熱自汗面白目乾口苦精神不守恐畏不能獨卧其傳在肝病者增寒發熱面黑鼻燥忽忽喜忘大便苦難或復泄㵼口瘡其傳在心病者增寒發熱面青唇黃舌本強不能咽飲食無味四肢羸瘦吐涎沫其傳在脾病者增寒發熱面赤鼻白乾燥毛折咯嗽喘急時吐白涎或有血線其傳在肺病者增寒發熱面黃耳輪焦枯胻骨悁痛小便白濁遺瀝胸痛其傳在腎二十四種蒸病論所謂勞蒸者二十四種隨證皆可考尋毛折髮焦肌膚甲錯其蒸在皮外人覺熱自反惡寒身振瞤劇其蒸在內髮焦鼻衄或復尿血其蒸在血身熱煩躁痛如針刺其蒸在脈爪甲焦枯眼昏兩脅急痛其蒸在筋版齒黑燥大杼酸痛其蒸在骨背膂疼痛胻骨酸􅤙其蒸在髓頭眩熱悶口吐濁涎眼多眵淚其蒸在腦男子失精女子白淫其蒸在玉房乍寒乍熱中脘與膻中煩悶其蒸在三焦小便赤黃凝濁如膏其蒸在膀胱傳道不均或祕或泄腹中雷鳴其蒸在小腸大腹隱痛右鼻乾疼其蒸在大腸口鼻乾燥腹脹睡卧不安白汗出其蒸在胃口苦耳聾脅下痛其蒸在膽裏急後重肛門澀祕其蒸在回腸小腹㽱痛筋脈縱緩隂器自強其蒸在宗筋眼昏淚下時復眩暈躁怒不常其蒸在肝舌焦黑氣短煩悶灑灑浙浙其蒸在心唇乾口瘡胸腹脹悶畏寒不食其蒸在脾咳嗽喘滿咯痰吐血聲嘶音逺其蒸在肺耳輪焦枯腳氣酸疼起居不得其蒸在腎情想不寧無故泄精白物綿綿而下其蒸在右腎心主胞絡心膈噎塞攻擊疼痛俯仰煩寃其蒸在鬲諸證雖曰不同其根多有蟲囓其心肺治之不可不絶其根也神仙祕法取傳尸勞蟲服此藥須先擇良日焚香禱祝令病人設榻面向福德方服即有神效不可使病人知其藥味及子細青桑皮楊栁枝梅枝桃枝已上要取東引者各七莖蔥白七莖青蒿一握如無以子代真安息香一分研去石阿魏一分右八味除阿魏外用童子小便一升半煮取藥耗及一半去滓將藥汁化阿魏再煮十數沸去滓候溫作二次調下件藥末朱砂半兩小檳榔半兩麝香半分右三味研令極細分為二服用前湯使調下五更初一服三點再一服辰時間取下蟲遂絶根本若見蟲色白者此病必差若黑色則已傳入腎經不可救也服藥後只以淡粥補之並不動元氣效驗無比切須祕之世傳勞蟲有靈輕易傳之則傷醫者此説殆醫者祕惜其方不可以授人耳要須密重之則無泄慢天機乃起死還生功同造化鬼神護助自有靈效大凡傳尸勞者必須先服此一藥後十五方隨證治不可以槩用藥調治三五箇月再服此取蟲藥則永除根本如取下蟲色已黑縱服後藥亦無補也然亦能使不傳它人治心胸積氣作胸痺引兩脅痛昏悶不收音聲不清虛熱上壅作鼻衄方桑白皮三分枳殼木通子芩生乾地黃白芍藥甘草各半兩右為粗末每服三錢重水盞半煎至七分去滓溫服食後治伏瘀血在心肺時作衄心胸徹背痛方白芍藥牡丹皮各一兩生犀屑半兩生地黃三兩别槌碎入右㕮咀每服半兩水一大盞煎至七分去滓溫服調榮衛消瘀血出聲音治痰嗽方川當歸牡丹皮白芍藥子芩木通麥門冬甘草華隂細辛各半兩生乾地黃一兩右㕮咀每服三錢水一盞薑三片煎至七分去滓溫服治虛熱昏冒倦怠下虛上壅嗽血衄血雞蘇圓雞蘇葉半斤黃耆半兩甘草川芎各一分防風一兩苦梗半兩荆芥穗一兩甘菊花一分真腦子半錢重生乾地黃半兩右為細末煉蜜圎如彈子大每服一圓用麥門冬去心煎湯嚼下又治肺損吐血日漸乏力瘦弱行步不得喘嗽痰涎飲食不美或發寒熱小便赤澀加車前子一分每服一圓煎桑枝湯嚼下日可六七服桑枝銼炒香每用水三盞煎至一盞去滓下藥治勞氣食後身疼倦夜間盜汗此病因失血榮衛損也宜防風湯方黃耆一兩白芍藥防風各三分甘草半兩當歸生乾地黃各三分右㕮咀每服三錢水一盞薑三片棗一箇煎至七分去滓溫服食前服治勞嗽溫金散甘草黃芩桑白皮防風各一兩杏仁二十七粒製人參去蘆茯神各半兩麥門冬一分以前五味用米泔浸一宿曬乾次入人參茯神麥門冬三味同為細末每服二錢水一盞蠟一豆大煎至八分食後溫服治勞嗽有四滿員極妙方見勞嗽門治心氣不足解勞倦益血桔梗飲子苦梗甘草黃耆人參去蘆麥門冬各一兩青皮半兩右為末每服二錢水一盞煎至七分溫服治胸痺瓜樓湯枳殼四箇厚朴薤白各一兩瓜樓一箇桂枝一兩有熱除此一味右㕮咀水七升煎取四升去滓溫服涼心肺解勞除熱使榮衛順血不絶子芩散黃耆一兩白芍藥子芩人參白茯苓麥門冬苦梗生乾地黃各半兩右為粗末先用竹葉一握小麥七十粒水三盞薑三片煎至水一盞半入藥末三錢重煎至七分去滓溫服治積氣堅硬作氣噎胸脅引背痛方白芍藥一兩半鱉甲醋炙枳殼去穰麩炒北柴胡各一兩甘草赤茯苓各半兩右㕮咀每服三錢水一大盞薑三片棗一箇煎至七分去滓溫服治伏連傳注腹中有堅硬積氣壅心胸作痺痛引脅背痛脘膈滿悶方鬼臼天門冬去心各三分巴豆一分去皮心炒莽草不蛀皂角酥炙各半兩葉子雄黃一兩右為細末煉蜜為圎如小豆大每服一圎漸加至三二圎空心湯水吞下臨卧一服常宜斟酌勿令泄㵼忌鯉魚山豬蘆笋出聲音方訶子炮去核木通各一兩甘草半兩右㕮咀用水三升煎至升半入生地黃汁一合再煎數沸放溫分六服食後日作半料治咽喉痛方百藥煎去黑皮鵬砂甘草生白礬等分右四味為細末每服一錢食後米飲調細細呷咽治肺間邪氣胸中積血作痛失音含化圎方蛤蚧一雙去口足炙訶子去核阿膠粉炒麥門冬去心北細辛甘草生乾地黃各半兩右為細末煉蜜為圎如雞頭子大食後含化一圎已上諸方辰州李倅名景遹録示云傳之於五羊大帥方侍郎上務下德治瘵疾得效方河車圎治勞嗽一切勞瘵虛損骨蒸等疾河車一枚初生男子者尤良於長流水中蕩洗盡血淨入鍋內煮熟以手擘成小片焙乾須在一日內便碾成末才經宿即不乾碾不成末矣按本草云人肉治瘵病胞衣飄生者尤佳主血氣羸瘦婦人勞損面皯皮黑腹內諸疾漸漸瘦悴者以五味和之如䭔􅀈法與服之勿令病者知亦治天行熱癘立效胞衣埋地中七八年化成水澄清如真水南方之人以甘草升麻和諸藥罐盛埋之三五年揆之此為藥服雪白茯苓半兩揀參一兩乾山藥二兩右為細末麵糊為圎如梧桐子大以少麝香末為衣每服三五十圎米飲溫酒鹽湯送下空心服嗽甚者五味子湯下又方治肌瘦咯血肺痿等疾蛤蚧一雙全者酒浸一宿酥炙知母貝母去心人參去蘆甘草杏仁去皮尖麩炒枇杷葉去毛炒鹿角膠粉炒右各一兩依方事治淨稱為末每服三錢水一盞入桑白皮煎至八分溫服日三夜二治勞嗽補肺湯桑白皮熟地黃各二兩人參去蘆紫苑黃耆川五味子各一兩右為細末每服二錢水一盞煎至七分入蜜少許食後溫服又四君子湯加秦芁黃蠟煎服尤妙辰陽李倅云已上藥方乃趙世則效之次子公璵並服此乃安傳之仲弟屢救人甚驗服藥止可食淡煮豬蹄肉仍須先煮熟肉去元汁再以白湯熟煮仍忌房勞一切生冷魚腥鹹毒醃藏等物無不痊愈修合藥及煎藥時忌生人孝子婦人雞犬貓畜見仍勿令病人知用藥味大有功效治傳尸出汗取蟲辟邪養正膏鱉甲一兩醋炙青蒿一握淡䜴三七粒蔥白兩莖安息香一分研桃栁桑枝各七莖桃仁四十九箇去皮尖雙仁天靈蓋用七頭大一片酥炙右十味隔夜以水一升浸至五更煎至半升再以童便半升同煎取四合又用檳榔一箇為末麝香一錢匕將所煎藥去滓調下至日髙二丈時放溫頓服以衣覆出汗審看十指汗出如藕絲五色臭穢汗出後仍㵼下蟲狀惡物盡甚者旬日再服永效豬肚元治骨蒸勞唇頰赤氣粗口乾遍身壯熱或多虛汗大腸澀祕小便赤黃飲食全少出博濟方青蒿鱉甲醋炙北柴胡木香生乾地黃各一兩青皮半兩宣黃連二兩右為末以豬肚一箇洗淨入藥在內繫定蒸令極軟研如泥為圓如緑豆大湯下十五元空心日三服忌濕麵毒物婦人骨蒸勞方論第二凡十五方夫骨蒸勞者由熱毒氣附骨故謂之骨蒸也亦曰傳尸亦謂殗殜亦稱復連亦名無辜丈夫以痃癖為根女人以血氣為本無問少長多染此病內既傷於臟腑外則損於肌膚日久不痊遂至羸瘦因服冷藥過度則傷於脾脾氣既衰而傳五臟脾初受病或脹或妨遂加泄痢肌肉瘦瘠轉增痿黃四肢無力飲食少味脾既受已次傳於腎腎既受病時時盜汗腰膝冷疼夢鬼交侵小便赤黃腎既受已次傳於心心既受病往往忪悸或喜或嗔兩頰常赤唇色如朱乍熱乍寒神氣不守心既受已次傳於肺肺既受病胸滿短氣咳嗽多唾皮膚甲錯狀如麩片肺既受已次傳於肝肝既受病兩目昏暗脅下妨痛不欲見人常懷忿怒五臟既病漸漸羸瘦即難療也天靈蓋散治婦人骨蒸勞四肢無力每至晚間即熱兩頰紅色食飲不下心神煩躁天靈蓋酥炙安息香地骨皮當歸山梔子仁人參去蘆貝母去心黃連桃仁去皮尖雙仁麩炒黃檳榔各一兩鱉甲醋炙北柴胡生乾地黃赤茯苓麥門冬各一兩半阿魏右為粗末以童子小便一大盞桃栁枝各七寸薑五片蔥白五寸藥四錢煎至七分去滓溫服獺肝元治婦人骨蒸勞熱體瘦煩疼不欲飲食獺肝一具鱉甲醋炙北柴胡各兩半朱砂桃仁去皮尖雙仁麩炒黃川升麻天靈蓋酥炙犀角屑梔子仁地骨皮知母各一兩黃耆三分甘草半兩麝香一分研右為細末煉蜜貟如梧桐子大溫水下三十貟無時候黃耆元治婦人骨蒸煩熱四肢羸瘦疼痛口乾心躁不得眠卧黃耆麥門冬去心茯神北柴胡甘草生乾地黃各一兩酸棗仁炒郁李仁杏仁去皮尖雙仁麩炒黃枸杞子人參去蘆黃芩各三分百合枳殼去穰麩炒赤芍藥知母各半兩鱉甲二兩製右為細末煉蜜為貟如梧桐子大清粥吞下三十貟無時候煞鬼貟治婦人骨蒸傳尸勞瘦鬼氣伏連已上出聖惠方麝香三分犀角屑木香白术各一兩鬼箭羽虎頭骨酥炙天靈蓋酥炙辰砂桃仁去皮尖雙仁麩炒黃雄黃各兩半右為細末煉蜜為貟如梧桐子大溫水下二十貟此藥亦辟瘟疫亦可帶之鱉甲煎治勞見專治婦人方雄鱉一個重一斤者杏仁去皮尖雙仁炒北柴胡貝母去心知母各四兩右除鱉外諸藥細銼以好酒五升入鍋內將活鱉在中以藥和停圍定上用板子石壓定令鱉在藥內喫酒藥候來日却以慢火煮候酒盡為度却取鱉令患人喫盡次將鱉甲用醋炙黃入在前項諸藥內焙乾為細末用酒煮麵糊元如梧桐子大用米飲吞下三十元無時候日五服麥煎散治少男室女骨蒸婦人血風攻疰四肢心胸煩壅赤茯苓當歸乾漆生鱉甲醋炙常山大黃煨北柴胡白术生乾地黃石膏各一兩甘草半兩右為細末每服二錢水一盞小麥五十粒煎至六分食後臨卧時溫服有虛汗加麻黃根一兩蘇東坡云此黃州吳判官方療骨蒸黃瘦口臭肌熱盜汗極效麥煎散甚多此方吳君寶之如希世之珍其效可知筒骨煎治諸虛勞疾羸瘦乏力腰背引痛心煩喘嗽唾膿嘔血頑涎壅盛睡卧有妨胸滿氣促夜多盜汗髮焦耳鳴皮寒骨熱一切五勞七傷骨蒸等候並皆療治許元林先生方地骨皮粉草北柴胡前胡烏藥麻黃不去節乾葛青蒿苦梗知母天仙藤北黃芩各一兩人參生乾地黃秦芁鱉甲黃耆各半兩右㕮咀每服三錢水一盞酒一分豬筒骨一莖炙焦分為四服桃栁枝各七寸杏仁五粒去皮尖槌碎煎至七分去滓溫服加烏梅半箇尤妙一方加當歸白芍藥華他方大靈治傳尸明月丹方雄黃木香各半兩天靈蓋炙一兩輕粉一分鱉甲醋炙一兩兔屎二兩右為末用法酒一大升大黃半兩為末熬膏入前藥為元如彈子大朱砂為衣傳尸勞肌瘦面黃嘔吐咳嗽不定先燒安息香令煙出吸之不嗽非傳尸也不可用此藥若煙入口咳不能禁止乃傳尸也宜用此藥五更初服勿令人知以童便共酒一盞化一元服如人行十里久必吐出蟲狀如燈心細長及寸或如爛瓜李又如蝦蟇狀各不同未效次日再服以應為度蘇沈良方治諸勞明月丹兔糞四十九枚碙砂如兔屎大四十九枚右細研生蜜元如梧桐子大以甘草半兩碎之水浸一宿取汁五更初下七元勿令病人知勞藥下後頻看若有蟲急打殺以桑火油煎使焦棄急水中三日不下更服須在月望前日服忌見喪服色衣婦人貓犬之類後服治勞補氣藥取差沈內翰云威愍孫元規藏此方數能活人江隂萬融病勞四體如焚垂困一夜夢人腹壅一月如大盤明爛不可正視逼人心骨皆寒已而悸寤俄頃扣關乃威愍使人遺之藥服之遂差問其名則明月丹也始悟向之所夢大體此藥最治熱勞又云傷寒煩躁骨熱皆能治療一方有鵬砂等分解勞生肌進食活血養心地黃煎元有人云甚妙華他方生地黃汁杏仁汁生薑汁藕汁各五升薄荷汁鵝梨汁各一升法酒二升沙蜜四升右慢火熬成膏入後藥北柴胡去蘆三兩木香人參茯苓山藥柏子仁去皮炒研逺志去心枳實去穰麩炒白术各一兩秦芁苦梗並去蘆各二兩麝香半兩研熟地黃洗焙酒蒸四兩右為末以前膏子和貟如梧桐子大食後甘草湯下二十元治骨蒸寒熱名醫録云睦州楊寺丞有女事鄭迪功女有骨蒸肉熱之病時發外寒寒過內熱附骨蒸盛之時四肢微瘦足趺腫者其病在五臟六腑之中衆醫不瘥因遇處州吳醫看曰請為治之只單用石膏散服之體微涼如故石膏散方見靈苑方真石膏不以多少研令極細右新汲水和服方寸匕取身無熱為度外臺祕要本草同青蒿散治男子婦人肢體倦疼虛勞寒熱靈苑方青蒿八九月間成實時採去枝梗以蒿用童子小便浸三日晒乾為末每服二錢烏梅一箇煎至七分溫服青蒿鱉甲煎元治骨蒸勞退熱解肌進食出博濟方九肋鱉甲一箇北柴胡二兩甘草杏仁桔梗當歸人參地骨皮赤芍藥各一兩胡黃連宣連各一分官桂木香各半兩麝香一字酥蜜各三兩右十四味同為細末用青蒿一斤童子小便五升好酒一升熬青蒿汁約二升已來摝去青蒿不用入酥蜜再熬成膏冷後入藥末搜和為元如梧桐子大每服十五元溫酒下米飲亦得日進三服如秋後合時更入桃栁枝七莖此藥甚妙五心煩熱附五心煩熱頰赤宜局方逍遙散秦芁散方見第六卷第一論逍遙散治血虛勞倦五心煩熱肢體疼痛頭目昏重心忪頰赤口燥咽乾發熱盜汗減食嗜卧及血熱相摶月水不調臍腹脹痛寒熱如瘧又療室女血弱隂虛榮衛不和痰嗽潮熱肌體羸瘦漸成骨蒸白茯苓白术當歸去蘆酒浸半日微炒白芍藥北柴胡去苗各一兩甘草炙兩半右㕮咀每服三錢水一盞煨生薑一塊切片薄荷三葉同煎至七分去滓熱服無時候枳殼散治婦人手足煩熱夜卧多汗肌肉黃瘁經候不調四肢煩倦心胸滿悶狀如勞氣枳殼去穰麩炒二兩半夏麴赤芍藥各一兩柴胡黃芩各一兩半右為細末每服二錢水一盞生薑一塊擘破棗二枚煎至八分去滓溫服候五心煩熱及身體壯熱潮熱退方續服婦人血風勞氣方論第三凡十四方夫婦人血風勞者由氣血虛損經候不調或外傷風邪或內挾宿冷致使隂陽不和經絡否澀腹中堅痛四肢酸疼月水或斷或來面色萎黃羸瘦又有因産後未滿百日不謹將護臟腑虛損百脈枯竭遂致勞損之疾也人參荆芥散治婦人血風勞氣身體疼痛頭昏目澀心忪煩倦寒熱盜汗頰赤口乾痰嗽胸滿精神不爽或月水不調臍腹㽱痛痃癖塊硬疼痛發歇或時嘔逆飲食不進或因産將理失節淹延瘦瘁乍起乍卧甚即著床荆芥穗人參桂心生乾地黃北柴胡鱉甲醋炙酸棗仁炒枳殼製羚羊角屑别為末白术各七錢半川芎當歸防風甘草各半兩右為粗末每服三錢水一盞半生薑三片煎至八分去滓熱服無時候日二服常服除一切風虛勞冷宿疾孕婦休服鱉甲元治婦人血風勞氣四肢羸瘦疼痛經脈不利飲食無味漸加虛困鱉甲紫苑桂心川芎防風川牛膝當歸秦芁人參桃仁琥珀各一兩麝香一分黃耆赤芍藥虻蟲製水蛭製鬼箭羽白术羌活各三分熟乾地黃兩半右為細末煉蜜元如梧桐子大食前溫酒吞下三十元琥珀元治血風虛勞上熱下冷或發動即心中煩燥困乏無力不美飲食醋心口瘡月水不調肌肉黃瘁腹痛腸鳴或有氣塊攻衝或時作寒熱頭旋痰逆手足麻痺大宜常服出傳濟方琥珀當歸木香川芎防風檳榔各四分三稜炮乾薑炮桂心各五分吳白术洗柴胡人參各二分青皮吳茱萸洗泡炒黑全蝎炒附子炮草豆䓻赤芍藥柏葉白芷各三分桃仁去皮尖炒敗龜醋炙鱉甲各六分天麻三分右為細末煉蜜元如梧桐子大每日空心酒下二十元午前近晚更進一服如覺暖近晚不須服如腹內塊積攻築於鱉甲桃仁檳榔三稜各加一倍為妙忌生冷蔥莧菜毒魚等物香甲散治婦人血氣虛勞四肢少力肌肉黃瘁多困減食遍身痠疼真邪相擊心腹撮疼木香乾薑各三分鱉甲醋炙二兩牡丹皮赤芍藥橘紅桂心人參茯苓熟地黃秦芁柴胡白术炒當歸炒附子炮去皮各一兩甘草半兩右為粗末每服二錢水一盞生薑三片棗二枚煎至七分去滓稍熱服如煩渴心躁入烏梅一兩同杵為末地黃煎治婦人血風勞心忪發熱不退出經驗方生乾地黃熟乾地黃右二味等分為細末用生薑自然汁入水相和打糊為元如梧桐子大每服三十元用地黃湯下或只茶酒醋湯下亦可食後日三服覺臟腑虛冷早間先服八味員一服不可謂地黃性冷沮洳壞脾大槩隂虛則發熱蓋地黃大能補隂精血也荆芥散治血風諸般疾産後並宜服食久服諸疾除去荆芥雀腦芎各三兩當歸人參各半兩桂心牡丹皮羌活防風苦梗大腹子甘草蒲黃白茯苓枳殼厚朴半夏杏仁欵冬花各三分附子炮乾地黃鱉甲白芍藥北柴胡黃耆各一兩乾薑木香各半分沉香一分右為細末每服二錢薑三片棗一枚水一盞煎至七分溫服荆芥煮散治婦人血海虛冷手足煩疼頰赤口乾背甲勞倦寒熱往來咳嗽痰涎飲食進退血經不調多驚盜汗胸膈不快但是風勞氣冷並皆治之荆芥穗四兩比柴胡秦芁白芷黃耆各二兩當歸莪荗川芎麥門冬白茯苓人參白芍藥沉香海桐皮枳殼熟地黃甘草酸棗仁木香檳榔各一兩鱉甲製白豆䓻桂心苦梗各二兩右為細末每服二錢生薑三片烏梅一箇煎至七分無時溫服如極虛去檳榔每日兩服臨卧服尤佳忌生冷動風甜物腹有顆塊服之便消如聖散治婦人所稟血氣不足不耐寒暑易冒疾傷月水不調久而心虛狀若心勞四肢易倦筋骨少力盜汗易驚或時不寧五心煩熱肌膚不長間作頭昏飲食無味胸膈不利或産前産後受病並可服之北柴胡白茯苓甘草熟地黃人參當歸各一兩鱉甲胡黃連沉香知母各半兩桑寄生乾葛各三分右為細末每服二錢水一盞烏梅一箇棗二枚麥門冬數粒煎至八分無時候乞力伽散治血虛肌熱又治小兒脾虛蒸熱羸瘦不能飲食白术白茯苓白芍藥各一兩甘草半兩右為細末薑棗煎二錢服油煎散治血虛寒熱四肢酸倦無力瘦瘁不進飲食日三服川烏海桐皮地骨皮五加皮桂心牡丹皮陳橘皮白芍藥川芎當歸烏藥白芷莪茂等分右為末每服二錢水二盞入生麻油三四點煎至七分溫服無時候大效油煎散治血風勞氣攻疰四肢腰背疼痛嘔逆醋心不思飲食日漸羸瘦面色痿黃手足麻痺血海冷敗服此神效五加皮川烏炮芍藥海桐皮牡丹皮各一兩桂心乾薑川芎各半兩右為細末每服二錢水一盞油浸錢一文同煎至六分溫服常服以油浸二錢煎藥時不可攪喫藥時不可吹局方亦有油煎散方見和劑四白散子亦妙見四卷第九論治血風勞方牡丹皮地骨皮防風甘草黑豆白芷白芍藥各一兩荆芥穗二兩川芎一分右為細末每服二錢水一盞薑三片棗一箇蔥白一寸煎至八分溫服無時候香甲散治熱病後虛勞或四肢倦怠腳手疼痛飲食無味肌膚黃瘦或熱瘧盜汗頭暈虛煩此藥久服駐顔其妙不可具述鱉甲三兩醋浸去裙炙黃又入醋蘸炙七次當歸木香人參羌活川芎沉香肉豆䓻酸棗仁附子檳榔大腹子各半兩北柴胡兩半厚朴川牛膝白茯苓秦芁各兩一桂心半兩右㕮咀每服五錢水一盞生薑三片烏梅一箇煎至八分去滓溫服日三服空心忌生冷麵食雞肉鮓醬之類馬鞭草散治血風攻透肢體疼痛或覺瘙癢或覺痺麻作寒作熱飲食減味並皆治之已上出專治婦人方馬鞭草去粗梗荆芥穗北柴胡烏梅肉各二兩枳殼白术羌活白芍藥各一兩秦芁天台烏藥麻黃各兩半木香半兩當歸川烏炮甘草各一兩右為細末每服二錢水一盞生薑二片棗一枚蔥白二寸煎至七分日午臨卧溫服常服無忌有孕莫服婦人風虛勞冷方論第四凡二方夫婦人風虛勞冷者是人體虛勞而受於冷也夫人將攝順理則血氣調和風寒暑濕不能為害若勞傷氣血便至虛損則風冷乘虛而干之或客於經絡或入於腹內其經絡得於冷則氣血凝滯不能自溫於肌膚也腹內得於風冷則脾胃氣弱不能消於飲食也隨其所傷變成疾病若大腸虛者則變下利若風冷入於子臟則令臟冷致令無子若摶於血則澀壅亦令經水不利斷絶不通也澤蘭散治婦人風虛勞冷氣攻心腹疼痛肢節拘急體瘦無力經候不調飲食減少牡丹皮赤芍藥柏子仁續斷各半兩麝香一分澤蘭葉二兩當歸延胡索桂心附子炮川牛膝川芎桃仁乾漆炒琥珀沒藥木香各三分右十七味為細末每服二錢溫酒調下紫石英圓治婦人風虛勞冷經候不調四肢羸弱不能飲食紫石英熟乾地黃白石英各二兩續斷白芍藥桂心木香當歸白术乾薑白薇各半兩川牛膝川芎北五味子人參各三分椒紅炒附子黃耆各一兩右為末煉蜜為元如梧桐子大每服三十元溫酒吞下空心服婦人冷勞方論第五凡七方夫婦人冷勞者由血氣不足表裏俱虛臟腑久挾宿冷致令飲食不消腹內積聚臍下冷痛月候不調骨節痠痛手足無力肌膚羸瘦面色痿黃故曰冷勞也桃仁散治婦人冷勞氣滯經脈不通腹脅妨悶四肢羸瘦不思飲食木香訶子白薑桃仁人參各半兩陳皮琥珀桂心各一兩赤芍藥延胡索赤茯苓川牛膝當歸白术各三分右㕮咀每服四錢水一盞薑三片煎至七分去滓空心溫服木香元治婦人冷勞經脈不調臟腑氣滯四肢疼痛飲食無味漸加羸瘦木香琥珀吳茱茰泡當歸牡丹皮赤芍藥三稜附子炮延胡索川芎各三分乾薑人參桂心各半兩北柴胡白术鱉甲醋煮去裙炙厚朴熟地黃陳橘皮各一兩右為末煉蜜元如梧桐子大每服三十元空心溫酒下熟乾地黃元治婦人冷勞虛損肌體消瘦顔色痿黃四肢無力月候不調少思飲食乾熟地黃鱉甲陳皮各一兩北五味子當歸川芎桂心各半兩川牛膝人參白芍藥白术附子白茯苓黃耆各三分甘草一分右為細末煉蜜元如梧桐子大空心溫酒下三十元碙砂煎元治婦人冷勞心腹積聚腹脅疼痛四肢羸瘦不食鱉甲醋炙桃仁去皮尖麩炒木香五靈脂去砂石炒當歸各一兩碙砂二兩醋一升熬成膏右為細末用碙砂膏為元如梧桐子大空心溫酒下二十元煮肝散治婦人冷勞脾胃虛乏大腸轉泄水榖不化四肢羸瘦口內生瘡不思飲食漸加無力宜服此藥北柴胡縮砂仁蒔蘿蓽撥各三分白术白芷胡椒白薑陳皮山茵蔯人參蕪荑仁木香紫苑白芍藥北細辛桂心各半兩右為細末以獖豬肝一具去脂膜切如栁葉片以新汲水洗過入蔥白三寸細切入藥末半兩於銚內以新水二大盞入鹽醋少許以瓷碗合煮令水盡空心以意食之喫粥飲下食後良久飲暖酒一盞為妙晚食前再服亦佳煮肝散治婦人冷勞面色痿黃不多思食或時腹痛四肢少力積漸羸瘦白芍藥川芎苦梗厚朴桂心各三分陳皮一兩半白薑當歸荆芥穗蒔蘿胡椒蕪荑仁藁本柴胡紫苑各半兩右為細末每服半兩以獖豬肝一具用鹽醋蔥白各少許相和如尋常煮熟空心任意食之然後飲溫酒二盞尤佳大香甲元散治婦人血臟風虛冷氣肌肉黃瘦飲食進退經候不調心腹多脹漸變如勞補血海調氣鱉甲醋炙一兩沉香柴胡人參川芎羌活當歸附子炮去皮木香安息香桔梗茯苓藿香葉陳橘皮牡丹皮三稜厚朴薑汁炙桂心桃仁去皮尖炒牛膝去苗各半兩檳榔和皮大腹子各一分右為細末每服二錢水一盞生薑烏梅各少許煎至八分溫服餘一半更加乾漆炒一分阿魏半分赤芍藥一分同為末煉蜜元如梧桐子大空心煎烏梅地黃湯下二三十元與散子相間服博濟方婦人大全良方卷五
