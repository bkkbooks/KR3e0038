body:
  text: 婦人大全良方卷二宋陳自明撰衆疾門經脉不調衆疾生焉故以次之極一方總論第一夫天地造端於夫婦乾坤配合於隂陽雖清濁動靜之不同而成象效法之有類原兹婦人之病與男子不同者亦有數焉古方以婦人病比男子十倍難治不亦言之深乎但三十六病産蓐一門男子無之其餘外傷風暑寒濕內積喜怒憂思飲食房勞虛實寒熱悉與丈夫一同也依源治療可得而知之産寶方論第二古書治婦人别著方論者以其胎妊生産崩傷之異况婦人之病比之男子十倍難療蓋女子嗜欲多於丈夫感病倍於男子加之慈戀愛憎嫉妬憂恚染著堅牢情不自抑所以為病根深治之難差况懷胎妊娠而挾病也不特避其毒藥仍須審其虛實冷熱而調治之無使妄投湯劑以致夭枉博濟方論第三夫人將攝順理則血氣調和風寒暑濕不能為害若勞傷血氣則風冷乘虛而干之或作之於經絡或循入於腹中內受風邪脾胃虛弱故不能消於飲食也食既不充榮衛凝澀肌膚黃燥面不光澤若大腸氣虛則變為下利若流入關元致絶子嗣隨其所傷而變成疾醫經曰凡婦人三十六種病皆由子臟冷熱勞損而挾帶下起於胞內也是故衝任之脉為十二經之㑹海婦人之病皆見手少隂太陽之經而候之冦宗奭論第四治婦人雖有别科然亦有不能盡聖人之法者今豪足之家居奧室之中處帷幔之內復以帛幪手臂既不能行望色之神又不能殫切脉之巧四者有二闕焉黃帝有言曰凡治病察其形氣色澤形氣相得謂之可治色澤已浮謂之易已形氣相失謂之難治色夭不澤謂之難已又曰診病之道觀人勇怯骨肉皮膚能知其情以為診法若患人脉病不相應既不得見其形醫人止據脉供藥其可得乎如此言之烏能盡其術也此醫家之通患世不能革醫者不免盡理質問病家見所問繁遂謂醫業不精往往得藥不肯服似此甚多扁鵲見齊侯之色尚不肯信况其不得見者乎嗚呼可謂難也已通用方序論第五夫通用方者蓋産前産後皆可用也或一方而治數十證不可入於專門皆是名賢所處世之常用有效之方雖曰通用亦不可刻舟求劒按圖索驥而膠柱者也加减四物湯治婦人經病或先或後或多或少疼痛不一腰足腹中痛或崩中漏下或半産惡露多或停留不出妊娠腹痛下血胎不安産後塊不散或亡血過多或惡露不下服之如神張聲道云此方治婦人百疾只是四物湯加茱茰煎服若陽臟少使茱茰若隂臟多使茱茰吳興周端仁郎中頃赴省試照矚一鄰案出場云某本醫家凡婦人百病只是四物湯加茱茰無不效者謹以此為報徐明仲方加香附子當歸白芍藥川芎陸氏云川芎减半生乾地黃洗焙養生必用方熟者和劑亦然本草云男子宜熟者女子宜生者合用生者為是右等分為粗末每服四錢水一盞半煎至八分去滓取六分清者帶熱服食前若平常血氣不調及常服只用本方日二三服治經血凝滯腹內血氣作疼加莪茂官桂等分用之王碩膚云熟地黃滯血安能止痛不若用五味子代之如因産後欲推陳致新補血海治諸疾加生薑煎若胎動不安下血每服加艾葉五七片更加葱白阿膠末減四味之半當歸用小半如疾勢甚者以四味各半兩細銼以水四盞熟艾一塊如雞子大阿膠五七片煎至二盞半去滓分作四服一日令盡一方有粉草乾薑黃耆日二三服至二臘以一七日為一臘以前産後每日可一二服如氣虛弱血海不調服一月不妨如産後被驚氣滯種種積滯敗血一月內惡物微少敗血作病或脹或疼胸膈脹悶或發寒熱四肢疼痛加延胡索沒藥香白芷與四物等分為細末淡醋湯或童子小便酒調下如血風於産後乘虛發作或産後傷風頭痛發熱百骨節痛加荆芥穗天麻香附子石膏藿香各一分四物料共一兩中加之每服三錢水一盞煎七分服如虛熱心煩與血相搏口舌乾渴欲飲水者加栝樓根一兩麥門冬去心三分如腹刺痛惡物不下加當歸芍藥一分如血崩不止加熟地黃蒲黃各一兩嘔逆加白术人參各半兩如寒熱往來加炮了乾薑牡丹皮各一分因熱生風加川芎一分柴胡半兩腹脹加厚朴枳實各一分身熱脉數頭昏項强加柴胡黃芩各半兩如臟腑滑泄加桂心附子炮熟各一分若虛煩不睡加竹葉人參各一分煩躁引飲頭痛大渴加知母石膏各半兩若水停心下微吐逆加术猪苓防已各三分同煎若平常些少虛眩肢體瘦倦月信不調只用生薑薄荷如常煎服此是婦人常服之藥蓋味寡而性緩效遲而功深一方治婦人血虛心腹㽲痛不可忍者去地黃加乾薑名四神湯治老人風祕加青皮等分煎服一方治小便澀大便祕加大黃桃仁去皮尖炒黃減半煎一方治血痢不止加阿膠艾葉煎陳氏方治痢疾腹痛難忍以此名六物湯一方治婦人腹痛作聲經脉不快加熟地黃一倍添桂心半倍煎治瘡疾加荆芥酒煎常服一方添柴胡名五神湯柴胡大能補虛退虛熱一方以四物湯共四兩為細末煉蜜為圓如梧桐子大空心米飲下三四十圓以療年髙婦人白帶又良驗也請詳用之一方四物湯共四兩加甘草半兩細末煉蜜為圓每兩作八圓酒醋共半盞溫湯同化調停下名當歸煎去敗血生好血如人行五里再進一圓無時候用生地黃為正此藥不知起於何代或云始自魏華他按巢氏云他之術精微方類單省傳稱他術針灸不過數處千金方云自三代以來醫方論藥未有如此詳偹者其間有漢普名公諸方今産寶方乃朱梁時節度巡官咱膺所撰其中有四物散國朝太平興國中修入聖惠方者數方自後醫者易散為湯雖無傑特之功但善用者若馭良馬以意驅䇿之則隨意無所不至自可珍也自皇朝以來名醫於此四物中增損品味隨意虛實寒燠無不得其效者然亦非止婦人之疾可用而已懷娠産前後加减良方川芎洗當歸桂心不見火白芍藥洗右四味各為細末取净一兩各隨病證加減用産前初覺胎動川芎芍藥各半錢米飲下臨産腹痛甚川芎芍藥當歸各半錢桂末一錢溫酒下扶産婦運行産後惡露未快川芎當歸各半錢童子小便調下仍時時打醋炭令香不絶則血脉自收安樂無病切不可妄投藥恐逐血過多則心虛氣劣三日內只服當歸川芎末各一錢童便調下日三服三日後只服四順理中圓空心童子小便吞下七日內補虛當歸川芎末各一錢童子小便或米飲調下七日外方可服補藥補得太早則留住惡血才平善四味各半錢童便調下産後頭昏目暈川芎芍藥當歸末各半錢童子小便調下未滿月已滿月四味各半錢水一盞煎至八分溫服腹痛當歸末一錢桂心末半錢童子小便調下心胸煩悶當歸芍藥各一錢童子小便調下惡露過多桂心芍藥當歸各一錢童子小便調下大便冷用理中圓水一盞煎八分溫服佛手散治産前産後腹痛體熱頭疼及諸疾才産了未進别物即先服此藥能除諸疾逐敗血生新血川芎二兩川當歸三兩右為細末每服二錢水一盞酒二分煎七分溫服一方為粗末每服四錢水七分酒三分同煎至七分熱服將産前先安排此藥將兩服藥末煎之産了速進之三日內日二服三日外日一服一方名芎歸湯只是此二味等分吺咀水煎專治失血傷胎去血産後去血崩中去血金瘡去血拔牙去血不止及一切去血過多心煩眩暈悶絶不省人事頭重目暗舉頭欲倒悉能治之若産後眩暈宜加芍藥服之一名桂香散治産後腹疼不可忍者加桂心等分酒與童子小便合煎服之立效一名當歸湯治妊娠子死或未死胎動不安每服用酒水合煎連進數服胎若已死服之便下若未死其胎即安此經纍效萬不失一一名琥珀散臨月服之則縮胎易産兼治産後諸疾一名羊肉湯治虛損羸乏腹中㽲痛往來寒熱吸吸少氣不能支持頭眩自汗腹內拘急每服用精羊肉一兩薑十片水二盞煎至六分溫服一名君臣散治婦人室女心腹㽲痛經脉不調用水煎服若妊婦胎氣不安産後諸疾加酒煎服一名芎當散治婦人血氣上喘下腫二味等分為細末每服二錢空心煎艾湯調下又治産後損身血衝心及腹脹氣絶者神驗難生倒橫子死腹中先用黑豆一大合炒熟水一盞入童子小便一盞藥末四錢煎至一盞以上分為二服未效再作産後惡血注心迷悶喘急腹痛依前用黑豆加生薑自然汁半合煎服又此藥兼治臟毒每服一錢半入炒槐花末半錢水一盞煎至六分無時候服三日取下血塊即愈如産後頭痛加荆芥煎如吐血亦宜服論丹參散主治出明理方論四物湯婦人多用者以其不問産前産後經水多少皆可通用惟丹參散一味其主治頗相類何者以其能破宿血補新血安生胎落死胎止崩中帶下調經脉大類當歸地黃芍藥川芎也丹參散治婦人經脉不調或前或後或多或少産前胎不安産後惡血不下並治之兼治冷熱勞暖脊痛骨節煩疼丹參不以多少去土切右為細末每服二錢溫酒調下經脉不調食前服冷熱勞無時候服勝金圓一方名不換金圓治婦人諸虛不足心腹疼痛一名勝金丹有沉香治婦人久虛無子産前産後一切病患兼療男子下虛無力此藥能安胎催生妊娠臨月服五七圓産時減痛婦人無子是子宫冷如服二十圓男女自至又治積年血風腳手麻痺半身不遂赤白帶下血如山崩及治産後腹中結痛吐逆心痛子死腹中繞臍痛氣滿煩悶失蓋汗不出月水不通四肢浮腫無力血勞虛勞小便不禁中風不語口禁産後痢疾消渴眼前見鬼迷運敗血上衝寒熱頭痛面色痿黃淋澀諸疾血下無度血痢不止飲食無味産後傷寒虛煩勞悶産後血癖産後羸瘦凡婦人衆疾不論年月日深並皆治之白芍藥藁本石脂赤白皆可川芎不見火牡丹皮當歸白茯苓人參白薇白芷桂心延胡索白术沒藥甘草炙藥江西安撫司沒甘草減半右十五味等分為細末煉蜜為圓如彈子大每服一圓溫酒化下初産了並用熱醋湯下空心食前此方係王承宣臺祖傳渠家凡婦人懷身便服此藥甚神妙常服尤好係在京師於能家傳到金叉煎專治婦人諸疾産前産後風虛痼冷手足􅂒痺豆淋酒化下血風頭痛産後中風荆芥酒化下産前産後痰涎咳嗽桑白皮湯下經脉不調或前或後或多或少血氣攻刺腰脅重痛溫酒化下經脉不通産後血喘蘇木人參煎湯化下血崩不止赤白帶下側柏燒灰調酒下妊娠將理失宜或因驚動痛極妨悶漏胎下血膠艾煎湯化下臨産艱難乳香研酒化下子死腹中胎衣不下用朴消三錢重研細童便和酒化下産後勞倦傷敗血氣如瘧寒熱遍身疼痛喘嗽盜汗地黃烏梅煎湯化下産後敗血浮腫薑汁少許和酒半盞化下産前服之則安胎臨産亦易産産後則逐去惡血不生諸疾用童便和酒化下常服活血駐顔大暖血海升降隂陽滋養榮衛或子宫久冷多病少子能久服之見效立致忌生冷油膩魚腥猪母白猪一切毒物當歸白芍藥川芎石斛酒炒香附子炒糯米各二兩炒降真香細銼熟地黃各四兩秦芁貝母去心羌活桂心粉草乾薑炮北細辛牡丹皮大豆卷炒茴香炒枳殼去穰麩炒延胡索白芷各一兩人參木香石膏煆沉香黃芩各半兩川椒三分交加修製八兩右為細末煉蜜為圓每兩作七圓依前服餌常服溫酒化下檀峯曉公方交加散治産前後百病治婦人榮衛不通經脉不調腹中撮痛氣多血少結聚為瘕産後中風尤妙生地黃一斤研取自然汁生薑十二兩研取自然汁右將地黃汁炒生薑滓薑汁炒地黃滓各稍乾焙為細末每服三錢溫酒調下尋常腹痛亦宜服産後尤不可缺交加散治榮衛不和月經湛濁大能滋養血絡逐散惡血臍腹撮痛腰腿重墜血經諸疾並皆治之生薑十二兩生地黃一斤如二味製度前法白芍藥延胡索醋紙裹煨令熟用布揉去皮當歸桂心各一兩紅花炒無惡血不用沒藥别研各半兩蒲黃一兩隔紙炒右為細末每服二錢溫酒調下如月經不依常蘇木煎酒調下若腰疼用糖毬子煎酒調下無時候玉露通真圓治婦人諸疾出經驗婦人方半夏薑汁製炒人參各半兩食茱茰醋炒製厚朴各兩一分澤蘭葉二兩半甘草蟬蛻炒白芍藥石膏蠶蛻炒用如無以蠶繭紙三張代白术當歸羌活熟地黃洗焙白茯苓各二兩防風乾薑柏子仁蒼术白薇木香黃耆川牛膝附子白蕪荑與蟬蛻同炒然此方無蟬蛻想馬鳴蛻是也川芎藁本各一兩川椒苦梗各三兩白芷一兩半右為細末煉蜜為圓每九錢重分作十圓切記煉蜜無令太過及生男子婦人諸虛不足狀如勞疾黃耆煎酒下血氣痛燒稱鎚淬酒下産前安胎用醋湯下産後諸疾用酒或鹽湯下産前産後㵼用米飲送下男子婦人牙疼用半圓揩疼處良久鹽湯咽下産前産後血悶用童子小便送下經脉不調用紅花煎酒送下産後風毒生瘡疥荆芥茶下冷痰翻胃醋心乾嚼下婦人子宫久冷崩漏赤白帶下用童子小便米醋好酒一處暖熱下補中圓常服川芎白芍藥黃耆當歸人參陳皮各半兩白术地黃各一兩右為末煉蜜圓如梧子大每服五七十圓溫水下二聖散産前服之則安胎産後惡血不盡胎衣不下方川芎羌活二味等分右為細末每服二大錢水七分盞酒少許煎七沸溫服二聖大寶琥珀散生地黃一斤生薑一斤二味修製如前交加散當歸川芎牡丹皮芍藥莪荗蒲黃香白芷羌活八味各炒桂心不見火熟地黃炒右十味各一兩同前二味為細末於瓷合內收之湯使于後婦人冷氣痛并血海不調膈氣炒薑酒下二錢産後胞衣不下暖酒調下二錢産婦臨月日進三服則滑胎易産溫酒調二錢産後血犯心眼見鬼神用童便半􅊦酒半盞同煎調二錢婦人久服則顔色紅白無血來相攻一生無子者久服則有孕此藥治療婦人百病空心日午食前日二服産後百病並暖酒調下朱翰林白术煎治婦人胎前産後血氣諸疾出眀理方論木香半分炮三稜莪荗白术各一兩枳殼去穰麩炒黃白茯苓當歸延胡索人參熟地黃洗牡丹皮粉草各半兩右為末米糊圓如梧桐子大每服十五圓至二十圓常服溫酒吞下湯使于后胎前渾身并腳手痛炒薑酒下胎前腹內疼并安胎紫草煎酒下胎前嘔逆吐食糯米飲下胎前飲食不得渾身倦怠豆淋酒下胎前渾身發熱甘草湯下胎前咳嗽煨薑鹽湯下胎前頭痛煨葱茶下胎前産後㵼紫蘇薑酒下催生胎衣不下嚼葱白三寸暖酒下産後赤白痢乾薑甘草湯下産後下血不止燒紗帽灰一錢調酒下無燒漆亦可産後渾身虛腫陳皮去白焙乾浸酒下頭疼薄荷茶下常服飯飲下赤白帶下燒棕櫚灰三錢調酒下久年血氣成塊築心痛溫酒下炒薑酒下及良薑浸酒下皆可婦人室女經脉不通煎紅花蘇木酒下經脉不調或前或後或多或少煎當歸酒下大小便祕結燈心煎湯下乳汁不行苦虀煮猪蹄羮下産後腰疼煎芍藥酒下沉香琥珀煎益榮衛滋氣血經脉不調心忪倦乏腰膝疼痛赤白帶下五心煩熱靣無顔色血海久冷胎孕不固增寒壯熱婦人諸疾並能治之沉香琥珀别研附子炮川芎肉桂五味子石斛去根切酒蒸炒辰砂研阿膠各半兩沒藥研續斷蓯蓉酒洗人參當歸牛膝各三分木香地黃各一兩右為末蜜圓如梧桐子大每服四十圓空心酒吞下日午再服滋血湯滋養榮血補婦人諸虛治血海久冷二方並出胡氏方當歸川芎芍藥人參麥門冬牡丹皮阿膠各二兩琥珀三分别研酸棗仁炒粉草桂心各一兩半夏麯一兩半右為粗末每服三大錢水一盞薑三片煎七分去滓溫服一日三服烏雞煎圓治婦人百病出三因方吳茱茰良薑白薑當歸芍藥延胡索炒椒炒陳皮青皮劉寄奴生地黃莪荗川芎各一兩荷葉灰四兩北艾二兩破故紙炒一兩右為細末醋煮麵糊元如梧子大每服四五十圓月水不通紅花蘇木酒下白帶牡蠣粉酒下子宫久冷白茯苓煎湯下赤帶建茶清下血崩豆淋酒調綿灰下胎不安蜜和酒下腸風陳米飲調百草霜下心疼菖蒲煎酒下漏胎下血烏梅溫酒下耳聾臘茶煎湯下胎死不動斑猫三箇煎酒下腰腳痛當歸酒下胞衣不下藝臺研水下頭風薄荷茶下血風眼黑豆粉草湯下生瘡生地黃湯下身體疼痛黃耆末調酒下四肢浮腫麝香湯下咳嗽喘滿桑白皮湯下腹痛芍藥末調酒下産前産後白痢乾薑湯下赤者甘草湯雜者二宜湯常服溫酒醋湯任下並空心食前服婦人大全良方卷二
