body:
  text: 婦人大全良方卷二十二宋陳自明撰産後傷寒方論第一凡産後發熱頭痛身疼不可便作感冒治之此等疾證多是血虚或敗血作梗血虚者隂虚也隂虚者陽必湊之故發熱且以平和之劑與服必效如玉露散方見十八卷第三論或四物湯以生地黄易熟地黄加北柴胡等分煎服或人參當歸散秦芁鼈甲散人參輕骨散人參百解散逍遙散皆可選用常見不學無聞纔見産後發熱不退便以為熱入血室便以小柴胡湯竟不可救者亦有用竹葉石膏湯而死者亦有見前失而投以温劑其熱愈熾者諸如此等非不知罪福皆是不觀古典杜撰臆度枉傷人命殊不知此等疾狀是産後去血過多而隂虚發熱亦有寒極生熱但以上件之藥以脈證選用無不獲安若是隂陽不和乍寒乍熱宜增損四物湯如敗血不散者宜奪命丹大調經散五積散加醋煎却效詳見二十卷第三論王子亨云婦人新産去血過多津液燥少隂陽俱虚大凡有疾如中風傷寒時氣之類雖當發汗如麻黄謹不可用取汗母令過多以意斟酌夫人觸冒寒氣而為病者謂之傷寒産婦血氣俱虚日月未滿而起早勞動為寒所傷則淅淅惡寒翕翕發熱頭項肩背骨節皆痛至七八日乃差也婦人産後亡血汗多故令鬱冒其脈微弱不能食大便反堅但頭汗出所以然者血虚而厥厥而必冒冒家欲解必大汗出以血虚下厥孤陽上出故但頭汗出所以為産婦無汗出者亡隂血陽氣獨盛故當汗出隂陽乃復所以便堅者嘔不能食也方可用小柴胡湯加生地黄主之秦芁鼈甲散人參輕骨散神仙百解散並見和劑局方人參當歸散治産後去血過多血虚則隂虚隂虚生内熱内熱曰煩其證心胸煩悶吸吸短氣頭痛悶亂骨節疼痛晡時輒甚與大病虚煩相類急宜治之人參當歸生乾地黄桂心麥門冬去心各一兩白芍藥二兩右㕮咀每服四大錢水二盞先將粳米一合淡竹葉十片煎至一琖去米竹葉入藥并棗二枚煎至七分去滓温服虚甚者用熟地黄三物黄芩湯治婦人草蓐中傷風四肢苦煩熱頭疼與小柴胡湯若頭不疼但煩者黄芩半兩苦參一兩生乾地黄二兩右㕮咀每服四錢水一琖煎至七分去滓温服增損柴胡湯治婦人産後虚羸發寒熱飲食少腹脹等疾宜柴胡三錢人參芍藥半夏炮甘草橘紅川芎各三分右㕮咀每服四錢水一琖薑三片棗一枚煎至七分去滓温服竹葉防風湯治婦人産後傷風發熱面赤喘而頭痛宜服淡竹葉半把防風人參桂枝苦梗甘草各半兩葛根一兩半右㕮咀每服三錢水一琖薑三片棗一枚煎至七分去滓温服使汗出頸項强用附子炮去皮臍剉如豆大抄一錢同煎嘔者加半夏煎服陽旦湯治婦人産後傷風十數日不解頭微痛惡寒時時有熱心下堅乾嘔汗出宜桂枝芍藥各三兩甘草炙黄芩各二兩右㕮咀每服三錢水一琖薑三片棗一枚煎至七分去滓温服無時候自汗者去桂加炮熟附子一枚渇者去桂加栝樓根三兩下痢者去芍藥加乾薑三兩心下悸者去芍藥加茯苓四兩虚勞裏急者正陽旦湯主之煎時入膠飴為佳若脈浮𦂳無汗發熱者莫與也治産後惡露方下忽而㫁絶晝日明了暮則譫語寒熱往来如見鬼狀此由為熱入血室不即治之諸變不測宜服柴胡地黄湯方見第六卷十五論中四物湯加北柴胡芍藥湯千金翼療産後虚熱頭痛身體發熱兼治腹内拘急疼痛桂心三兩牡蠣白芍藥各五兩黄芩二兩千金翼云若通身發熱方加黄芩生乾地黄五兩右㕮咀每服五錢水一琖半煎至一琖去滓温服千金蜀漆湯産後療虚熱往来心胸煩滿骨節疼痛及頭痛壯熱日晡加甚又如瘧狀黄耆五兩生地黄一斤蜀漆葉桂心甘草黄芩各一兩知母芍藥各二兩右㕮咀每服五錢水一琖半煎至一琖去滓温服産後頭痛方論第二凡三方夫人頭者諸陽之㑹也凡産後五臓皆虚胃氣虧弱飲食不充穀氣尚乏則令虚熱陽氣不守上湊於頭陽實隂虚則令頭痛也又有産後敗血頭痛不可不知黒龍丹言之甚詳川芎散治産後頭痛真天台烏藥皮大川芎等分右為細末每服三錢秤鎚淬酒調服芎附散治産後敗血作梗頭痛諸藥不効者涂明仲先生傳大附子一枚釅醋一椀用火四畔炙透蘸醋令盡去皮臍川芎一兩並為細末每服二錢茶清調下一竒散治産後頭疼取當歸川芎為細末每服二錢水一琖煎七分温服産後咳嗽方論第三凡四方夫肺者主氣因産後血虚肺經一感微邪便成咳嗽或風或熱或寒或濕皆令人咳嗽也若産後喫鹽太早而咳嗽者難治産後血氣不通咳嗽者何答曰産後咳嗽多因食熱麪壅納或熱病或有氣塊發時充心痛氣急咳嗽四肢寒熱心悶口乾或時煩躁睡夢驚悸氣虚肢體無力宜服局方真黑神散五積散加棗煎服二母散治産後惡露上攻流入於肺經咳嗽宜服此藥如傷風痰嗽却以尋常傷風藥主治知母貝母白茯苓人參各半兩桃仁杏仁並生去皮尖各一分右為細末每服三錢水一琖半煎至八分無時温服如覺腹痛併服之立有神效集驗療産後感風傷寒咳嗽多痰唾粘産寳同甘草苦梗各六分欵冬花四分生麥門冬生地黄各十二分葱白一握豉二合舊方無葱白與豉右㕮咀每二升煮取八合去滓食後分二服經効療咳嗽多痰唾粘氣急前胡五味子紫苑貝母各六分桑白皮茯苓各八分淡竹葉二十片右㕮咀水二升煎取八合去滓食後分兩服療産後咳嗽氣喘百部根苦梗各六分桑白皮二十分乾百合赤茯苓各八分右㕮咀水二升煮取七合去滓食後分兩服産後喉中氣急喘促方論第四凡四方論曰産後喉中氣急喘促者何答曰榮者血也衞者氣也榮行脈中衞行脈外相隨上下謂之榮衞因産所下過多榮血暴竭衞氣無主獨聚肺中故令喘也此名孤陽絶隂為難治若惡露不快敗血停凝上熏於肺亦令喘急但服奪命丹方見十八卷第四論中血去喘自定評曰産後喘急固可畏若是敗血上熏於肺猶可責効奪命丹若感風寒或因憂怒飲食鹹冷等奪命丹未可均濟况孤陽絶隂乎若榮血暴絶宜大料煮芎藭湯亦自可救傷風寒宜旋覆花湯性理鬱發宜小調經散用桑白皮杏仁煎湯調下傷食宜服見現元五積散芎藭湯方見第二卷第五論又名佛手散旋覆花湯治産後傷風感寒暑濕咳嗽喘滿痰涎壅盛坐卧不寧旋覆花赤芍藥前胡半夏麯荆芥穂甘草茯苓五味子杏仁麻黄各等分右㕮咀每服四錢水一琖半薑五片棗一枚煎至七分去滓食前温服有汗者莫服小調經散方見本卷第十論五積散方見和劑見現元方見二十一卷第一論參蘇飲治婦人産後血入於肺面黑發喘欲死者胡氏人參一兩别為末蘇木二兩右以水兩碗煮取一碗以下去滓調參末隨時加減服神效不可言産後口鼻黒氣起及鼻衂方論第五凡二方論曰産後口鼻黒氣起及鼻衂者何答曰陽明者經脈之海起於鼻交頞中還出頰口交人中左之右右之左産後氣消血散榮衞不理散亂入於諸經却還不得故令口鼻黒起及變鼻衂此緣産後虚熱變生此證其疾不可治名胃絶肺敗此證不可治故不出方經驗方云遇有此疾急取緋線一條并産婦頂心髪兩條𦂳繫中指節上即止無藥可療亦厭禳之一端也海上方治産後鼻衂中風以荆芥為末童子小便調下二錢匕産後咳癔方論第六凡六方夫肺主於氣五臓六腑俱稟於氣産後則氣血傷臓腑皆損而風冷摶於氣氣則逆上而又脾虚聚冷胃中伏寒因食熱物冷熱氣相衝擊使氣厥而不順則咳癔也脾者主中焦為三焦之闗五臓之倉廩貯積水穀若隂陽氣虚使榮衞氣厥逆則致生斯病也經云吃噫者胃寒所生服藥無効者灸期門三壯必愈期門穴乃胃之大絡穴見六卷第十五論丁香散治産後心煩咳癔不止丁香白豆蔲仁各半兩伏龍肝一兩右為細末煎桃仁吴茱茰湯調下一錢如人行五里再服石蓮散治氣吃噫又治吐逆心怔目暈不思飲食出婦人經驗方石蓮肉炒兩半白茯苓一兩丁香半兩右為細末每服三錢米飲調下無時候産寳療産後咳逆三日不止欲死桂心半兩薑汁三合右同煎取二合以火先炙背摩令背熱時塗藥汁盡妙産後咳逆方乾柿一个右切碎以水一琖煎至六分熱呷又方古壁鏡窠三四个水一小琖煎至一半熱服並出産寳羌活散治欬逆出靈苑方羌活附子炮茴香炒各半兩木香白薑炮各一分右五味為末每服二錢水一琖鹽一捻煎一二十沸熱服一服止産後血崩方論第七凡八方論曰産後血崩者何答曰産卧傷耗經脈未得平復而勞役損動致血暴崩淋瀝不止或因酸鹹不節傷蠧榮衞氣血衰弱亦變崩中若小腹滿痛肝經已壊為難治急服固經元以止之固經元方艾葉赤石脂煅補骨脂木賊各半兩附子一个炮右為末陳米飲和員如梧桐子大食前温酒下二十員米飲亦可評曰血崩不是輕病况産後有此是謂重傷恐不止鹹酸不節而能致之多因驚憂恚怒臓氣不平或産後服㫁血藥早致惡血不消鬱滿作堅亦成崩中固經元自難責効不若大料煮芎藭湯加芍藥候定續次隨證諸藥治之為得芎藭湯加芍藥方芎藭當歸芍藥等分右㕮咀每服四錢水琖半煮取七分出滓無時熱服熟乾地黄散治産後崩中頭目旋運神思昏迷四肢煩亂不知人事熟乾地黄伏龍肝黄耆赤石脂各一兩阿膠甘草白术艾葉炒川芎人參各半兩當歸三分右㕮咀每服三錢薑三片煎至七分去滓温服白芍藥散治産後崩中下血淋瀝不絶黄痩虚損宜白芍藥牡蠣乾薑熟乾地黄桂心黄耆烏賊骨鹿角膠龍骨各一兩右為末食前温酒調下二錢又方熟地黄赤石脂各一兩鹿茸牡蠣當歸各半兩右為細末食前粥飲調二錢阿膠元治産後崩中下血不止虚羸無力阿膠赤石脂各一兩半續㫁川芎當歸甘草丹參各一兩龍骨鹿茸酥炙烏賊骨鼈甲炙各二兩右為細末煉蜜元如梧桐子大空心温酒下二三十元菖蒲酒治産後崩中不止下血菖蒲一兩半右細剉以酒二琖煮取一琖去滓分温三服食前瑞蓮散治産後惡血崩漏狀如泉水瑞蓮百枚燒存性棕櫚燒存性當歸桂心各一兩鯉魚鱗燒川芎各三分檳榔二枚右為細末每服三錢煨薑酒調下如未止更進一服或非時血崩無藥可治但進三服即止産後月水不調方論第八凡二方夫産後月水不調者由産傷動血氣虚損未復而風邪冷熱之氣客於經絡乍冷乍熱冷則血結熱則血消故令血或多或少或在月前或在月後故名不調也琥珀散治産後經脈不調四肢煩疼飲食全少日漸羸痩琥珀牛膝生乾地黄當歸各一兩桃仁赤芍藥各半兩右為粗末每服三錢水一琖薑三片煎至六分去滓温服薑黄元治産後虚乏不足胸心短氣腹内𦂳急腰背疼痛月水不調食少煩渇四肢無力薑黄當歸熟地黄牡丹皮厚朴桂心川芎續㫁桃仁白术各一兩赤芍藥木香各三分羚羊角屑一分右為細末煉蜜元如梧桐子大食前温酒下三十元産後月水不通方論第九無方論曰夫産傷動於血氣其後虚損未復而為風冷所傷血之為性得冷則凝結故風冷傷於經血結於胞絡之間故令月水不通也凡血結月水不通則血結成瘕水血相併復遇脾胃衰弱肌肉虚者則為水腫也但於第一卷第六七論中求方夫婦人衝任之脈為經絡之海皆起於胞内而手太陽小腸之經手少隂心之經也此二經上為乳汁下為月水若産後月水不通者盖新産之後勞傷氣血或去血過多乳汁通行自是不通闕或一嵗之内而月經不行此是常候即非病也何必通之諺云妳假是也若半嵗而行者或四五箇月便經行者皆是少壯血盛之人注受極易産乳必衆其子失乳必四肢尫羸肚大青筋頭大髪焦好啖泥土病名無辜若經血有餘者不可以藥止之若産後一二嵗月經不通而無疾苦何必服藥或勞傷氣血衝任脈虚氣血衰少而不能行者但服健脾胃資氣血之藥自然通行若以牛膝紅花蘇木乾漆䖟虫水蛭等藥以通之則為害滋大經水枯竭則無以滋養其能行乎初虞世所謂譬猶索萬金於乞丐之手雖捶楚並下而不可得也後之學者更宜詳審而療之自明補註産後四肢浮腫方論第十凡九方論曰産後四肢浮腫者何答曰産後敗血闕乘虚停積於五臓循經流入四肢留淫日深却還不得腐壊如水故令面黄四肢浮腫醫人不識便作水氣治之凡治水氣多用導水藥極虚人夫産後既虚又以藥虚之是謂重虚往往因致夭枉但服小調經散血行腫消則愈小調經散方沒藥琥珀桂心芍藥當歸各一錢細辛麝香各半錢右為細末每服半錢匕薑汁温酒各少許調停服評曰産後浮腫多端有自懐姙腫至産後不退者亦有産後失於將理外感寒暑風濕内作喜怒憂驚血與氣摶留滯經絡氣分血分不可不辨要當隨所因脈證治之宜得其情小調經散治血分固効但力淺難憑不若吴茱茰湯枳术湯奪魂散大調經散皆要藥也經云産後肌浮柑皮酒服加減吴茱茰湯治婦人臟氣本虚宿挾風冷胸膈滿痛腹脇絞刺嘔吐惡心飲食減少身面虚浮惡寒戰慄或泄不止少氣羸困及因生産臟氣暴虚邪冷内勝宿疾轉增吴茱茰一兩半苦梗乾薑甘草麥門冬防風半夏細辛當歸赤茯苓牡丹皮桂心各半兩右為粗末每服四錢水琖半煎至七分去滓食前熱服枳术湯治心腹堅大如盤邉如旋盤水飲所作名曰氣分枳實一兩半白术三兩右㕮咀每服四錢水一琖半煎至七分去滓温服中軟即當散也奪魂散治産後虚腫喘促利小便則愈生薑三兩取汁白麪三兩半夏七箇右以生薑汁捜麪裹半夏為七餅子炙焦熟為末水調一琖小便利為効大調經散最治産後腫滿喘急煩渇小便不利方見二十一卷第三論中又論曰夫産後勞傷血氣腠理虚則為風邪所乗邪摶於氣不得宣越故令虚腫輕浮是邪摶於氣氣腫也若皮膚如熟李狀則變為水腫氣腫者發汗即愈水腫者利小便差也漢防已散治産後風虛氣壅上攻頭面浮腫漢防已猪苓枳殻桑白皮各一兩商陸甘草各三分右為粗末每服四錢水琖半薑三片煎至七分去滓温服空心治産後遍身青腫疼痛産後血水疾出婦人經驗方乾漆大麥蘖等分右各為細末以新瓦罐子中鋪一重麥蘖一重乾漆如此填滿用鹽泥固濟火煅通赤放冷研為散但是産後諸疾熱酒調下二錢張氏方治産後血虚風腫水腫澤蘭葉防已等分右為末每服一一錢温酒調下不能飲者醋湯調亦可産後腹痛及瀉痢方論第十一凡七方論曰産後腹痛及瀉痢者何答曰産後腸胃虛怯寒邪易侵若未滿月欲冷當風乗虚襲留於肓膜散於腹脇故腹痛作陣或如錐刀所刺流入大腸水穀不化洞泄腸鳴或下赤白胠脇䐜脹或痛走不定急服調中湯立愈若醫者以為積滯取之禍不旋踵謹之謹之調中湯方髙良薑當歸桂心芍藥附子炮川芎各一兩甘草半兩右為粗末每服三錢匕水三琖煎至一琖去滓熱服評曰産後下痢非止一證當隨所因而調之既云飲冷當風何所不至寒熱風濕本属外因喜怒憂思還従自性况勞逸飢飽皆能致病若其洞泄可服調中湯赤白滯下非此能愈各隨門類别有正方今録桃膠散白頭翁湯以備用餘従滯下門選之桃膠散治産後痢下赤白裏急後重㽲刺疼痛等證桃膠瓦上焙乾沉香蒲黄隔紙炒等分右為末每服二錢食前陳米飲調下白頭翁湯治産後下痢虚極白頭翁甘草阿膠各二兩黄連蘖皮秦皮各三兩右㕮咀每服四錢水琖半煎至七分去滓空心服調中湯張氏方的竒散治産後泄瀉惡露不行此餘血滲入大腸為瀉分過則愈雖洞泄不禁下青黒色物亦驗因食傷動用荆芥大者四五穂於琖内然火燒成灰不得犯油火入麝香少許研沸湯一兩呷調下此藥雖微能愈大病宜勿忽之産後諸痢方煮薤白食之又方羊腎脂炒薤白空腹食尤佳又方炙肥羊肉食之産後赤白痢疾及虚羸氣痢方論第十二凡三十一方論曰産後痢疾者由産勞傷臓腑不足日月未滿虚乏未復或勞動太早或誤食生冷若行起太早則外傷風冷乗虚入於腸胃若誤食生冷難化之物傷於脾胃皆令洞泄水瀉甚者變為痢也若血滲入大腸則為血痢難治泄謂之産子痢是也得冷則白或如魚腦得熱則赤黄或為驟血若冷熱相摶則下痢赤白或膿血相雜若下痢青色則極冷也若飲食不進便利無常日夜無度産後本虚更加久痢不止無力痩乏愈見羸弱謂之虚羸下利又有産後氣宇不順而下痢赤白謂之氣痢治之之法熱則涼之冷則温之冷熱相摶則調之滑者澁之虚羸者補之水穀不分者當利小便若産婦性情執著不能寛解須當順其氣未有不安者也治之各有方黄連元深師療産後冷熱痢黄連六兩烏梅三兩乾薑二兩右為細末煉蜜元如梧桐子大空心米飲下三十元忌猪肉經效治産後赤白痢臍下氣痛厚朴八分當歸枳殻訶子肉各六分甘草五分肉豆蔲五箇薤白三合右水一升煮取九合空心分為三服張文仲治産後赤白痢腹中絞痛不可忍黄連四兩阿膠蒲黄梔子仁各一兩當歸一兩半黄芩二兩黄蘗皮三兩右為細末煉蜜元如梧桐子大飲下六十元日三夜一立定破血止痢救急治産後赤白痢腹中絞痛芍藥四兩阿膠艾葉各二兩乾地黄四兩甘草當歸各二兩右水二升煮取八合分兩服空心必效療新産後赤白痢疾心腹刺痛薤白切一升當歸二兩酸榴皮三兩地榆四兩粳米五合阿膠人參甘草黄連各兩半右㕮咀以水六升煮取一升日三服一方有厚朴一兩千金方只有前五味又療産後赤白痢腹中絞痛不下食當歸石榴皮地榆各二分白蘘荷黄連各十二分黄蘗一分犀角屑四分黄芩枳殻甘草升麻各六分茜根八分粳米二合薤白一升右為末煉蜜元如梧桐子大空心米飲下二十元療産後赤白痢疾黄連八分阿膠六分赤茯苓當歸黄蘗各四分右為末煉蜜元如梧桐子大粥飲吞下二十元空心療産後下痢赤白有血赤石脂黄連地榆各六分當歸四分乾薑甘草各三分厚朴十二分葱白七茎右水二升煎取八合空心分作兩服廣濟療産後腹痛氣脹肋下妨滿不能食兼微痢方茯苓人參厚朴各八分甘草橘紅當歸黄芩各六分一方無黄芩有生姜右為細末以飲調下方寸匕至匕半日三赤石脂元大治冷痢色青鶩溏又療産後下痢赤石脂三兩甘草當歸白术黄連乾薑秦皮各二兩川椒附子各一兩右為細末煉蜜為元如梧桐子大酒下二十元日三良忌猪肉冷水海藻菘菜膠蠟湯深師療産後下痢阿膠當歸各六分蠟一枚如雞子大粳米一合黄連十分右細切以水六升先煮米令蟹目沸去米内藥煮取二升入阿膠蠟煮令烊分温三服當歸湯千金療産後下痢腹痛當歸龍骨各三兩乾薑附子甘草熟艾各一兩白术二兩川芎二兩半右八味細切以水五升煮取二升半去滓分為三服日三一日令盡忌猪肉冷水桃李雀肉毒物廣濟療産後赤白痢臍下絞痛當歸芍藥地榆龍骨黄連艾葉甘草厚朴各八分黄芩乾薑各六分右㕮咀以水八升煮取二升半去滓分温三服即差忌生冷油膩海藻菘菜猪魚肉又療産後赤白痢臍下氣痛當歸八分厚朴黄連各十二分肉豆蔲五枚甘草六分右㕮咀以水五升煮取二升去滓分温三服桂枝湯千金療産後餘寒下痢便膿血赤白日數十行腹痛時時下血桂心乾薑甘草各二兩赤石脂十兩當歸三兩附子一兩炮蜜一升右細切以水七升煮取三升入蜜再煎一二沸去滓分服一升日三必效療産後痢日五十行者方取木裏蠧蟲糞炒令黄急以水沃之稀稠得所服之差止獨孤祭酒訥方療産後虚羸下痢膿血腹痛黄連芍藥甘草當歸乾薑人參各八兩艾葉三分右㕮咀水七升煮取二升分為三服忌猪鹿肉治産後下痢不禁止困乏氣欲絶無問赤白水穀不分黄連厚朴各三兩芍藥黄蘗各二兩右水六升煮取二升分温二服治産後羸困赤白痢疾心腹絞痛薤白石榴皮黄連各三分當歸二兩地榆三分右水七升煮取二升半分為三服療産後氣痢不止方青木香三分訶子酥炙黄去核八分右為細末空心米飲調下方寸匕一方有縮砂仁三味等分為細末入蜜一匙米飲調下二錢療産後水痢枳殻四分厚朴茯苓黄連各六分當歸三分右水一升煮取八合空心分為三服療産後水痢黄連六分烏梅五分石榴皮赤石脂當歸各四分乾薑三分右為細末煉蜜為元如梧桐子大空心米飲下三十元療産後血痢艾葉三分阿膠十分黄連七分芍藥黄蘗甘草各六分右為細末粥飲調下方寸匕療産後下痢膿血相雜赤石脂五色龍骨黄連各十分白术五分阿膠黄耆各六分黄蘗四分右為細末飲服方寸匕碙砂煎元治一切積滯化氣消食補益真氣産後逐敗血補虚至善碙砂揀透明無石者别研如粉金鈴子去皮核天雄用無灰酒煮五七百沸候軟刮去皮當歸各浄秤二兩巴㦸檳榔舶茴香木香附子炮沉香各一兩阿魏半兩米醋磨成膏入諸藥肉蓯蓉一兩右為細末以無灰酒煮白麪糊元如梧桐子大每服三十元空心日午温酒下此方家家有予家婦人嘗病蓐中下痢日久甚困篤百方不差士人李潛善醫曰蓐中痢與他痢不同常痢可用苦澁藥止之蓐中痢生於血不足投澁藥則血愈不行痢當更甚為予作碙砂法云此藥最能治産後痢先以桂元小下之次投碙砂圓日九十圓痢頓減半次日遂愈碙砂圓産後雖無疾亦宜服之能養血氣去積滯桂元方沈内翰方碙砂桂心甘遂丁香木香芫花以碙砂炒焦已上等分巴豆去心皮不去油減半右為細末麪糊元如菉豆大每服二元三元温水下加減更量虚實潛名醫也云此元取積最勝不以久近皆能消化又許仁則秘方神麴末五合炒枳殻白术各六分人參四分赤石脂十分右為細末米飲調下方寸匕續命湯療産後驟血不止白蜜一匙生薑一片右同煎候蜜色赤投童子小便一升去薑更煎兩沸分為三次頓服之療産後血痢小便不通臍腹痛生馬齒莧右𢷬取汁三大合煎一沸下蜜一合調頓服療産後血痢不止臭樗根六分右為末水和元如棗核大麪担作餛飩無度煮二七箇熱吞之療産後下血不止桑耳炙芍藥炙地榆茜根牛角腮阿膠各六分艾葉雞蘇各四分白龍骨十二分右㕮咀以水二升煮取八合分三服婦人大全良方卷二十二
