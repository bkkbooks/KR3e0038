body:
  text: 婦人大全良方卷二十三宋陳自明撰産後痢疾作渴方論第一凡三方論曰産後不痢作渴夫水榖之精化為血氣津液以養臟腑臟腑虛燥故痢而渴若引飲則難止反溢水氣脾胃既虛不能剋水水自流溢浸漬皮膚則令人腫但止其渴痢則自差必效療産後痢而渴飲無度數麥門冬十二分烏梅二十箇右細銼以水一升煮取七合細呷經效療産後久痢津液竭渴不止龍骨十二分厚朴茯苓黃耆麥門冬人參各八分生薑六分大棗十四箇並細銼右水一大升煮取七合空心分兩服古今録驗療産後痢日久津液枯竭四肢浮腫口乾舌燥冬瓜一枚右以黃泥褁厚五寸煨令爛熟去皮攪汁服之差産後大便祕澀方論第二凡七方論曰産後大便祕澀者何答曰産卧水血俱下腸胃虛竭津液不足是以大便祕澀不通也若過五六日腹中悶脹者此有燥屎在臟腑以其乾澀未能出耳宜服麻仁元以津潤之若誤以為有熱而投以寒藥則陽消隂長變證百出性命危矣麻仁元方麻仁枳殼人參各四分大黃二分焙右為末煉蜜元如梧桐子大空心溫酒下二十元未通漸加元數不可太過評曰産後不得利利者百無一生去血過多藏燥大便祕澀澀則固當滑之大黃似難輕用唯蔥涎調臘茶為元復以蔥茶下之必通僕常以局方四物湯以生乾地黃易熟地黃加青皮去白煎服效療産後五七日不大便切不可妄服藥先宜用麥蘖散方大麥芽不以多少右炒黃為末每服三錢沸湯調下與粥間服阿膠枳殼圓治産後虛羸大便祕澀阿膠枳殼等分右為末煉蜜圓如梧桐子大别研滑石末為衣溫水下二十圓半日以來未通再服許學士云婦人産後有三種疾鬱冒則多汗汗則大便祕故難於用藥唯麻子仁蘇子粥最佳穩當紫蘇子大麻子仁右二味各二合淨洗研令極細用水再研取汁一盞分二次煮粥啜之此粥不惟産後可服大抵老人諸虛風祕皆得力千金療産後熱結大便不通蜜兊法白蜜五合慢火煎令如硬餳以投冷水中良久取出捻如母指大長二寸內榖道中即通産後大小便不通方論第三凡三方論曰産後大小便不通者腸胃本挾於熱因産血水俱下津液燥竭腸胃痞澀熱氣結於腸胃故令大小便不通也葵根湯千金療産後淋瀝葵根二兩乾者通草二兩車前子一升亂髮灰大黃桂心各一兩冬瓜汁七合生薑六兩滑石末别研一兩右九味切以水七升煮取二升半去滓下滑石末分三服以愚考之既有大黃亦可治大便不通故録於此更宜斟量虛實而投之集驗療産後津液燥竭大小便不通芍藥大黃枳殼麻仁等分右為細末煉蜜元如梧子大空心熟水下二十元一方有甘草山梔仁桃花散治産後大小便祕澀桃花葵子滑石檳榔等分右為細末每服二錢蔥白湯空心調下産後遺糞方第四廣濟療産後遺糞方取故燕窠中草燒為末以酒調下半錢亦治男子集驗方礬石枯牡蠣熬右等分為末酒服方寸匕日三亦治男子又療産後遺糞不知出時方白斂芍藥右各等分為末酒服方寸匕産後諸淋方論第五凡十五方論曰産後諸淋因産有熱氣客於脬中內虛則起數熱則小便澀痛故謂之淋又有因産損氣虛則挾熱熱則搏於血血即流滲於胞中故血隨小便出而為血淋淋者如雨之淋也三因論曰治諸産前後淋祕其法不同産前當安胎産後當去血如其冷熱膏石氣淋等為治則一但量其虛實而用之瞿麥蒲黃最為産後要藥唯當尋其所因則不失機要茅根湯治産後諸淋無問冷熱膏石氣結悉主之白茅根八兩瞿麥穗白茯苓各四兩葵子人參各二兩蒲黃桃膠滑石甘草各一兩紫貝十箇燒石首魚頭中石二十箇燒右銼為散每服四大錢水一盞半薑三片燈心二十莖煎至七分去滓溫服亦可為末木通煎湯調下二錢如氣壅閉木通橘皮煎湯調服集驗療産後患淋小便痛通草三兩大棗二十枚葵子一升白术一兩榆白皮五兩石韋黃芩各二兩右以水八升煮取二升半空心服溫呷千金有甘草生薑療産後小便淋澀不通葵子一合朴硝八分右水二升煮取八合下硝分兩服滑石散千金療産後淋滑石五分研通草車前子葵子各四分右為末以漿水調服方寸匕至二匕為妙療産後小便不通張不愚方陳皮一兩去白右為末空心溫酒調二錢一服便通療卒不得小便杏仁十四箇去皮尖右炒為末和飲頓服立通古今録驗療産後勞傷熱大小便赤澀雞蘇一分通草十分冬葵子三合芍藥滑石芒硝各八分生地黃十二分右水三升煮取八合下芒硝空心分三服療脬轉小便不通八九日滑石十二分寒水石八分右水二升煮取八合空心分三服經效療氣結成淋小便熱淋引痛或如豆汁面色痿黃貝齒三箇為末葵子一合碎石膏十二分滑石八分右水一升煮取八合下豬膽汁半枚合煎三四沸空心溫服療産後小便澀痛或血淋者瞿麥黃芩冬葵子各二兩通草三兩大棗十二枚右以水七升煮取二升半分作兩服療産後血淋車前子瞿麥各四兩黃芩三兩鬱金末一兩右水六升煮取二升下鬱金末分三服廣濟療産後卒患淋小便磣痛及至尿血冬葵子一升通草三兩滑石末别處四兩石韋去毛三兩茯苓黃芩各二兩右水九升煮取三升入滑石末空心服忌熱麵醋物療産後淋小便痛及血淋白茅根五兩瞿麥車前子各二兩冬葵子二合鯉魚齒一百箇為末通草三兩右水二升煮取一升入齒末空心服治産後小便不通腹脹如鼓悶亂不醒蓋緣未産之前內積冷氣遂致産時尿胞運動不順用鹽於産臍中填可與臍平却用蔥白剝去粗皮十餘根作一縳切作一指厚安鹽上用大艾炷滿蔥餅子大小以火灸之覺熱氣直入腹內即時便通神驗不可具述出産乳集木通散治産後小便不通木通大麻仁葵子滑石檳榔枳實甘草各半兩右為粗末每服三大錢水盞半煎至七分去滓溫服産後小便數方論第六凡二方夫産後小便數者此由脬內宿有冷氣因産後發動冷氣入腹虛弱不能致其小便故數也桑螵蛸散千金翼治産後小便數及遺尿桑螵蛸三十箇炒鹿茸酥炙黃耆各三兩牡蠣煆人參厚朴赤石脂各二兩右為末空心粥飲調下二錢外臺方無厚朴石脂有甘草生薑栝樓湯集驗療産後小便數兼渴桑螵蛸甘草並炙黃連生薑各二兩栝樓根人參各三兩大棗五十箇右細切以水七升煮取二升半分三服忌豬肉冷水産後小便不禁方論第七凡四方廣濟療産後小便不禁以雞尾毛燒作灰細研溫酒調方寸匕服日三又方桑螵蛸半兩炒龍骨一兩右為細末食前粥飲調下二錢千金翼療産後遺尿不知出白薇芍藥右等分為細末以酒服方寸匕日三服固脬散治婦人臨産時傷手胞破小便不禁黃絲絹自然黃者不用染成者三尺以炭灰汁煮極化爛用清水洗去灰令盡入黃蠟半兩蜜一兩白茅根二錢馬屁勃末二錢右用水一升再煎至一盞空心頓服服時斂氣服之不得作聲如作聲無效産後小便出血方論第八凡三方夫産後損於血氣血氣虛而挾於熱血得熱則流散滲於脬內故血隨小便出治小便利血方亂髮淨洗燒成灰研細為末右米飲調服方寸匕一方有滑石等分每服一錢生地黃汁調下療産後大小便不利下血車前子黃芩蒲黃生地黃牡蠣芍藥各六分右為細末空心米飲服方寸匕忌麵蒜崔氏療産後血滲入大小腸車前子草汁一升蜜一大合右相和煎一沸分為兩服産後隂脫玉門不閉方論第九凡十二方與八卷第十八論通用三因論曰婦人趣産勞力弩咽太過致隂下脫若脫肛狀及隂挺下出逼迫腫痛舉動房勞能發作清水續續小便淋露硫黃散治産後勞傷隂脫硫黃烏賊骨各半兩五味子一分千金翼用三銖一方無之右為細末研令極細糝患處日三易當歸散治隂下脫方見八卷第十八論千金方治産後隂下脫以鐵精粉上推內之又灸臍下橫文二七壯廣濟療産後隂腫下脫內出玉門不閉産寶只有此一方無論石灰一升炒令能燒草右熱湯二升投灰湯中適溫冷澄清坐水中以浸玉門斯須平復如故當歸散治産後隂下脫方傳心方當歸黃芩牡蠣煆各二兩芍藥一兩一分蝟皮燒存性半兩右為細末每服二錢空心溫酒調服米飲調服亦可忌登髙舉重集驗療婦人産後虛冷玉門不閉寬冷方千金同蛇床子硫黃各四分兔絲子五分吳茱萸六分右為細末以湯一升投藥方寸匕以洗玉門日再用陳氏玉龍湯治婦人産後用力太過産門惡出以四物湯入真龍骨末少許煎空心連進二服麻油湯熏洗尉法集驗療婦人産後隂下脫方單炒蛇床子一升乘熱以帛裹尉患處亦治産後隂中痛桃仁膏治産後隂腫妨悶桃仁去皮尖别研為膏枯礬五倍子右等分為細末以膏子拌均傅之樗枝散治産後子腸下出不能收拾不論年深者皆治之樗枝取皮焙乾一握右用水五升連根蔥五莖漢椒一撮同煎至三升去滓傾在盆內乘熱熏候通手淋洗如冷傾入五升瓶內再煎一沸依前用一服可作五度用洗了睡少時忌鹽鹹鮓醬濕麵發風毒物及用心力房勞等事古今録驗療産後隂下脫方鱉頭二箇隂乾葛根一斤當作一兩右二味為末酒服方寸匕日三服皂角散治産後魋皂角樹皮川楝樹皮各半斤皂角核一合石蓮一合炒去心右為粗末用水煎湯乘熱以物圍定熏通手洗於淨房中就熏洗處鋪薦席才熏洗了以帛挹乾便喫玉露通真元熱酒下二元便仰睡方見通用方中古今録驗療産後隂下脫方川椒一斗吳茱茰二升戎鹽半雞子大右為末以綿褁如半雞子大內隂中日一易二十日愈婦人隂蝕五疳方論第十凡八方凡婦人少隂脈數而滑者隂中必生瘡名曰𧈟瘡或痛或癢如蟲行狀淋露膿汁隂蝕幾盡者此皆由心神煩鬱胃氣虛弱致氣血留滯故經云諸痛癢瘡皆屬於心又云陽明主肌肉痛癢皆屬於心治之當補心養胃外以熏洗坐導法治之乃可千金療隂蝕瘡方當歸芍藥甘草芎藭各二兩地榆三兩右細切以水五升煮取二升去滓熏洗日三夜一又方蒲黃一升水銀一兩右二味研均以粉上又方肥豬肉三十斤右以水三碩煮熟去肉入盆中浸之冷即易不過三兩度崔氏療隂蝕洗拓湯方甘草乾漆各一兩黃芩乾地黃當歸芍藥各二兩龜甲五兩右細切以水七升煮取一半去滓以綿帛內湯中以拓瘡處良久即易日二度每拓湯可行十里許即裛乾捻取甘濕散薄傅瘡上使遍可經半日又以湯拓拓訖如前傅藥余家婢遇此疾就甘家療不差蝕處作兩瘡深半寸余於涓子方中檢得此甘草湯方仍以自處蚺蛇膽散不經七日瘡乃平復甚效凡救十八人手下即活遇斯疾者請廣流布傳之甘濕散又名蚺蛇膽散療疳蟲隂蝕方蚺蛇膽真者青木香末石硫黃闕精麝香各四分臨時分之多少入用元麝香辟蛇毒若先以相和蛇膽即無力也舊用五月五日蝦麻右五味等分分為末更細研有患取如三碁子和井花水日再服訖先令便利了即以後方桃枝熏下部訖然後取藥如碁子安竹管裏吹入下部中亦日再度老少量減其熏法每日一度不用再為之良又療疳蟲食下部及五藏方取桃東南枝三七枚輕打頭使散以綿纒之又搗石硫黃為末將此綿纒桃枝撚轉之令末少厚又截一短竹筒先內下部中仍以所撚藥桃枝熟然熏之文仲療隂蝕欲盡者方蝦蟆兔屎右等分為末傅瘡上良狼牙湯古今録驗療婦人隂蝕其中爛傷膿水淋漓臭穢狼牙三兩右㕮咀以水四升煮取半升去滓內苦酒如雞子中黃大沸湯一杯消盡夜適寒溫以綿纒筋頭大如繭濡湯以瀝瘡中日四五度即差産後乳汁或行或不行方論第十一凡十五方論曰凡婦人乳汁或行或不行者皆由氣血虛弱經絡不調所致也乳汁勿令投於地蟲蟻食之令乳無汁若乳盈溢可潑東壁上佳或有産後必有乳若乳雖脹而産後臖作者此年少之人初經産乳有風熱耳須服清利之藥則乳行若纍經産而無乳者亡津液故也須服滋溢之藥以動之若雖有乳又却不甚多者須服通經之藥以動之仍以羮􅌜引之蓋婦人之乳資於衝脈與胃經通故也有屢經産而乳汁常多者亦婦人血氣不衰使然也大抵婦人素有疾在衝任經者乳汁少而其色帶黃所生之子怯弱而多疾三因論曰産婦有二種乳脈不行有氣血盛而壅閉不行者有血少氣弱澀而不行者虛當補之盛當疏之盛者當用通草漏蘆土瓜根輩虛者當用成煉鍾乳粉豬蹄鯽魚之屬概可見矣漏蘆散療乳婦氣脈壅塞乳汁不行及經絡凝滯妳乳脹痛留蓄邪毒或作癰腫此藥服之自然內消乳汁通行漏蘆二兩半蛇脫十條炙瓜樓十箇急火燒令焦存性右為末溫酒調下二錢無時候服藥後即以豬蹄羮投之經驗方有牡蠣並燒存性一方只用牡蠣煆為末酒調下二錢又方葵菜子炒香縮砂仁各等分右為細末每服二錢熱酒調下滋益氣脈榮衛行津液上蔡張不愚方常用極有驗療乳婦氣少血衰脈澀不行乳汁絶少成煉鍾乳粉研濃煎漏蘆湯調下二錢産寶療産後乳無汁土瓜根漏蘆各三兩甘草二兩通草四兩右水八升煎取二升分溫三服忌如常法一方加桂心並為末飲服方寸匕一方以豬􅏬如食法煮清粥食之驗靈苑方下乳汁立效粳米糯米各半合萵苣子一合並淘淨生甘草半兩右煎汁一升研前藥令細去滓分作三服立下又方漏蘆一方二分蠐螬各三分瓜樓根土瓜根各四分右為細末酒調方寸匕日三服一方無土瓜根有鍾乳沙糖水調服又方通草十分鍾乳粉麥門冬各六分右為細末食後酒服方寸匕日三兩服效千金方同有理石二方出産寶一方土瓜根為末酒調方寸匕日三兩服效一方豬蹄一隻通草四兩右以水一斗煮作羮食之最妙湧泉散療乳無汁成都教授單釀方亦治乳結癰腫穿山甲洗一兩灰炒令燥右為細末酒調服方寸匕下乳方大麻仁去殼二合生蝦三枚右同研爛去滓用酒水各一盞瓦罌輝至一盞半有餘食後臨卧溫服仍用被覆睡乳即通流劉栁溪傳又方必用方云漏蘆栝樓皆要藥或云多食豬蹄羮栝樓取子淨洗炒令香熟捶碎取仁研細瓦上攤浥令白色研為細末溫酒調下一錢服了合面卧少時未效再作一方瓜樓一枚熟搗以白酒一斗煮取四升去滓溫飲一升日三崔氏療乳不下鼠肉五兩羊肉六兩肉八兩右三物作臛噉之勿令食者知漏蘆湯千金療乳無汁漏蘆通草各八分鍾乳四分黍米一升右先將米漬一宿研取汁三升煮藥三四沸去滓作飲食經心録同余荆布因産前食素得疾羸弱産後乳脈不行已七十日服諸藥無效嬰兒甚苦偶有人送赤豆一斗遂如常煮赤豆粥食之當夜乳脈通行閲本草赤小豆能通妳乳謾載之産後乳汁自出方論第十二無方論曰産後乳汁自出蓋是身虛所致宜服補藥以止之若乳多溫滿急痛者溫帛尉之産寶有是論却無方以治之若有此證但以漏蘆散亦可亦有未産前乳汁自出者謂之乳泣生子多不育經書未曽論及産後吹妳方論第十三凡六方夫産後吹妳者因兒喫妳之次兒忽自睡呼氣不通乳不時泄蓄積在內遂成腫硬壅閉乳道津液不通腐結疼痛亦有不癢不痛腫硬如石名曰吹妳若不急治腫甚成癰産後吹妳最宜急治不爾結癰逮至死者速與服皂角散栝樓散傅以天南星散以手揉之則散矣出指迷方栝樓散方乳香一錢研栝樓根末一兩右研令均溫酒調二錢服天南星散天南星為末用溫湯調以鵝翎塗之皂角散方歌曰婦人吹妳意如何皂角燒灰蛤粉和熱酒一杯調八字須臾揉散笑呵呵治妳結硬疼痛出經驗方百藥煎為細末每服三錢酒一盞煎數沸熱服療乳硬作痛嫩桑葉生採研以米飲調攤紙花貼病處産後妬乳方論第十四婦人女子乳頭生小淺熱瘡搔黃汁出方附凡十方夫妬乳者由新産後兒未能飲之及乳不泄或乳脹揑其汁不盡皆令乳汁蓄結與血氣相搏即壯熱大渴引飲牢強掣痛手不得近是也初覺便以手助揑去汁更令傍人助吮引之不爾或作瘡有膿其熱勢盛必成癰也吹妳妬乳乳癰其實則一只分輕重而已輕則為吹妳妬乳重則為癰雖有専門不可不録療産後吹妳作癰葵莖及子右搗篩為散酒服方寸匕即愈又方雞屎為末酒服方寸匕須臾三服愈又方皂莢拾條以酒一升揉取汁硝石半兩煎成膏傅之療産婦乳初結脹不消令敗乳自退方瓜樓一箇半生半炒大粉草一寸半生半炙生薑一塊半生半煨右同銼用酒一碗煮取一盞去滓服之其痛一會不可忍即搜去敗乳臨卧再一服順所患處乳側卧於床上令其藥行故也療乳腫次第結成癰方右以馬溺塗之立愈婦人女子乳頭生小淺熱瘡搔之黃汁出方附集驗論曰凡婦人女子乳頭生小淺熱瘡搔之黃汁出浸淫為長百種療不差者動經年月名為妬乳病婦人飲兒者乳皆欲斷世論茍抄乳是也宜以赤龍皮湯及天麻湯洗之傅二物飛烏膏及飛烏散佳始作者可傅以黃芩漏蘆散及黃連胡粉散並佳赤龍皮湯方槲皮切三升右以水一斗煮五升夏冷用水秋冬溫之分以洗乳亦洗諸深敗爛久瘡洗畢傅膏散千金同天麻草湯方天麻草切五升右以水一斗半煎取一斗隨寒溫分洗乳以殺癢也此草葉如麻葉冬生夏著花赤如鼠尾花亦以洗浸淫黃爛熱瘡癢疽濕隂蝕瘡小兒頭瘡洗畢傅膏散千金同飛烏膏散用燒朱砂作水銀上黑煙名緗粉者三兩熬令焦燥礬石三兩燒粉右二味以絹篩了以甲煎和之令如脂以傅乳瘡日三作散者不須和有汁自著可用散亦傅諸熱瘡黃爛浸淫汁瘡蜜瘡丈夫隂蝕癢濕諸小兒頭瘡疳蝕口邊肥瘡蝸瘡等並以此傅之千金同又黃連胡粉膏散黃連二兩胡粉十分水銀一兩同研令消散右三味搗黃連為末三物相和合皮褁熟挼之自和合也縱不成一家且得水銀細散入粉中也以傅乳瘡諸濕癢黃爛肥瘡若著甲煎為膏千金同乳癰方論第十五凡二十五方夫婦人乳癰者由乳腫聚結皮薄以澤是成癰也足陽明之經脈則血澀不通其血又歸之氣積不散故結聚成癰千金云年四十以下治之多愈年五十以上宜速治之即差若不治者多死中年又懷胎發乳癰腫及體結癰此必無害也蓋懷胎之癰病起於陽明陽明者胃之脈也主肌肉不傷藏故無害也診其右手關上脈沉則為隂虛者則病癰乳癰久不差則變為瘻開慶間淦川嘉林曾都運恭人吳氏年已五十而病妳癰後果不起以此知聖賢不妄説也産寶論曰産後宜勤去乳汁不宜蓄積不出惡汁內引於熱則結硬堅腫牽急疼痛或渴思飲其妳手近不得若成膿者名妬乳乃急於癰宜服連翹湯利下熱毒外以赤小豆末水調塗之便愈或數揑去乳汁或以小兒手摩動之或大人含水嗍之得汁吐之其汁狀如膿若産後不曾乳兒畜積乳汁亦結成癰連翹湯療産後妬乳并癰連翹子升麻芒硝各十分玄參芍藥白斂防已麝干各八分大黃十二分甘草六分杏仁八十枚去皮尖右以水九升煎取三升大黃次下硝分三服又方蒲黃草右熟搗傅腫上日三度易之并葉煎汁飲之亦佳妬乳及癰並差又方以地黃汁塗即愈又療諸癰不散已成膿懼針令自決破方取白雞內翅第一翎各一莖燒末服之即決又方取白丁香研塗乾即易又療乳癰初得令消赤小豆菵草右等分為細末苦酒和傅之愈又療乳癰初覺有異黃芩甘草防風赤芍藥黃耆各五兩通草十分桑寄生麥門冬各六分大棗五枚右細切以水一升煮取九合去滓入乳糖六分分為四服療乳癰或瘡久不差膿汁出疼痛欲死不可忍鹿角二兩甘草半兩右為細末用雞子白和於銅器中暖溫傅患處日五七易即愈一方只用鹿角石上磨取濃汁塗之乾即易一方鹿角燒作灰酒調抹立愈治乳癰鹿角屑一兩右為細末以豬膽汁調下一錢不過再服神驗以醋漿水服之亦得集驗方以豬頷下清汁張氏橘香散治乳癰未結即散已結即潰極痛不可忍者藥下即不疼神驗不可云喻因小兒吹妳變成斯疾者並皆治之陳皮浸去白眼乾麵炒微黃為細末麝香研酒調二錢初發覺赤腫疼痛一服見效每服有效療乳癰諸般癤癰疽橘紅半兩阿膠粉炒粉草炙各一兩右㕮咀分為二服每服用泉水一碗半煎至盞半去滓溫服療妳癰并無名癰癤鼠糞不以多少燒存性二分入輕粉二十文研停麻油調塗如有頭即潰無頭即消又療火瘡療乳頭裂破以丁香為末水調傳立愈又以蛤粉胭脂等分新水調傅陳日華方一醉膏治妳癰石膏不以多少煆通赤取於地上碗覆出火毒細研每服三錢溫酒調下添酒盡醉睡覺再進一服千金療乳無汁以水煮服金黃散治妳癰出婦人經驗方川大黃粉草各一兩右為細末以好酒熬成膏傾在盞中放冷攤紙上貼痛處仰面卧至五更未貼時先用溫酒調一大匙就患處臥明日取下惡物相度強弱用藥羸弱不冝服療發背乳癰四肢虛熱大渴生地黃六兩黃芩芍藥人參知母甘草各二兩升麻黃耆麥門冬栝樓各三兩大棗十二枚右以竹葉切三升以水一斗二升煮取九升去竹葉內藥煮取三升渴則飲之療婦人發乳丈夫發背爛生膿血後虛成氣疾黃耆麥門冬地黃人參升麻茯苓各三兩當歸芍藥逺志甘草各一兩大棗十箇右水二升煮取一升分溫三服若有是證局中排膿內補十宣散亦妙産乳療婦人乳癰已穿未穿出膿大止痛斂瘡口以芙蓉花爛研如癡若無花只取根上皮先用竹刀刮去粗皮但用內一層嫩白皮研如癡却入蜜少許調停看瘡大小如未穿即留中孔如已穿即塞其孔其膿根自然浢出盡不倦頻頻更換此方大治一切癰疽發背立見神效膿出盡却用後藥傅乾膿散又斂瘡口烏賊骨黃丹天竺黃各二錢輕粉二匕麝香一字老降真骨三錢右研為細末乾糝瘡口不數日乾又方降真節二錢天竺黃露蜂房各一錢麝香輕粉各少許右為末乾糝又方乳香沒藥黃丹各一錢龍骨二錢真坯子三錢血竭半錢麝香一字降真節一錢右為細末乾糝産寶療乳癰方黃蘖一分右為細末以雞子白調停塗之乾則易立愈又方苧根搗傅之愈丹參膏必效方療婦人乳癰丹參白芷芍藥各二兩右㕮咀以苦酒淹經宿以豬脂半斤微火煎之白芷黃為度膏成去滓傅之治妳發痛不可忍先人國器經效方水楊栁根新採者一握捶碎以好酒同甘草烏梅輝至七分去滓時時溫服神效瓜樓散李嗣立方治婦人乳疽妳勞瓜樓一箇去皮焙研為末如急用只爛研子多者有力生粉草半兩當歸酒洗去蘆焙半兩乳香一錢通明沒藥一分二味并别研右用無灰酒三升同於銀石器中慢火熬取一升清汁分作三服食後良久服如有妳勞便服此藥可杜絶病根如毒氣已成能化膿為黃水毒未成即於大小便中通利疾甚再合服以退為妙婦人乳癰方甚多獨此一方神效無比萬不失一癸亥年僕處五羊趙經略廳判閫夫人年七十一歲隔一二年左乳房上有一塊如鵝卵大今忽然作楚召余議藥僕云據孫真人云婦人年五十歲已上乳房不宜見癰見則不可療矣幸而未破恐是氣瘤謾以五香連翹湯去大黃煎服服後稍減則已過六七年後每遇乳有腫脹時再合服必消減矣五香連翹湯方見二十卷第二論婦人大全良方卷二十三
