body:
  text: 婦人大全良方卷一宋陳自明撰調經門凡醫婦人先須調經故以為初月經序論第一岐伯曰女子七歲腎氣盛齒更髮長二七而天癸至任脈通太衝脈盛月事以時下天謂天真之氣降癸謂壬癸水名故云天癸也然衝為血海任主胞胎腎氣全盛二脈流通經血漸盈應時而下所以謂之月事者平和之氣常以三旬一見以像月盈則虧也若遇經脈行時最宜謹於將理將理失宜似産後一般受病輕為宿疾重可死矣蓋被驚則血氣錯亂經脈斬然不行逆於身則為血分勞瘵等疾若其時勞力則生虛熱變為疼痛之根若恚怒則氣逆氣逆則血逆逆於腰腿則遇經行時腰腿痛重過期即安也逆於頭腹心肺背脅手足之間則遇經行時其證亦然若怒極則傷肝而有眼暈脅痛嘔血瘰􅊓癰瘍之病加之經血滲漏於其間遂成竅穴淋瀝無有己也凡此之時中風則病風感冷則病冷久而不愈變證百出不可言者所謂犯時微若秋毫感病重如山嶽可不畏哉精血篇第二齊光祿大夫禇澄遺書飲食五味養髓骨肉血肌膚毛髮男子為陽陽中必有隂隂中之數八故一八而陽精升二八而陽精溢女子為隂隂中必有陽陽之中數七故一七而隂血升二七而隂血溢皆飲食五味之實秀也方其升也智慮開明齒牙更始髮黃者黑筋弱者強暨其溢也凡充身體手足耳目之餘雖針芥之歷無有不下凡子形肖父母者以其精血嘗於父母之身無所不歷也是以父一肢廢則子一肢不肖其父母一目虧則子一目不肖其母然雌鳥牝獸無天癸而成胎何也鳥獸精血往來尾間也精未通而御女以通其精則五體有不滿之處異日有難狀之疾隂已痿而思色以降其精則精不出而內敗小便道澀而為淋精已耗而復竭之則大小便道牽疼愈疼則欲大小便愈便則愈疼女人天癸既至踰十年無男子合則不調未踰十年思男子合亦不調不調則舊血不出新血誤行或漬而入骨或變而之腫或雖合而難子合男子多則瀝枯虛人産乳衆則血枯殺人觀其精血思過半矣産寶方序論第三大率治病先論其所主男子調其氣女子調其血氣血人之神也不可不謹調護然婦人以血為基本氣血宣行其神自清所謂血室不蓄則氣和血凝結則水火相刑月水如期謂之月信不然血凝成孕此乃調燮之常其血不來則因風熱傷於經血故血不通或外感風寒內受邪熱脾胃虛弱不能飲食食既不充榮衛抑遏肌膚黃燥靣無光澤時發寒熱腹脹作痛難於子息子藏冷熱久而勞損必挾帶下便多淋瀝忽致崩漏經云腹中如塊忽聚忽散其病乃癥血涸不流而搏腹脹時作寒熱此乃成瘕或先後爽期雖通而或多或寡究病之原蓋本於此王子亨方論第四論曰經者常候謂候其一身之隂陽愆伏知其安危故其來必以月太過不及皆為不調過於陽則前期而來過於隂則後時而至其有乍多乍少斷絶不行崩漏不止亦由隂陽衰盛寒熱為邪詳説於下月水不調方論第五夫婦人月水不調者由勞傷氣血致體虛風冷之氣乘也若風冷之氣客於胞內傷於衝任之脈損手太陽少隂之經衝任之脈皆起於胞內為經絡之海手太陽小腸之經手少隂心之經也此二經為表裏主上為乳汁下為月水然則月水是經絡之餘若冷熱調和則衝脈任脈氣盛太陽少隂所生之血宣流依時而下若寒溫乖適經脈則虛若有風冷虛則乘之邪搏於血或寒或溫寒則血結溫則血消故月水乍多乍少故為不調也紫石英圓出本事方治婦人病多是月經乍多乍少或前或後時發疼痛醫者一例呼為經病不曽説是隂勝陽是陽勝隂所以服藥少得有效蓋隂氣勝陽則胞寒氣冷血不運行經所謂天寒地凍水凝成氷故令乍少而在月後若陽氣勝隂則血流散溢經所謂天暑地熱經水沸溢故令乍多而在月前當知隂陽調其氣血使不相勝以平為福紫石英禹餘糧人參龍骨川烏官桂桑寄生杜仲五味子遠志澤㵼當歸石斛蓯蓉乾薑各一兩川椒牡蠣甘草各半兩右為細末煉蜜圓如梧桐子大每服三五十圓空心米飲吞下指迷方同加減吳茱萸湯治衝任衰弱月候愆期或前或後或崩漏不止赤白帶下小腹急痛每至經脈行時頭眩飲食減少氣滿心忪肌膚不澤悉皆主之出張氏方吳茱萸半兩麥門冬乾薑白茯苓牡丹皮南木香苦梗各三錢甘草三錢半當歸半兩北細辛一錢半防風官桂各一分半夏七錢右㕮咀每服四大錢水一盞半生薑五片棗子一枚煎至七分去滓空心溫服治婦人室女經脈不調臍腹冷痛惡心腹常脹滿至晚則增宜服小烏沉湯吞下艾煎圓見和劑局方薑黃散治血臟久冷月水不調臍腹刺痛出專治婦人方川薑黃成片子者四兩蓬莪术紅花桂心川芎各一兩延胡索牡丹皮當歸各二兩白芍藥三兩右為細末每服一錢水半盞酒半盞煎至七分熱服桃仁散治婦人月水不調或淋瀝不斷斷後復來狀如㵼水四體虛翕不能飲食腹中堅痛不可行動月水或前或後或經月不來舉體沉重惟欲眠睡多思酸物桃仁粉草半夏各一兩赤芍藥生地黃各三兩澤蘭葉川牛膝當歸桂心牡丹皮人參蒲黃川芎各二兩右為粗末每服五大錢水盞半薑三片煎七分空心去滓溫服月水不通方論第六夫婦人月水不通者由勞傷血氣致令體虛受風冷邪氣客於胞內傷損衝任之脈并手太陽少隂之經致胞絡內血絶不通故也衝任之脈起於胞內為經脈之海手太陽小腸之經也手少隂心之經也此二經為表裏主上為乳汁下為月水風冷傷其經血血性得溫則宣流得寒則澀閉既為風冷所搏血結於內故令月水不通也又云腸中鳴則月水不來病本在胃胃氣虛不能消化水榖使津液不生血氣故也所以梅師方單用厚朴其理可見再出易簡方又云醉以入房則內氣竭絶傷於肝使月水衰少不來所以爾者肝藏於血勞傷過度血氣枯竭於內也又先唾血及吐血下血謂之脫血名曰血枯亦月水不來也所以爾者津液減耗故也但益津液其經自下也診於腎脈微澀者是月水不通也又左手關後尺內浮為陽絶無膀胱脈也月水則閉又肝脈沉而急隱之亦然時小便難苦頭眩痛腰背痛足寒時疼月水不來時恐得之時有所墮墜也月水不通久則血結於內生塊變為血瘕亦作血癥血水相并壅澀不通脾胃虛弱變為水腫也所以然者脾候身之肌肉象於土土主尅消於水水血既并脾氣衰弱不能尅消故水氣流溢浸漬肌肉故腫滿也産寶方論論曰經脈不通日久此非細事實為沉病若是室女經脈不通初因貪食酸鹹之物遂致血脈乾涸變成勞疾若因經脈正行誤食熱麵生冷房室遂成此疾腹內顆塊誤認為胎時日稍深必見困篤養生必用論經病第七初虞世云女子十四天癸至任脈通月事以時下故令有子天癸者物之自然月者以月至經者有常也其來不可過與不及多與少反此皆謂之病不行尤甚百疾生焉血既不能滋養百體則髮落靣黃身羸瘦血虛則發熱故身多熱水不足則燥氣燔燥氣燔則金受邪金受邪則肺家嗽嗽則為肺癰肺痿必矣醫見經不行則用虻蟲水蛭等行血藥見熱則用除熱諸寒藥實出妄意就中不行以藥行之為害滋大經水枯竭則無以滋養其能行乎譬猶索萬金於乞丐之人雖捶楚並下不可得也但服以養氣益血諸藥天癸自行又有一種婦人盛實月經瘀閉利之則行自有證候學者宜審焉當歸散治血脈不通當歸穿山甲灰炒蒲黃各半兩炒辰砂一錢麝香少許右為細末研停每服二錢熱酒調下如不喫酒薄荷醋湯亦可琥珀散治心膈迷悶腹臟撮痛氣急氣悶月信不通等疾天台烏藥二兩當歸莪茂各一兩右為細末每服二錢溫酒調下服後以食壓之大忌生冷油膩等物若産後諸疾用炒薑酒調下已上出婦人經驗方救急療婦人月經不調或一月不來或隔月不來或多或少臍下絞痛靣色痿黃四體虛吸羸瘦不能食方當歸川牛膝牡丹皮桃仁各一兩半大黃芎藭土瓜根芍藥朴消桂心虻蟲去翅足炒水蛭各半兩炒右㕮咀以水九升煮取三升分溫五服忌如常法療月經不通腹中痛見産寶方牛膝六分大黃桃仁去皮尖雙仁炒細辛各五分川芎當歸各四分水蛭三分糯米炒黃右為末煉蜜圓如梧桐子大每服二十圓空心溫酒下治月水不通出梅師方已試有驗厚朴薑汁炙香細切不以多少濃煎去滓空心溫服治婦人經候不來數月臍腹㽱痛或有一塊上下相拄飲食減少腹滿惡心大便祕澀者宜服局方北亭圓用石菖蒲馬鞭草煎湯送下三四十圓兩服必通萬病圓治女人月經淤閉月候不來繞臍寒疝痛徹及産後血氣不調腹中生瘕結而不散及癥瘕等病乾漆杵碎炒令大煙出煙頭青白如此一時久牛膝去苗酒浸一宿焙各一兩右為末以生地黃汁一升入二味藥末銀石器內慢火熬俟可圓即圓如梧桐子大空心米飲或溫酒下二圓日再勿妄加病去止藥紅花當歸散治婦人血藏虛竭或積瘀血經候不行或斷續不定時作腹痛腰胯重疼攻刺小腹緊硬及室女月經不通並宜服之紅花當歸尾紫葳牛膝甘草蘇木捶碎細挫各二兩白芷桂心各一兩半赤芍藥九兩劉寄奴去梗五兩右為細末空心熱酒調三錢服食前臨卧再服若血久不行濃煎紅花酒調下孕婦休服一名凌霄花散鱉甲圓治婦人月經不調肌肉黃瘁脅下積氣結硬時發刺痛漸成勞狀出博濟方鱉甲去裙醋炙桂心三稜醋煮急炒牡丹皮牛膝去苗炒訶子肉琥珀大黃煨土瓜根桃仁去皮尖雙仁麩炒右各等分為細末煉蜜圓如梧桐子大煎桃仁湯送下十五圓破血癥氣塊尤妙桃仁煎治月水不調阻滯不通博濟方大黃炮朴硝桃仁去皮尖雙仁麩炒各二兩虻蟲一兩去足翅炒黑用右為細末用醋五升入銀石器內慢火熬成膏可圓圓如梧桐子大當日晚不須喫食五更初以溫酒吞下一圓至明日午際取下如赤豆汁或似雞肝蝦蟇衣其病下了即一圓分作二服未下再服候鮮紅即住服仍以調氣湯散補之室女月水不通方論第八論曰夫衝任之脈起於胞內為經脈之海手太陽小腸之經手少隂心之經也二經為表裏心主於血上為乳汁下為月水也女子十四而天癸至腎氣全盛衝任流通經血既盈應時而下名之月水常以三旬而一見謂之平和也若愆期者由勞傷血氣壅結故令月水不通也通經圓治婦人室女月候不通疼痛或成血瘕桂心青皮大黃煨川椒莪茂川烏炮去皮乾漆碎之炒令煙盡當歸桃仁去皮尖雙仁麩炒乾薑各等分右為細末分為四分用一分以米醋熬成膏和餘分藥末成劑臼中治之圓如梧桐子大朗乾每服二十圓淡醋湯下至三十圓溫酒亦得空心食前服治室女月水不通出聖惠方雄鼠屎一兩燒存性為細末空心溫酒調下一錢神效室女經閉成勞方論第九寇宗奭曰夫人之生以氣血為本人之病未有不先傷其氣血者世有室女童男積想在心思慮過當多致勞損男子則神色先散女子則月水先閉何以致然蓋憂愁思慮則傷心心傷則血逆竭血逆竭則神色先散而月水先閉也火既受病不能榮養其子故不嗜食脾既虛則金氣虧故發嗽嗽既作水氣絶故四肢乾木氣不充故多怒鬢髮焦筋痿俟五臟傳遍故卒不能死者然終死矣此一種於勞中最難治蓋病起於五臟之中無有已期藥力不可及也若或自能改易心志用藥扶接如此則可得九死一生舉此為例其餘諸勞可按脈與證而治之張氏云室女月水久不行切不可用青蒿等涼藥醫家多以為室女血熱故以涼藥解之殊不知血得熱則行冷則凝養生必用方言之甚詳此説大有理不可不知若經候微少漸漸不通手足骨肉煩疼日漸羸瘦漸生潮熱其脈微數此由隂虛血弱陽往乘之少水不能滅盛火火逼水涸亡津液當養血益隂慎無以毒藥通之宜柏子仁圓澤蘭湯柏子仁圓柏子仁炒别研牛膝卷柏各半兩澤蘭葉續斷各二兩熟地黃三兩右為細末煉蜜圓如梧桐子大空心飲下三十圓澤蘭湯澤蘭葉三兩當歸芍藥各一兩甘草半兩右為粗末每服五錢水二盞煎至一盞去滓溫服沉香鱉甲散治室女榮衛不調經候凝滯或時頭目昏悶上膈積涎肢體不利五心虛煩飲食進退多困少力博濟方沉香甘草炙檳榔各三分木香一兩鱉甲一兩半常山當歸柴胡人參半夏桂心生地黃白茯苓青皮陳皮各一兩右為細末每服二錢水一盞生薑三片煎至七分溫服空心日三服金花散治室女骨蒸熱勞藿香零陵香延胡索芍藥白芷川芎當歸桂心各一分蓮子心晚蠶蛾各二分右為細末溫酒調下一錢日二服劫勞散治心腎俱虛勞嗽二三聲無疾遇夜發熱熱過即冷時有盜汗四肢倦怠體劣黃瘦飲食減少夜卧恍惚神氣不寧睡多異夢此藥能治微嗽有唾唾中有紅線名曰肺痿若上件疾不治便成羸劣之疾白芍藥六兩綿黃耆甘草人參當歸半夏白茯苓熟地黃五味子阿膠各二兩炒右㕮咀每服三大錢水盞半生薑十二片棗三箇煎至九分無時溫服日進三服陳總領日華云鄉人楊元鼎女及筓病證甚危一歲之間百藥俱試無有效者亦嘗從豫求治法無有應之者偶遇名醫得此方只一料遂除根專録此方傳人資血湯治婦人血熱氣虛經候澀滯不通至使血聚肢體麻木渾身疼痛煩倦或室女年及經脈未行日漸黃瘦將成勞疾切不可便投紅花破硬等藥他日為患也若是前證則增寒發熱五心煩躁飲食減少宜服此藥滋養而通利之馬鞭草荆芥穗各四兩桂心枳殼川芎當歸赤芍藥各二兩牡丹皮一兩右為粗末每服四錢烏梅一箇水二盞同煎至一盞去滓空心食前日四服有此證服至半月經脈自通此方至妙不可輕視非一二服便見特逹之效而鄙之仍服後素有諸疾因此藥皆去矣麥煎散治少男室女骨蒸婦人血風攻疰四肢心胸煩壅出蘇沈艮方鱉甲大黃煨常山赤茯苓柴胡白术當歸乾漆炒令煙盡生地黃石膏各一兩甘草半兩右為細末每服二錢水一盞小麥五十粒煎至六分食後臨卧時溫服有虛汗加麻黃根一兩此黃州吳判官方治骨熱黃瘦口臭肌熱盜汗極效麥煎散甚多此方吳君寶之如希世之珍其效可知鱉煎圓治男子婦人童男室女五勞七傷傳疰飛尸尸注八極骨蒸肺痿黃瘦虛勞無力肌肉不生婦人血蒸五心煩熱血風勞氣室女月閉黃瘦氣塊腹痛經脈不調乾嗽咽膈不利癥瘕積塊臉赤口瘡已上等疾無不效驗黃耆柴胡枳殼知母白茯苓沉香人參附子木香升麻肉桂胡黃連杏仁當歸常山羌活京三稜烏梅肉安息香明者同胡桃肉細研右十九味修製了各稱一兩為末用活鱉一箇重十兩或半斤者以河水養七日須逐日換新水用童子小便五升無灰酒五升銀石器內慢火熬百沸先更入桃柳枝東南上者各銼三合烏梅五十箇拍破此三味用綿裹同鱉煎煮至一半去桃柳枝等三味鱉爛取去將肉研如膏骨併殼焙乾為末再入汁中熬如漆色或更入酒少許此在臨時斟酌盛放瓷器中搜和前藥入臼中杵千下圓如梧桐子大丈夫婦人十五歲已上二十圓至三十圓溫酒下婦人荆芥酒下所煮膏子須契勘多少勿令剩却但少些子不妨却别熬酒若膏剩恐鱉不全故也凡服此藥恐熱三日更須服八仙飲子一服解之八仙飲子常山白术秦芁洪州鬼臼赤芍藥甘草紫蘇銀州柴胡右等分洗淨為粗末每服半兩水一碗烏梅肉二個蔥白薤白桃柳槐枝各七寸同煎至一盞去滓溫服滓併煎治女子經脈不行胸膈滿悶身體麻木或有寒熱證候厚朴牡丹皮茅香藿香甘草各三錢陳皮生半夏麥芽當歸蒼术炒各半兩赤芍藥三分右㕮咀每服半兩水一大盞薑三片煎服熱甚加北柴胡三錢半羅宅大師傳有效血枯方論第十出駱龍吉方腹中論曰有病胸脅支滿者妨於食病至則先聞腥臊臭出清液四肢清目眩時時前後血病名曰血枯此得之年少時有所大脫血若醉入房中氣竭肝傷故月事衰少不來也注云夫藏血受天一之氣以為滋榮者也其經上貫膈布脅肋今脫血失精肝氣已傷故血枯涸而不榮胸脅滿以經絡所貫然也妨於食則以肝病傳脾胃病至則先聞腥臊臭出清液則以肝病而肺乘之先唾血四肢凊目眩時時前後血皆肝病血傷之證也烏賊魚骨圓治婦人血枯胸膈四肢滿妨於食飲病至聞腥臊臭氣先唾血出清液或前後泄血目眩轉月事衰少不來烏賊魚骨去甲四兩䕡茹一兩右為末以雀卵和成劑圓如小豆大每服五圓加至十圓以鮑魚煎湯下以飯壓之蓯蓉圓治婦人胸脅支滿聞腥臊氣唾血目眩不能飲食泄血不已日久血枯蓯蓉酉浸熟地黃白茯苓兔絲子製附子炮當歸炒白石英研五味子禹餘糧製研烏賊魚骨去甲各一兩人參半兩右為末煉蜜為圓如梧桐子大酒下二三十圓米湯亦可空心日中臨卧各一服治婦人先有所脫血或醉入房勞傷故月事衰少不來宜乾地黃湯乾地黃澤蘭葉白茯苓人參五味子附子炮禹餘糧製當歸右等分為粗末每服三錢薑五片水一盞煎至七分空心溫服磁石圓治婦人隂氣衰弱血枯不榮月事不來磁石製研白茯苓附子炮乾地黃人參當歸右各一兩為細末煉蜜圓如梧桐子大酒下三十圓米湯亦可空心日中臨卧各一服月水不利不流利也方論第十一夫婦人月水不利者由勞傷血氣致令體虛而受風冷客於胞內損傷衝任之脈手太陽少隂之經故也衝任之脈為經脈之海皆起於胞內手太陽小腸之經手少隂心之經也此二經為表裏主下為月水風冷客於經絡搏於血氣血得冷則壅滯故令月水來不宣利也診其脈寸口弦苦腹痛主月水不利孔竅生瘡又肝脈沉是厥隂經也沉為隂主月水不利腰腹痛尺脈滑血氣實經絡不利又尺脈來而斷絶者月水不利也寸關調如故而尺脈絶不至者月水不利也當患小腹引腰痛氣滯上攻胸膈也白薇圓治婦人月水不利四肢羸瘦喫食減少漸覺虛乏故令無子白薇柏子仁白芍藥當歸桂心附子􅒝薢白术吳茱萸木香細辛川芎檳榔各半兩熟地黃二兩牡丹皮一兩紫石英一兩人參三分石斛白茯苓澤蘭葉川牛膝各三分右為細末煉蜜為圓如梧桐子大每服三十圓空心晚食前溫酒吞下療女人臍下憋逆氣脹滿月經不利血氣上攻欲嘔不得睡出産寶方當歸四錢乾漆三錢炒令煙盡右為細末煉蜜圓如梧桐子大空心溫酒下十五圓牡丹散治婦人月水不利臍腹疼痛不欲飲食牡丹皮川大黃炒各一兩赤茯苓生地黃桃仁當歸桂心赤芍藥白术各三分石韋去毛木香各半兩右㕮咀每服三大錢水一盞薑三片煎七分去滓空心溫服牛膝散治婦人月水不利臍腹㽱痛牛膝一兩桂心赤芍藥桃仁延胡索當歸牡丹皮川芎木香各三分右為末每服方寸匕溫酒調下食前月水行或不行心腹刺痛方論第十二論曰夫婦人月經來腹痛者由勞傷氣血致令體虛風冷之氣客於胞絡損於衝任之脈手太陽少隂之經衝脈任脈皆起於胞內為經脈之海也手太陽小腸之經手少隂心之經也此二經為表裏主下為月水其經血虛則受風冷故月水將行之際血氣動於風冷風冷與血氣相擊故令痛也亦可就第七卷第十五論尋方若經道不通繞臍寒疝痛徹其脈沉緊此由寒氣客於血室血凝不行結積血為氣所衝新血與故血相搏所以發痛譬如天寒地凍水凝成氷宜溫經湯及桂枝桃仁湯萬病圓方見第一卷第七論溫經湯方當歸川芎芍藥桂心牡丹皮莪茂各半兩人參甘草牛膝各一兩右㕮咀每服五錢水一盞半煎至八分去滓溫服桂枝桃仁湯桂枝芍藥生地黃各二兩桃仁製五十個甘草一兩右為粗末每服五錢水二盞薑三片棗一箇煎至一盞空心溫服若經候頓然不行臍腹疼痛上攻心脅欲死或因不行結積漸漸成塊臍脹如覆杯久成肉塊不可復治由驚恐憂思意所不決氣鬱抑而不舒則乘於血血隨氣行滯則血結以氣主先之血主後之宜服桂枝桃仁湯不瘥宜地黃通經圓已成塊者宜萬病圓方見前地黃通經圓熟地黃三兩虻蟲去頭足翅炒水蛭用糯米同炒黃去糯米桃仁製各五十箇右為細末煉蜜圓如梧桐子大空心溫酒下五圓未知加至七圓琥珀散治婦人月經壅滯每發心腹臍㽱痛不可忍及治産後惡露不快血上搶心迷悶不省氣絶欲死出本事方三稜莪术赤芍藥牡丹皮劉寄奴當歸熟地黃桂心甘菊花真蒲黃炒各一兩細銼右前五味用烏豆一升生薑半斤切片米醋四升同煮豆爛為度焙乾入後五味同為細末每服三錢空心食前溫酒調下一方不用菊花蒲黃却用烏藥延胡索亦佳豫家之祕方也若是尋常血氣痛只一服産後血衝心二服便下常服尤佳前後救人急切不少此方易合宜多合以救人烏豆一升約用五兩又一方延胡索當歸各等分右二味為粗末每服三錢薑三片水一大盞煎至七分去滓稍熱服陳氏方有桂名如神湯最治腰痛雷公炮炙論只用延胡索一味治心痛僕詳此方大能治血氣腰腹痛藥簡功專治疾有效蓽撥圓治婦人無時月水來腹痛蓽撥鹽炒去鹽為末蒲黃各一兩炒右為細末煉蜜圓如梧桐子大每服三四十圓食後用鹽米飲吞下月水不斷方論第十三夫婦人月水不斷者由損傷經血衝任脈虛損故也衝任之脈為經脈之海手太陽小腸之經也手少隂心之經也此二經為表裏主下為月水若勞傷經脈衝任氣虛故不能制經血令月水不斷也凡月水不止而合隂陽則冷氣上入於臟令人身體靣目痿黃亦令絶子不産也若經候時行時止或淋瀝不斷腹中時痛其脈沉細此因寒熱邪氣客於胞中衝任不調此非虛弱蓋邪氣伏留滯於血海譬如有積之人下利不定有所去即愈宜牡丹圓牡丹皮牡蒙附子炮大黃蒸葶藶炒苦梗茯苓各半兩當歸製厚朴吳茱萸川椒炒出汗人參川芎北柴胡桂心乾薑各半兩細辛一兩半虻蟲五十箇去頭足翅炒右為細末煉蜜圓如梧桐子大空心溫酒下十圓未知漸加至二十圓以知為度續斷圓治婦人月水不斷口乾心煩四肢羸瘦飲食無味漸加乏弱川續斷當歸烏賊骨黃耆牛角䚡燒五味子甘草龍骨煅研赤石脂熟地黃各一兩地榆半兩艾葉附子乾薑川芎各三分右為末煉蜜圓如梧桐子大每服三十圓食前溫酒下禹餘糧圓治婦人久冷月水不斷靣色痿黃四肢瘦弱心神虛煩飲食減少禹餘糧二兩鹿角膠三分粉炒紫石英續斷赤石脂熟地黃川芎各一兩乾薑黃耆艾葉柏葉炒當歸炒人參白茯苓各半兩右為末煉蜜圓如梧桐子大每服三十圓空心米飲下牡蠣圓治婦人血海虛損月水不斷牡蠣粉赤石脂代赭石各一兩阿膠川芎當歸鹿茸續斷乾薑各三分甘草一分右為末煉蜜圓如梧桐子大每服三十圓食前溫酒下療經血不止黃芩五分當歸柏葉蒲黃各四分生薑二分艾葉一分生地黃二十四分伏龍肝十二分右㕮咀用水二升煎取八合分為二服療經血不止歌曰出婦人經驗方已試有效婦人經血正淋漓舊瑞蓮蓬燒作灰熱酒一杯調八字自然安樂更無疑又一方蓮蓬殼拒霜花右二味等分為末每服二錢空心米飲調服婦人殺血心痛方論第十四凡婦人血崩心痛甚者名殺血心痛小産血過多而心痛甚者亦然烏賊魚墨炒醋湯調下此魚腹內有墨汁遇見人過必吐其墨以蔽其身崩暴下血不止方論第十五凡三十六方論曰夫婦人崩中者由臟腑傷損衝脈任脈血氣俱虛故也衝任之脈為經脈之海血氣之行外循經絡內榮臟腑若無傷損則隂陽和平而氣血調適經下依時若勞動過度致臟腑俱傷而衝任之氣虛不能約制其經血故忽然而下謂之崩中暴下診其寸口脈微長尺脈微弦寸口脈微長為寒在上焦但吐爾今尺脈微弦如此即小腹痛引腰脊痛者必下血也若經候過多遂至崩漏色明如水下得溫則煩甚者至於昏悶其脈數疾小為順大甚者逆此由隂陽搏為熱所乘攻傷衝任血得熱則流散譬如天暑地熱則經水沸溢陽傷於隂令人下血當補其隂宜服小薊湯阿茄陀圓小薊湯小薊莖葉洗切研取汁一盞生地黃汁一盞白术半兩銼右三件入水一盞煎至一半去滓溫服阿茄陀圓胡椒紫檀鬱金茜根小蘖皮乃山石榴皮也右等分為細末滴水圓如梧桐子大阿膠湯化下二圓琥珀散治崩暴下血陳總領方赤芍藥香附子荷葉枯男子髮皂莢水洗當歸棕櫚炒焦烏紗帽是漆紗頭巾取陽氣衝上故也右等分除棕外其餘並切粗片新瓦上煅成黑炭存性三分為細末每服三五錢空心童子小便調下如人行十里再進一服不過七八服即止如産後血去多加米醋京墨麝少許親戚黃守正卿為和劑局日內子凌夫人忽苦此疾危殆百藥不效偶得此方旋即安愈張聲道云大率治血崩先用此譬如治痢有積不先去之徒服斷下藥一時暫止久則毒氣愈深甚至危殆血崩乃經脈錯亂不循故道淖溢妄行一二日不止便有積瘀之血凝成窠臼更以藥澀住轉見增劇宜先以五積散加醋煎投一二服次服靈脂散及順氣藥去故生新自能平治此切當之説五靈脂散治婦人血山崩及治丈夫脾積氣張氏云治血崩諸藥不能止者妙好五靈脂炒令煙盡為末每服一錢溫酒調下此藥兼能解藥毒及蛇蝎蜈蚣咬塗傷處立愈一方每服三錢水酒童便各半盞煎至八分通口服名抽刀散治産後有病服三服散惡血或心腹脅肋腳痛不可忍者或只用童子小便尤佳或中風即入草烏頭半錢重同煎此鄧知縣方張氏云亦治腸風下血如不能飲酒者煎烏梅柏葉湯調下如心煩口乾渴者加蒲黃炒減半用一方燒存性霹靂酒調下然此藥氣惡難喫燒之存性極妙又一方五靈脂十兩為末水五大盞煎至三盞去滓澄清再煎成膏入神麴二兩為末和圓如梧桐子大每服二三十圓溫酒下荆芥散治婦人崩中連日不止夏太君娘娘方用荆芥穗於燈盞多著燈心好麻油點燈就上燒荆芥焦色為細末每服三錢童便調下獨聖散治婦人血山崩不止出經驗方防風去義蘆右不以多少為細末酒煮白麵清調下二錢空心食前日二服更以麵作糊酒投之極驗已上三方似非止血之藥如靈脂荆芥防風皆是去風之藥然風為動物衝任經虛被風所傷致令崩中暴下僕因覽許學士傷寒脈歌曰脈浮而大風傷榮榮血也而用此藥方悟古人見識深奧如此一方熟艾如雞子大阿膠半兩乾薑一錢右為粗末用水五盞先煮艾薑至二盞半入膠消洋溫分二服空心服一日服盡又一方牛角䚡烏賊骨各一分麝香一錢右為細末入麝香令停酒調下一錢匕日二三服神應散治婦人血崩不止桂心不以多少甘鍋內煅微存性為末每服一二錢米飲調下一方治崩中下血出本事方黃芩不以多少為細末每服一錢霹靂酒調下許學士云崩中多是用止血藥補血藥此治陽乘於隂前所謂天暑地熱經水沸溢是也近朝有王御醫值夜忽有一宫女血如山崩其時暑月藥笥中只有大順散兩服用冷水調服旋即奏效以此知醫要權變金華散亦可金華散治婦人血室有熱崩下不止服溫藥不效者延胡索瞿麥穗當歸乾葛牡丹皮各一兩石膏二兩桂心别為末三分蒲黃半兩葳靈仙三分右為細末每服二錢水一盞煎至六分空心溫服日二服凡血崩之疾亦有隂陽冷熱之不同不可一槩用藥僕嘗療一婦人崩漏暴下諸醫投薑桂附子等藥服之愈甚召豫診之六脈緊數遂用此藥兼局方龍腦雞蘇元數服即安本事方單用黃芩者亦此意也如聖散治婦人血山崩棕櫚烏梅各一兩乾薑一兩五分並燒過存性右為細末每服二錢烏梅酒調下空心食前服久患者不過三服即愈一方用烏梅燒灰為末烏梅湯調下一方用棕櫚燒存性為末湯破酒令淡調下三錢空心服一方用棕櫚白礬煅為末酒調二錢服治婦人血崩屢效方當歸白芍藥乾薑棕櫚各等分右各煅存性碾為細末稱過醋湯調以有節朱筋左攪四十九轉食前服千金翼治婦人崩中去血不止大小薊根一斤用酒一斗漬五宿任意服之千金方有白茅根六兩半酒煮服縮砂散治血崩新縮砂仁不以多少於新瓦上炒香為細末米飲調下三錢一方用益智炒為細末鹽米飲調下如神散治婦人血崩不止赤白帶下香附子赤芍藥各等分右為細末每服二錢鹽一捻水一盞煎至七分溫服無時候日二服十服見效一方用香附子去毛炒焦為細末用極熱酒調下二錢放溫服不過兩服立愈昏迷甚者三錢匕如山崩不可止者亦能解之米飲調亦可許學士云治下血不止或成五色崩漏常服資血調氣是婦人仙藥也已上並出婦人經驗方煮附圓治婦人室女一切血氣經脈不調臍腹㽱痛靣色痿黃心怔乏力腹脹脅痛頭暈惡心飲食減少崩漏帶下大腸便血積聚癥瘕並皆治之虔心服餌自見其功爾已上三方大同小異出産寶方香附子不以多少先擦去毛用好醋煮出焙碾為末醋煮糊為圓如梧桐子大每服三十圓米飲送下無時候婦人數墮胎由氣不下降所以胎氣不固此藥尤妙一方有艾同煮亦好治血崩方夏枯草為細末每服二錢米飲調下無時候治崩中下血不止小腹痛芍藥一兩半炒黃柏葉六兩微炒右水一升煎取六合入酒五合再煎取七合空心分為兩服一方為細末酒調二錢一方有鹿角膠等分炒燥為細末酒調服方寸匕治白帶臍腹疼痛靣黃瘦悴出千金聖惠方治崩中下血久不止或赤或黑臍下痛側柏炒芍藥龜甲炙桑耳各六分乾地黃黃耆續斷各五分當歸炒艾葉牛角䚡煅各四分禹餘糧十分右為末煉蜜圓如梧桐子大每服三十圓煎黃耆湯空心下治崩中晝夜不止醫不能治芎藭一兩生地黃汁二合先用酒五升煮芎藭一升去滓下地黃汁再煎三二沸分為三服不耐者漸進小品方無地黃汁不飲酒者水煮亦可一方丁香二兩為細末用酒三升煮取一升空心頓服必效方用丁香百顆酒煎服梅師方同治忽患崩中血不止結作血片如雞肝色碎爛芎藭十二分阿膠青竹茹各八分續斷地榆小薊根各十分當歸六分生地黃伏龍肝各十二分右用水九升煮取三升去滓分作三服先服此藥後服補藥圓子阿膠鱉甲川芎當歸赤石脂丹參各六分續斷甘草鹿茸各五分龍骨十一分龜甲十分地榆四分烏賊骨八分右為末煉蜜圓如梧桐子大空心酒下二十圓日二服常煮小薊汁服之尤佳治崩中泄血無度經年淋瀝并黃瘦骨立芍藥白芷黃耆龜甲川芎烏賊骨各八分乾地黃牡礪五色龍骨乾薑各十分桂心六分附子五箇炮右為細末空心酒調方寸匕又一方白芷牡蠣龍骨芍藥赤石脂阿膠當歸川芎鼉甲烏賊骨人參各六分艾葉四分乾地黃八分呵子四分乾薑黃耆各五分右為細末空心酒調方寸匕竹茹圓治婦人崩中赤白帶下鄧元老方當歸白术青木香蠶蛻煅墨棕刷煆穿山甲煅各一兩地榆竹茹川芎白茯苓粉草血餘煅牡蠣煅綿子煅各半兩熟地黃四兩赤石脂煅三兩右七味煅藥用綿子裹定入瓶子內用鹽泥固濟用炭則半煅存性却同前藥碾為細末煉蜜圓如梧桐子大每服四十圓空心溫酒吞下經驗方治崩暴下血百草霜二錢狗膽汁一處拌停分作兩服當歸酒調下如聖無比散治血山崩晚蠶沙一兩伏龍肝半兩同為細末酒調二錢匕千金治崩中去血不止千金翌無茅根白茅根二斤小薊根五斤一方無小薊根右二味細切用酒五升煮取四升去滓分溫四服婦人崩中無問久近悉皆治之伏龍肝一斤小薊根桑寄生續斷地榆艾葉各三兩阿膠當歸赤石脂厚朴各二兩生薑五兩右十味切以水一斗煮取三升絞去滓分作三服忌如常法崩中帶下方論第十六凡三十方論曰崩中帶下者何答曰其患有五夫病之中人皆有受處因起之候須盡心講究竊尋方書惟言帶下有色之與形此不參先賢醫中之理也且五崩是婦人極重之患療之最難後之學者莫識其源殷幼習醫方濟衆服餌當極濟人之道遍以思慮於兹彌久其功頗有精妙夫此病者起於風氣寒熱之所傷或産後早起不避風邪風邪之氣入於胞門或中經脈流傳臟腑而發下血名為帶下若傷足厥隂肝之經其色則青如泥色若傷手少隂心之經其色赤如紅津若傷手太隂肺之經其色則白形如涕若傷足太隂脾之經則其色黃如爛瓜若傷足少隂腎之經則其色黑如衃血此為其因也問曰風邪氣之所中是人皆受之何為婦人獨患此病答曰五臟六腑男女雖同其中細微各有差别緣婦人有胞門子臟風冷中之則為所病若男子則為他病矣又問何以名為帶下復有冷熱者何答曰脈有數經名字不同竒經八脈有帶在腰如帶之狀其病生於帶脈之下其有冷熱者即隨其性也又號崩中者二帶之下别名也諸君子有留心於醫存志備急者以此推之萬不失一崩中漏下生死脈方論第十七論曰夫婦人崩中漏下者由勞傷血氣衝任之脈虛損故也衝脈任脈為經脈之海皆起於胞內而手太陽小腸之經也手少隂心之經也此二經上為乳汁下為月水婦人經脈調適則月水依時若勞傷衝任氣虛不能制其經脈血非時而下淋瀝而不斷謂之漏下也致五臟傷損五臟之色隨臟不同若五臟皆虛損者則其色隨血下診其脈寸口弦而大弦則為藏大則為芤藏則為寒芤則為虛虛寒相搏其脈為牢婦人即半産而漏下又云尺脈急而弦大風邪入少隂之經女子漏自下赤又漏下赤白不止脈小虛滑者生脈大緊實數者死也又漏血下赤白日下血數斗脈急疾者死遲者生也又云尺寸脈虛者漏血漏血脈浮不可治也若經候過多其色瘀黑甚者崩下吸吸少氣臍腹冷極則汗出如雨尺脈微小由衝任虛衰為風冷客乘胞中氣不能固可炙關元百壯在臍下當中三寸宜鹿茸圓鹿茸燎去毛酥炙赤石脂禹餘糧製各一兩艾葉柏葉附子炮各半兩熟地黃冼焙當歸續斷各二兩右為細末酒糊圓如梧桐子大空心溫酒下三十圓柏葉散治婦人崩中漏下不問年月遠近柏葉續斷川芎當歸生乾地黃龜甲鼉甲各一兩半禹餘糧二兩半阿膠赤石脂牡蠣地榆艾葉鹿茸各一兩右為末每服二錢食前粥飲調下一方有丹參如鹿茸數煉蜜圓如梧子大每服三四十圓空心溫酒吞下益母草散治赤白惡露下不止益母草開花時採隂乾為細末空心溫酒調二錢日三服療帶下赤白年月深久不差乾薑半兩白芍藥二兩右各炒黃色同為末空心米飲調二錢日兩服張氏方乾薑芍藥等分又云加香附子等分甘草減半各炒黃色同為末空心米飲調下方寸匕白芷散治婦人赤白帶下白芷一兩海螵蛸二箇燒胎髮一團煅右為細末空心溫酒調下二錢乳香散治赤白帶下草果一箇去皮入乳香一小塊用麵餅裹火炮焦黃留性取出和麵用之右為細末每服二錢陳米飲調下重者三錢破故紙散治赤白帶下破故紙石菖蒲等分並銼炒右為末每服二錢用菖蒲浸酒調溫服更入斑貓五分去翅頭足糯米同炒黃去米搐鼻香治子宫久冷赤白帶下牡蠣煅黃狗頭骨煅紫梢花韶腦母丁香蛇床子破故紙桂心等分右為細末煉蜜圓如雞頭大臨事用一粒白礬圓治婦人血臟久冷赤白帶下補虛進食暖血海北礬四兩枯大附子二箇二兩黃狗頭骨灰四兩右為末粟米粥為圓如梧桐子大每服三十圓醋湯吞下或飯飲亦可空心日三服忌生冷毒物伏龍肝散治婦人赤白帶下久患不差肌瘦黃瘁多困乏力棕櫚不以多少燒灰火然急以盆蓋蔭令火住伏龍肝於鍋竈直下去取赤土炒令煙盡屋梁上塵懸長者如無以竈頭虛空中者炒令煙盡於淨地出火毒右三味等分碾和令停入龍腦麝香各少許每服二錢溫酒調下淡醋湯亦可患十年者半月可安一親戚婦人年四十五經年病崩漏不止靣黃肌瘦髮黃枯稿語言聲嘶服諸藥無效召僕診之六脈微濡問之服何藥云凡是當歸川芎澀血諸品丹藥服之皆不作效僕遂合博濟方伏龍肝散兼白礬圓服之愈茯苓散治婦人血海不調因虛冷成積經絡無定赤白帶下崩中不止靣色痿黃胎氣多損三方出博濟白茯苓青木香杜仲菖蒲乾地黃柏子仁秦芁青皮兔絲子訶子皮當歸艾葉青石脂五加皮牛角䚡烏賊骨等分右為末每日空心以糯米粥一盞將一匙粥攤溫抄藥一錢相和喫下後喫餘粥或有胎息用鯉魚糯米粥下治冷白帶下桑寄生芍藥柏葉各四分桑耳禹餘糧各六分吳茱萸乾地黃各八分烏賊骨五分右為細末空心用飯飲調下二錢七治白崩中不絶牡蠣禹餘糧鼉甲各六分黃皮阿膠烏賊骨續斷白芷各四分當歸赤石脂各六分白石脂龍骨各五分右為末煉蜜圓如梧桐子大每服四十圓空心溫酒下治帶下茅花一握炒棕櫚炭三寸嫩蓮葉三張甘草節一錢右為細末空心酒調方寸匕治赤白帶下骨立者崔元弼方地榆一斤洗銼用水三升煮至一半去滓再煎如稠餳絞濾空心服三合日二服聖惠方治漏下五色亦治嘔血地榆三兩銼木草注云地榆主帶下十二病一曰多赤二曰多白三曰月水不通四曰餘蝕五曰子藏堅六曰子門僻七曰合隂陽患痛八曰小腹寒痛九曰子門閉十曰子宫冷十一曰夢與鬼交十曰五臟不足用醋一升煮十餘沸去滓食前稍熱服一合治婦人漏下不斷方亂髮皂莢水冼燒為細末空心溫酒調下一錢又一方鹿角燒灰細研食前溫酒調下二錢又一方桃仁燒灰細研食前溫酒調下二錢千金溫經湯治女人曾經小産或帶下三十六病腹脹唇口乾日暮發熱小腹急痛手足煩熱大腑不調時時泄利經脈不調久不懷孕吳茱萸三兩白芍藥當歸芎藭各二兩麥門冬去心半夏各二兩半人參阿膠粉炒牡丹皮去心甘草桂心各一兩右為粗末每服三錢水一盞薑五片煎七分去滓空心食前溫服忌生冷羊肉生蔥海藻菘菜等千金方同紫金散治衝任虛損月水過多崩漏帶下淋瀝不斷腰腹重痛凡是五色帶疾並皆治之男六德續添禹餘糧煅赤釅醋中淬如此者七次細研水飛挹乾稱三兩赤石脂煅龍骨煅石器研各一兩白芍藥川芎附子熟地黃當歸各一兩乾薑炮肉桂各半兩右為細末每服二錢入麝香少許米飲調下空心食前一日二服文仲治婦人崩中漏下青黃赤白使人無子方禹餘糧煆研赤石脂煅研牡蠣煆研桂心烏賊骨去皮伏龍肝炒研右等分為末溫酒調下方寸匕日二服忌生蔥又一方鹿茸酥炙當歸各二兩蒲黃半兩炒右三味為末溫酒調下五分匕日三服又一方京墨為末二匕若燒露蜂房為末三指撮酒調服又一方常炙豬腎食之千金療婦人白崩中方乾地黃四兩芎藭阿膠桂心赤石脂小薊根各二兩伏龍肝七枚如雞子大右七味切以酒六升水四升煮取三升去滓入膠令洋分為三服日三服千金翼有白馬通汁二升用白石脂沉香牡丹圓治婦人血海久虛經候不利赤白帶下血氣衝心多發刺痛四肢困煩博濟方沉香三分牡丹皮去心赤芍藥當歸桂心川芎黃耆去蘆蜜炙人參茯苓山藥白芷橘紅吳茱萸炮七次炒白巴戟去心木香牛膝酒洗去苗枳殼去瓠麩炒肉豆䓻製厚朴生乾薑白龍骨各半兩右為末煉蜜圓如梧桐子大每服二十圓空心溫酒下若心腹痛煎白芷酒下廣濟治帶下病方芍藥七兩熬令黑為末每服三錢匕以酒調下千金治帶下方脈數者可用枸杞根一斤生地黃五斤右二味以酒一斗煮取五升分為三服白芷暖宫圓暖血海實衝任治子宫虛弱風寒客滯因而斷緒不成孕育及數嘗墮胎或帶下赤白漏下五色頭目虛暈吸吸少氣胸腹苦滿心下煩悸臍腹刺痛連引腰背下血過多兩脅牽急嘔吐不食靣色青黃肌膚瘦瘁寢常自汗禹餘糧製一兩白薑炮芍藥白芷川椒製阿膠粉炒艾葉製川芎各三分右為末煉蜜圓如梧桐子大每服四十圓米飲下或溫酒醋湯亦得常服溫補胞室和養血氣光澤顔色消散風冷退除百病自成孕育性平不熱竹茹圓治婦人赤白帶下方見崩暴下血不止方地黃圓治婦人月經不調每行數日不止兼有白帶漸漸瘦瘁飲食少味纍年無子龎安常方熟地黃一兩一分山茱萸蕪荑仁各一兩乾薑三分白芍藥微炒代赭石各一兩白殭蠶厚朴各三分右為細末煉蜜為圓如梧桐子大空心溫酒下五十圓日三服許學士云凡婦人有白帶是第一病令人不産育宜速治之此扁鵲過邯鄲聞貴婦人有此病所以專為帶下醫也婦人白濁白淫方論第十八論曰夫婦人小便白濁白淫者皆由心腎不交養水火不升降或由勞傷於腎腎氣虛冷故也腎主水而開竅在隂隂為溲便之道胞冷腎損故有白濁白淫宜服局方金鎖正元丹或因心虛而得者宜服平補鎮心丹降心丹威喜元若因思慮過當致使隂陽不分清濁相干而成白濁者然思則傷脾故也宜用四七湯吞白圓子此藥極能分利方見簡易方更宜小烏沉湯每貼加茯苓一錢重益智二十枚去殼碾鹽煎服薑黃散治血臟久冷腹脹疼痛小便濃白如泔片子薑黃二兩大附子炮一兩赤芍藥柳桂紅藍子三稜各半兩牡丹皮芫花醋浸炒木香郁李仁去皮沒藥各一分右為細末每服一錢酒煎服如腹痛用當歸沒藥為末以水七分酒三分同煎至七分熱服婦人天癸過期經脈不調方論第十九許學士云婦人天癸過期而經脈不調或三四月不行或一月再至腰腹疼痛素問云七損七益謂女子七七數盡而經脈不依時者血有餘也不可止之但令得依時不腰痛為善宜服當歸散當歸川芎白芍藥黃芩白术各半兩山茱萸肉兩半右為細末空心食前溫酒調下二錢日三如冷者去黃芩加桂心一兩茱茰鹿茸圓補氣固血治本臟因虛生寒月經行多或來不及期腹痛怯風臟腑不和鹿茸五味子蓯蓉杜仲赤石脂各一兩吳茱茰附子乾薑黑龍骨肉豆蔲白茯苓各半兩乾地黃一兩半右為細末酒煮麵糊為圓如梧桐子大空心食前熱米飲吞下五七十圓一月後血氣已安去龍骨加沉香半兩可以常服中年已後婦人最宜服此藥婦人血分水分腫滿方論第二十夫婦人腫滿若先因經水斷絶後至四肢浮腫小便不通名曰血分水化為血血不通則復化為水矣宜椒仁圓若先因小便不利後身靣浮腫致經水不通名曰水分宜服葶藶圓治血分椒仁圓椒仁甘遂續隨子去皮研附子郁李仁黑牽牛五靈脂碎之炒當歸吳茱茰延胡索各半兩芫花醋浸一宿炒黃石膏各一分信砒膽礬各一錢斑貓糯米炒黃去米不用蚖青各三十枚去頭足翅糯米炒黃右為細末麵作糊為圓如豌豆大每服一圓橘皮湯下治經脈不利即為水水流走四肢悉皆腫滿名曰血分其候與水相類醫作水治之非也宜此方養生必用方人參當歸大黃濕紙裹三斗米下蒸米熟去紙切焙桂心瞿麥穗赤芍藥白茯苓各半兩葶藶炒别研一分右為末煉蜜圓如梧桐子大空心米飲下十五圓至二三十圓葶藶圓治水分王氏指迷方葶藶炒刑研續隨子去殼各半兩研乾笋末一兩右為末棗肉圓如梧桐子大每服七圓煎扁竹湯下如大便利者減續隨子葶藶各一分加白术半兩又有腸覃臚脹脾氣血氣血蠱水蠱石蠱血癭此數證亦與腫相頥並見後拾遺門出三十四卷婦人大全良方卷一
