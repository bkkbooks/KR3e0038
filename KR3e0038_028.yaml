body:
  text: 婦人大全良方卷二十四宋陳自明撰拾遺方烏喙元治腸覃病因寒氣客於腸外與胃氣相搏正氣不榮繫瘕內著惡氣乃起其生也始如雞卵久久乃成狀如懷胎按之堅推即移月事時下故曰腸覃亦治乳餘疾大小便不利并食有伏蟲臚脹癰疽毒腫久寒邪氣烏喙炮去皮尖二錢半夏湯洗七次四錢石膏煆藜蘆炒牡蒙蓯蓉酒浸各一錢乾薑炮桂心各一錢三字巴豆六七箇研膏右為末蜜元如緑豆大每服三五元食後酒飲任下亦治男子疝痛木香散治婦人脾氣血氣血蠱氣蠱水蠱石蠱木香沉香乳香研甘草炙各一分川芎胡椒陳皮人參晉礬各半兩桂心乾薑炮縮砂各一兩茴香炒兩半天茄五兩赤小者乾稱右細焙為末空心日午溫陳米飲調下二錢忌羊肉石莖散治婦人血結胞門或為癥瘕在腹脅間心腹脹滿腫急如石水狀俗謂之血蠱石莖一兩當歸尾馬鞭草紅花炒烏梅肉各半兩蓬莪茂三稜並炮蘇木節沒藥琥珀别研各一分甘草炙一錢右為末濃煎蘇木酒調下二錢不飲酒薑棗煎湯調亦得大腹皮飲治婦人血癭單單腹腫大腹皮防已木通厚朴薑製栝樓黃芪枳殼麩炒桑白皮炙大黃蒸陳皮青皮五味子各等分右㕮咀每服稱一兩水一碗煎至六分盞去滓入酒一分溫服不以時候大黃甘遂湯治婦人小腹滿如敦敦狀小便微難而不渴由産後為水與血并結在血室也大黃四兩蒸甘遂炮阿膠炒各二兩右銼散每服三錢水一盞煎七分去滓溫服其血當下竹茹湯治婦人汗血吐血尿血下血竹茹熟地黃各三兩人參白芍藥桔梗川芎當歸甘草炙桂心各一兩右㕮咀每服四錢水一大盞煎至七分去滓不以時服膏髮煎治婦人榖氣實胃氣下泄隂吹而正喧隂中出血頭髮灰豬脂右調停綿褁如棗核大納隂中産後腸頭如以針刺連榖道又如痔痛小便如淋狀或寒熱此産時用力氣併腸間亦由隂虛陽邪乘之毒氣攻衝恐成腸癰宜瓜子湯薏苡仁四兩桃仁去皮尖牡丹皮瓜樓子各一兩右為粗末每服五錢水二盞煎至一盞去滓溫服固真丹治元臟久虛及小腸腎餘膀胱疝氣五般淋疾精滑精漏小便白濁及婦人赤白帶下漏下血崩子宫血海虛泠等疾並皆治之髙司法方續添製蒼术法洗去土米泔浸逐日換新泔春五日夏三日如秋七日冬十日切作片子焙乾稱一斤分四處蒼术四兩入茴香一兩鹽一兩同炒令术黃為度蒼术四兩入川烏一兩炮裂去皮尖切作片子并川楝子一兩和皮核擘開同炒令术黃為度蒼术四兩入紅椒一兩去目并合口者破故紙一兩同炒令术黃為度蒼术四兩用好醋好酒各半升一處同煮二三十沸取术焙乾右一處為末用煮藥酒醋打麵糊為元如梧子大每服二十元男子溫酒或鹽湯下空心食前婦人醋湯下藥性溫無毒小便頻數為效大效內補元治受氣虛弱及五勞七傷藏府積泠痃癖癥塊虛脹或經脈不調疳冷赤白帶下口苦舌乾面色萎黃黑皯心煩驚悸頭目旋暈不美飲食痰涕黏涎手足百節熱疼無力肌肉消瘦子息斷緒服一月當妊娠百病皆愈萆薢四兩牛膝五加皮白术各二兩川烏炮枳實炒丹參各一兩右為細末煉蜜元如梧子大溫酒下二十元空心日午晚食前各進一服南嶽魏夫人濟隂丹治婦人血氣久冷無子及數經墮胎皆因衝任之脈虛損胞內宿挾疾病經水不時暴下不止月內再行或前或後或崩中漏下三十六疾積聚癥瘕臍下冷痛小便白濁以上疾證皆令孕育不成以致絶嗣此藥治産後百病百晬內常服除宿血生新血令人有孕及生子充實亦治男子亡血諸疾桃仁去皮尖雙仁麩炒木香炮茯苓京墨燒各一兩秦芁甘草人參桔梗炒石斛酒浸炒蠶布燒藁本各二兩當歸桂心乾薑炮細辛牡丹皮去心川芎各兩半川椒去目及閉口炒去汗山藥各三兩澤蘭葉熟地黃洗酒蒸焙香附子炒各四兩蒼术米泔浸去皮大豆卷炒各半升糯米炒一升右為細末煉蜜元每兩作六元每服二元細嚼溫酒送下淡醋湯調亦可空心食前服治面部生瘡或鼻臉赤風刺粉刺用盡藥不效者惟有此藥可治神效不可言每以少許臨卧時洗面令淨如面油用之數日間瘡腫處自平赤亦消如風刺粉刺一夕見效但塗藥勿近眼處生硫黃香白芷瓜樓子仁膩粉各半錢重全蝎七枚去翅足蟬蛻五枚洗芫青各七枚去翅足右為細末麻油黃蠟約度如合面油多少熬滚取下離火入諸藥在內每用少許塗面上林提點方烏雞煎治婦人百病吳茱茰良薑白薑當歸赤芍藥延胡索破故紙川椒生乾地黃劉寄奴蓬莪茂橘紅青皮川芎各一兩荷葉灰四兩熟艾二兩右為末醋煮麵糊元如梧子大每服三五十元湯使於後月經不通紅花蘇木酒下白帶牡蠣粉調酒下子宫久冷白茯苓煎湯下赤帶建茶清下血崩豆淋酒調綿灰下胎不安蜜和酒下腸風陳米飲調百草霜下心疼菖蒲煎酒下漏胎下血烏梅溫酒下耳聾蠟點茶下胎死不動斑貓三十箇煎酒下腳腰痛當歸酒下胎衣不下藝臺研水下頭風薄荷點茶下血風眼黑豆甘草湯下生瘡地黃湯下身體疼痛黃耆末調酒下四肢浮腫麝香湯下咳嗽喘滿杏仁桑白皮湯下腹痛芍藥調酒下産前後痢白者乾薑湯下赤者甘草湯下赤白雜者二宜湯下常服溫酒醋湯任下並空心食前服産乳集將護嬰兒方論凡新生兒坐婆急以綿纒手指繳去兒口中惡物令盡不可遲若咽入腹中必生諸疾聖惠方寶鑑方謂之玉銜疾先斷兒臍帶可只留二寸許更看帶中如有小蟲急撥去之留之必生異病或以線繫扎定然後洗兒不然則濕氣入腹必作臍風之疾須是坐婆諳練收生手段輕疾方得其宜既綳褁了取生甘草一寸捶銼用水一合煎濃汁用綿篆子蘸令兒咂之當吐出惡汁盡半合不妨今人止以濃煎黃連并甘草汁以綿篆子蘸令兒咂三日以來以退惡物大便下謂之臍屎此乃忌吐故也好辰砂一字研細以熟蜜調置兒口中吮之以去驚邪然後飼乳自此飼乳之後須依時量多寡與之勿令太飽恐成哯妳久則吐妳不可節也三朝洗兒可用虎頭骨桃枝豬膽金銀煎湯洗之則兒少驚尋常澡浴用豬膽汁化入湯即不生瘡疥每日頻就無風處看兒上㬽并兩頰內有白泡如膜起者速以指甲刮破更生更去之保童必效謂之鵝口無即不須妄動更看舌下恐生重舌皆由兒在胎中母喫炙􅏼肥膩飲酒服熱藥所致保童必效方自有藥治之三日烙臍帶或灸之外不可别加火艾恐成驚癎舊灸兒臍有二十壯者今以七壯為中又天寒時兒用父母舊衣作衣服不可用新綿絹只用舊者若太溫暖則令兒筋骨軟弱若天色和暖無風可令妳婆抱孩兒頻見風日則血壯氣剛肌體硬密堪耐風寒不致疾病又擇乳母須精神爽健情性和恱肌肉充肥無諸疾病知寒溫之宜能調節乳食妳汁濃白則可以飼兒不得與妳母大段酸鹹飲食仍忌才衝寒或衝熱來便餧兒妳如此則必成妳癖或驚疳㵼痢之疾切須忌之夜間不得令兒枕臂須作一二豆袋令兒枕兼左右附之可近乳母之側蓋覆衣衾須露兒頭面一向仰卧恐成驚疾須時復回動之夏月須涼簟如夜間餧妳須妳母起身坐地抱兒餧之如隂陽交接之際切不可餧兒妳此正謂之交妳也必生癖或換易衣綳三月房中不可太暖妳母不可頻喫酒恐兒作痰嗽驚熱昏眩之疾至於變蒸次第妳乳所傷夜啼潮熱之類自有専於小方脈者此略見之若能調和妳食并看承愛護如法則别無疾病亦不可令兒常服湯藥此尤宜審之也見楊氏嬰兒論巢氏病源嬰童寶鑑方程甫備要方初生浴兒良日寅卯酉日大吉壬申丁巳癸巳大凶木瓜元療兒初生下口中穢惡不盡入喉中即便吐自後才啼聲一發則又咽下因生異疾矣木瓜麝香膩粉木香檳榔末各一字右水麵糊元如小黃黍米大每服一二元甘草水下不拘時候延胡索散療兒初生下盤腸刺痛面青色啼哭不止延胡索一錢乳香木香各半錢右為細末水一大盞煎七分無時與服少許婦人大全良方卷二十四
